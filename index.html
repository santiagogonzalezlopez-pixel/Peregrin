  {id:705,country:'de',lat:50.939,lng:6.957,icon:'🏰',name:'Cologne Cathedral',type:'Cathedral',city:'Cologne',province:'North Rhine-Westphalia',description:'A UNESCO World Heritage Site and one of the greatest Gothic cathedrals in the world. It houses the Shrine of the Three Kings, the largest medieval reliquary in the Western world.',history:'Construction began in 1248 and was not completed until 1880 — over 600 years. The cathedral survived World War II bombing while surrounding Cologne was devastated. It remains Germany\'s most visited landmark.',prayer:'Lord, the Three Magi came from afar seeking you and offered their finest gifts. May we too seek you with the same determination and offer you the gift of our lives. Amen.',feast:'January 6 (Epiphany)',es:{name:'Catedral de Colonia',type:'Catedral',city:'Colonia',province:'Renania del Norte-Westfalia',description:'Patrimonio de la Humanidad de la UNESCO y una de las mayores catedrales góticas del mundo. Alberga el Relicario de los Reyes Magos, el relicario medieval más grande del mundo occidental.',history:'La construcción comenzó en 1248 y no se completó hasta 1880, más de 600 años. La catedral sobrevivió a los bombardeos de la Segunda Guerra Mundial mientras el Colonia circundante quedaba devastado. Sigue siendo el monumento más visitado de Alemania.',prayer:'Señor, los Tres Magos vinieron de lejos buscándote y ofrecieron sus mejores dones. Que nosotros también te busquemos con la misma determinación y te ofrezcamos el don de nuestras vidas. Amén.',feast:'6 de enero (Epifanía)'},fr:{name:'Cathédrale de Cologne',type:'Cathédrale',city:'Cologne',province:'Rhénanie-du-Nord-Westphalie',description:'Patrimoine mondial et l\'une des plus grandes cathédrales gothiques. Abrite le Reliquaire des Rois Mages.',history:'Construction de 1248 à 1880. Survécut aux bombardements de la Seconde Guerre mondiale.',prayer:'Seigneur, que nous te cherchions avec la même détermination que les Mages et t\'offrions nos vies. Amen.',feast:'6 janvier (Épiphanie)'},it:{name:'Cattedrale di Colonia',type:'Cattedrale',city:'Colonia',province:'Renania Settentrionale-Vestfalia',description:'Patrimonio dell\'Umanità e una delle più grandi cattedrali gotiche. Custodisce il Reliquiario dei Re Magi.',history:'Costruzione dal 1248 al 1880. Sopravvisse ai bombardamenti della Seconda Guerra Mondiale.',prayer:'Signore, che ti cerchiamo con la stessa determinazione dei Magi e ti offriamo le nostre vite. Amen.',feast:'6 gennaio (Epifania)'},pt:{name:'Catedral de Colónia',type:'Catedral',city:'Colónia',province:'Renânia do Norte-Vestefália',description:'Património da Humanidade e uma das maiores catedrais góticas. Alberga o Relicário dos Reis Magos.',history:'Construção de 1248 a 1880. Sobreviveu aos bombardeamentos da Segunda Guerra Mundial.',prayer:'Senhor, que te procuremos com a mesma determinação dos Magos e te ofereçamos as nossas vidas. Ámen.',feast:'6 de janeiro (Epifania)'}},

  // ===== AUSTRIA =====
  {id:801,country:'at',lat:47.772,lng:15.323,icon:'🏔️',name:'Mariazell Basilica',type:'Basilica',city:'Mariazell',province:'Styria',description:'The most important pilgrimage destination in Central Europe, drawing pilgrims from Austria, Hungary, Czech Republic, Slovakia and beyond. Home to the miraculous statue of the Madonna of Mariazell.',history:'Founded in 1157 when Benedictine monk Magnus placed a linden wood statue of the Madonna on a rock. The basilica was rebuilt in Baroque style in the 17th century. Fourteen Habsburg emperors visited.',prayer:'Mother of Mercy, Gate of Heaven, help of those who call upon you, we come to lay our needs before your throne. Take them to the heart of your Son Jesus. Amen.',feast:'September 8',es:{name:'Basílica de Mariazell',type:'Basílica',city:'Mariazell',province:'Estiria',description:'El destino de peregrinación más importante de Europa Central, que atrae peregrinos de Austria, Hungría, República Checa, Eslovaquia y más allá. Hogar de la milagrosa imagen de la Madonna de Mariazell.',history:'Fundada en 1157 cuando el monje benedictino Magnus colocó una estatua de madera de tilo de la Madonna sobre una roca. La basílica fue reconstruida en estilo barroco en el siglo XVII. Catorce emperadores habsburgo la visitaron.',prayer:'Madre de Misericordia, Puerta del Cielo, auxilio de quienes te invocan, venimos a depositar nuestras necesidades ante tu trono. Llévalas al corazón de tu Hijo Jesús. Amén.',feast:'8 de septiembre'},fr:{name:'Basilique de Mariazell',type:'Basilique',city:'Mariazell',province:'Styrie',description:'La destination de pèlerinage la plus importante d\'Europe centrale.',history:'Fondée en 1157. Reconstruite en baroque au XVIIe siècle. Quatorze empereurs Habsbourg la visitèrent.',prayer:'Mère de Miséricorde, nous venons déposer nos besoins devant ton trône. Porte-les au cœur de ton Fils. Amen.',feast:'8 septembre'},it:{name:'Basilica di Mariazell',type:'Basilica',city:'Mariazell',province:'Stiria',description:'La destinazione di pellegrinaggio più importante dell\'Europa centrale.',history:'Fondata nel 1157. Ricostruita in barocco nel XVII secolo. Quattordici imperatori asburgici la visitarono.',prayer:'Madre di Misericordia, veniamo a deporre le nostre necessità davanti al tuo trono. Portale al cuore di tuo Figlio. Amen.',feast:'8 settembre'},pt:{name:'Basílica de Mariazell',type:'Basílica',city:'Mariazell',province:'Estíria',description:'O destino de peregrinação mais importante da Europa Central.',history:'Fundada em 1157. Reconstruída em barroco no século XVII. Catorze imperadores Habsburgo visitaram.',prayer:'Mãe de Misericórdia, vimos depositar as nossas necessidades perante o teu trono. Leva-as ao coração do teu Filho. Ámen.',feast:'8 de setembro'}},
  {id:802,country:'at',lat:48.208,lng:16.373,icon:'🎵',name:'Saint Stephen\'s Cathedral',type:'Cathedral',city:'Vienna',province:'Vienna',description:'The mother church of the Archdiocese of Vienna and one of Europe\'s greatest Gothic cathedrals. The multicoloured tile roof and soaring South Tower are symbols of Vienna.',history:'Built between 1137 and 1511. The famous Pummerin bell was recast from Ottoman cannons captured at the 1683 Battle of Vienna. Mozart\'s funeral was held here. The Habsburg catacombs lie beneath.',prayer:'Lord, in this cathedral where emperors prayed and saints were honoured, may we too find you present in the beauty of your house. Amen.',feast:'August 15 (Assumption — Cathedral dedication)',es:{name:'Catedral de San Esteban',type:'Catedral',city:'Viena',province:'Viena',description:'La iglesia madre de la Archidiócesis de Viena y una de las mayores catedrales góticas de Europa. El tejado de tejas multicolores y la imponente Torre Sur son símbolos de Viena.',history:'Construida entre 1137 y 1511. La famosa campana Pummerin fue refundida con cañones otomanos capturados en la batalla de Viena de 1683. El funeral de Mozart se celebró aquí. Las catacumbas de los Habsburgo se encuentran debajo.',prayer:'Señor, en esta catedral donde rezaron emperadores y se honró a los santos, que nosotros también te encontremos presente en la belleza de tu templo. Amén.',feast:'15 de agosto (Asunción — dedicación)'},fr:{name:'Cathédrale Saint-Étienne',type:'Cathédrale',city:'Vienne',province:'Vienne',description:'L\'une des plus grandes cathédrales gothiques d\'Europe. Le toit multicolore et la Tour Sud symbolisent Vienne.',history:'Construite entre 1137 et 1511. La cloche Pummerin fut refondue avec des canons ottomans de 1683. Funérailles de Mozart.',prayer:'Seigneur, que nous te trouvions dans la beauté de ta maison. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Santo Stefano',type:'Cattedrale',city:'Vienna',province:'Vienna',description:'Una delle più grandi cattedrali gotiche d\'Europa. Il tetto multicolore e la Torre Sud simboleggiano Vienna.',history:'Costruita tra il 1137 e il 1511. La campana Pummerin fu rifusa con cannoni ottomani del 1683. Funerale di Mozart.',prayer:'Signore, che ti troviamo nella bellezza della tua casa. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Catedral de Santo Estêvão',type:'Catedral',city:'Viena',province:'Viena',description:'Uma das maiores catedrais góticas da Europa. O telhado multicolorido e a Torre Sul simbolizam Viena.',history:'Construída entre 1137 e 1511. O sino Pummerin foi refundido com canhões otomanos de 1683. Funeral de Mozart.',prayer:'Senhor, que te encontremos na beleza da tua casa. Ámen.',feast:'15 de agosto (Assunção)'}},
  {id:803,country:'at',lat:47.803,lng:13.045,icon:'✝️',name:'Nonnberg Abbey',type:'Abbey',city:'Salzburg',province:'Salzburg',description:'The oldest convent in the German-speaking world, founded around 714 AD by Saint Rupert. It overlooks Salzburg from its rocky perch and was immortalised in The Sound of Music.',history:'Founded by Saint Rupert and his niece Saint Erentrudis, the first abbess. The Romanesque church dates from the 12th century. The convent has been continuously inhabited by Benedictine nuns for over 1,300 years.',prayer:'Lord, in this place consecrated to your praise for over thirteen centuries, may the prayers of the nuns of Nonnberg rise with ours to you as a sweet fragrance. Amen.',feast:'June 30 (Saint Erentrudis)',es:{name:'Abadía de Nonnberg',type:'Abadía',city:'Salzburgo',province:'Salzburgo',description:'El convento más antiguo del mundo de habla alemana, fundado hacia el año 714 d.C. por San Ruperto. Domina Salzburgo desde su emplazamiento rocoso y fue inmortalizado en Sonrisas y lágrimas.',history:'Fundada por San Ruperto y su sobrina Santa Erentruda, la primera abadesa. La iglesia románica data del siglo XII. El convento ha sido habitado de forma continua por monjas benedictinas durante más de 1.300 años.',prayer:'Señor, en este lugar consagrado a tu alabanza durante más de trece siglos, que las oraciones de las monjas de Nonnberg se unan a las nuestras hacia ti como suave fragancia. Amén.',feast:'30 de junio (Santa Erentruda)'},fr:{name:'Abbaye de Nonnberg',type:'Abbaye',city:'Salzbourg',province:'Salzbourg',description:'Le plus ancien couvent du monde germanophone, fondé vers 714 par saint Rupert. Immortalisé dans La Mélodie du bonheur.',history:'Habité continuellement par des bénédictines depuis plus de 1 300 ans.',prayer:'Seigneur, que les prières des moniales s\'élèvent avec les nôtres vers toi. Amen.',feast:'30 juin (Sainte Erentrudis)'},it:{name:'Abbazia di Nonnberg',type:'Abbazia',city:'Salisburgo',province:'Salisburgo',description:'Il convento più antico del mondo germanofono, fondato verso il 714 da San Ruperto. Immortalato in Tutti insieme appassionatamente.',history:'Abitato continuamente da benedettine da oltre 1.300 anni.',prayer:'Signore, che le preghiere delle monache si uniscano alle nostre verso di te. Amen.',feast:'30 giugno (Santa Erentrude)'},pt:{name:'Abadia de Nonnberg',type:'Abadia',city:'Salzburgo',province:'Salzburgo',description:'O convento mais antigo do mundo germanófono, fundado por volta de 714 por São Ruperto. Imortalizado em Música no Coração.',history:'Habitado continuamente por beneditinas há mais de 1.300 anos.',prayer:'Senhor, que as orações das monjas se unam às nossas até ti. Ámen.',feast:'30 de junho (Santa Erentrudis)'}},
  {id:804,country:'at',lat:47.2568,lng:11.3933,icon:'⛰️',name:'Wilten Basilica',type:'Basilica',city:'Innsbruck',province:'Tyrol',description:'A stunning yellow Baroque basilica in the Tyrolian capital, housing a revered 14th-century statue of Our Lady known as the Patroness of Tyrol, Magna Mater Austriae.',history:'The basilica was built between 1751 and 1756. The statue of Our Lady was already venerated in the 14th century. Emperor Franz Joseph visited in 1883 and elevated it to the status of basilica.',prayer:'Our Lady, Great Mother of Austria, under your mantle this Alpine land has sheltered for centuries. Continue to watch over us and our families. Amen.',feast:'September 8',es:{name:'Basílica de Wilten',type:'Basílica',city:'Innsbruck',province:'Tirol',description:'Una impresionante basílica barroca amarilla en la capital tirolesa, que alberga una venerada estatua del siglo XIV de Nuestra Señora, conocida como la Patrona del Tirol, Magna Mater Austriae.',history:'La basílica fue construida entre 1751 y 1756. La estatua de Nuestra Señora ya era venerada en el siglo XIV. El emperador Francisco José la visitó en 1883 y la elevó al rango de basílica.',prayer:'Nuestra Señora, Gran Madre de Austria, bajo tu manto esta tierra alpina ha encontrado cobijo durante siglos. Continúa velando por nosotros y nuestras familias. Amén.',feast:'8 de septiembre'},fr:{name:'Basilique de Wilten',type:'Basilique',city:'Innsbruck',province:'Tyrol',description:'Magnifique basilique baroque jaune avec la statue vénérée de la Magna Mater Austriae.',history:'Construite entre 1751 et 1756. Élevée au rang de basilique par François-Joseph en 1883.',prayer:'Notre-Dame, Grande Mère d\'Autriche, continue de veiller sur nous et nos familles. Amen.',feast:'8 septembre'},it:{name:'Basilica di Wilten',type:'Basilica',city:'Innsbruck',province:'Tirolo',description:'Splendida basilica barocca gialla con la venerata statua della Magna Mater Austriae.',history:'Costruita tra il 1751 e il 1756. Elevata a basilica da Francesco Giuseppe nel 1883.',prayer:'Nostra Signora, Grande Madre d\'Austria, continua a vegliare su di noi e le nostre famiglie. Amen.',feast:'8 settembre'},pt:{name:'Basílica de Wilten',type:'Basílica',city:'Innsbruck',province:'Tirol',description:'Esplêndida basílica barroca amarela com a venerada estátua da Magna Mater Austriae.',history:'Construída entre 1751 e 1756. Elevada a basílica por Francisco José em 1883.',prayer:'Nossa Senhora, Grande Mãe da Áustria, continua a velar por nós e pelas nossas famílias. Ámen.',feast:'8 de setembro'}},
  {id:805,country:'at',lat:48.0547,lng:14.1328,icon:'📿',name:'Kremsmünster Abbey',type:'Abbey',city:'Kremsmünster',province:'Upper Austria',description:'One of Austria\'s oldest and most magnificent Benedictine abbeys, founded in 777 AD by Duke Tassilo III. Its fish ponds, observatory and library make it a remarkable cultural and spiritual landmark.',history:'Founded as a memorial to Duke Tassilo\'s son killed in a hunting accident. The abbey has operated continuously for over 1,200 years and houses the Tassilo Chalice, one of the finest pieces of early medieval art.',prayer:'Lord, like Duke Tassilo who gave his grief to God, may we too transform our sorrows into offerings of love and build something lasting for your glory. Amen.',feast:'October 11 (Saint Gunther)',es:{name:'Abadía de Kremsmünster',type:'Abadía',city:'Kremsmünster',province:'Alta Austria',description:'Una de las abadías benedictinas más antiguas y magníficas de Austria, fundada en el año 777 d.C. por el duque Tasilo III. Sus estanques de peces, observatorio y biblioteca la convierten en un notable hito cultural y espiritual.',history:'Fundada en memoria del hijo del duque Tasilo, muerto en una cacería. La abadía ha funcionado de forma continua durante más de 1.200 años y alberga el Cáliz de Tasilo, una de las mejores piezas del arte medieval temprano.',prayer:'Señor, como el duque Tasilo que entregó su dolor a Dios, que nosotros también transformemos nuestros sufrimientos en ofrendas de amor y construyamos algo duradero para tu gloria. Amén.',feast:'11 de octubre (San Günther)'},fr:{name:'Abbaye de Kremsmünster',type:'Abbaye',city:'Kremsmünster',province:'Haute-Autriche',description:'L\'une des plus anciennes abbayes bénédictines d\'Autriche, fondée en 777 par le duc Tassilo III.',history:'Fonctionne depuis plus de 1 200 ans. Abrite le Calice de Tassilo, chef-d\'œuvre de l\'art médiéval.',prayer:'Seigneur, que nous transformions nos peines en offrandes d\'amour pour ta gloire. Amen.',feast:'11 octobre (Saint Günther)'},it:{name:'Abbazia di Kremsmünster',type:'Abbazia',city:'Kremsmünster',province:'Alta Austria',description:'Una delle più antiche abbazie benedettine d\'Austria, fondata nel 777 dal duca Tassilone III.',history:'Funziona da oltre 1.200 anni. Custodisce il Calice di Tassilone, capolavoro dell\'arte medievale.',prayer:'Signore, che trasformiamo le nostre sofferenze in offerte d\'amore per la tua gloria. Amen.',feast:'11 ottobre (San Günther)'},pt:{name:'Abadia de Kremsmünster',type:'Abadia',city:'Kremsmünster',province:'Alta Áustria',description:'Uma das mais antigas abadias beneditinas da Áustria, fundada em 777 pelo duque Tassilo III.',history:'Funciona há mais de 1.200 anos. Alberga o Cálice de Tassilo, obra-prima da arte medieval.',prayer:'Senhor, que transformemos os nossos sofrimentos em ofertas de amor para a tua glória. Ámen.',feast:'11 de outubro (São Günther)'}},

  // ===== CROATIA =====
  {id:901,country:'ba',lat:43.194,lng:17.677,icon:'🌟',name:'Shrine of Our Lady of Medjugorje',type:'Marian shrine',city:'Međugorje',province:'Herzegovina',description:'One of the most visited pilgrimage sites in the world, where six visionaries have reported apparitions of the Virgin Mary since 1981. Millions of pilgrims come each year seeking peace and conversion.',history:'The first apparition occurred on June 24, 1981. The messages emphasise prayer, fasting, conversion, peace and faith. The Church is still investigating the apparitions. An estimated 40 million pilgrims have visited.',prayer:'Our Lady of Medjugorje, Queen of Peace, you call us to prayer, fasting and conversion. Help us to respond to your messages and become apostles of your peace. Amen.',feast:'June 25 (Anniversary of the apparitions)',es:{name:'Santuario de Nuestra Señora de Medjugorje',type:'Santuario mariano',city:'Medjugorje',province:'Herzegovina',description:'Uno de los lugares de peregrinación más visitados del mundo, donde seis videntes han relatado apariciones de la Virgen María desde 1981. Millones de peregrinos acuden cada año buscando paz y conversión.',history:'La primera aparición ocurrió el 24 de junio de 1981. Los mensajes enfatizan la oración, el ayuno, la conversión, la paz y la fe. La Iglesia sigue investigando las apariciones. Se estima que 40 millones de peregrinos han visitado el lugar.',prayer:'Nuestra Señora de Medjugorje, Reina de la Paz, nos llamas a la oración, el ayuno y la conversión. Ayúdanos a responder a tus mensajes y a convertirnos en apóstoles de tu paz. Amén.',feast:'25 de junio (Aniversario de las apariciones)'},fr:{name:'Sanctuaire de Notre-Dame de Medjugorje',type:'Sanctuaire marial',city:'Medjugorje',province:'Herzégovine',description:'L\'un des lieux les plus visités au monde. Six voyants rapportent des apparitions de la Vierge depuis 1981.',history:'Première apparition le 24 juin 1981. Les messages insistent sur prière, jeûne et conversion. Environ 40 millions de pèlerins.',prayer:'Notre-Dame de Medjugorje, Reine de la Paix, aide-nous à devenir des apôtres de ta paix. Amen.',feast:'25 juin (Anniversaire des apparitions)'},it:{name:'Santuario di Nostra Signora di Medjugorje',type:'Santuario mariano',city:'Medjugorje',province:'Erzegovina',description:'Uno dei luoghi più visitati al mondo. Sei veggenti riferiscono apparizioni della Vergine dal 1981.',history:'Prima apparizione il 24 giugno 1981. I messaggi insistono su preghiera, digiuno e conversione. Circa 40 milioni di pellegrini.',prayer:'Nostra Signora di Medjugorje, Regina della Pace, aiutaci a diventare apostoli della tua pace. Amen.',feast:'25 giugno (Anniversario delle apparizioni)'},pt:{name:'Santuário de Nossa Senhora de Medjugorje',type:'Santuário mariano',city:'Medjugorje',province:'Herzegovina',description:'Um dos lugares mais visitados do mundo. Seis videntes relatam aparições da Virgem desde 1981.',history:'Primeira aparição a 24 de junho de 1981. As mensagens insistem na oração, jejum e conversão. Cerca de 40 milhões de peregrinos.',prayer:'Nossa Senhora de Medjugorje, Rainha da Paz, ajuda-nos a tornar-nos apóstolos da tua paz. Ámen.',feast:'25 de junho (Aniversário das aparições)'}},
  {id:902,country:'hr',lat:43.508,lng:16.440,icon:'⛪',name:'Cathedral of Saint Domnius',type:'Cathedral',city:'Split',province:'Dalmatia',description:'The world\'s oldest cathedral in continuous use, converted from the mausoleum of Roman Emperor Diocletian — the very emperor who persecuted Saint Domnius, whose relics it now houses.',history:'Built as Diocletian\'s mausoleum in the 4th century, it was converted to a Christian cathedral in the 7th century. The ancient columns and peristyle of the original Roman palace still surround it.',prayer:'Saint Domnius, martyr of Salona, whose relics rest in the tomb of the very emperor who condemned you — a remarkable reversal! Help us to trust in God\'s ultimate victory. Amen.',feast:'May 7 (Saint Domnius)',es:{name:'Catedral de San Doymo',type:'Catedral',city:'Split',province:'Dalmacia',description:'La catedral del mundo en uso continuo más antigua, convertida del mausoleo del emperador romano Diocleciano, el mismo que persiguió a San Doymo, cuyas reliquias alberga ahora.',history:'Construida como mausoleo de Diocleciano en el siglo IV, fue convertida en catedral cristiana en el siglo VII. Las antiguas columnas y el peristilo del palacio romano original aún la rodean.',prayer:'San Doymo, mártir de Salona, cuyas reliquias reposan en la tumba del mismo emperador que te condenó, ¡una notable inversión! Ayúdanos a confiar en la victoria final de Dios. Amén.',feast:'7 de mayo (San Doymo)'},fr:{name:'Cathédrale Saint-Domnius',type:'Cathédrale',city:'Split',province:'Dalmatie',description:'La plus ancienne cathédrale en usage continu, convertie du mausolée de Dioclétien.',history:'Mausolée du IVe siècle converti en cathédrale au VIIe siècle.',prayer:'Saint Domnius, aide-nous à croire en la victoire finale de Dieu. Amen.',feast:'7 mai (Saint Domnius)'},it:{name:'Cattedrale di San Doimo',type:'Cattedrale',city:'Spalato',province:'Dalmazia',description:'La cattedrale in uso continuo più antica al mondo, convertita dal mausoleo di Diocleziano.',history:'Mausoleo del IV secolo convertito in cattedrale nel VII secolo.',prayer:'San Doimo, aiutaci a credere nella vittoria finale di Dio. Amen.',feast:'7 maggio (San Doimo)'},pt:{name:'Catedral de São Domnius',type:'Catedral',city:'Split',province:'Dalmácia',description:'A catedral em uso contínuo mais antiga do mundo, convertida do mausoléu de Diocleciano.',history:'Mausoléu do século IV convertido em catedral no século VII.',prayer:'São Domnius, ajuda-nos a acreditar na vitória final de Deus. Ámen.',feast:'7 de maio (São Domnius)'}},
  {id:903,country:'hr',lat:45.814,lng:15.977,icon:'🏛️',name:'Zagreb Cathedral',type:'Cathedral',city:'Zagreb',province:'Zagreb',description:'The tallest building in Croatia and the most monumental building of Gothic style in southeastern Europe. It dominates the Zagreb skyline with its twin neo-Gothic spires.',history:'The first cathedral was consecrated in 1217. Destroyed by the Mongols in 1242 and rebuilt. The current neo-Gothic appearance results from extensive rebuilding after the 1880 earthquake. It houses the tomb of Cardinal Alojzije Stepinac.',prayer:'Blessed Cardinal Stepinac, you defended human dignity and the rights of your people at the cost of your freedom. Pray for Croatia and all those who suffer for justice. Amen.',feast:'February 10 (Blessed Alojzije Stepinac)',es:{name:'Catedral de Zagreb',type:'Catedral',city:'Zagreb',province:'Zagreb',description:'El edificio más alto de Croacia y el más monumental en estilo gótico del sureste de Europa. Domina el horizonte de Zagreb con sus dos agujas neogóticas.',history:'La primera catedral fue consagrada en 1217. Destruida por los mongoles en 1242 y reconstruida. El aspecto neogótico actual es el resultado de una amplia reconstrucción tras el terremoto de 1880. Alberga la tumba del cardenal Alojzije Stepinac.',prayer:'Beato cardenal Stepinac, defendiste la dignidad humana y los derechos de tu pueblo al precio de tu libertad. Ruega por Croacia y por todos los que sufren por la justicia. Amén.',feast:'10 de febrero (Beato Alojzije Stepinac)'},fr:{name:'Cathédrale de Zagreb',type:'Cathédrale',city:'Zagreb',province:'Zagreb',description:'Le bâtiment le plus haut de Croatie en style gothique. Abrite la tombe du cardinal Stepinac.',history:'Première consécration en 1217. Reconstruite en néogothique après le séisme de 1880.',prayer:'Bienheureux Stepinac, prie pour la Croatie et tous ceux qui souffrent pour la justice. Amen.',feast:'10 février (Bienheureux Stepinac)'},it:{name:'Cattedrale di Zagabria',type:'Cattedrale',city:'Zagabria',province:'Zagabria',description:'L\'edificio più alto della Croazia in stile gotico. Custodisce la tomba del cardinale Stepinac.',history:'Prima consacrazione nel 1217. Ricostruita in neogotico dopo il terremoto del 1880.',prayer:'Beato Stepinac, prega per la Croazia e tutti coloro che soffrono per la giustizia. Amen.',feast:'10 febbraio (Beato Stepinac)'},pt:{name:'Catedral de Zagreb',type:'Catedral',city:'Zagreb',province:'Zagreb',description:'O edifício mais alto da Croácia em estilo gótico. Alberga o túmulo do cardeal Stepinac.',history:'Primeira consagração em 1217. Reconstruída em neogótico após o terramoto de 1880.',prayer:'Beato Stepinac, reza pela Croácia e por todos os que sofrem pela justiça. Ámen.',feast:'10 de fevereiro (Beato Stepinac)'}},
  {id:904,country:'hr',lat:45.327,lng:14.442,icon:'🌊',name:'Sanctuary of Our Lady of Trsat',type:'Sanctuary',city:'Rijeka',province:'Primorje',description:'Perched on a cliff above Rijeka, Trsat is one of the oldest and most visited Marian shrines in Croatia. Legend holds that the Holy House of Nazareth stopped here on its way to Loreto.',history:'The shrine dates to the 13th century. A 13th-century chapel was built by Prince Nicholas Frankopan after miraculous cures were reported. The current church was rebuilt in Baroque style. A monumental staircase of 561 steps leads up to it.',prayer:'Our Lady of Trsat, who rested on this cliff above the sea, give rest to our hearts too. Be our companion on every journey and bring us safely home. Amen.',feast:'May 10 (Our Lady of Trsat)',es:{name:'Santuario de Nuestra Señora de Trsat',type:'Santuario',city:'Rijeka',province:'Primorje',description:'Enclavado en un acantilado sobre Rijeka, Trsat es uno de los santuarios marianos más antiguos y visitados de Croacia. La leyenda cuenta que la Santa Casa de Nazaret se detuvo aquí de camino a Loreto.',history:'El santuario data del siglo XIII. El príncipe Nicolás Frankopan construyó una capilla del siglo XIII tras relatarse curaciones milagrosas. La actual iglesia fue reconstruida en estilo barroco. Una escalinata monumental de 561 escalones sube hasta ella.',prayer:'Nuestra Señora de Trsat, que reposaste en este acantilado sobre el mar, da también descanso a nuestros corazones. Sé nuestra compañera en cada viaje y llévanos sanos a casa. Amén.',feast:'10 de mayo (Nuestra Señora de Trsat)'},fr:{name:'Sanctuaire de Notre-Dame de Trsat',type:'Sanctuaire',city:'Rijeka',province:'Primorje',description:'L\'un des plus anciens sanctuaires mariaux de Croatie, sur une falaise au-dessus de Rijeka.',history:'Date du XIIIe siècle. Escalier monumental de 561 marches.',prayer:'Notre-Dame de Trsat, donne le repos à nos cœurs. Sois notre compagne à chaque voyage. Amen.',feast:'10 mai (Notre-Dame de Trsat)'},it:{name:'Santuario di Nostra Signora di Trsat',type:'Santuario',city:'Rijeka',province:'Primorje',description:'Uno dei più antichi santuari mariani della Croazia, su una scogliera sopra Rijeka.',history:'Risale al XIII secolo. Scalinata monumentale di 561 gradini.',prayer:'Nostra Signora di Trsat, dai riposo ai nostri cuori. Sii la nostra compagna in ogni viaggio. Amen.',feast:'10 maggio (Nostra Signora di Trsat)'},pt:{name:'Santuário de Nossa Senhora de Trsat',type:'Santuário',city:'Rijeka',province:'Primorje',description:'Um dos mais antigos santuários marianos da Croácia, num penhasco sobre Rijeka.',history:'Data do século XIII. Escadaria monumental de 561 degraus.',prayer:'Nossa Senhora de Trsat, dá descanso aos nossos corações. Sê a nossa companheira em cada viagem. Ámen.',feast:'10 de maio (Nossa Senhora de Trsat)'}},
  {id:905,country:'hr',lat:43.7356,lng:15.8899,icon:'💒',name:'Cathedral of Saint James',type:'Cathedral',city:'Šibenik',province:'Dalmatia',description:'A UNESCO World Heritage Site and one of the most significant architectural monuments of the Renaissance period. Built entirely of stone without any brick or wood, a remarkable engineering achievement.',history:'Construction spanned 105 years (1431–1536). Three architects oversaw the building. The innovative all-stone construction technique developed here influenced architecture across the Mediterranean.',prayer:'Saint James, patron of pilgrims, may your cathedral inspire us with the perseverance of its builders, who worked across generations for the glory of God. Amen.',feast:'July 25 (Saint James)',es:{name:'Catedral de Santiago',type:'Catedral',city:'Šibenik',province:'Dalmacia',description:'Patrimonio de la Humanidad de la UNESCO y uno de los monumentos arquitectónicos más significativos del período renacentista. Construida íntegramente en piedra, sin ladrillo ni madera, un notable logro de ingeniería.',history:'La construcción se prolongó 105 años (1431-1536). Tres arquitectos supervisaron las obras. La innovadora técnica de construcción en piedra desarrollada aquí influyó en la arquitectura de todo el Mediterráneo.',prayer:'Santiago apóstol, patrón de los peregrinos, que tu catedral nos inspire con la perseverancia de sus constructores, que trabajaron a lo largo de generaciones para la gloria de Dios. Amén.',feast:'25 de julio (Santiago Apóstol)'},fr:{name:'Cathédrale Saint-Jacques',type:'Cathédrale',city:'Šibenik',province:'Dalmatie',description:'Patrimoine mondial. Monument Renaissance construit entièrement en pierre, sans brique ni bois.',history:'Construction de 1431 à 1536. La technique en pierre influença l\'architecture méditerranéenne.',prayer:'Saint Jacques, que ta cathédrale nous inspire par la persévérance de ses bâtisseurs. Amen.',feast:'25 juillet (Saint Jacques)'},it:{name:'Cattedrale di San Giacomo',type:'Cattedrale',city:'Sebenico',province:'Dalmazia',description:'Patrimonio dell\'Umanità. Monumento rinascimentale costruito interamente in pietra, senza mattoni né legno.',history:'Costruzione dal 1431 al 1536. La tecnica in pietra influenzò l\'architettura mediterranea.',prayer:'San Giacomo, che la tua cattedrale ci ispiri con la perseveranza dei suoi costruttori. Amen.',feast:'25 luglio (San Giacomo)'},pt:{name:'Catedral de São Tiago',type:'Catedral',city:'Šibenik',province:'Dalmácia',description:'Património da Humanidade. Monumento renascentista construído inteiramente em pedra, sem tijolo nem madeira.',history:'Construção de 1431 a 1536. A técnica em pedra influenciou a arquitetura mediterrânica.',prayer:'São Tiago, que a tua catedral nos inspire com a perseverança dos seus construtores. Ámen.',feast:'25 de julho (São Tiago)'}},

  // ===== MEXICO =====
  {id:1001,country:'mx',lat:19.4846,lng:-99.1177,icon:'🌹',name:'Basilica of Our Lady of Guadalupe',type:'Marian shrine',city:'Mexico City',province:'Mexico City',description:'The most visited Catholic pilgrimage site in the world after the Vatican, receiving over 20 million pilgrims a year. Home to the miraculous tilma of Juan Diego, imprinted with the image of Our Lady.',history:'The Virgin Mary appeared to the indigenous Juan Diego in 1531 on Tepeyac Hill. The image of Our Lady miraculously appeared on his cloak. The current modern basilica was built in 1974 next to the original church. Juan Diego was canonised by Pope John Paul II in 2002.',prayer:'Our Lady of Guadalupe, Mother of all the Americas, you appeared to the humble Juan Diego and left us your image as a sign of your love. Protect your people and draw all hearts to your Son Jesus. Amen.',feast:'December 12',es:{name:'Basílica de Nuestra Señora de Guadalupe',type:'Santuario mariano',city:'Ciudad de México',province:'Ciudad de México',description:'El lugar de peregrinación católica más visitado del mundo después del Vaticano, con más de 20 millones de peregrinos al año. Alberga la milagrosa tilma de Juan Diego, con la imagen de Nuestra Señora impresa en ella.',history:'La Virgen María se apareció al indígena Juan Diego en 1531 en el Cerro del Tepeyac. La imagen de Nuestra Señora apareció milagrosamente en su manto. La moderna basílica actual fue construida en 1974 junto a la iglesia original. Juan Diego fue canonizado por el Papa Juan Pablo II en 2002.',prayer:'Nuestra Señora de Guadalupe, Madre de todas las Américas, te apareciste al humilde Juan Diego y nos dejaste tu imagen como signo de tu amor. Protege a tu pueblo y acerca todos los corazones a tu Hijo Jesús. Amén.',feast:'12 de diciembre'},fr:{name:'Basilique Notre-Dame de Guadalupe',type:'Sanctuaire marial',city:'Mexico',province:'Mexico',description:'Le lieu de pèlerinage le plus visité au monde après le Vatican. Plus de 20 millions de pèlerins par an.',history:'La Vierge apparut à Juan Diego en 1531. L\'image apparut sur sa tilma. Canonisé en 2002.',prayer:'Notre-Dame de Guadalupe, Mère des Amériques, protège ton peuple et attire tous les cœurs vers ton Fils. Amen.',feast:'12 décembre'},it:{name:'Basilica di Nostra Signora di Guadalupe',type:'Santuario mariano',city:'Città del Messico',province:'Città del Messico',description:'Il luogo di pellegrinaggio più visitato al mondo dopo il Vaticano. Oltre 20 milioni di pellegrini all\'anno.',history:'La Vergine apparve a Juan Diego nel 1531. L\'immagine apparve sulla sua tilma. Canonizzato nel 2002.',prayer:'Nostra Signora di Guadalupe, Madre delle Americhe, proteggi il tuo popolo e attira tutti i cuori verso tuo Figlio. Amen.',feast:'12 dicembre'},pt:{name:'Basílica de Nossa Senhora de Guadalupe',type:'Santuário mariano',city:'Cidade do México',province:'Cidade do México',description:'O lugar de peregrinação mais visitado do mundo após o Vaticano. Mais de 20 milhões de peregrinos por ano.',history:'A Virgem apareceu a Juan Diego em 1531. A imagem apareceu na sua tilma. Canonizado em 2002.',prayer:'Nossa Senhora de Guadalupe, Mãe das Américas, protege o teu povo e atrai todos os corações para o teu Filho. Ámen.',feast:'12 de dezembro'}},
  {id:1002,country:'mx',lat:21.2468,lng:-102.3303,icon:'⭐',name:'Sanctuary of Our Lady of San Juan de los Lagos',type:'Marian shrine',city:'San Juan de los Lagos',province:'Jalisco',description:'One of the most important Marian shrines in Mexico, receiving over 8 million pilgrims a year. The small ceramic image of the Immaculate Conception has been venerated here since the 17th century.',history:'The image was brought by Franciscan missionaries in 1542. In 1623 a miraculous healing was attributed to it and devotion spread rapidly. The current neo-classical basilica dates from the 18th century. It is the second most visited shrine in Mexico.',prayer:'Our Lady of San Juan de los Lagos, you have heard the prayers of millions of pilgrims who cross deserts and mountains to reach you. Hear our prayer too and bring us closer to your Son. Amen.',feast:'February 2 (Candlemas)',es:{name:'Santuario de Nuestra Señora de San Juan de los Lagos',type:'Santuario mariano',city:'San Juan de los Lagos',province:'Jalisco',description:'Uno de los santuarios marianos más importantes de México, con más de 8 millones de peregrinos al año. La pequeña imagen de cerámica de la Inmaculada Concepción es venerada aquí desde el siglo XVII.',history:'La imagen fue traída por misioneros franciscanos en 1542. En 1623 se le atribuyó una curación milagrosa y la devoción se extendió rápidamente. La actual basílica neoclásica data del siglo XVIII. Es el segundo santuario más visitado de México.',prayer:'Nuestra Señora de San Juan de los Lagos, has escuchado las oraciones de millones de peregrinos que cruzan desiertos y montañas para llegar a ti. Escucha también la nuestra y acércanos a tu Hijo. Amén.',feast:'2 de febrero (Candelaria)'},fr:{name:'Sanctuaire de Notre-Dame de San Juan de los Lagos',type:'Sanctuaire marial',city:'San Juan de los Lagos',province:'Jalisco',description:'L\'un des sanctuaires les plus importants du Mexique avec plus de 8 millions de pèlerins par an.',history:'Image apportée par des franciscains en 1542. Guérison miraculeuse en 1623. Deuxième sanctuaire du Mexique.',prayer:'Notre-Dame de San Juan de los Lagos, entends notre prière et rapproche-nous de ton Fils. Amen.',feast:'2 février (Chandeleur)'},it:{name:'Santuario di Nostra Signora di San Juan de los Lagos',type:'Santuario mariano',city:'San Juan de los Lagos',province:'Jalisco',description:'Uno dei santuari più importanti del Messico con oltre 8 milioni di pellegrini all\'anno.',history:'Immagine portata dai francescani nel 1542. Guarigione miracolosa nel 1623. Secondo santuario del Messico.',prayer:'Nostra Signora di San Juan de los Lagos, ascolta la nostra preghiera e avvicinaci a tuo Figlio. Amen.',feast:'2 febbraio (Candelora)'},pt:{name:'Santuário de Nossa Senhora de San Juan de los Lagos',type:'Santuário mariano',city:'San Juan de los Lagos',province:'Jalisco',description:'Um dos santuários mais importantes do México com mais de 8 milhões de peregrinos por ano.',history:'Imagem trazida por franciscanos em 1542. Cura milagrosa em 1623. Segundo santuário do México.',prayer:'Nossa Senhora de San Juan de los Lagos, ouve a nossa oração e aproxima-nos do teu Filho. Ámen.',feast:'2 de fevereiro (Candelária)'}},
  {id:1003,country:'mx',lat:18.9625,lng:-99.4708,icon:'🕯️',name:'Sanctuary of the Lord of Chalma',type:'Sanctuary',city:'Chalma',province:'State of Mexico',description:'The second most visited pilgrimage site in Mexico after Guadalupe. The miraculous image of the Lord of Chalma, a dark-skinned Christ crucified, attracts millions who walk for days to reach it.',history:'An image of Christ appeared miraculously in a cave in 1537, replacing a pre-Hispanic idol. The cave became a chapel, then a church, and today an Augustinian monastery surrounds it. Pilgrims traditionally arrive wearing flower crowns.',prayer:'Lord of Chalma, you appeared in the darkness of a cave to bring light to your people. In the darkest moments of our lives, be our light and our strength. Amen.',feast:'First Sunday of January',es:{name:'Santuario del Señor de Chalma',type:'Santuario',city:'Chalma',province:'Estado de México',description:'El segundo lugar de peregrinación más visitado de México después de Guadalupe. La milagrosa imagen del Señor de Chalma, un Cristo crucificado de tez oscura, atrae a millones que caminan días para llegar.',history:'Una imagen de Cristo apareció milagrosamente en una cueva en 1537, reemplazando a un ídolo prehispánico. La cueva se convirtió en capilla, luego en iglesia, y hoy un monasterio agustino la rodea. Los peregrinos llegan tradicionalmente con coronas de flores.',prayer:'Señor de Chalma, te apareciste en la oscuridad de una cueva para traer luz a tu pueblo. En los momentos más oscuros de nuestra vida, sé nuestra luz y nuestra fortaleza. Amén.',feast:'Primer domingo de enero'},fr:{name:'Sanctuaire du Seigneur de Chalma',type:'Sanctuaire',city:'Chalma',province:'État de Mexico',description:'Deuxième lieu de pèlerinage du Mexique. L\'image d\'un Christ crucifié attire des millions de pèlerins.',history:'Image apparue dans une grotte en 1537. Les pèlerins arrivent avec des couronnes de fleurs.',prayer:'Seigneur de Chalma, dans les moments les plus sombres, sois notre lumière et notre force. Amen.',feast:'Premier dimanche de janvier'},it:{name:'Santuario del Signore di Chalma',type:'Santuario',city:'Chalma',province:'Stato del Messico',description:'Secondo luogo di pellegrinaggio del Messico. L\'immagine di un Cristo crocifisso attira milioni di pellegrini.',history:'Immagine apparsa in una grotta nel 1537. I pellegrini arrivano con corone di fiori.',prayer:'Signore di Chalma, nei momenti più bui, sii la nostra luce e la nostra forza. Amen.',feast:'Prima domenica di gennaio'},pt:{name:'Santuário do Senhor de Chalma',type:'Santuário',city:'Chalma',province:'Estado do México',description:'Segundo lugar de peregrinação do México. A imagem de um Cristo crucificado atrai milhões de peregrinos.',history:'Imagem aparecida numa gruta em 1537. Os peregrinos chegam com coroas de flores.',prayer:'Senhor de Chalma, nos momentos mais escuros, sê a nossa luz e a nossa força. Ámen.',feast:'Primeiro domingo de janeiro'}},
  {id:1004,country:'mx',lat:19.3180,lng:-98.2313,icon:'🌺',name:'Sanctuary of Our Lady of Ocotlán',type:'Marian shrine',city:'Tlaxcala',province:'Tlaxcala',description:'One of Mexico\'s most beautiful Baroque sanctuaries, built on the site where the Virgin appeared to Juan Diego Bernardino in 1541 during a smallpox epidemic. The elaborate white Churrigueresque facade is extraordinary.',history:'The apparition occurred just ten years after Guadalupe. Our Lady led the indigenous man to a spring of healing water during the smallpox plague. The current church was built over two centuries and is considered the finest example of Mexican Baroque architecture.',prayer:'Our Lady of Ocotlán, you brought healing to the sick and hope to the despairing. May your spring of living water refresh our souls and bring us closer to the source of all life. Amen.',feast:'Third Monday of May',es:{name:'Santuario de Nuestra Señora de Ocotlán',type:'Santuario mariano',city:'Tlaxcala',province:'Tlaxcala',description:'Uno de los santuarios barrocos más hermosos de México, construido en el lugar donde la Virgen se apareció a Juan Diego Bernardino en 1541 durante una epidemia de viruela. La elaborada fachada churrigueresca blanca es extraordinaria.',history:'La aparición ocurrió apenas diez años después de Guadalupe. Nuestra Señora condujo al indígena hacia un manantial de agua curativa durante la plaga de viruela. La iglesia actual fue construida a lo largo de dos siglos y es considerada el mejor ejemplo de arquitectura barroca mexicana.',prayer:'Nuestra Señora de Ocotlán, trajiste curación a los enfermos y esperanza a los desesperados. Que tu manantial de agua viva refresque nuestras almas y nos acerque a la fuente de toda vida. Amén.',feast:'Tercer lunes de mayo'},fr:{name:'Sanctuaire de Notre-Dame d\'Ocotlán',type:'Sanctuaire marial',city:'Tlaxcala',province:'Tlaxcala',description:'L\'un des plus beaux sanctuaires baroques du Mexique. Apparition de la Vierge en 1541 durant une épidémie de variole.',history:'Apparition dix ans après Guadalupe. La Vierge indiqua une source de guérison. Plus bel exemple d\'architecture baroque mexicaine.',prayer:'Notre-Dame d\'Ocotlán, que ta source d\'eau vive rafraîchisse nos âmes. Amen.',feast:'Troisième lundi de mai'},it:{name:'Santuario di Nostra Signora di Ocotlán',type:'Santuario mariano',city:'Tlaxcala',province:'Tlaxcala',description:'Uno dei santuari barocchi più belli del Messico. Apparizione della Vergine nel 1541 durante un\'epidemia di vaiolo.',history:'Apparizione dieci anni dopo Guadalupe. La Vergine indicò una sorgente di guarigione. Miglior esempio di architettura barocca messicana.',prayer:'Nostra Signora di Ocotlán, che la tua sorgente d\'acqua viva rinfreschi le nostre anime. Amen.',feast:'Terzo lunedì di maggio'},pt:{name:'Santuário de Nossa Senhora de Ocotlán',type:'Santuário mariano',city:'Tlaxcala',province:'Tlaxcala',description:'Um dos santuários barrocos mais belos do México. Aparição da Virgem em 1541 durante uma epidemia de varíola.',history:'Aparição dez anos após Guadalupe. A Virgem indicou uma fonte de cura. Melhor exemplo de arquitetura barroca mexicana.',prayer:'Nossa Senhora de Ocotlán, que a tua fonte de água viva refresque as nossas almas. Ámen.',feast:'Terceira segunda-feira de maio'}},
  {id:1005,country:'mx',lat:20.9670,lng:-89.6237,icon:'🏛️',name:'Cathedral of Mérida',type:'Cathedral',city:'Mérida',province:'Yucatán',description:'The oldest cathedral on the American mainland, begun in 1561. Built with stones from Maya temples, it stands as a symbol of the encounter between two civilisations and the deep roots of Mexican Catholicism.',history:'Construction began in 1561 and was completed in 1598, making it the oldest functioning cathedral in the Americas. It was built partly with stones from the Maya pyramid at T\'hó. It houses the Cristo de las Ampollas, a miraculous image carved from a tree struck by lightning.',prayer:'Lord, in this cathedral built from the stones of ancient temples, may all peoples find unity in you. You are the God of every nation and every culture. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Catedral de Mérida',type:'Catedral',city:'Mérida',province:'Yucatán',description:'La catedral más antigua del continente americano, iniciada en 1561. Construida con piedras de templos mayas, es símbolo del encuentro entre dos civilizaciones y de las profundas raíces del catolicismo mexicano.',history:'La construcción comenzó en 1561 y se completó en 1598, convirtiéndola en la catedral en funcionamiento más antigua de América. Se construyó en parte con piedras de la pirámide maya de T\'hó. Alberga el Cristo de las Ampollas, una imagen milagrosa tallada en un árbol alcanzado por un rayo.',prayer:'Señor, en esta catedral construida con las piedras de los antiguos templos, que todos los pueblos encuentren en ti su unidad. Eres el Dios de cada nación y cada cultura. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'},fr:{name:'Cathédrale de Mérida',type:'Cathédrale',city:'Mérida',province:'Yucatán',description:'La plus ancienne cathédrale du continent américain, commencée en 1561. Construite avec des pierres de temples mayas.',history:'Achevée en 1598. Abrite le Cristo de las Ampollas, image miraculeuse.',prayer:'Seigneur, que tous les peuples trouvent en toi leur unité. Amen.',feast:'8 décembre (Immaculée Conception)'},it:{name:'Cattedrale di Mérida',type:'Cattedrale',city:'Mérida',province:'Yucatán',description:'La cattedrale più antica del continente americano, iniziata nel 1561. Costruita con pietre di templi maya.',history:'Completata nel 1598. Custodisce il Cristo de las Ampollas, immagine miracolosa.',prayer:'Signore, che tutti i popoli trovino in te la loro unità. Amen.',feast:'8 dicembre (Immacolata Concezione)'},pt:{name:'Catedral de Mérida',type:'Catedral',city:'Mérida',province:'Yucatán',description:'A catedral mais antiga do continente americano, iniciada em 1561. Construída com pedras de templos maias.',history:'Concluída em 1598. Alberga o Cristo de las Ampollas, imagem milagrosa.',prayer:'Senhor, que todos os povos encontrem em ti a sua unidade. Ámen.',feast:'8 de dezembro (Imaculada Conceição)'}},

  // ===== BRAZIL =====
  {id:1101,country:'br',lat:-22.9588,lng:-45.3828,icon:'👑',name:'Basilica of Our Lady of Aparecida',type:'Basilica',city:'Aparecida',province:'São Paulo',description:'The patroness of Brazil and one of the largest Catholic basilicas in the world. The small terracotta image of Our Lady found by fishermen in 1717 draws 12 million pilgrims a year.',history:'Three fishermen found a broken image of Our Lady in the Paraíba River in 1717. The image was declared patroness of Brazil by Pope Pius XI in 1930. Pope John Paul II crowned the image and Pope Francis visited in 2013 for World Youth Day.',prayer:'Our Lady of Aparecida, Patroness of Brazil, you were found broken in the waters of a river and became a source of hope for an entire nation. Mend what is broken in our lives and make us whole in God\'s love. Amen.',feast:'October 12 (Patroness of Brazil)',es:{name:'Basílica de Nuestra Señora de Aparecida',type:'Basílica',city:'Aparecida',province:'São Paulo',description:'La patrona de Brasil y una de las basílicas católicas más grandes del mundo. La pequeña imagen de terracota de Nuestra Señora encontrada por pescadores en 1717 atrae a 12 millones de peregrinos al año.',history:'Tres pescadores encontraron una imagen rota de Nuestra Señora en el río Paraíba en 1717. La imagen fue declarada patrona de Brasil por el Papa Pío XI en 1930. El Papa Juan Pablo II coronó la imagen y el Papa Francisco la visitó en 2013 para la Jornada Mundial de la Juventud.',prayer:'Nuestra Señora de Aparecida, Patrona de Brasil, fuiste encontrada rota en las aguas de un río y te convertiste en fuente de esperanza para toda una nación. Repara lo que está roto en nuestras vidas y hazlos íntegros en el amor de Dios. Amén.',feast:'12 de octubre (Patrona de Brasil)'},fr:{name:'Basilique Notre-Dame d\'Aparecida',type:'Basilique',city:'Aparecida',province:'São Paulo',description:'Patronne du Brésil. L\'une des plus grandes basiliques au monde. 12 millions de pèlerins par an.',history:'Image trouvée brisée dans le fleuve Paraíba en 1717. Patronne du Brésil depuis 1930.',prayer:'Notre-Dame d\'Aparecida, répare ce qui est brisé dans nos vies et rends-nous entiers dans l\'amour de Dieu. Amen.',feast:'12 octobre (Patronne du Brésil)'},it:{name:'Basilica di Nostra Signora di Aparecida',type:'Basilica',city:'Aparecida',province:'San Paolo',description:'Patrona del Brasile. Una delle più grandi basiliche al mondo. 12 milioni di pellegrini all\'anno.',history:'Immagine trovata rotta nel fiume Paraíba nel 1717. Patrona del Brasile dal 1930.',prayer:'Nostra Signora di Aparecida, ripara ciò che è rotto nelle nostre vite e rendici integri nell\'amore di Dio. Amen.',feast:'12 ottobre (Patrona del Brasile)'},pt:{name:'Basílica de Nossa Senhora Aparecida',type:'Basílica',city:'Aparecida',province:'São Paulo',description:'Padroeira do Brasil. Uma das maiores basílicas do mundo. 12 milhões de peregrinos por ano.',history:'Imagem encontrada partida no rio Paraíba em 1717. Padroeira do Brasil desde 1930.',prayer:'Nossa Senhora Aparecida, repara o que está partido nas nossas vidas e torna-nos inteiros no amor de Deus. Ámen.',feast:'12 de outubro (Padroeira do Brasil)'}},
  {id:1102,country:'br',lat:-1.4554,lng:-48.4898,icon:'🕊️',name:'Basilica of Our Lady of Nazareth',type:'Basilica',city:'Belém',province:'Pará',description:'Home to the famous Círio de Nazaré, the largest Catholic procession in the world with over 2 million participants. The small image of Our Lady of Nazareth has been venerated in Belém since the 18th century.',history:'The image was found in the jungle in 1700. Each October, Belém celebrates the Círio de Nazaré, a massive procession through the city that has taken place for over 225 years. It is listed as UNESCO Intangible Cultural Heritage.',prayer:'Our Lady of Nazareth, carried in procession by millions of hands, may you be carried above all in our hearts. Guide us through the forests of life to the clearing of your Son\'s peace. Amen.',feast:'Second Sunday of October (Círio de Nazaré)',es:{name:'Basílica de Nuestra Señora de Nazaré',type:'Basílica',city:'Belém',province:'Pará',description:'Sede del famoso Círio de Nazaré, la procesión católica más grande del mundo con más de 2 millones de participantes. La pequeña imagen de Nuestra Señora de Nazaré es venerada en Belém desde el siglo XVIII.',history:'La imagen fue encontrada en la selva en 1700. Cada octubre, Belém celebra el Círio de Nazaré, una masiva procesión por la ciudad que lleva más de 225 años realizándose. Está declarada Patrimonio Cultural Inmaterial de la UNESCO.',prayer:'Nuestra Señora de Nazaré, llevada en procesión por millones de manos, que seas llevada sobre todo en nuestros corazones. Guíanos a través de los bosques de la vida hasta el claro de la paz de tu Hijo. Amén.',feast:'Segundo domingo de octubre (Círio de Nazaré)'},fr:{name:'Basilique Notre-Dame de Nazareth',type:'Basilique',city:'Belém',province:'Pará',description:'Siège du Círio de Nazaré, la plus grande procession catholique du monde. Patrimoine immatériel de l\'UNESCO.',history:'Image trouvée dans la jungle en 1700. Le Círio se célèbre depuis plus de 225 ans.',prayer:'Notre-Dame de Nazareth, que tu sois portée avant tout dans nos cœurs. Amen.',feast:'Deuxième dimanche d\'octobre'},it:{name:'Basilica di Nostra Signora di Nazareth',type:'Basilica',city:'Belém',province:'Pará',description:'Sede del Círio de Nazaré, la più grande processione cattolica al mondo. Patrimonio Immateriale UNESCO.',history:'Immagine trovata nella giungla nel 1700. Il Círio si celebra da oltre 225 anni.',prayer:'Nostra Signora di Nazareth, che tu sia portata soprattutto nei nostri cuori. Amen.',feast:'Seconda domenica di ottobre'},pt:{name:'Basílica de Nossa Senhora de Nazaré',type:'Basílica',city:'Belém',province:'Pará',description:'Sede do Círio de Nazaré, a maior procissão católica do mundo. Património Imaterial da UNESCO.',history:'Imagem encontrada na selva em 1700. O Círio celebra-se há mais de 225 anos.',prayer:'Nossa Senhora de Nazaré, que sejas levada sobretudo nos nossos corações. Ámen.',feast:'Segundo domingo de outubro'}},
  {id:1103,country:'br',lat:-12.9714,lng:-38.5014,icon:'⛪',name:'Cathedral Basilica of Salvador',type:'Cathedral',city:'Salvador',province:'Bahia',description:'The oldest Catholic cathedral in Brazil, built by the Jesuits in the 17th century. Salvador was the first capital of colonial Brazil and remains the heart of Afro-Brazilian Catholic devotion.',history:'Built between 1657 and 1672, the cathedral was originally the Jesuit College church. It has an extraordinary gilded interior with Portuguese azulejos tiles. Salvador hosts the most vibrant Catholic popular festivals in Brazil, blending African and European traditions.',prayer:'Lord, in this city where so many peoples met — European, African, indigenous — may your Church be a home for all. Make us one in the diversity of your gifts. Amen.',feast:'November 1 (All Saints)',es:{name:'Catedral Basílica de Salvador',type:'Catedral',city:'Salvador',province:'Bahía',description:'La catedral católica más antigua de Brasil, construida por los jesuitas en el siglo XVII. Salvador fue la primera capital del Brasil colonial y sigue siendo el corazón de la devoción católica afrobrasileña.',history:'Construida entre 1657 y 1672, la catedral fue originalmente la iglesia del Colegio Jesuita. Tiene un extraordinario interior dorado con azulejos portugueses. Salvador acoge los festivales católicos populares más vibrantes de Brasil, mezclando tradiciones africanas y europeas.',prayer:'Señor, en esta ciudad donde se encontraron tantos pueblos — europeos, africanos, indígenas — que tu Iglesia sea un hogar para todos. Haznos uno en la diversidad de tus dones. Amén.',feast:'1 de noviembre (Todos los Santos)'},fr:{name:'Cathédrale Basilique de Salvador',type:'Cathédrale',city:'Salvador',province:'Bahia',description:'La plus ancienne cathédrale du Brésil, construite par les Jésuites au XVIIe siècle.',history:'Construite entre 1657 et 1672. Intérieur doré avec azulejos portugais.',prayer:'Seigneur, que ton Église soit un foyer pour tous. Fais de nous un dans la diversité de tes dons. Amen.',feast:'1er novembre (Toussaint)'},it:{name:'Cattedrale Basilica di Salvador',type:'Cattedrale',city:'Salvador',province:'Bahia',description:'La cattedrale più antica del Brasile, costruita dai Gesuiti nel XVII secolo.',history:'Costruita tra il 1657 e il 1672. Interno dorato con azulejos portoghesi.',prayer:'Signore, che la tua Chiesa sia una casa per tutti. Rendici uno nella diversità dei tuoi doni. Amen.',feast:'1° novembre (Ognissanti)'},pt:{name:'Catedral Basílica de Salvador',type:'Catedral',city:'Salvador',province:'Bahia',description:'A catedral mais antiga do Brasil, construída pelos Jesuítas no século XVII.',history:'Construída entre 1657 e 1672. Interior dourado com azulejos portugueses.',prayer:'Senhor, que a tua Igreja seja um lar para todos. Faz-nos um na diversidade dos teus dons. Ámen.',feast:'1 de novembro (Todos os Santos)'}},
  {id:1104,country:'br',lat:-15.8176,lng:-47.8860,icon:'✝️',name:'Sanctuary of Dom Bosco',type:'Sanctuary',city:'Brasília',province:'Federal District',description:'Built in 1963 in the newly created capital of Brazil, this iconic sanctuary is famous for its extraordinary blue stained glass windows that bathe the interior in a supernatural light.',history:'Don Bosco, the Italian saint, reportedly had a vision in 1883 of a great civilisation arising between the 15th and 20th parallels in South America. Brasília was built exactly in that region, and this sanctuary was built in his honour.',prayer:'Saint John Bosco, visionary and friend of young people, you dreamed of a great civilisation of peace and justice. May Brazil fulfil the dream God gave you and may its young people build a world of faith. Amen.',feast:'January 31 (Saint John Bosco)',es:{name:'Santuario Dom Bosco',type:'Santuario',city:'Brasilia',province:'Distrito Federal',description:'Construido en 1963 en la recién creada capital de Brasil, este icónico santuario es famoso por sus extraordinarias vidrieras azules que bañan el interior en una luz sobrenatural.',history:'Don Bosco, el santo italiano, tuvo supuestamente una visión en 1883 de una gran civilización que surgiría entre los paralelos 15 y 20 en América del Sur. Brasilia fue construida exactamente en esa región, y este santuario fue construido en su honor.',prayer:'San Juan Bosco, visionario y amigo de los jóvenes, soñaste con una gran civilización de paz y justicia. Que Brasil cumpla el sueño que Dios te dio y que sus jóvenes construyan un mundo de fe. Amén.',feast:'31 de enero (San Juan Bosco)'},fr:{name:'Sanctuaire Dom Bosco',type:'Sanctuaire',city:'Brasília',province:'District Fédéral',description:'Construit en 1963, célèbre pour ses vitraux bleus extraordinaires qui baignent l\'intérieur d\'une lumière surnaturelle.',history:'Don Bosco aurait eu une vision en 1883 d\'une civilisation entre les 15e et 20e parallèles.',prayer:'Saint Jean Bosco, que le Brésil accomplisse le rêve que Dieu t\'a donné. Amen.',feast:'31 janvier (Saint Jean Bosco)'},it:{name:'Santuario Dom Bosco',type:'Santuario',city:'Brasilia',province:'Distretto Federale',description:'Costruito nel 1963, famoso per le straordinarie vetrate blu che bagnano l\'interno di luce soprannaturale.',history:'Don Bosco avrebbe avuto una visione nel 1883 di una civiltà tra il 15° e il 20° parallelo.',prayer:'San Giovanni Bosco, che il Brasile realizzi il sogno che Dio ti ha dato. Amen.',feast:'31 gennaio (San Giovanni Bosco)'},pt:{name:'Santuário Dom Bosco',type:'Santuário',city:'Brasília',province:'Distrito Federal',description:'Construído em 1963, famoso pelos extraordinários vitrais azuis que banham o interior de luz sobrenatural.',history:'Dom Bosco teria tido uma visão em 1883 de uma civilização entre os paralelos 15 e 20.',prayer:'São João Bosco, que o Brasil realize o sonho que Deus te deu. Ámen.',feast:'31 de janeiro (São João Bosco)'}},

  // ===== ARGENTINA =====
  {id:1201,country:'ar',lat:-34.5658,lng:-59.1072,icon:'🌟',name:'Basilica of Our Lady of Luján',type:'Basilica',city:'Luján',province:'Buenos Aires',description:'The patroness of Argentina, Uruguay and Paraguay. The small terracotta image of Our Lady refused to move from Luján in 1630 and has been venerated there ever since. The Gothic basilica receives 7 million pilgrims a year.',history:'According to tradition, an ox cart carrying the image stopped and could not be moved until the image was left behind. A chapel was built, then successive churches, and finally the current neo-Gothic basilica completed in 1937. Pope John Paul II prayed here in 1982.',prayer:'Our Lady of Luján, Patroness of the Southern Cone, you chose to stay among your people and have never abandoned them. Stay with us too, especially in times of crisis and uncertainty. Amen.',feast:'May 8 (Our Lady of Luján)',es:{name:'Basílica de Nuestra Señora de Luján',type:'Basílica',city:'Luján',province:'Buenos Aires',description:'La patrona de Argentina, Uruguay y Paraguay. La pequeña imagen de terracota de Nuestra Señora se negó a moverse de Luján en 1630 y ha sido venerada allí desde entonces. La basílica gótica recibe 7 millones de peregrinos al año.',history:'Según la tradición, una carreta de bueyes que transportaba la imagen se detuvo y no pudo moverse hasta que la imagen fue dejada allí. Se construyó una capilla, luego sucesivas iglesias, y finalmente la actual basílica neogótica completada en 1937. El Papa Juan Pablo II rezó aquí en 1982.',prayer:'Nuestra Señora de Luján, Patrona del Cono Sur, elegiste quedarte entre tu pueblo y nunca lo has abandonado. Quédate con nosotros también, especialmente en tiempos de crisis e incertidumbre. Amén.',feast:'8 de mayo (Nuestra Señora de Luján)'},fr:{name:'Basilique Notre-Dame de Luján',type:'Basilique',city:'Luján',province:'Buenos Aires',description:'Patronne d\'Argentine, Uruguay et Paraguay. 7 millions de pèlerins par an.',history:'En 1630, une charrette s\'arrêta et ne put être bougée. Basilique néogothique achevée en 1937.',prayer:'Notre-Dame de Luján, reste avec nous surtout dans les temps de crise. Amen.',feast:'8 mai (Notre-Dame de Luján)'},it:{name:'Basilica di Nostra Signora di Luján',type:'Basilica',city:'Luján',province:'Buenos Aires',description:'Patrona di Argentina, Uruguay e Paraguay. 7 milioni di pellegrini all\'anno.',history:'Nel 1630, un carro si fermò e non poté essere mosso. Basilica neogotica completata nel 1937.',prayer:'Nostra Signora di Luján, resta con noi specialmente nei tempi di crisi. Amen.',feast:'8 maggio (Nostra Signora di Luján)'},pt:{name:'Basílica de Nossa Senhora de Luján',type:'Basílica',city:'Luján',province:'Buenos Aires',description:'Padroeira da Argentina, Uruguai e Paraguai. 7 milhões de peregrinos por ano.',history:'Em 1630, um carro parou e não pôde ser movido. Basílica neogótica concluída em 1937.',prayer:'Nossa Senhora de Luján, fica connosco especialmente nos tempos de crise. Ámen.',feast:'8 de maio (Nossa Senhora de Luján)'}},
  {id:1202,country:'ar',lat:-27.2680,lng:-58.2451,icon:'💎',name:'Basilica of Our Lady of Itatí',type:'Basilica',city:'Itatí',province:'Corrientes',description:'One of Argentina\'s most important Marian shrines, home to the crowned image of Our Lady of Itatí venerated by the Guaraní people since the 17th century. The basilica dominates the banks of the Paraná River.',history:'The devotion began among the indigenous Guaraní in 1615. Our Lady of Itatí was crowned by Pope Leo XIII in 1900. The current basilica was completed in 1950. Thousands of pilgrims arrive by boat along the Paraná River, a unique pilgrimage tradition.',prayer:'Our Lady of Itatí, beloved of the Guaraní people, you have watched over this river land for four centuries. May your protection extend to all who live on the margins, forgotten by the world but remembered by God. Amen.',feast:'July 9 (Our Lady of Itatí)',es:{name:'Basílica de Nuestra Señora de Itatí',type:'Basílica',city:'Itatí',province:'Corrientes',description:'Uno de los santuarios marianos más importantes de Argentina, sede de la imagen coronada de Nuestra Señora de Itatí venerada por el pueblo guaraní desde el siglo XVII. La basílica domina las orillas del río Paraná.',history:'La devoción comenzó entre los indígenas guaraníes en 1615. Nuestra Señora de Itatí fue coronada por el Papa León XIII en 1900. La basílica actual se completó en 1950. Miles de peregrinos llegan en barco por el río Paraná, una tradición de peregrinación única.',prayer:'Nuestra Señora de Itatí, amada del pueblo guaraní, has velado por estas tierras fluviales durante cuatro siglos. Que tu protección se extienda a todos los que viven en los márgenes, olvidados por el mundo pero recordados por Dios. Amén.',feast:'9 de julio (Nuestra Señora de Itatí)'},fr:{name:'Basilique Notre-Dame d\'Itatí',type:'Basilique',city:'Itatí',province:'Corrientes',description:'Sanctuaire mariano important d\'Argentine, vénéré par le peuple guarani depuis le XVIIe siècle.',history:'Dévotion commencée en 1615. Couronnée par Léon XIII en 1900. Pèlerins arrivent en bateau par le Paraná.',prayer:'Notre-Dame d\'Itatí, que ta protection s\'étende à tous ceux qui vivent en marge. Amen.',feast:'9 juillet (Notre-Dame d\'Itatí)'},it:{name:'Basilica di Nostra Signora di Itatí',type:'Basilica',city:'Itatí',province:'Corrientes',description:'Importante santuario mariano argentino, venerato dal popolo guaraní dal XVII secolo.',history:'Devozione iniziata nel 1615. Incoronata da Leone XIII nel 1900. Pellegrini arrivano in barca sul Paraná.',prayer:'Nostra Signora di Itatí, che la tua protezione si estenda a tutti coloro che vivono ai margini. Amen.',feast:'9 luglio (Nostra Signora di Itatí)'},pt:{name:'Basílica de Nossa Senhora de Itatí',type:'Basílica',city:'Itatí',province:'Corrientes',description:'Importante santuário mariano argentino, venerado pelo povo guarani desde o século XVII.',history:'Devoção iniciada em 1615. Coroada por Leão XIII em 1900. Peregrinos chegam de barco pelo Paraná.',prayer:'Nossa Senhora de Itatí, que a tua proteção se estenda a todos os que vivem à margem. Ámen.',feast:'9 de julho (Nossa Senhora de Itatí)'}},
  {id:1203,country:'ar',lat:-31.4167,lng:-64.1833,icon:'🏔️',name:'Cathedral of Córdoba',type:'Cathedral',city:'Córdoba',province:'Córdoba',description:'The oldest functioning cathedral in Argentina, begun in 1577. A masterpiece of colonial Baroque architecture at the heart of one of Latin America\'s oldest university cities.',history:'Construction began in 1577 and continued for over 150 years. The cathedral has witnessed the entire history of Argentina, from colonial times through independence and the modern era. The Jesuit Block of Córdoba, of which it is part, is a UNESCO World Heritage Site.',prayer:'Lord, this cathedral has stood for nearly 450 years, witnessing the joys and sorrows of a nation being born. May we too stand firm in faith, a sign of your enduring presence among your people. Amen.',feast:'August 15 (Assumption)',es:{name:'Catedral de Córdoba',type:'Catedral',city:'Córdoba',province:'Córdoba',description:'La catedral en funcionamiento más antigua de Argentina, iniciada en 1577. Una obra maestra de la arquitectura colonial barroca en el corazón de una de las ciudades universitarias más antiguas de América Latina.',history:'La construcción comenzó en 1577 y continuó durante más de 150 años. La catedral ha sido testigo de toda la historia de Argentina, desde la época colonial hasta la independencia y la era moderna. La Manzana Jesuítica de Córdoba, de la que forma parte, es Patrimonio de la Humanidad de la UNESCO.',prayer:'Señor, esta catedral lleva casi 450 años en pie, siendo testigo de las alegrías y tristezas de una nación que nacía. Que nosotros también nos mantengamos firmes en la fe, signo de tu presencia duradera entre tu pueblo. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Cathédrale de Córdoba',type:'Cathédrale',city:'Córdoba',province:'Córdoba',description:'La plus ancienne cathédrale d\'Argentine, commencée en 1577. Architecture coloniale baroque. Patrimoine mondial.',history:'Construction durant plus de 150 ans. Le Bloc Jésuite est Patrimoine mondial.',prayer:'Seigneur, que nous restions fermes dans la foi, signes de ta présence durable. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Córdoba',type:'Cattedrale',city:'Córdoba',province:'Córdoba',description:'La cattedrale più antica dell\'Argentina, iniziata nel 1577. Architettura coloniale barocca. Patrimonio dell\'Umanità.',history:'Costruzione durata più di 150 anni. La Manzana Gesuitica è Patrimonio dell\'Umanità.',prayer:'Signore, che restiamo saldi nella fede, segni della tua presenza duratura. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Catedral de Córdoba',type:'Catedral',city:'Córdoba',province:'Córdoba',description:'A catedral mais antiga da Argentina, iniciada em 1577. Arquitetura colonial barroca. Património da Humanidade.',history:'Construção durante mais de 150 anos. O Quarteirão Jesuíta é Património da Humanidade.',prayer:'Senhor, que permaneçamos firmes na fé, sinais da tua presença duradoura. Ámen.',feast:'15 de agosto (Assunção)'}},
  {id:1204,country:'ar',lat:-24.7879,lng:-65.4103,icon:'🌸',name:'Cathedral Basilica of Salta',type:'Cathedral',city:'Salta',province:'Salta',description:'Home to the miraculous images of the Lord of the Miracle and Our Lady of the Miracle, patrons of Salta. The Procession of the Miracle, held every September 15, is one of Argentina\'s most moving expressions of faith, drawing nearly a million pilgrims.',history:'The images arrived in Salta in 1592. When earthquake and epidemic struck in 1692, the faithful made a pact with Christ and the Virgin: to carry them in procession every year forever. The disasters ceased and the promise has been kept for over three centuries. The current cathedral was consecrated in 1882 and raised to a basilica in 1947.',prayer:'Lord of the Miracle and Virgin of the Miracle, you who heard a desperate people in 1692 and saved Salta from disaster, hear today too the pleas of your people. May the pact be renewed in every generation. Amen.',feast:'September 15 (Lord and Virgin of the Miracle)',es:{name:'Catedral Basílica de Salta',type:'Catedral',city:'Salta',province:'Salta',description:'Sede de las milagrosas imágenes del Señor del Milagro y de la Virgen del Milagro, patronos de Salta. La Procesión del Milagro, que se celebra cada 15 de septiembre, es una de las manifestaciones de fe más impresionantes de Argentina y atrae a cerca de un millón de peregrinos.',history:'Las imágenes llegaron a Salta en 1592. Cuando un terremoto y una epidemia azotaron la ciudad en 1692, los fieles hicieron un pacto con Cristo y la Virgen: llevarlos en procesión cada año para siempre. Los desastres cesaron y la promesa se ha cumplido durante más de tres siglos. La catedral actual fue consagrada en 1882 y elevada a basílica en 1947.',prayer:'Señor del Milagro y Virgen del Milagro, ustedes que escucharon a un pueblo desesperado en 1692 y salvaron a Salta del desastre, escuchen también hoy las súplicas de su pueblo. Que el pacto se renueve en cada generación. Amén.',feast:'15 de septiembre (Señor y Virgen del Milagro)'},fr:{name:'Cathédrale Basilique de Salta',type:'Cathédrale',city:'Salta',province:'Salta',description:'Siège des images miraculeuses du Seigneur du Miracle et de la Vierge du Miracle, patrons de Salta. Procession du Miracle le 15 septembre, qui attire près d\'un million de pèlerins.',history:'Les images arrivèrent à Salta en 1592. Lors du séisme de 1692, les fidèles firent un pacte : les porter en procession chaque année. La promesse dure depuis plus de trois siècles. Cathédrale consacrée en 1882, élevée au rang de basilique en 1947.',prayer:'Seigneur du Miracle et Vierge du Miracle, que le pacte se renouvelle en chaque génération. Amen.',feast:'15 septembre (Seigneur et Vierge du Miracle)'},it:{name:'Cattedrale Basilica di Salta',type:'Cattedrale',city:'Salta',province:'Salta',description:'Sede delle immagini miracolose del Signore del Miracolo e della Vergine del Miracolo, patroni di Salta. Processione del Miracolo il 15 settembre, che attira quasi un milione di pellegrini.',history:'Le immagini arrivarono a Salta nel 1592. Durante il terremoto del 1692, i fedeli fecero un patto: portarle in processione ogni anno. La promessa dura da oltre tre secoli. Cattedrale consacrata nel 1882, elevata a basilica nel 1947.',prayer:'Signore del Miracolo e Vergine del Miracolo, che il patto si rinnovi in ogni generazione. Amen.',feast:'15 settembre (Signore e Vergine del Miracolo)'},pt:{name:'Catedral Basílica de Salta',type:'Catedral',city:'Salta',province:'Salta',description:'Sede das imagens milagrosas do Senhor do Milagre e da Virgem do Milagre, padroeiros de Salta. Procissão do Milagre a 15 de setembro, que atrai cerca de um milhão de peregrinos.',history:'As imagens chegaram a Salta em 1592. No terramoto de 1692, os fiéis fizeram um pacto: levá-las em procissão todos os anos. A promessa dura há mais de três séculos. Catedral consagrada em 1882, elevada a basílica em 1947.',prayer:'Senhor do Milagre e Virgem do Milagre, que o pacto se renove em cada geração. Ámen.',feast:'15 de setembro (Senhor e Virgem do Milagre)'}},

  // ===== PERU =====
  {id:1301,country:'pe',lat:-12.0464,lng:-77.0428,icon:'🟣',name:'Church of Las Nazarenas',type:'Church',city:'Lima',province:'Lima',description:'Home of the Lord of Miracles, the most venerated image in Peru and perhaps the most popular in all of Latin America. The October procession draws over 2 million people in a sea of purple.',history:'The image was painted by an Angolan slave on a wall in the 17th century. When an earthquake destroyed all surrounding buildings in 1655, the wall remained intact. The October procession has been held continuously since 1687, making it one of the oldest in the Americas.',prayer:'Lord of Miracles, you stood firm when the earth shook and all around you fell. Teach us your strength. When our world trembles, may we remain standing, trusting in your power. Amen.',feast:'October 18 (Lord of Miracles)',es:{name:'Iglesia de Las Nazarenas',type:'Iglesia',city:'Lima',province:'Lima',description:'Sede del Señor de los Milagros, la imagen más venerada del Perú y quizás la más popular de toda América Latina. La procesión de octubre reúne a más de 2 millones de personas en un mar de morado.',history:'La imagen fue pintada por un esclavo angoleño en una pared en el siglo XVII. Cuando un terremoto destruyó todos los edificios circundantes en 1655, la pared permaneció intacta. La procesión de octubre se celebra ininterrumpidamente desde 1687, siendo una de las más antiguas de América.',prayer:'Señor de los Milagros, permaneciste firme cuando la tierra tembló y todo a tu alrededor cayó. Enséñanos tu fortaleza. Cuando nuestro mundo tiembla, que permanezcamos en pie, confiando en tu poder. Amén.',feast:'18 de octubre (Señor de los Milagros)'},fr:{name:'Église de Las Nazarenas',type:'Église',city:'Lima',province:'Lima',description:'Siège du Seigneur des Miracles, l\'image la plus vénérée du Pérou. Plus de 2 millions en procession d\'octobre.',history:'Image peinte par un esclave angolais au XVIIe siècle. Le mur survécut à un séisme en 1655. Procession depuis 1687.',prayer:'Seigneur des Miracles, tu es resté debout quand la terre tremblait. Apprends-nous ta force. Amen.',feast:'18 octobre (Seigneur des Miracles)'},it:{name:'Chiesa di Las Nazarenas',type:'Chiesa',city:'Lima',province:'Lima',description:'Sede del Signore dei Miracoli, l\'immagine più venerata del Perù. Oltre 2 milioni nella processione di ottobre.',history:'Immagine dipinta da uno schiavo angolano nel XVII secolo. Il muro sopravvisse a un terremoto nel 1655. Processione dal 1687.',prayer:'Signore dei Miracoli, sei rimasto in piedi quando la terra tremava. Insegnaci la tua forza. Amen.',feast:'18 ottobre (Signore dei Miracoli)'},pt:{name:'Igreja de Las Nazarenas',type:'Igreja',city:'Lima',province:'Lima',description:'Sede do Senhor dos Milagres, a imagem mais venerada do Peru. Mais de 2 milhões na procissão de outubro.',history:'Imagem pintada por um escravo angolano no século XVII. A parede sobreviveu a um terramoto em 1655. Procissão desde 1687.',prayer:'Senhor dos Milagres, permaneceste de pé quando a terra tremeu. Ensina-nos a tua força. Ámen.',feast:'18 de outubro (Senhor dos Milagres)'}},
  {id:1302,country:'bo',lat:-16.1657,lng:-69.0856,icon:'🌊',name:'Sanctuary of Our Lady of Copacabana',type:'Marian shrine',city:'Copacabana',province:'La Paz',description:'Perched on the shores of Lake Titicaca, the highest navigable lake in the world, this sanctuary is a sacred pilgrimage site for Bolivia and Peru. The image of Our Lady was carved by the indigenous sculptor Francisco Tito Yupanqui in 1583.',history:'Francisco Tito Yupanqui, a descendant of the Inca, carved the image after the Virgin appeared to him. The image was canonically crowned in 1925. Pilgrims walk from as far as La Paz to reach this sanctuary on the shores of the sacred lake.',prayer:'Our Lady of Copacabana, enthroned above the sacred waters of Titicaca, bless the peoples of the altiplano and all pilgrims who climb to you. May the height of this place remind us of the heights to which God calls us. Amen.',feast:'August 5 (Our Lady of Copacabana)',es:{name:'Santuario de Nuestra Señora de Copacabana',type:'Santuario mariano',city:'Copacabana',province:'La Paz',description:'Enclavado a orillas del lago Titicaca, el lago navegable más alto del mundo, este santuario es un lugar de peregrinación sagrado para Bolivia y Perú. La imagen de Nuestra Señora fue tallada por el escultor indígena Francisco Tito Yupanqui en 1583.',history:'Francisco Tito Yupanqui, descendiente del Inca, talló la imagen tras aparecérsele la Virgen. La imagen fue coronada canónicamente en 1925. Los peregrinos caminan desde tan lejos como La Paz para llegar a este santuario a orillas del lago sagrado.',prayer:'Nuestra Señora de Copacabana, entronizada sobre las sagradas aguas del Titicaca, bendice a los pueblos del altiplano y a todos los peregrinos que suben hasta ti. Que la altura de este lugar nos recuerde las alturas a las que Dios nos llama. Amén.',feast:'5 de agosto (Nuestra Señora de Copacabana)'},fr:{name:'Sanctuaire de Notre-Dame de Copacabana',type:'Sanctuaire marial',city:'Copacabana',province:'La Paz',description:'Sur les rives du lac Titicaca. Image sculptée par l\'indigène Francisco Tito Yupanqui en 1583.',history:'Francisco Tito Yupanqui, descendant de l\'Inca, sculpta l\'image après une apparition. Les pèlerins marchent depuis La Paz.',prayer:'Notre-Dame de Copacabana, bénis les peuples de l\'altiplano et tous les pèlerins. Amen.',feast:'5 août (Notre-Dame de Copacabana)'},it:{name:'Santuario di Nostra Signora di Copacabana',type:'Santuario mariano',city:'Copacabana',province:'La Paz',description:'Sulle rive del lago Titicaca. Immagine scolpita dall\'indigeno Francisco Tito Yupanqui nel 1583.',history:'Francisco Tito Yupanqui, discendente dell\'Inca, scolpì l\'immagine dopo un\'apparizione. I pellegrini camminano da La Paz.',prayer:'Nostra Signora di Copacabana, benedici i popoli dell\'altipiano e tutti i pellegrini. Amen.',feast:'5 agosto (Nostra Signora di Copacabana)'},pt:{name:'Santuário de Nossa Senhora de Copacabana',type:'Santuário mariano',city:'Copacabana',province:'La Paz',description:'Nas margens do lago Titicaca. Imagem esculpida pelo indígena Francisco Tito Yupanqui em 1583.',history:'Francisco Tito Yupanqui, descendente do Inca, esculpiu a imagem após uma aparição. Os peregrinos caminham desde La Paz.',prayer:'Nossa Senhora de Copacabana, abençoa os povos do altiplano e todos os peregrinos. Ámen.',feast:'5 de agosto (Nossa Senhora de Copacabana)'}},
