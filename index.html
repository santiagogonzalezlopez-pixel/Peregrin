  {id:1901,country:'us',lat:38.9335,lng:-76.9999,icon:'🌟',name:'Basilica of the National Shrine of the Immaculate Conception',type:'Basilica',city:'Washington, D.C.',province:'District of Columbia',description:'The largest Roman Catholic church in North America and one of the ten largest churches in the world. Dedicated to Our Lady of the Immaculate Conception, patroness of the United States, it combines Byzantine and Romanesque architecture in a spectacular way.',history:'Construction began in 1920 and was largely completed in 1961. The basilica features over 80 chapels and oratories representing the diversity of peoples who make up Catholic America. Popes Benedict XVI and Francis both prayed here during their U.S. visits.',prayer:'Immaculate Mother, Patroness of the United States of America, you welcomed with open arms the peoples who built this nation. Continue to guide and protect this land and bring all its inhabitants to your Son Jesus. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Basílica del Santuario Nacional de la Inmaculada Concepción',type:'Basílica',city:'Washington D. C.',province:'Distrito de Columbia',description:'La iglesia católica más grande de Norteamérica y una de las diez más grandes del mundo. Dedicada a Nuestra Señora de la Inmaculada Concepción, patrona de los Estados Unidos, combina arquitectura bizantina y románica de forma espectacular.',history:'La construcción comenzó en 1920 y se completó en gran parte en 1961. La basílica cuenta con más de 80 capillas y oratorios que representan la diversidad de pueblos que forman la América católica. Los Papas Benedicto XVI y Francisco rezaron aquí en sus visitas.',prayer:'Madre Inmaculada, Patrona de los Estados Unidos de América, acogiste con los brazos abiertos a los pueblos que construyeron esta nación. Continúa guiando y protegiendo esta tierra y llevando a todos sus habitantes a tu Hijo Jesús. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'},fr:{name:'Basilique du Sanctuaire National de l\'Immaculée Conception',type:'Basilique',city:'Washington D.C.',province:'District de Columbia',description:'La plus grande église catholique d\'Amérique du Nord et l\'une des dix plus grandes au monde. Dédiée à Notre-Dame de l\'Immaculée Conception, patronne des États-Unis.',history:'Construction commencée en 1920, achevée en 1961. Plus de 80 chapelles représentant la diversité des peuples catholiques américains. Benoît XVI et François y prièrent.',prayer:'Mère Immaculée, Patronne des États-Unis, continue de guider et protéger cette terre. Amen.',feast:'8 décembre (Immaculée Conception)'},it:{name:'Basilica del Santuario Nazionale dell\'Immacolata Concezione',type:'Basilica',city:'Washington D.C.',province:'Distretto di Columbia',description:'La più grande chiesa cattolica del Nord America e una delle dieci più grandi al mondo. Dedicata all\'Immacolata Concezione, patrona degli Stati Uniti.',history:'Costruzione iniziata nel 1920, completata nel 1961. Oltre 80 cappelle rappresentano la diversità dei popoli cattolici americani. Benedetto XVI e Francesco vi pregarono.',prayer:'Madre Immacolata, Patrona degli Stati Uniti, continua a guidare e proteggere questa terra. Amen.',feast:'8 dicembre (Immacolata Concezione)'},pt:{name:'Basílica do Santuário Nacional da Imaculada Conceição',type:'Basílica',city:'Washington D.C.',province:'Distrito de Columbia',description:'A maior igreja católica da América do Norte e uma das dez maiores do mundo. Dedicada à Imaculada Conceição, padroeira dos Estados Unidos.',history:'Construção iniciada em 1920, concluída em 1961. Mais de 80 capelas representam a diversidade dos povos católicos americanos. Bento XVI e Francisco rezaram aqui.',prayer:'Mãe Imaculada, Padroeira dos Estados Unidos, continua a guiar e proteger esta terra. Ámen.',feast:'8 de dezembro (Imaculada Conceição)'}},

  {id:1902,country:'us',lat:38.6396,lng:-90.2631,icon:'✨',name:'Cathedral Basilica of Saint Louis',type:'Cathedral',city:'Saint Louis',province:'Missouri',description:'Home to the largest mosaic collection in the Western Hemisphere, with over 41 million glass pieces covering 7,700 square metres. A Byzantine-style masterpiece dedicated to Saint Louis IX, King of France.',history:'Construction began in 1907 and the mosaics were installed over 76 years, finished in 1988. The cathedral is often called "the New Cathedral" to distinguish it from the older Basilica of Saint Louis, King of France. Pope John Paul II prayed here in 1999.',prayer:'Saint Louis, crusader king and just ruler, you served Christ in your people and defended the faith with courage. May this city that bears your name remain faithful to the Gospel and shine with the light of Christ. Amen.',feast:'August 25 (Saint Louis)',es:{name:'Catedral Basílica de San Luis',type:'Catedral',city:'San Luis',province:'Misuri',description:'Alberga la mayor colección de mosaicos del hemisferio occidental, con más de 41 millones de piezas de vidrio cubriendo 7.700 metros cuadrados. Una obra maestra de estilo bizantino dedicada a San Luis IX, rey de Francia.',history:'La construcción comenzó en 1907 y los mosaicos se instalaron durante 76 años, finalizándose en 1988. A menudo llamada «la Nueva Catedral» para distinguirla de la antigua Basílica. El Papa Juan Pablo II rezó aquí en 1999.',prayer:'San Luis, rey cruzado y gobernante justo, serviste a Cristo en tu pueblo y defendiste la fe con valor. Que esta ciudad que lleva tu nombre permanezca fiel al Evangelio y resplandezca con la luz de Cristo. Amén.',feast:'25 de agosto (San Luis)'},fr:{name:'Cathédrale Basilique de Saint-Louis',type:'Cathédrale',city:'Saint-Louis',province:'Missouri',description:'Plus grande collection de mosaïques de l\'hémisphère occidental, avec plus de 41 millions de pièces de verre. Chef-d\'œuvre byzantin dédié à saint Louis IX, roi de France.',history:'Construction de 1907. Mosaïques installées pendant 76 ans, achevées en 1988. Jean-Paul II y pria en 1999.',prayer:'Saint Louis, roi croisé, que cette ville reste fidèle à l\'Évangile. Amen.',feast:'25 août (Saint Louis)'},it:{name:'Cattedrale Basilica di San Luigi',type:'Cattedrale',city:'Saint Louis',province:'Missouri',description:'Ospita la più grande collezione di mosaici dell\'emisfero occidentale, con oltre 41 milioni di pezzi di vetro. Capolavoro bizantino dedicato a San Luigi IX, re di Francia.',history:'Costruzione dal 1907. Mosaici installati per 76 anni, completati nel 1988. Giovanni Paolo II vi pregò nel 1999.',prayer:'San Luigi, re crociato, che questa città resti fedele al Vangelo. Amen.',feast:'25 agosto (San Luigi)'},pt:{name:'Catedral Basílica de São Luís',type:'Catedral',city:'St. Louis',province:'Missouri',description:'Alberga a maior coleção de mosaicos do hemisfério ocidental, com mais de 41 milhões de peças de vidro. Obra-prima bizantina dedicada a São Luís IX, rei de França.',history:'Construção desde 1907. Mosaicos instalados durante 76 anos, concluídos em 1988. João Paulo II rezou aqui em 1999.',prayer:'São Luís, rei cruzado, que esta cidade permaneça fiel ao Evangelho. Ámen.',feast:'25 de agosto (São Luís)'}},

  {id:1903,country:'us',lat:33.5016,lng:-117.6635,icon:'🕊️',name:'Mission San Juan Capistrano',type:'Mission',city:'San Juan Capistrano',province:'California',description:'The "Jewel of the Missions", founded in 1776 by Saint Junípero Serra. Famous for the swallows that return each year on Saint Joseph\'s Day. The oldest building still in use in California is located here: the Serra Chapel.',history:'Founded on November 1, 1776, the same year the United States declared independence. The Great Stone Church collapsed in the 1812 earthquake, killing 40 worshippers during Mass. The Serra Chapel, where Saint Junípero celebrated Mass, remains in continuous use.',prayer:'Saint Junípero Serra, missionary of the Americas, you walked thousands of miles to bring Christ to the peoples of California. Pray for us that we may have the same zeal for the Gospel and love for all people. Amen.',feast:'July 1 (Saint Junípero Serra)',es:{name:'Misión San Juan Capistrano',type:'Misión',city:'San Juan Capistrano',province:'California',description:'La «Joya de las Misiones», fundada en 1776 por San Junípero Serra. Famosa por las golondrinas que regresan cada año el Día de San José. Aquí se encuentra el edificio más antiguo aún en uso de California: la Capilla de Serra.',history:'Fundada el 1 de noviembre de 1776, el mismo año en que Estados Unidos declaró su independencia. La Gran Iglesia de Piedra se derrumbó en el terremoto de 1812, matando a 40 fieles durante la misa. La Capilla de Serra, donde San Junípero celebró misa, sigue en uso continuo.',prayer:'San Junípero Serra, misionero de las Américas, caminaste miles de kilómetros para llevar a Cristo a los pueblos de California. Ruega por nosotros para que tengamos el mismo celo por el Evangelio y amor por todos. Amén.',feast:'1 de julio (San Junípero Serra)'},fr:{name:'Mission San Juan Capistrano',type:'Mission',city:'San Juan Capistrano',province:'Californie',description:'Le « Joyau des Missions », fondé en 1776 par saint Junípero Serra. Célèbre pour les hirondelles qui reviennent chaque année à la Saint-Joseph.',history:'Fondée le 1er novembre 1776. La Grande Église de Pierre s\'effondra en 1812, tuant 40 fidèles pendant la messe.',prayer:'Saint Junípero Serra, missionnaire des Amériques, prie pour que nous ayons le même zèle pour l\'Évangile. Amen.',feast:'1er juillet (Saint Junípero Serra)'},it:{name:'Missione San Juan Capistrano',type:'Missione',city:'San Juan Capistrano',province:'California',description:'Il «Gioiello delle Missioni», fondato nel 1776 da San Junípero Serra. Famoso per le rondini che tornano ogni anno a San Giuseppe.',history:'Fondata il 1° novembre 1776. La Grande Chiesa di Pietra crollò nel 1812, uccidendo 40 fedeli durante la messa.',prayer:'San Junípero Serra, missionario delle Americhe, prega perché abbiamo lo stesso zelo per il Vangelo. Amen.',feast:'1° luglio (San Junípero Serra)'},pt:{name:'Missão San Juan Capistrano',type:'Missão',city:'San Juan Capistrano',province:'Califórnia',description:'A «Joia das Missões», fundada em 1776 por São Junípero Serra. Famosa pelas andorinhas que regressam todos os anos no Dia de São José.',history:'Fundada a 1 de novembro de 1776. A Grande Igreja de Pedra desabou em 1812, matando 40 fiéis durante a missa.',prayer:'São Junípero Serra, missionário das Américas, reza para que tenhamos o mesmo zelo pelo Evangelho. Ámen.',feast:'1 de julho (São Junípero Serra)'}},

  {id:1904,country:'us',lat:32.1078,lng:-111.0113,icon:'⛪',name:'Mission San Xavier del Bac',type:'Mission',city:'Tucson',province:'Arizona',description:'Known as the "White Dove of the Desert", a dazzling 18th-century Spanish colonial mission on the Tohono O\'odham Nation reservation. Considered the finest example of Spanish colonial architecture in the United States.',history:'Founded by the Jesuit missionary Eusebio Kino in 1692. The current church was built between 1783 and 1797 by Franciscan friars. It has been in continuous use since, serving the Tohono O\'odham community for over 300 years.',prayer:'Saint Francis Xavier, patron of missions, you dreamed of bringing the Gospel to the ends of the earth. Bless this desert mission and all indigenous peoples who have kept faith alive for centuries. Amen.',feast:'December 3 (Saint Francis Xavier)',es:{name:'Misión San Xavier del Bac',type:'Misión',city:'Tucson',province:'Arizona',description:'Conocida como «la Paloma Blanca del Desierto», una deslumbrante misión colonial española del siglo XVIII en la reserva de la Nación Tohono O\'odham. Considerada el mejor ejemplo de arquitectura colonial española en Estados Unidos.',history:'Fundada por el misionero jesuita Eusebio Kino en 1692. La iglesia actual fue construida entre 1783 y 1797 por frailes franciscanos. Desde entonces ha estado en uso continuo, sirviendo a la comunidad Tohono O\'odham durante más de 300 años.',prayer:'San Francisco Javier, patrón de las misiones, soñaste con llevar el Evangelio a los confines de la tierra. Bendice esta misión en el desierto y a todos los pueblos indígenas que han mantenido viva la fe durante siglos. Amén.',feast:'3 de diciembre (San Francisco Javier)'},fr:{name:'Mission San Xavier del Bac',type:'Mission',city:'Tucson',province:'Arizona',description:'Connue comme la « Colombe Blanche du Désert », une magnifique mission coloniale espagnole du XVIIIe siècle sur la réserve des Tohono O\'odham.',history:'Fondée par le jésuite Eusebio Kino en 1692. Église actuelle bâtie entre 1783 et 1797.',prayer:'Saint François Xavier, bénis cette mission du désert et les peuples indigènes qui ont gardé la foi vivante. Amen.',feast:'3 décembre (Saint François Xavier)'},it:{name:'Missione San Xavier del Bac',type:'Missione',city:'Tucson',province:'Arizona',description:'Conosciuta come la «Colomba Bianca del Deserto», splendida missione coloniale spagnola del XVIII secolo nella riserva Tohono O\'odham.',history:'Fondata dal gesuita Eusebio Kino nel 1692. Chiesa attuale costruita tra il 1783 e il 1797.',prayer:'San Francesco Saverio, benedici questa missione del deserto e i popoli indigeni che hanno mantenuto viva la fede. Amen.',feast:'3 dicembre (San Francesco Saverio)'},pt:{name:'Missão San Xavier del Bac',type:'Missão',city:'Tucson',province:'Arizona',description:'Conhecida como a «Pomba Branca do Deserto», deslumbrante missão colonial espanhola do século XVIII na reserva Tohono O\'odham.',history:'Fundada pelo jesuíta Eusebio Kino em 1692. Igreja atual construída entre 1783 e 1797.',prayer:'São Francisco Xavier, abençoa esta missão do deserto e os povos indígenas que mantiveram viva a fé. Ámen.',feast:'3 de dezembro (São Francisco Xavier)'}},

  {id:1905,country:'us',lat:44.6330,lng:-87.7266,icon:'🌟',name:'National Shrine of Our Lady of Good Help',type:'Marian shrine',city:'Champion',province:'Wisconsin',description:'The only Marian apparition in the United States officially approved by the Catholic Church. In 1859, the Virgin Mary appeared three times to Adele Brise, a Belgian immigrant, asking her to teach the children of the American frontier.',history:'The apparitions took place in October 1859. In 1871, during the Great Peshtigo Fire that devastated surrounding Wisconsin, the faithful took refuge at the shrine and prayed all night. The fire stopped at the fence and the shrine was saved. The apparitions were officially recognised by the bishop in 2010.',prayer:'Our Lady of Good Help, you asked a simple immigrant to catechise the children of this vast land. Bless all who teach the faith to the young and protect those who pass through fires, whether of body or spirit. Amen.',feast:'October 9 (Apparition of Champion)',es:{name:'Santuario Nacional de Nuestra Señora del Buen Socorro',type:'Santuario mariano',city:'Champion',province:'Wisconsin',description:'La única aparición mariana en Estados Unidos oficialmente aprobada por la Iglesia católica. En 1859, la Virgen María se apareció tres veces a Adele Brise, una inmigrante belga, pidiéndole que enseñara a los niños de la frontera americana.',history:'Las apariciones ocurrieron en octubre de 1859. En 1871, durante el Gran Incendio de Peshtigo que devastó el Wisconsin circundante, los fieles se refugiaron en el santuario y rezaron toda la noche. El fuego se detuvo en la valla y el santuario se salvó. Las apariciones fueron reconocidas oficialmente por el obispo en 2010.',prayer:'Nuestra Señora del Buen Socorro, pediste a una sencilla inmigrante catequizar a los niños de esta vasta tierra. Bendice a todos los que enseñan la fe a los jóvenes y protege a quienes atraviesan fuegos, ya sean del cuerpo o del espíritu. Amén.',feast:'9 de octubre (Aparición de Champion)'},fr:{name:'Sanctuaire National de Notre-Dame du Bon Secours',type:'Sanctuaire marial',city:'Champion',province:'Wisconsin',description:'La seule apparition mariale des États-Unis officiellement approuvée. En 1859, la Vierge apparut trois fois à Adele Brise, immigrante belge.',history:'Apparitions en octobre 1859. En 1871, lors du Grand Incendie de Peshtigo, le sanctuaire fut sauvé. Reconnues officiellement en 2010.',prayer:'Notre-Dame du Bon Secours, bénis tous ceux qui enseignent la foi aux jeunes. Amen.',feast:'9 octobre (Apparition de Champion)'},it:{name:'Santuario Nazionale di Nostra Signora del Buon Aiuto',type:'Santuario mariano',city:'Champion',province:'Wisconsin',description:'L\'unica apparizione mariana negli Stati Uniti ufficialmente approvata. Nel 1859, la Vergine apparve tre volte ad Adele Brise, immigrata belga.',history:'Apparizioni nell\'ottobre 1859. Nel 1871, durante il Grande Incendio di Peshtigo, il santuario fu salvato. Riconosciute ufficialmente nel 2010.',prayer:'Nostra Signora del Buon Aiuto, benedici coloro che insegnano la fede ai giovani. Amen.',feast:'9 ottobre (Apparizione di Champion)'},pt:{name:'Santuário Nacional de Nossa Senhora do Bom Socorro',type:'Santuário mariano',city:'Champion',province:'Wisconsin',description:'A única aparição mariana nos Estados Unidos oficialmente aprovada. Em 1859, a Virgem apareceu três vezes a Adele Brise, imigrante belga.',history:'Aparições em outubro de 1859. Em 1871, durante o Grande Incêndio de Peshtigo, o santuário foi salvo. Reconhecidas oficialmente em 2010.',prayer:'Nossa Senhora do Bom Socorro, abençoa todos os que ensinam a fé aos jovens. Ámen.',feast:'9 de outubro (Aparição de Champion)'}},

  {id:1906,country:'us',lat:40.7585,lng:-73.9754,icon:'✝️',name:'Saint Patrick\'s Cathedral',type:'Cathedral',city:'New York',province:'New York',description:'The seat of the Archbishop of New York and the largest Gothic Revival cathedral in North America. A bastion of faith in the heart of Manhattan, it receives over five million visitors each year.',history:'Construction began in 1858 and the cathedral was opened in 1879. The twin spires reach 100 metres high. A symbol of the faith of Irish immigrants and all American Catholics, it has witnessed the funerals of great figures and visits of multiple popes.',prayer:'Saint Patrick, apostle of Ireland, you drove out the darkness of paganism and brought the light of Christ. In this cathedral at the heart of the modern world, renew the faith of all who seek God amid the noise of the city. Amen.',feast:'March 17 (Saint Patrick)',es:{name:'Catedral de San Patricio',type:'Catedral',city:'Nueva York',province:'Nueva York',description:'Sede del Arzobispo de Nueva York y la mayor catedral neogótica de Norteamérica. Un bastión de la fe en el corazón de Manhattan, que recibe más de cinco millones de visitantes al año.',history:'La construcción comenzó en 1858 y la catedral se abrió en 1879. Las torres gemelas alcanzan 100 metros de altura. Símbolo de la fe de los inmigrantes irlandeses y de todos los católicos estadounidenses, ha sido testigo de funerales de grandes figuras y de visitas de varios papas.',prayer:'San Patricio, apóstol de Irlanda, alejaste las tinieblas del paganismo y trajiste la luz de Cristo. En esta catedral en el corazón del mundo moderno, renueva la fe de todos los que buscan a Dios en medio del ruido de la ciudad. Amén.',feast:'17 de marzo (San Patricio)'},fr:{name:'Cathédrale Saint-Patrick',type:'Cathédrale',city:'New York',province:'New York',description:'Siège de l\'archevêque de New York et la plus grande cathédrale néogothique d\'Amérique du Nord. Plus de cinq millions de visiteurs par an.',history:'Construction commencée en 1858, ouverte en 1879. Flèches jumelles de 100 mètres.',prayer:'Saint Patrick, renouvelle la foi de ceux qui cherchent Dieu dans le bruit de la ville. Amen.',feast:'17 mars (Saint Patrick)'},it:{name:'Cattedrale di San Patrizio',type:'Cattedrale',city:'New York',province:'New York',description:'Sede dell\'Arcivescovo di New York e la più grande cattedrale neogotica del Nord America. Oltre cinque milioni di visitatori all\'anno.',history:'Costruzione iniziata nel 1858, aperta nel 1879. Guglie gemelle di 100 metri.',prayer:'San Patrizio, rinnova la fede di chi cerca Dio nel rumore della città. Amen.',feast:'17 marzo (San Patrizio)'},pt:{name:'Catedral de São Patrício',type:'Catedral',city:'Nova Iorque',province:'Nova Iorque',description:'Sede do Arcebispo de Nova Iorque e a maior catedral neogótica da América do Norte. Mais de cinco milhões de visitantes por ano.',history:'Construção iniciada em 1858, aberta em 1879. Torres gémeas de 100 metros.',prayer:'São Patrício, renova a fé dos que procuram Deus no ruído da cidade. Ámen.',feast:'17 de março (São Patrício)'}},

  {id:1907,country:'us',lat:35.9891,lng:-105.9307,icon:'💧',name:'El Santuario de Chimayó',type:'Sanctuary',city:'Chimayó',province:'New Mexico',description:'Known as "the Lourdes of America", this humble adobe church receives nearly 300,000 pilgrims a year. The sacred earth from the "pocito" (little well) is believed to have miraculous healing properties. The Good Friday pilgrimage attracts over 40,000 walkers.',history:'Built between 1813 and 1816 by Bernardo Abeyta, after he experienced a miraculous healing in that spot. The tradition of the healing earth has pre-Hispanic roots that merged with Catholic faith. It has been a National Historic Landmark since 1970.',prayer:'Lord of Esquipulas, venerated in this humble sanctuary of earth and adobe, you remind us that your healing power reaches even the most hidden corners. Heal the wounds of our body and soul as we touch this sacred land. Amen.',feast:'Good Friday (Great Pilgrimage)',es:{name:'El Santuario de Chimayó',type:'Santuario',city:'Chimayó',province:'Nuevo México',description:'Conocido como «la Lourdes de América», este humilde templo de adobe recibe cerca de 300.000 peregrinos al año. La tierra sagrada del «pocito» se cree tiene propiedades curativas milagrosas. La peregrinación del Viernes Santo reúne a más de 40.000 caminantes.',history:'Construido entre 1813 y 1816 por Bernardo Abeyta, tras experimentar una curación milagrosa en ese lugar. La tradición de la tierra curativa tiene raíces prehispánicas que se fundieron con la fe católica. Es Monumento Histórico Nacional desde 1970.',prayer:'Señor de Esquipulas, venerado en este humilde santuario de tierra y adobe, nos recuerdas que tu poder sanador llega incluso a los rincones más escondidos. Sana las heridas de nuestro cuerpo y alma al tocar esta tierra sagrada. Amén.',feast:'Viernes Santo (Gran Peregrinación)'},fr:{name:'El Santuario de Chimayó',type:'Sanctuaire',city:'Chimayó',province:'Nouveau-Mexique',description:'Connu comme « la Lourdes d\'Amérique », cette humble église en adobe reçoit près de 300 000 pèlerins par an. La terre sacrée du « pocito » a des vertus curatives.',history:'Construit entre 1813 et 1816 par Bernardo Abeyta après une guérison miraculeuse. Monument historique national depuis 1970.',prayer:'Seigneur d\'Esquipulas, guéris les blessures de notre corps et de notre âme. Amen.',feast:'Vendredi Saint (Grand Pèlerinage)'},it:{name:'El Santuario de Chimayó',type:'Santuario',city:'Chimayó',province:'Nuovo Messico',description:'Conosciuto come «la Lourdes d\'America», questa umile chiesa in adobe riceve circa 300.000 pellegrini all\'anno. La terra sacra del «pocito» ha virtù curative.',history:'Costruito tra il 1813 e il 1816 da Bernardo Abeyta dopo una guarigione miracolosa. Monumento storico nazionale dal 1970.',prayer:'Signore di Esquipulas, guarisci le ferite del nostro corpo e della nostra anima. Amen.',feast:'Venerdì Santo (Grande Pellegrinaggio)'},pt:{name:'El Santuario de Chimayó',type:'Santuário',city:'Chimayó',province:'Novo México',description:'Conhecido como «a Lourdes da América», esta humilde igreja de adobe recebe cerca de 300.000 peregrinos por ano. A terra sagrada do «pocito» tem virtudes curativas.',history:'Construído entre 1813 e 1816 por Bernardo Abeyta após uma cura milagrosa. Monumento Histórico Nacional desde 1970.',prayer:'Senhor de Esquipulas, cura as feridas do nosso corpo e da nossa alma. Ámen.',feast:'Sexta-feira Santa (Grande Peregrinação)'}},

  // ===== CANADA =====
  {id:2001,country:'ca',lat:47.0228,lng:-70.9275,icon:'👵',name:'Sanctuary of Sainte-Anne-de-Beaupré',type:'Basilica',city:'Sainte-Anne-de-Beaupré',province:'Quebec',description:'One of the oldest and most famous pilgrimage sites in North America, dedicated to Saint Anne, the mother of the Virgin Mary and grandmother of Jesus. Over a million pilgrims come each year, and the basilica is renowned for miraculous healings — evidenced by the crutches left at the entrance by the cured.',history:'The devotion began in 1658 when a chapel was built by Breton sailors who had survived a storm through the intercession of Saint Anne. Through successive fires and reconstructions, it has grown into the vast neo-Romanesque basilica we know today, opened for public worship in 1934 and formally dedicated in 1976. Pope John Paul II visited in 1984.',prayer:'Saint Anne, mother of the Virgin Mary, grandmother of Jesus, you who taught your daughter to love God, teach us too. Heal our ills of body and spirit, and carry our prayers to the heart of your grandson. Amen.',feast:'July 26 (Saint Anne)',es:{name:'Santuario de Santa Ana de Beaupré',type:'Basílica',city:'Sainte-Anne-de-Beaupré',province:'Quebec',description:'Uno de los lugares de peregrinación más antiguos y famosos de Norteamérica, dedicado a Santa Ana, madre de la Virgen María y abuela de Jesús. Más de un millón de peregrinos acuden cada año, y la basílica es célebre por sus curaciones milagrosas, atestiguadas por las muletas que los sanados dejan a la entrada.',history:'La devoción comenzó en 1658 cuando unos marinos bretones, salvados de una tempestad por intercesión de Santa Ana, construyeron una capilla. A través de sucesivos incendios y reconstrucciones, se convirtió en la inmensa basílica neorrománica actual, abierta al culto en 1934 y dedicada oficialmente en 1976. El Papa Juan Pablo II la visitó en 1984.',prayer:'Santa Ana, madre de la Virgen María, abuela de Jesús, tú que enseñaste a tu hija a amar a Dios, enséñanos también a nosotros. Sana nuestros males de cuerpo y espíritu, y lleva nuestras oraciones al corazón de tu nieto. Amén.',feast:'26 de julio (Santa Ana)'},fr:{name:'Sanctuaire de Sainte-Anne-de-Beaupré',type:'Basilique',city:'Sainte-Anne-de-Beaupré',province:'Québec',description:'L\'un des plus anciens et des plus célèbres lieux de pèlerinage d\'Amérique du Nord, dédié à sainte Anne, mère de la Vierge Marie et grand-mère de Jésus. Plus d\'un million de pèlerins s\'y rendent chaque année, et la basilique est réputée pour ses guérisons miraculeuses, attestées par les béquilles laissées à l\'entrée.',history:'La dévotion commença en 1658 lorsque des marins bretons, sauvés d\'une tempête par l\'intercession de sainte Anne, construisirent une chapelle. À travers incendies et reconstructions, elle est devenue l\'immense basilique néo-romane actuelle, ouverte au culte en 1934 et dédicacée en 1976. Jean-Paul II la visita en 1984.',prayer:'Sainte Anne, mère de la Vierge Marie, grand-mère de Jésus, toi qui appris à ta fille à aimer Dieu, apprends-le-nous aussi. Guéris nos maux de corps et d\'esprit, et porte nos prières au cœur de ton petit-fils. Amen.',feast:'26 juillet (Sainte Anne)'},it:{name:'Santuario di Sant\'Anna di Beaupré',type:'Basilica',city:'Sainte-Anne-de-Beaupré',province:'Quebec',description:'Uno dei luoghi di pellegrinaggio più antichi e famosi del Nord America, dedicato a Sant\'Anna, madre della Vergine Maria e nonna di Gesù. Oltre un milione di pellegrini ogni anno. La basilica è celebre per le guarigioni miracolose, testimoniate dalle stampelle lasciate all\'ingresso.',history:'La devozione iniziò nel 1658 quando marinai bretoni, salvati da una tempesta per intercessione di Sant\'Anna, costruirono una cappella. Attraverso incendi e ricostruzioni, è diventata l\'immensa basilica neoromanica attuale, aperta al culto nel 1934 e dedicata ufficialmente nel 1976. Giovanni Paolo II la visitò nel 1984.',prayer:'Sant\'Anna, madre della Vergine Maria, nonna di Gesù, tu che hai insegnato a tua figlia ad amare Dio, insegnalo anche a noi. Guarisci i nostri mali di corpo e di spirito. Amen.',feast:'26 luglio (Sant\'Anna)'},pt:{name:'Santuário de Sant\'Ana de Beaupré',type:'Basílica',city:'Sainte-Anne-de-Beaupré',province:'Quebec',description:'Um dos lugares de peregrinação mais antigos e famosos da América do Norte, dedicado a Santa Ana, mãe da Virgem Maria e avó de Jesus. Mais de um milhão de peregrinos por ano. A basílica é célebre pelas suas curas milagrosas.',history:'A devoção começou em 1658 quando marinheiros bretões salvos de uma tempestade por intercessão de Santa Ana construíram uma capela. Transformou-se na atual basílica neo-românica, aberta ao culto em 1934 e dedicada oficialmente em 1976. João Paulo II visitou em 1984.',prayer:'Santa Ana, mãe da Virgem Maria, avó de Jesus, ensina-nos a amar a Deus. Cura os nossos males de corpo e espírito. Ámen.',feast:'26 de julho (Santa Ana)'}},

  {id:2002,country:'ca',lat:45.4921,lng:-73.6184,icon:'⛪',name:'Saint Joseph\'s Oratory of Mount Royal',type:'Basilica',city:'Montreal',province:'Quebec',description:'The largest church in Canada, crowning the summit of Mount Royal in Montreal. Its dome is the third largest in the world after Saint Peter\'s and the Duomo of Florence. Founded by Saint Brother André Bessette, the "miracle worker of Montreal", who attributed all healings to Saint Joseph.',history:'Brother André, a humble Holy Cross porter, began a devotion to Saint Joseph in 1904 with a small chapel on the hillside. Thousands of healings were attributed to his intercession. The monumental basilica was built between 1924 and 1967. Brother André was canonised by Pope Benedict XVI in 2010 — his heart is preserved and venerated in the oratory.',prayer:'Saint Joseph, foster father of Jesus and silent guardian of the Holy Family, pray for us. Brother André, humble servant who pointed all to Saint Joseph, intercede for the sick and all who seek consolation. Amen.',feast:'March 19 (Saint Joseph)',es:{name:'Oratorio de San José del Monte Real',type:'Basílica',city:'Montreal',province:'Quebec',description:'La iglesia más grande de Canadá, coronando la cima del Monte Real en Montreal. Su cúpula es la tercera más grande del mundo tras la de San Pedro y el Duomo de Florencia. Fundado por San Hermano André Bessette, el «taumaturgo de Montreal», que atribuía todas las curaciones a San José.',history:'El hermano André, humilde portero de los Padres de la Santa Cruz, inició la devoción a San José en 1904 con una pequeña capilla en la ladera. Se le atribuyeron miles de curaciones por su intercesión. La basílica monumental fue construida entre 1924 y 1967. El hermano André fue canonizado por el Papa Benedicto XVI en 2010 — su corazón se conserva y venera en el oratorio.',prayer:'San José, padre adoptivo de Jesús y guardián silencioso de la Sagrada Familia, ruega por nosotros. Hermano André, humilde servidor que remitía todo a San José, intercede por los enfermos y los que buscan consuelo. Amén.',feast:'19 de marzo (San José)'},fr:{name:'Oratoire Saint-Joseph du Mont-Royal',type:'Basilique',city:'Montréal',province:'Québec',description:'La plus grande église du Canada, couronnant le sommet du Mont-Royal. Son dôme est le troisième plus grand au monde après Saint-Pierre et le Duomo de Florence. Fondé par saint frère André Bessette, le « thaumaturge de Montréal », qui attribuait toutes les guérisons à saint Joseph.',history:'Le frère André, humble portier des Pères de Sainte-Croix, commença la dévotion à saint Joseph en 1904 avec une petite chapelle. Des milliers de guérisons lui furent attribuées. La basilique monumentale fut construite entre 1924 et 1967. Frère André fut canonisé par Benoît XVI en 2010 — son cœur est conservé et vénéré à l\'Oratoire.',prayer:'Saint Joseph, père adoptif de Jésus, prie pour nous. Frère André, humble serviteur, intercède pour les malades et ceux qui cherchent consolation. Amen.',feast:'19 mars (Saint Joseph)'},it:{name:'Oratorio di San Giuseppe del Monte Reale',type:'Basilica',city:'Montreal',province:'Quebec',description:'La chiesa più grande del Canada, sulla cima del Monte Reale a Montreal. La sua cupola è la terza più grande al mondo dopo San Pietro e il Duomo di Firenze. Fondato da San Fratel André Bessette, il «taumaturgo di Montreal».',history:'Fratel André, umile portinaio della Santa Croce, iniziò la devozione a San Giuseppe nel 1904. Migliaia di guarigioni furono attribuite alla sua intercessione. La basilica monumentale fu costruita tra il 1924 e il 1967. Canonizzato da Benedetto XVI nel 2010. Il suo cuore è conservato e venerato nell\'oratorio.',prayer:'San Giuseppe, padre adottivo di Gesù, prega per noi. Fratel André, intercedi per i malati e per chi cerca consolazione. Amen.',feast:'19 marzo (San Giuseppe)'},pt:{name:'Oratório de São José do Monte Real',type:'Basílica',city:'Montreal',province:'Quebec',description:'A maior igreja do Canadá, no cume do Monte Real em Montreal. A sua cúpula é a terceira maior do mundo. Fundado por São Irmão André Bessette, o «taumaturgo de Montreal».',history:'O Irmão André, humilde porteiro da Santa Cruz, iniciou a devoção a São José em 1904. Milhares de curas foram atribuídas à sua intercessão. Canonizado por Bento XVI em 2010. O seu coração conserva-se e venera-se no oratório.',prayer:'São José, pai adotivo de Jesus, reza por nós. Irmão André, intercede pelos doentes. Ámen.',feast:'19 de março (São José)'}},

  {id:2003,country:'ca',lat:45.5045,lng:-73.5561,icon:'🕯️',name:'Notre-Dame Basilica of Montreal',type:'Basilica',city:'Montreal',province:'Quebec',description:'A masterpiece of Gothic Revival architecture in the historic heart of Montreal. The interior is one of the most spectacular in North America: deep blue vaults with golden stars, thousands of hand-carved wooden details, and stained glass depicting the religious history of the city.',history:'Built between 1824 and 1829 by Irish-American architect James O\'Donnell, who converted to Catholicism to be buried there. The interior was decorated later, between 1872 and 1880. It was the setting of Céline Dion\'s wedding and the state funeral of former Prime Minister Pierre Elliott Trudeau in 2000.',prayer:'Our Lady of Montreal, Mother of the city built by faith, watch over this metropolis where so many peoples and languages meet. May all who cross this threshold find peace, beauty and the nearness of God. Amen.',feast:'September 8 (Nativity of Mary)',es:{name:'Basílica de Notre-Dame de Montreal',type:'Basílica',city:'Montreal',province:'Quebec',description:'Una obra maestra del neogótico en el corazón histórico de Montreal. El interior es uno de los más espectaculares de Norteamérica: bóvedas azul profundo con estrellas doradas, miles de tallas de madera y vidrieras que representan la historia religiosa de la ciudad.',history:'Construida entre 1824 y 1829 por el arquitecto irlandés-americano James O\'Donnell, que se convirtió al catolicismo para ser enterrado en ella. El interior se decoró más tarde, entre 1872 y 1880. Fue escenario de la boda de Céline Dion y del funeral de Estado del primer ministro Pierre Elliott Trudeau en 2000.',prayer:'Nuestra Señora de Montreal, Madre de la ciudad edificada por la fe, vela por esta metrópoli donde se encuentran tantos pueblos y lenguas. Que todos los que crucen este umbral encuentren paz, belleza y la cercanía de Dios. Amén.',feast:'8 de septiembre (Natividad de María)'},fr:{name:'Basilique Notre-Dame de Montréal',type:'Basilique',city:'Montréal',province:'Québec',description:'Chef-d\'œuvre néogothique au cœur historique de Montréal. Son intérieur est l\'un des plus spectaculaires d\'Amérique du Nord : voûtes bleu profond aux étoiles dorées, milliers de sculptures en bois et vitraux retraçant l\'histoire religieuse de la ville.',history:'Construite entre 1824 et 1829 par James O\'Donnell, converti au catholicisme pour y être enterré. Intérieur décoré entre 1872 et 1880. Céline Dion s\'y maria, Pierre Elliott Trudeau y eut ses funérailles d\'État en 2000.',prayer:'Notre-Dame de Montréal, Mère de cette ville bâtie par la foi, veille sur cette métropole où se rencontrent tant de peuples et de langues. Amen.',feast:'8 septembre (Nativité de Marie)'},it:{name:'Basilica di Notre-Dame di Montreal',type:'Basilica',city:'Montreal',province:'Quebec',description:'Capolavoro neogotico nel cuore storico di Montreal. L\'interno è tra i più spettacolari del Nord America: volte blu profondo con stelle dorate, migliaia di sculture lignee e vetrate sulla storia religiosa della città.',history:'Costruita tra il 1824 e il 1829 da James O\'Donnell, convertitosi al cattolicesimo per esservi sepolto. Interno decorato tra il 1872 e il 1880. Matrimonio di Céline Dion, funerale di Stato di Pierre Elliott Trudeau nel 2000.',prayer:'Nostra Signora di Montreal, Madre di questa città edificata sulla fede, veglia su questa metropoli dove s\'incontrano tanti popoli. Amen.',feast:'8 settembre (Natività di Maria)'},pt:{name:'Basílica de Notre-Dame de Montreal',type:'Basílica',city:'Montreal',province:'Quebec',description:'Obra-prima neogótica no coração histórico de Montreal. O interior é dos mais espetaculares da América do Norte: abóbadas azul profundo com estrelas douradas e milhares de esculturas em madeira.',history:'Construída entre 1824 e 1829 por James O\'Donnell, que se converteu ao catolicismo para aí ser sepultado. Interior decorado entre 1872 e 1880. Casamento de Céline Dion, funeral de Estado de Pierre Elliott Trudeau em 2000.',prayer:'Nossa Senhora de Montreal, vela por esta metrópole onde se encontram tantos povos. Ámen.',feast:'8 de setembro (Natividade de Maria)'}},

  {id:2004,country:'ca',lat:44.7401,lng:-79.8157,icon:'🩸',name:'Martyrs\' Shrine',type:'Shrine',city:'Midland',province:'Ontario',description:'Dedicated to the eight Canadian Jesuit Martyrs who died bringing the Gospel to the Huron peoples in the 17th century. Built near the ruins of Sainte-Marie among the Hurons, the first European settlement in Ontario. A profoundly moving pilgrimage site.',history:'Saint Jean de Brébeuf, Saint Isaac Jogues and six companions were tortured and killed by Iroquois warriors between 1642 and 1649. They were canonised by Pope Pius XI in 1930. The current Gothic Revival shrine was opened in 1926. Pope John Paul II visited in 1984.',prayer:'Holy Martyrs of Canada, you gave your lives to bring Christ to the peoples of this land. Pray for Canada and for all missionaries. May your blood, which became seed of the Church, bear fruit still today in hearts of peace and reconciliation. Amen.',feast:'October 19 (Canadian Martyrs)',es:{name:'Santuario de los Mártires Canadienses',type:'Santuario',city:'Midland',province:'Ontario',description:'Dedicado a los ocho mártires jesuitas canadienses que dieron la vida llevando el Evangelio a los pueblos hurones en el siglo XVII. Construido cerca de las ruinas de Sainte-Marie entre los hurones, el primer asentamiento europeo en Ontario. Un lugar de peregrinación profundamente conmovedor.',history:'San Juan de Brébeuf, San Isaac Jogues y otros seis compañeros fueron torturados y asesinados por guerreros iroqueses entre 1642 y 1649. Fueron canonizados por el Papa Pío XI en 1930. El santuario neogótico actual fue inaugurado en 1926. El Papa Juan Pablo II lo visitó en 1984.',prayer:'Santos Mártires de Canadá, disteis la vida para llevar a Cristo a los pueblos de esta tierra. Rogad por Canadá y por todos los misioneros. Que vuestra sangre, semilla de la Iglesia, siga fructificando hoy en corazones de paz y reconciliación. Amén.',feast:'19 de octubre (Mártires Canadienses)'},fr:{name:'Sanctuaire des Martyrs Canadiens',type:'Sanctuaire',city:'Midland',province:'Ontario',description:'Dédié aux huit martyrs jésuites canadiens morts en apportant l\'Évangile aux peuples hurons au XVIIe siècle. Construit près des ruines de Sainte-Marie-au-pays-des-Hurons, premier établissement européen en Ontario.',history:'Saint Jean de Brébeuf, saint Isaac Jogues et six compagnons furent torturés et tués par les Iroquois entre 1642 et 1649. Canonisés par Pie XI en 1930. Sanctuaire ouvert en 1926. Jean-Paul II le visita en 1984.',prayer:'Saints Martyrs du Canada, priez pour le Canada et tous les missionnaires. Que votre sang, semence de l\'Église, porte encore fruit en cœurs de paix et de réconciliation. Amen.',feast:'19 octobre (Martyrs Canadiens)'},it:{name:'Santuario dei Martiri Canadesi',type:'Santuario',city:'Midland',province:'Ontario',description:'Dedicato agli otto martiri gesuiti canadesi morti portando il Vangelo agli Uroni nel XVII secolo. Costruito vicino alle rovine di Sainte-Marie, primo insediamento europeo in Ontario.',history:'San Giovanni de Brébeuf, Sant\'Isacco Jogues e sei compagni furono torturati e uccisi dagli Irochesi tra il 1642 e il 1649. Canonizzati da Pio XI nel 1930. Santuario inaugurato nel 1926. Giovanni Paolo II lo visitò nel 1984.',prayer:'Santi Martiri del Canada, pregate per il Canada e per tutti i missionari. Che il vostro sangue porti ancora frutto in cuori di pace. Amen.',feast:'19 ottobre (Martiri Canadesi)'},pt:{name:'Santuário dos Mártires Canadenses',type:'Santuário',city:'Midland',province:'Ontário',description:'Dedicado aos oito mártires jesuítas canadenses que deram a vida levando o Evangelho aos hurões no século XVII. Construído perto das ruínas de Sainte-Marie, primeiro estabelecimento europeu no Ontário.',history:'São João de Brébeuf, Santo Isaac Jogues e seis companheiros foram torturados e mortos pelos iroqueses entre 1642 e 1649. Canonizados por Pio XI em 1930. Santuário inaugurado em 1926. João Paulo II visitou em 1984.',prayer:'Santos Mártires do Canadá, rezai pelo Canadá e por todos os missionários. Ámen.',feast:'19 de outubro (Mártires Canadenses)'}},

  {id:2005,country:'ca',lat:46.3793,lng:-72.5163,icon:'🌹',name:'Sanctuary of Our Lady of the Cape',type:'Marian shrine',city:'Trois-Rivières',province:'Quebec',description:'The National Shrine of Canada dedicated to the Rosary, on the banks of the Saint Lawrence River. Site of two famous Marian prodigies: the "Ice Bridge" of 1879, when a miraculous ice road formed across the river to transport the stones of the new church, and the "Prodigy of the Eyes" of 1888, when witnesses saw the statue\'s eyes open.',history:'The first stone chapel dates from 1714 — the oldest surviving stone church in Canada that has remained in its original form. In 1879, when stones were needed from the other side of the frozen-but-impassable river, an unseasonable frost formed an "ice bridge" between March 14 and 19, attributed to Saint Joseph. In 1888, three witnesses saw the eyes of the statue open during prayer. Pope John Paul II visited in 1984.',prayer:'Our Lady of the Cape, Queen of the Holy Rosary, you have smiled upon this land of Canada through the centuries. May the stones carried on the miraculous bridge remind us that nothing is impossible for those who trust in God. Amen.',feast:'August 15 (Assumption)',es:{name:'Santuario de Nuestra Señora del Cabo',type:'Santuario mariano',city:'Trois-Rivières',province:'Quebec',description:'El Santuario Nacional de Canadá dedicado al Santo Rosario, a orillas del río San Lorenzo. Escenario de dos famosos prodigios marianos: el «Puente de Hielo» de 1879, cuando se formó milagrosamente un camino de hielo sobre el río para transportar las piedras de la nueva iglesia, y el «Prodigio de los Ojos» de 1888, cuando unos testigos vieron abrirse los ojos de la estatua.',history:'La primera capilla de piedra data de 1714 — la iglesia de piedra más antigua de Canadá que conserva su forma original. En 1879, cuando se necesitaban piedras de la otra orilla del río helado pero intransitable, una helada fuera de estación formó un «puente de hielo» entre el 14 y el 19 de marzo, atribuido a San José. En 1888, tres testigos vieron abrirse los ojos de la estatua durante la oración. El Papa Juan Pablo II la visitó en 1984.',prayer:'Nuestra Señora del Cabo, Reina del Santo Rosario, has sonreído a esta tierra de Canadá a través de los siglos. Que las piedras llevadas sobre el puente milagroso nos recuerden que nada es imposible para quien confía en Dios. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Sanctuaire Notre-Dame-du-Cap',type:'Sanctuaire marial',city:'Trois-Rivières',province:'Québec',description:'Sanctuaire National du Canada dédié au Rosaire, sur les rives du Saint-Laurent. Théâtre de deux prodiges mariaux : le « Pont de glace » de 1879 et le « Prodige des Yeux » de 1888, quand des témoins virent les yeux de la statue s\'ouvrir.',history:'La première chapelle de pierre date de 1714 — la plus ancienne église en pierre du Canada conservée dans sa forme originale. En 1879, une glace hors saison forma un « pont de glace » du 14 au 19 mars, attribué à saint Joseph. En 1888, trois témoins virent les yeux de la statue s\'ouvrir. Jean-Paul II la visita en 1984.',prayer:'Notre-Dame-du-Cap, Reine du Saint Rosaire, tu as souri à cette terre du Canada. Que les pierres portées sur le pont miraculeux nous rappellent que rien n\'est impossible à qui se confie en Dieu. Amen.',feast:'15 août (Assomption)'},it:{name:'Santuario di Nostra Signora del Capo',type:'Santuario mariano',city:'Trois-Rivières',province:'Quebec',description:'Santuario Nazionale del Canada dedicato al Rosario, sulle rive del San Lorenzo. Teatro di due prodigi mariani: il «Ponte di Ghiaccio» del 1879 e il «Prodigio degli Occhi» del 1888, quando alcuni testimoni videro aprirsi gli occhi della statua.',history:'La prima cappella in pietra risale al 1714 — la chiesa in pietra più antica del Canada nella sua forma originale. Nel 1879, un ponte di ghiaccio fuori stagione si formò dal 14 al 19 marzo, attribuito a San Giuseppe. Nel 1888 tre testimoni videro aprirsi gli occhi della statua. Giovanni Paolo II la visitò nel 1984.',prayer:'Nostra Signora del Capo, Regina del Santo Rosario, hai sorriso a questa terra del Canada. Che nulla sia impossibile a chi confida in Dio. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Santuário de Nossa Senhora do Cabo',type:'Santuário mariano',city:'Trois-Rivières',province:'Quebec',description:'Santuário Nacional do Canadá dedicado ao Rosário, nas margens do rio São Lourenço. Palco de dois prodígios marianos: a «Ponte de Gelo» de 1879 e o «Prodígio dos Olhos» de 1888.',history:'A primeira capela de pedra data de 1714 — a igreja de pedra mais antiga do Canadá na sua forma original. Em 1879, uma ponte de gelo fora de época formou-se de 14 a 19 de março, atribuída a São José. Em 1888 três testemunhas viram abrir-se os olhos da estátua. João Paulo II visitou em 1984.',prayer:'Nossa Senhora do Cabo, Rainha do Santo Rosário, nada é impossível para quem confia em Deus. Ámen.',feast:'15 de agosto (Assunção)'}},

  // ===== BOLIVIA =====
  {id:2101,country:'bo',lat:-17.3793,lng:-66.1378,icon:'✝️',name:'Cristo de la Concordia',type:'Monument',city:'Cochabamba',province:'Cochabamba',description:'One of the largest statues of Christ in the world, even taller than Rio de Janeiro\'s Christ the Redeemer. Rising from Cerro San Pedro and overlooking the entire city of Cochabamba, it is a powerful symbol of Bolivia\'s Catholic faith and a major pilgrimage destination.',history:'Built between 1987 and 1994, the statue stands 34 metres tall on a 6-metre pedestal. Pilgrims climb the 1,399 steps up the hill as a devotional exercise, stopping at Stations of the Cross along the way. A small chapel inside the base allows for Mass and prayer.',prayer:'Lord Jesus of the Concordia, you open your arms over Bolivia as over the whole world. May the peoples of this land find in you the unity and peace that give the monument its name. Amen.',feast:'Solemnity of Christ the King',es:{name:'Cristo de la Concordia',type:'Monumento',city:'Cochabamba',province:'Cochabamba',description:'Una de las estatuas de Cristo más grandes del mundo, incluso más alta que el Cristo Redentor de Río de Janeiro. Alzándose sobre el Cerro San Pedro y dominando toda la ciudad de Cochabamba, es un poderoso símbolo de la fe católica boliviana y un importante destino de peregrinación.',history:'Construido entre 1987 y 1994, la estatua mide 34 metros de altura sobre un pedestal de 6 metros. Los peregrinos suben los 1.399 escalones hasta la cima como ejercicio devocional, deteniéndose en las estaciones del Vía Crucis por el camino. Una pequeña capilla en la base permite celebrar misa y rezar.',prayer:'Señor Jesús de la Concordia, abres tus brazos sobre Bolivia como sobre el mundo entero. Que los pueblos de esta tierra encuentren en ti la unidad y la paz que dan nombre al monumento. Amén.',feast:'Solemnidad de Cristo Rey'},fr:{name:'Christ de la Concorde',type:'Monument',city:'Cochabamba',province:'Cochabamba',description:'L\'une des plus grandes statues du Christ au monde, plus haute que le Christ Rédempteur de Rio. Dominant toute la ville de Cochabamba depuis le Cerro San Pedro.',history:'Construit entre 1987 et 1994, la statue mesure 34 mètres. Les pèlerins gravissent 1 399 marches avec les stations du chemin de croix. Une chapelle se trouve à la base.',prayer:'Seigneur Jésus de la Concorde, que les peuples de cette terre trouvent en toi l\'unité et la paix. Amen.',feast:'Solennité du Christ-Roi'},it:{name:'Cristo della Concordia',type:'Monumento',city:'Cochabamba',province:'Cochabamba',description:'Una delle più grandi statue di Cristo al mondo, più alta del Cristo Redentore di Rio. Domina tutta la città di Cochabamba dal Cerro San Pedro.',history:'Costruito tra il 1987 e il 1994, la statua misura 34 metri. I pellegrini salgono i 1.399 gradini con le stazioni della Via Crucis. Una cappella si trova alla base.',prayer:'Signore Gesù della Concordia, che i popoli di questa terra trovino in te l\'unità e la pace. Amen.',feast:'Solennità di Cristo Re'},pt:{name:'Cristo da Concórdia',type:'Monumento',city:'Cochabamba',province:'Cochabamba',description:'Uma das maiores estátuas de Cristo no mundo, mais alta que o Cristo Redentor do Rio. Domina toda a cidade de Cochabamba desde o Cerro San Pedro.',history:'Construído entre 1987 e 1994, a estátua mede 34 metros. Os peregrinos sobem 1.399 degraus com as estações da Via-Sacra. Uma capela encontra-se na base.',prayer:'Senhor Jesus da Concórdia, que os povos desta terra encontrem em ti a unidade e a paz. Ámen.',feast:'Solenidade de Cristo Rei'}},

  {id:2102,country:'bo',lat:-17.3917,lng:-66.2806,icon:'🌟',name:'Sanctuary of Our Lady of Urkupiña',type:'Marian shrine',city:'Quillacollo',province:'Cochabamba',description:'The second most important Marian sanctuary in Bolivia after Copacabana, and one of the great pilgrimage destinations of the Andean world. The Virgin of Urkupiña appeared to a shepherd girl in 1785, and her feast in August draws hundreds of thousands of devotees from all of South America.',history:'Tradition tells that a shepherd girl was visited by a beautiful woman with a child on the Cota hill. When villagers came to see, the girl pointed and cried "Urqupiña! Urqupiña!" — Quechua for "she is already on the hill!" — as the figure ascended. A stone image was later found at the spot. The basilica was built in 1962 and crowned by Pope John Paul II in 1988.',prayer:'Our Lady of Urkupiña, Mother of the poor and companion of pilgrims, as you rose upon the hill, lift our hearts toward heaven. Grant us what we humbly ask of you and give peace to Bolivia. Amen.',feast:'August 15 (Assumption)',es:{name:'Santuario de la Virgen de Urkupiña',type:'Santuario mariano',city:'Quillacollo',province:'Cochabamba',description:'El segundo santuario mariano más importante de Bolivia después de Copacabana, y uno de los grandes destinos de peregrinación del mundo andino. La Virgen de Urkupiña se apareció a una pastorcita en 1785, y su fiesta en agosto reúne a cientos de miles de devotos de toda Sudamérica.',history:'La tradición cuenta que una pastorcita fue visitada por una hermosa mujer con un niño en el cerro Cota. Cuando los pobladores acudieron, la niña gritó señalando «¡Urqupiña! ¡Urqupiña!» — «¡ya está en el cerro!» en quechua — mientras la figura ascendía. Más tarde se encontró una imagen de piedra en el lugar. La basílica fue construida en 1962 y coronada por Juan Pablo II en 1988.',prayer:'Virgen de Urkupiña, Madre de los pobres y compañera de peregrinos, como subiste al cerro, eleva también nuestros corazones hacia el cielo. Concédenos lo que humildemente te pedimos y da paz a Bolivia. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Sanctuaire de la Vierge d\'Urkupiña',type:'Sanctuaire marial',city:'Quillacollo',province:'Cochabamba',description:'Deuxième sanctuaire marial de Bolivie après Copacabana. Apparition de 1785 à une bergère. Fête en août qui réunit des centaines de milliers de fidèles.',history:'Une bergère vit une belle dame avec un enfant sur la colline Cota. La petite cria « Urqupiña ! » — « elle est déjà sur la colline ! » en quechua. Basilique construite en 1962, couronnée par Jean-Paul II en 1988.',prayer:'Vierge d\'Urkupiña, élève nos cœurs vers le ciel et donne la paix à la Bolivie. Amen.',feast:'15 août (Assomption)'},it:{name:'Santuario della Vergine di Urkupiña',type:'Santuario mariano',city:'Quillacollo',province:'Cochabamba',description:'Secondo santuario mariano della Bolivia dopo Copacabana. Apparizione del 1785 a una pastorella. Festa di agosto con centinaia di migliaia di fedeli.',history:'Una pastorella vide una bella signora con un bambino sulla collina Cota. La piccola gridò «Urqupiña!» — «è già sulla collina!» in quechua. Basilica costruita nel 1962, incoronata da Giovanni Paolo II nel 1988.',prayer:'Vergine di Urkupiña, eleva i nostri cuori al cielo e dona la pace alla Bolivia. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Santuário da Virgem de Urkupiña',type:'Santuário mariano',city:'Quillacollo',province:'Cochabamba',description:'Segundo santuário mariano da Bolívia depois de Copacabana. Aparição de 1785 a uma pastorinha. Festa de agosto com centenas de milhares de fiéis.',history:'Uma pastorinha viu uma bela senhora com uma criança no cerro Cota. A menina gritou «Urqupiña!» — «já está no cerro!» em quéchua. Basílica construída em 1962, coroada por João Paulo II em 1988.',prayer:'Virgem de Urkupiña, eleva os nossos corações ao céu e dá a paz à Bolívia. Ámen.',feast:'15 de agosto (Assunção)'}},

  {id:2103,country:'bo',lat:-16.4969,lng:-68.1399,icon:'⛪',name:'Basilica of San Francisco',type:'Basilica',city:'La Paz',province:'La Paz',description:'The most important colonial church in La Paz and one of the finest examples of Andean mestizo baroque architecture in the world. The carved stone facade blends European Baroque with Andean Indigenous symbols — birds, masks, tropical fruit, dragons — in a fusion unique to the high Andes.',history:'Founded in 1549, just a year after the founding of La Paz. The original church collapsed under a heavy snowfall in 1610. The current building was rebuilt between 1753 and 1784 by Indigenous and mestizo artisans who gave it its characteristic facade. The attached convent was elevated to a basilica in 2020.',prayer:'Saint Francis of Assisi, poor and humble servant of the Lord, you who sang of Brother Sun and Sister Moon, bless Bolivia and its Andean peoples. Teach us your joyful poverty and love for every creature. Amen.',feast:'October 4 (Saint Francis)',es:{name:'Basílica de San Francisco',type:'Basílica',city:'La Paz',province:'La Paz',description:'La iglesia colonial más importante de La Paz y uno de los mejores ejemplos de arquitectura barroca mestiza andina del mundo. La fachada de piedra tallada fusiona el barroco europeo con símbolos indígenas andinos — aves, mascarones, frutas tropicales, dragones — en una síntesis única del altiplano.',history:'Fundada en 1549, apenas un año después de la fundación de La Paz. La iglesia original se derrumbó bajo una intensa nevada en 1610. El edificio actual fue reconstruido entre 1753 y 1784 por artesanos indígenas y mestizos que le dieron su característica fachada. Elevada al rango de basílica en 2020.',prayer:'San Francisco de Asís, pobre y humilde servidor del Señor, tú que cantaste al Hermano Sol y a la Hermana Luna, bendice a Bolivia y a sus pueblos andinos. Enséñanos tu pobreza gozosa y tu amor por toda criatura. Amén.',feast:'4 de octubre (San Francisco)'},fr:{name:'Basilique Saint-François',type:'Basilique',city:'La Paz',province:'La Paz',description:'L\'église coloniale la plus importante de La Paz et l\'un des meilleurs exemples d\'architecture baroque métisse andine au monde. La façade mêle baroque européen et symboles indigènes.',history:'Fondée en 1549. L\'église originale s\'effondra sous la neige en 1610. Bâtiment actuel reconstruit de 1753 à 1784 par des artisans indigènes et métis. Élevée au rang de basilique en 2020.',prayer:'Saint François d\'Assise, bénis la Bolivie et ses peuples andins. Apprends-nous ta pauvreté joyeuse et ton amour pour toute créature. Amen.',feast:'4 octobre (Saint François)'},it:{name:'Basilica di San Francesco',type:'Basilica',city:'La Paz',province:'La Paz',description:'La chiesa coloniale più importante di La Paz e uno dei migliori esempi di architettura barocca meticcia andina al mondo. La facciata fonde barocco europeo e simboli indigeni.',history:'Fondata nel 1549. La chiesa originale crollò sotto la neve nel 1610. Edificio attuale ricostruito dal 1753 al 1784 da artigiani indigeni e meticci. Elevata a basilica nel 2020.',prayer:'San Francesco d\'Assisi, benedici la Bolivia e i suoi popoli andini. Insegnaci la tua povertà gioiosa e il tuo amore per ogni creatura. Amen.',feast:'4 ottobre (San Francesco)'},pt:{name:'Basílica de São Francisco',type:'Basílica',city:'La Paz',province:'La Paz',description:'A igreja colonial mais importante de La Paz e um dos melhores exemplos de arquitetura barroca mestiça andina do mundo. A fachada funde barroco europeu e símbolos indígenas.',history:'Fundada em 1549. A igreja original desabou sob a neve em 1610. Edifício atual reconstruído de 1753 a 1784 por artesãos indígenas e mestiços. Elevada a basílica em 2020.',prayer:'São Francisco de Assis, abençoa a Bolívia e os seus povos andinos. Ensina-nos a tua pobreza alegre e o teu amor por toda criatura. Ámen.',feast:'4 de outubro (São Francisco)'}},
];

const routes = [

    en:{name:'The Camino de Santiago',days:'30+ days',desc:"The iconic pilgrimage route from the Pyrenees to the tomb of Saint James. The Camino Francés, starting in Saint-Jean-Pied-de-Port, is the most walked path in Christendom."},

let visits={}, unlockedRegions=[], currentLang='en', currentScreen='map', currentCountry='be', map=null, markers={}, activeRouteFilter=null, pilgrimName='';

const regionMap = {europe:['be','es','pt','fr','it','pl','ie','de','at','hr','ba'], americas:['mx','br','ar','pe','co','bo','us','ca'], asia:['ph','in','kr','jp']};
function getRegion(cid){ for(const [r,ids] of Object.entries(regionMap)) if(ids.includes(cid)) return r; return null; }
function isRegionUnlocked(region){ return unlockedRegions.includes('all')||unlockedRegions.includes(region); }

// ===================== FIREBASE =====================
window._loadUserData = async function(uid){
  try{
    const snap=await window._fbGetDoc(uid);
    if(snap.exists()){
      const d=snap.data();
      visits=d.visits||{};
      if(d.isPremium===true) unlockedRegions=['all'];
      else unlockedRegions=d.unlockedRegions||[];
      if(d.lang) currentLang=d.lang;
      if(d.displayName) pilgrimName=d.displayName;
    }else{visits={};unlockedRegions=[];}
  }catch(e){visits={};unlockedRegions=[];}
  if(!pilgrimName && window._currentUser?.displayName) pilgrimName=window._currentUser.displayName;
  applyLang();
  refreshAll();
  if(map) updateMarkerStyles();
};

async function saveVisits(){
  try{
    if(window._currentUser){
      await window._fbSetDoc(window._currentUser.uid,{visits});
    }
  }catch(e){console.error('saveVisits failed:',e);}
}

async function setLang(lang){
  currentLang=lang;
  try{ if(window._currentUser) await window._fbSetDoc(window._currentUser.uid,{lang}); }catch(e){}
  applyLang();
  refreshAll();
  rebindMapPopups();
}

function applyLang(){
  document.getElementById('header-sub').textContent = t('appSubtitle');
  const authSub = document.getElementById('auth-subtitle');
  if(authSub) authSub.textContent = t('appSubtitle');
  const headerCountry = document.getElementById('header-country');
  if(headerCountry) headerCountry.textContent = '🌍 ' + t('navWorld');
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.textContent = t(el.dataset.nav);
  });
  // Update auth screen
  const tabLogin = document.getElementById('tab-login');
  const tabReg = document.getElementById('tab-register');
  const btnSubmit = document.getElementById('auth-submit');
  const emailEl = document.getElementById('auth-email');
  const passEl = document.getElementById('auth-password');
  if(tabLogin) tabLogin.textContent = t('signIn');
  if(tabReg) tabReg.textContent = t('register');
  if(btnSubmit) btnSubmit.textContent = currentAuthTab==='login'?t('signIn'):t('createAccount');
  if(emailEl) emailEl.placeholder = t('emailPlaceholder');
  if(passEl) passEl.placeholder = t('passwordPlaceholder');
  const nameEl = document.getElementById('auth-name');
  if(nameEl) nameEl.placeholder = t('namePlaceholder');
}

// ===================== AUTH =====================
var currentAuthTab='login';
function switchAuthTab(tab){
  currentAuthTab=tab;
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('auth-submit').textContent=tab==='login'?t('signIn'):t('createAccount');
  document.getElementById('auth-name').style.display=tab==='register'?'block':'none';
  document.getElementById('auth-error').textContent='';
}
async function handleEmailAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-password').value;
  const nameVal=document.getElementById('auth-name').value.trim();
  const errEl=document.getElementById('auth-error');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent=t('authErrFields');return;}
  if(currentAuthTab==='register'&&!nameVal){errEl.textContent=t('authErrName');return;}
  try{
    if(currentAuthTab==='login') await window._fbSignInEmail(email,pass);
    else {
      const cred=await window._fbCreateUser(email,pass);
      await cred.user.updateProfile({displayName:nameVal});
      await window._fbSetDoc(cred.user.uid,{displayName:nameVal});
    }
  }catch(e){
    const msgs={'auth/user-not-found':t('authErrNotFound'),'auth/wrong-password':t('authErrWrongPass'),'auth/email-already-in-use':t('authErrInUse'),'auth/weak-password':t('authErrWeak'),'auth/invalid-email':t('authErrInvalidEmail'),'auth/invalid-credential':t('authErrInvalidCred')};
    errEl.textContent=msgs[e.code]||t('authErrGeneric');
  }
}

async function handleSignOut(){
  await window._fbSignOut();
  visits={};unlockedRegions=[];pilgrimName='';
}

function renderRegionOption(region, icon, labelKey, subKey, priceKey){
  const unlocked = isRegionUnlocked(region);
  if(unlocked) return `<div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--cream);border-radius:12px;margin-bottom:8px;opacity:0.6;">
    <span style="font-size:22px;">${icon}</span>
    <div style="flex:1;"><div style="font-weight:600;font-size:14px;">${t(labelKey)}</div><div style="font-size:11px;color:var(--brown-light);">${t(subKey)}</div></div>
    <span style="font-size:12px;color:#2E7D32;font-weight:700;">${t('premiumAlreadyUnlocked')}</span>
  </div>`;
  return `<div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--white);border:2px solid var(--cream-dark);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;" onclick="handleRegionPurchase('${region}')" onmousedown="this.style.transform='scale(0.98)'" onmouseup="this.style.transform=''">
    <span style="font-size:22px;">${icon}</span>
    <div style="flex:1;"><div style="font-weight:600;font-size:14px;">${t(labelKey)}</div><div style="font-size:11px;color:var(--brown-light);">${t(subKey)}</div></div>
    <span style="font-family:'Crimson Pro',serif;font-size:16px;font-weight:700;color:var(--burgundy);">${t(priceKey)}</span>
  </div>`;
}

// ===================== VISITS =====================
function isVisited(id){return !!visits[id];}
function getVisitCount(){return Object.keys(visits).length;}
function isCountryUnlocked(cid){const c=countries.find(x=>x.id===cid);return c?.free||isRegionUnlocked(getRegion(cid));}

function toggleVisit(id){
  const s=sanctuaries.find(x=>x.id===id);
  if(!isCountryUnlocked(s.country)){openPremiumModal();return;}
  if(visits[id]){delete visits[id];}
  else{visits[id]=new Date().toISOString().split('T')[0];showToast(t('visitToast')(sd(s).name));}
  saveVisits();refreshAll();updateMarkerStyles();
}

function getRank(){
  const c=getVisitCount();
  if(c>=50) return t('rank50');
  if(c>=30) return t('rank30');
  if(c>=15) return t('rank10');
  if(c>=5)  return t('rank5');
  if(c>=1)  return t('rank1');
  return t('rank0');
}

// ===================== NAVIGATION =====================
document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>switchScreen(btn.dataset.screen)));
function switchScreen(screen){
  currentScreen=screen;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`[data-screen="${screen}"]`).classList.add('active');
  if(screen==='map'&&map){
    setTimeout(()=>map.invalidateSize(),50);
  }
}

// ===================== MAP =====================
function createMarkerIcon(s,visited,highlight){
  const locked=!isCountryUnlocked(s.country);
  let cls='custom-marker';
  if(visited) cls+=' visited-marker';
  else if(locked) cls+=' locked-marker';
  if(highlight) cls+=' route-highlight-marker';
  const badge=visited?'<span class="visited-check">✓</span>':locked?'<span class="lock-badge">🔒</span>':'';
  return L.divIcon({className:'',html:`<div class="${cls}">${s.icon}${badge}</div>`,
    iconSize:visited?[42,42]:[32,32],iconAnchor:visited?[21,21]:[16,16],popupAnchor:[0,visited?-24:-18]});
}

function buildPopupContent(s){
  const d=sd(s), visited=isVisited(s.id), locked=!isCountryUnlocked(s.country);
  return `<div class="popup-body">
    <div class="popup-type">${d.type}</div>
    <div class="popup-name">${d.name}</div>
    <div class="popup-loc">📍 ${d.city}, ${d.province}</div>
    <div class="popup-desc">${d.description.substring(0,120)}...</div>
    ${locked
      ? `<button class="popup-locked" onclick="openPremiumModal();map.closePopup();">${t('lockBtn')}</button>`
      : `<button class="popup-btn ${visited?'visited':'visit'}" onclick="toggleVisit(${s.id});map.closePopup();">${visited?t('visited_btn'):'🥾 '+t('registerVisit')}</button>`}
    <button class="popup-btn detail" onclick="openModal(${s.id});map.closePopup();">${t('viewDetails')}</button>
    <a class="popup-maps-link" href="https://www.google.com/maps/search/${encodeURIComponent(d.name+' '+d.city)}/@${s.lat},${s.lng},17z" target="_blank">🗺️ ${t('howToGet')}</a>
  </div>`
}

function initMap(){
  map=L.map('map',{zoomControl:false,tap:false,tapTolerance:15}).setView([25,15],3);
  L.control.zoom({position:'topright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:18}).addTo(map);
  sanctuaries.forEach(s=>{
    const marker=L.marker([s.lat,s.lng],{icon:createMarkerIcon(s,false,false)}).addTo(map);
    markers[s.id]=marker;
    marker.bindPopup(buildPopupContent(s),{maxWidth:280,closeButton:true});
  });
}

function updateMarkerStyles(){
  sanctuaries.forEach(s=>{
    const visited=isVisited(s.id);
    const inRoute=!activeRouteFilter||activeRouteFilter.includes(s.id);
    const highlight=!!activeRouteFilter&&inRoute;
    markers[s.id].setIcon(createMarkerIcon(s,visited,highlight));
    markers[s.id].setOpacity(inRoute?1:0.25);
    markers[s.id].unbindPopup();
    markers[s.id].bindPopup(buildPopupContent(s),{maxWidth:280,closeButton:true});
  });
}

function showRouteOnMap(idx){
  const r=routes[idx];
  activeRouteFilter=r.stops;
  switchScreen('map');
  updateMarkerStyles();
  document.getElementById('map-route-name').textContent='🗺️ '+(r[currentLang]||r.en).name;
  document.getElementById('map-route-banner').style.display='flex';
}
function clearRouteFilter(){activeRouteFilter=null;updateMarkerStyles();document.getElementById('map-route-banner').style.display='none';}

function rebindMapPopups(){
  if(!map) return;
  sanctuaries.forEach(s=>{
    if(markers[s.id]){
      markers[s.id].unbindPopup();
      markers[s.id].bindPopup(buildPopupContent(s),{maxWidth:280,closeButton:true});
    }
  });
}

function focusCountry(cid){
  currentCountry=cid;
  const cs=sanctuaries.filter(s=>s.country===cid);
  if(cs.length&&map){
    const lats=cs.map(s=>s.lat),lngs=cs.map(s=>s.lng);
    map.fitBounds([[Math.min(...lats)-0.5,Math.min(...lngs)-0.5],[Math.max(...lats)+0.5,Math.max(...lngs)+0.5]]);
  }
  switchScreen('map');
}

// ===================== TOAST =====================
let toastTimeout=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg;
  if(toastTimeout)clearTimeout(toastTimeout);
  t.classList.add('show');
  toastTimeout=setTimeout(()=>{t.classList.remove('show');toastTimeout=null;},3000);
}

// ===================== CERTIFICATE =====================
function generateCertificate(countryId){
  const country = countries.find(c => c.id === countryId);
  const cs = sanctuaries.filter(s => s.country === countryId);
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
  const W = 297, H = 210;
  const BURG  = [114, 47, 55];
  const GOLD  = [197, 150, 58];
  const GOLDL = [232, 201, 122];
  const CREAM = [253, 245, 230];
  const BROWN = [62, 39, 35];
  const BROWNL= [109, 76, 65];
  const WHITE = [255, 255, 255];

  const locales = {en:'en-GB',es:'es-ES',fr:'fr-FR',it:'it-IT',pt:'pt-PT'};
  const locale = locales[currentLang]||'en-GB';
  const quotes = {
    en:'"Traveller, there is no path — the path is made by walking"',
    es:'"Caminante, no hay camino, se hace camino al andar"',
    fr:'"Voyageur, il n\'y a pas de chemin, le chemin se fait en marchant"',
    it:'"Viandante, non c\'\u00e8 sentiero, il sentiero si fa camminando"',
    pt:'"Caminhante, não há caminho, o caminho faz-se ao andar"'
  };
  const subtitles = {
    en:'THE DIGITAL PASSPORT OF THE CATHOLIC PILGRIM',
    es:'EL PASAPORTE DIGITAL DEL PEREGRINO CAT\u00d3LICO',
    fr:'LE PASSEPORT NUM\u00c9RIQUE DU P\u00c8LERIN CATHOLIQUE',
    it:'IL PASSAPORTO DIGITALE DEL PELLEGRINO CATTOLICO',
    pt:'O PASSAPORTE DIGITAL DO PEREGRINO CATÓLICO'
  };
  const footers = {
    en:'PEREGRIN  \u2014  THE DIGITAL PASSPORT OF THE CATHOLIC PILGRIM',
    es:'PEREGRIN  \u2014  EL PASAPORTE DIGITAL DEL PEREGRINO CAT\u00d3LICO',
    fr:'PEREGRIN  \u2014  LE PASSEPORT NUM\u00c9RIQUE DU P\u00c8LERIN CATHOLIQUE',
    it:'PEREGRIN  \u2014  IL PASSAPORTO DIGITALE DEL PELLEGRINO CATTOLICO',
    pt:'PEREGRIN  \u2014  O PASSAPORTE DIGITAL DO PEREGRINO CATÓLICO'
  };

  // === BACKGROUND ===
  doc.setFillColor(...CREAM);
  doc.rect(0, 0, W, H, 'F');

  // === BURGUNDY BORDER FRAME ===
  doc.setFillColor(...BURG);
  doc.rect(0, 0, W, 8, 'F');
  doc.rect(0, H-8, W, 8, 'F');
  doc.rect(0, 0, 8, H, 'F');
  doc.rect(W-8, 0, 8, H, 'F');

  // === INNER GOLD DOUBLE BORDER ===
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.8);
  doc.rect(11, 11, W-22, H-22);
  doc.setLineWidth(0.3);
  doc.rect(14, 14, W-28, H-28);

  // === CORNER DECORATIONS ===
  [[14,14],[W-14,14],[14,H-14],[W-14,H-14]].forEach(([x,y])=>{
    doc.setDrawColor(...GOLD);
    doc.setLineWidth(0.5);
    const len=15;
    const dx=x<W/2?1:-1, dy=y<H/2?1:-1;
    doc.line(x,y,x+len*dx,y);
    doc.line(x,y,x,y+len*dy);
  });

  // === LEFT PANEL (burgundy) ===
  const panelW = 85;
  doc.setFillColor(...BURG);
  doc.rect(14, 14, panelW, H-28, 'F');
  doc.setFillColor(...GOLD);
  doc.rect(14+panelW, 14, 2, H-28, 'F');

  // Cross on panel
  const cx = 14 + panelW/2;
  doc.setFillColor(...GOLD);
  doc.rect(cx-2.5, 30, 5, 30, 'F');
  doc.rect(cx-12, 42, 24, 5, 'F');
  doc.setFillColor(...BURG);
  doc.rect(cx-0.8, 33, 1.6, 24, 'F');
  doc.rect(cx-9.5, 43.5, 19, 2, 'F');

  // PEREGRIN title
  doc.setFont('helvetica','bold');
  doc.setFontSize(28);
  doc.setTextColor(...WHITE);
  doc.text('PEREGRIN', cx, 78, {align:'center'});

  // Subtitle
  doc.setFont('helvetica','normal');
  doc.setFontSize(6.5);
  doc.setTextColor(...GOLDL);
  const subLines = doc.splitTextToSize(subtitles[currentLang]||subtitles.en, panelW-16);
  doc.text(subLines, cx, 86, {align:'center'});

  // Decorative line
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.4);
  doc.line(cx-25, 94, cx+25, 94);

  // Country name
  doc.setFont('helvetica','bold');
  doc.setFontSize(14);
  doc.setTextColor(...GOLDL);
  doc.text(cn(country).toUpperCase(), cx, 105, {align:'center'});
  doc.setFontSize(10);
  doc.setTextColor(...WHITE);
  doc.text(new Date().getFullYear().toString(), cx, 114, {align:'center'});

  // Seal
  const sy = 145;
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.8);
  doc.circle(cx, sy, 16);
  doc.setLineWidth(0.3);
  doc.circle(cx, sy, 13);
  doc.setLineWidth(0.2);
  doc.circle(cx, sy, 10.5);
  doc.setFillColor(...GOLD);
  doc.circle(cx, sy, 9, 'F');
  doc.setFillColor(...BURG);
  doc.rect(cx-1.5, sy-6, 3, 12, 'F');
  doc.rect(cx-5, sy-1.5, 10, 3, 'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(4);
  doc.setTextColor(...BURG);
  doc.text('PEREGRIN', cx, sy-13.5, {align:'center'});
  doc.text('OFFICIAL', cx, sy+17, {align:'center'});

  // Quote
  doc.setFont('helvetica','italic');
  doc.setFontSize(6);
  doc.setTextColor(...GOLDL);
  const qLines = doc.splitTextToSize(quotes[currentLang]||quotes.en, panelW-14);
  doc.text(qLines, cx, H-32, {align:'center'});

  // === RIGHT SIDE ===
  const rLeft = 14 + panelW + 2 + 12;
  const rWidth = W - rLeft - 20;
  const rCenter = rLeft + rWidth/2;

  // Certificate title
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(...GOLD);
  doc.text(t('certTitle').toUpperCase(), rCenter, 30, {align:'center'});
  const titleW = doc.getTextWidth(t('certTitle').toUpperCase());
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.3);
  doc.line(rLeft, 32, rCenter-titleW/2-6, 32);
  doc.line(rCenter+titleW/2+6, 32, rLeft+rWidth, 32);

  // Certify text
  doc.setFont('helvetica','italic');
  doc.setFontSize(10);
  doc.setTextColor(...BROWNL);
  doc.text(t('certText1'), rCenter, 44, {align:'center'});

  // Pilgrim name
  const user = window._currentUser;
  const raw = pilgrimName || user?.displayName || user?.email?.split('@')[0] || 'Pilgrim';
  const name = raw.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\x20-\x7E]/g,'').trim()||'Pilgrim';
  doc.setFont('times','bolditalic');
  doc.setFontSize(26);
  doc.setTextColor(...BURG);
  doc.text(name, rCenter, 56, {align:'center'});
  const nw = doc.getTextWidth(name);
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.5);
  doc.line(rCenter-nw/2-4, 59, rCenter+nw/2+4, 59);

  // Completed text
  doc.setFont('helvetica','italic');
  doc.setFontSize(10);
  doc.setTextColor(...BROWNL);
  doc.text(t('certText2'), rCenter, 68, {align:'center'});
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(...BURG);
  doc.text(cs.length + ' ' + t('certText3') + ' ' + cn(country), rCenter, 77, {align:'center'});

  // Divider
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.3);
  doc.line(rLeft+10, 82, rLeft+rWidth-10, 82);

  // === SANCTUARY LIST ===
  const listStartY = 88;
  const rowH = Math.min(10, (H - 60 - listStartY) / cs.length);
  const listH = cs.length * rowH + 6;
  doc.setFillColor(...WHITE);
  doc.roundedRect(rLeft+4, listStartY-2, rWidth-8, listH+2, 2, 2, 'F');
  doc.setDrawColor(...GOLDL);
  doc.setLineWidth(0.2);
  doc.roundedRect(rLeft+4, listStartY-2, rWidth-8, listH+2, 2, 2);

  cs.forEach((s, i) => {
    const y = listStartY + 5 + i * rowH;
    if (i % 2 === 0) {
      doc.setFillColor(246, 236, 218);
      doc.rect(rLeft+5, y-5.5, rWidth-10, rowH, 'F');
    }
    doc.setFillColor(...GOLD);
    doc.circle(rLeft+10, y-1, 1.2, 'F');
    doc.setFont('helvetica','normal');
    doc.setFontSize(8);
    doc.setTextColor(...BROWN);
    const sname = sd(s).name;
    const maxNameW = rWidth - 60;
    let displayName = sname;
    while(doc.getTextWidth(displayName) > maxNameW && displayName.length > 10) displayName = displayName.slice(0,-1);
    if(displayName !== sname) displayName = displayName.slice(0,-2)+'..';
    doc.text(displayName, rLeft+14, y);
    if(visits[s.id]){
      const vDate = new Date(visits[s.id]).toLocaleDateString(locale,{day:'numeric',month:'short',year:'numeric'});
      doc.setFont('helvetica','italic');
      doc.setFontSize(7);
      doc.setTextColor(...BROWNL);
      doc.text('('+vDate+')', rLeft+rWidth-14, y, {align:'right'});
    }
  });

  // Footer
  const footY = listStartY + listH + 8;
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.4);
  doc.line(rLeft+10, footY, rLeft+rWidth-10, footY);
  const issued = new Date().toLocaleDateString(locale,{day:'numeric',month:'long',year:'numeric'});
  doc.setFont('helvetica','italic');
  doc.setFontSize(9);
  doc.setTextColor(...BROWN);
  doc.text(t('certIssued') + ' ' + issued, rCenter, footY+8, {align:'center'});

  // Bottom bar
  doc.setFillColor(...BURG);
  doc.rect(0, H-8, W, 8, 'F');
  doc.setFont('helvetica','normal');
  doc.setFontSize(6);
  doc.setTextColor(...GOLDL);
  doc.text(footers[currentLang]||footers.en, W/2, H-3, {align:'center'});

  doc.save('Peregrin_' + country.name + '_' + new Date().getFullYear() + '.pdf');
  showToast(t('certDownloaded'));
}

// ===================== ONBOARDING =====================
// Show on first ever visit (before login, using localStorage)
if(!localStorage.getItem('peregrin_onb_seen')){
  document.getElementById('onboarding').classList.add('open');
}
function showOnboarding(){
  document.getElementById('onboarding').classList.add('open');
}
function closeOnboarding(){
  document.getElementById('onboarding').classList.remove('open');
  localStorage.setItem('peregrin_onb_seen','1');
  if(window._currentUser) window._fbSetDoc(window._currentUser.uid,{onboardingSeen:true});
}

// ===================== EDIT NAME =====================
async function editPilgrimName(){
  const current = pilgrimName||'';
  const newName = prompt(t('editNamePrompt'), current);
  if(newName!==null && newName.trim()){
    pilgrimName = newName.trim();
    if(window._currentUser){
      await window._fbSetDoc(window._currentUser.uid, {displayName: pilgrimName});
      try{ await window._currentUser.updateProfile({displayName: pilgrimName}); }catch(e){}
    }
    refreshAll();
    showToast(pilgrimName);
  }
}

// ===================== DEV MODE =====================
let devTapCount=0, devTapTimer=null;
function handleDevTap(){
  devTapCount++;
  if(devTapTimer) clearTimeout(devTapTimer);
  devTapTimer=setTimeout(()=>devTapCount=0, 2000);
  if(devTapCount>=5){
    devTapCount=0;
    if(unlockedRegions.includes('all')){unlockedRegions=[];}
    else{unlockedRegions=['all'];}
    if(window._currentUser) window._fbSetDoc(window._currentUser.uid,{unlockedRegions});
    showToast(unlockedRegions.length>0?'🔓 Premium activated (test)':'🔒 Premium deactivated');
    refreshAll();
    updateMarkerStyles();
  }
}
