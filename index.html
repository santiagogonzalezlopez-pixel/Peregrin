<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Peregrin — Your Pilgrim Passport</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#722F37">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Peregrin">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --burgundy:#722F37; --burgundy-dark:#5A1A22; --gold:#C5963A; --gold-light:#E8C97A;
  --cream:#FDF5E6; --cream-dark:#F5E6CC; --brown:#3E2723; --brown-light:#6D4C41;
  --white:#FFFFFF; --shadow:0 2px 16px rgba(62,39,35,0.15); --shadow-lg:0 8px 32px rgba(62,39,35,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--brown);height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* AUTH */
#auth-screen{position:fixed;inset:0;background:linear-gradient(160deg,var(--burgundy-dark),var(--burgundy));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:30px;}
.auth-logo{font-family:'Crimson Pro',serif;font-size:48px;font-weight:700;color:var(--cream);letter-spacing:2px;margin-bottom:4px;}
.auth-logo span{color:var(--gold-light);}
.auth-subtitle{font-size:13px;color:rgba(253,245,230,0.7);margin-bottom:40px;letter-spacing:1px;}
.auth-card{background:var(--white);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.auth-tab-row{display:flex;margin-bottom:24px;background:var(--cream);border-radius:10px;padding:4px;gap:4px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--brown-light);transition:all 0.2s;}
.auth-tab.active{background:var(--white);color:var(--burgundy);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.auth-input{width:100%;padding:12px 14px;border:2px solid var(--cream-dark);border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;margin-bottom:12px;color:var(--brown);outline:none;transition:border 0.2s;}
.auth-input:focus{border-color:var(--burgundy);}
.auth-btn-primary{width:100%;padding:13px;background:var(--burgundy);color:var(--cream);border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-bottom:10px;}
.auth-btn-primary:hover{background:var(--burgundy-dark);}
.auth-divider{text-align:center;font-size:12px;color:var(--brown-light);margin:6px 0 10px;}


.auth-error{font-size:12px;color:#c62828;margin-bottom:8px;text-align:center;min-height:16px;}

/* PREMIUM MODAL */
#premium-modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:5000;display:none;align-items:flex-end;justify-content:center;}
#premium-modal.open{display:flex;}
.premium-card{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:30px 24px 40px;text-align:center;}
.premium-cross{font-size:40px;margin-bottom:8px;}
.premium-title{font-family:'Crimson Pro',serif;font-size:26px;font-weight:700;color:var(--burgundy);margin-bottom:6px;}
.premium-sub{font-size:13px;color:var(--brown-light);margin-bottom:24px;line-height:1.5;}
.premium-feature{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--cream-dark);text-align:left;font-size:14px;}
.premium-feature:last-of-type{border-bottom:none;}
.premium-feature-icon{font-size:22px;width:32px;flex-shrink:0;}
.premium-price{font-family:'Crimson Pro',serif;font-size:22px;font-weight:700;color:var(--burgundy);margin:20px 0 6px;}
.premium-price-sub{font-size:12px;color:var(--brown-light);margin-bottom:20px;}
.premium-cta{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold),#b8842e);color:var(--brown);border:none;border-radius:14px;font-family:'Crimson Pro',serif;font-size:18px;font-weight:700;cursor:pointer;margin-bottom:10px;box-shadow:0 4px 16px rgba(197,150,58,0.4);}
.premium-close{background:none;border:none;color:var(--brown-light);font-size:13px;cursor:pointer;padding:8px;}

/* APP */
#app-wrapper{display:none;flex-direction:column;height:100vh;height:100dvh;}
.header{background:linear-gradient(135deg,var(--burgundy),var(--burgundy-dark));color:var(--cream);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:1000;flex-shrink:0;}
.header h1{font-family:'Crimson Pro',serif;font-size:24px;font-weight:600;letter-spacing:1px;}
.header h1 span{color:var(--gold-light);}
.header-sub{font-size:11px;opacity:0.7;letter-spacing:0.5px;font-weight:300;}
.header-right{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;}
.main{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;overflow-y:auto;transition:opacity 0.3s,transform 0.3s;opacity:0;pointer-events:none;transform:translateY(8px);}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}
.bottom-nav{display:flex;background:var(--white);border-top:1px solid var(--cream-dark);flex-shrink:0;z-index:1000;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;cursor:pointer;transition:all 0.2s;border:none;background:none;color:var(--brown-light);font-family:'Jost',sans-serif;font-size:10px;font-weight:500;gap:3px;position:relative;}
.nav-item.active{color:var(--burgundy);}
.nav-item.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:3px;background:var(--gold);border-radius:0 0 3px 3px;}
.nav-item svg{width:22px;height:22px;}

/* MAP */
#map{width:100%;height:100%;}
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:var(--shadow-lg)!important;padding:0!important;overflow:hidden;}
.leaflet-popup-content{margin:0!important;width:260px!important;}
.leaflet-popup-tip{box-shadow:none!important;}
.popup-body{padding:14px;}
.popup-type{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:600;margin-bottom:4px;}
.popup-name{font-family:'Crimson Pro',serif;font-size:18px;font-weight:600;color:var(--brown);margin-bottom:4px;}
.popup-loc{font-size:12px;color:var(--brown-light);margin-bottom:10px;}
.popup-desc{font-size:12.5px;line-height:1.5;color:var(--brown);margin-bottom:12px;}
.popup-btn{width:100%;padding:10px;border:none;border-radius:8px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.popup-btn.visit{background:var(--burgundy);color:var(--cream);}
.popup-btn.visited{background:var(--cream-dark);color:var(--gold);}
.popup-btn.detail{background:none;color:var(--burgundy);text-decoration:underline;padding:6px;font-size:12px;}
.popup-maps-link{display:block;text-align:center;color:var(--brown-light);font-size:11.5px;text-decoration:none;margin-top:6px;padding:4px;font-weight:500;}
.popup-locked{background:var(--cream-dark);color:var(--brown-light);width:100%;padding:10px;border:none;border-radius:8px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.map-route-banner{position:absolute;top:10px;left:10px;right:52px;z-index:500;background:var(--burgundy);color:var(--cream);padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;display:none;align-items:center;justify-content:space-between;box-shadow:var(--shadow-lg);border-left:4px solid var(--gold);}
.map-route-banner span{flex:1;}
.map-route-banner button{background:none;border:none;color:var(--cream);font-size:18px;cursor:pointer;padding:0 0 0 12px;opacity:0.8;line-height:1;}

/* MARKERS */
.custom-marker{background:var(--burgundy);border:3px solid var(--gold);border-radius:50%;width:32px!important;height:32px!important;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.35);position:relative;}
.custom-marker.visited-marker{background:var(--gold);border:4px solid var(--burgundy-dark);width:42px!important;height:42px!important;font-size:19px;box-shadow:0 0 0 5px rgba(197,150,58,0.28),0 4px 14px rgba(0,0,0,0.4);}
.custom-marker.route-highlight-marker{border-width:4px;box-shadow:0 0 0 5px rgba(197,150,58,0.45),0 4px 14px rgba(0,0,0,0.5);}
.custom-marker.locked-marker{background:#9E9E9E;border-color:#757575;opacity:0.7;}
.visited-check{position:absolute;top:-5px;right:-5px;background:#2E7D32;color:white;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid white;line-height:1;}
.lock-badge{position:absolute;top:-5px;right:-5px;background:#757575;color:white;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;border:2px solid white;}

/* PASSPORT */
.passport-screen{background:var(--cream);padding:20px;}
.passport-header{text-align:center;padding:30px 20px;background:linear-gradient(135deg,var(--burgundy),var(--burgundy-dark));border-radius:16px;color:var(--cream);margin-bottom:24px;position:relative;overflow:hidden;}
.passport-header::before{content:'✝';position:absolute;font-size:200px;opacity:0.05;top:-40px;right:-20px;}
.passport-title{font-family:'Crimson Pro',serif;font-size:26px;font-weight:600;margin-bottom:4px;}
.passport-subtitle{font-size:13px;opacity:0.7;}
.passport-stats{display:flex;gap:16px;justify-content:center;margin-top:20px;}
.stat-box{background:rgba(255,255,255,0.1);border-radius:10px;padding:12px 20px;text-align:center;}
.stat-num{font-family:'Crimson Pro',serif;font-size:28px;font-weight:700;color:var(--gold-light);}
.stat-label{font-size:10px;opacity:0.7;text-transform:uppercase;letter-spacing:1px;}
.passport-section-title{font-family:'Crimson Pro',serif;font-size:20px;font-weight:600;margin-bottom:14px;color:var(--brown);}
.stamp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.stamp-card{background:var(--white);border-radius:12px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;}
.stamp-card::after{content:'✓';position:absolute;top:8px;right:10px;width:22px;height:22px;background:var(--gold);color:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.stamp-icon{font-size:28px;margin-bottom:8px;}
.stamp-name{font-family:'Crimson Pro',serif;font-size:14px;font-weight:600;margin-bottom:2px;}
.stamp-date{font-size:11px;color:var(--brown-light);}
.empty-state{text-align:center;padding:40px 20px;color:var(--brown-light);}
.empty-state-icon{font-size:48px;margin-bottom:12px;opacity:0.4;}
.empty-state-text{font-size:14px;line-height:1.6;}
.cert-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),#b8842e);color:var(--brown);border:none;border-radius:14px;font-family:'Crimson Pro',serif;font-size:17px;font-weight:700;cursor:pointer;margin-top:8px;margin-bottom:30px;box-shadow:0 4px 16px rgba(197,150,58,0.4);transition:all 0.2s;}
.cert-btn:active{transform:scale(0.98);}

/* ACHIEVEMENTS */
.achievements-screen{background:var(--cream);padding:20px;}
.achievement-card{background:var(--white);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;}
.achievement-card.locked{opacity:0.5;}
.achievement-card.unlocked{border-left:4px solid var(--gold);}
.achievement-icon{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.achievement-card.unlocked .achievement-icon{background:linear-gradient(135deg,var(--gold),var(--gold-light));}
.achievement-card.locked .achievement-icon{background:var(--cream-dark);}
.achievement-info{flex:1;}
.achievement-name{font-family:'Crimson Pro',serif;font-size:16px;font-weight:600;margin-bottom:2px;}
.achievement-desc{font-size:12px;color:var(--brown-light);line-height:1.4;}
.achievement-progress{height:4px;background:var(--cream-dark);border-radius:2px;margin-top:8px;overflow:hidden;}
.achievement-progress-bar{height:100%;background:var(--gold);border-radius:2px;transition:width 0.5s ease;}

/* ROUTES */
.routes-screen{background:var(--cream);padding:20px;}
.route-card{background:var(--white);border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);cursor:pointer;transition:transform 0.15s;}
.route-card:active{transform:scale(0.98);}
.route-banner{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;}
.route-banner-1{background:linear-gradient(135deg,#2E7D32,#4CAF50);}
.route-banner-2{background:linear-gradient(135deg,#1565C0,#42A5F5);}
.route-banner-3{background:linear-gradient(135deg,#6A1B9A,#AB47BC);}
.route-banner-4{background:linear-gradient(135deg,#E65100,#FF9800);}
.route-banner-5{background:linear-gradient(135deg,#880E4F,#E91E63);}
.route-body{padding:16px;}
.route-name{font-family:'Crimson Pro',serif;font-size:18px;font-weight:600;margin-bottom:4px;}
.route-meta{font-size:12px;color:var(--brown-light);margin-bottom:8px;}
.route-desc{font-size:13px;line-height:1.5;color:var(--brown);margin-bottom:12px;}
.route-stops{display:flex;gap:6px;flex-wrap:wrap;}
.route-stop{font-size:11px;background:var(--cream);padding:4px 10px;border-radius:12px;color:var(--brown-light);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-content{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);}
.modal-overlay.open .modal-content{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--cream-dark);border-radius:2px;margin:10px auto 0;}
.modal-hero{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:70px;position:relative;overflow:hidden;}
.modal-hero::before{content:'✝';position:absolute;font-size:180px;opacity:0.07;top:-20px;right:-10px;color:white;}
.modal-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(0,0,0,0.15));}
.hero-be{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}.hero-es{background:linear-gradient(135deg,#8B1A1A,#C41E3A,#E8A317);}
.hero-pt{background:linear-gradient(135deg,#006600,#009900,#CC0000);}.hero-fr{background:linear-gradient(135deg,#002654,#2B4570,#C8102E);}
.hero-it{background:linear-gradient(135deg,#009246,#006233,#CE2B37);}.hero-pl{background:linear-gradient(135deg,#DC143C,#8B0000,#FFFFFF20);}
.hero-ie{background:linear-gradient(135deg,#169B62,#0D6B3F,#FF883E);}.hero-de{background:linear-gradient(135deg,#1a1a1a,#333333,#DD0000);}
.hero-at{background:linear-gradient(135deg,#C8102E,#8B0000,#FFFFFF20);}.hero-hr{background:linear-gradient(135deg,#171796,#0D1380,#FF0000);}
.hero-mx{background:linear-gradient(135deg,#006847,#003C2B,#CE1126);}.hero-br{background:linear-gradient(135deg,#009c3b,#006B2C,#FFDF00);}
.hero-ar{background:linear-gradient(135deg,#74ACDF,#4A8BC2,#F6B40E);}.hero-pe{background:linear-gradient(135deg,#D91023,#8B0000,#FFFFFF20);}
.hero-co{background:linear-gradient(135deg,#FCD116,#C8A000,#003893);}.hero-bo{background:linear-gradient(135deg,#D52B1E,#F9E300,#007934);}.hero-us{background:linear-gradient(135deg,#B22234,#3C3B6E,#FFFFFF20);}.hero-ca{background:linear-gradient(135deg,#D52B1E,#FFFFFF30,#D52B1E);}.hero-ba{background:linear-gradient(135deg,#002F6C,#1E4B9A,#FFCD00);}.hero-ph{background:linear-gradient(135deg,#0038A8,#002878,#CE1126);}
.hero-in{background:linear-gradient(135deg,#FF9933,#CC7A29,#138808);}.hero-kr{background:linear-gradient(135deg,#003478,#002055,#CD2E3A);}
.hero-jp{background:linear-gradient(135deg,#BC002D,#8B0020,#FFFFFF20);}
.modal-hero-flag{position:absolute;top:14px;left:16px;font-size:24px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.3));}
.modal-hero-country{position:absolute;bottom:12px;left:16px;color:rgba(255,255,255,0.8);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-shadow:0 1px 3px rgba(0,0,0,0.3);z-index:1;}
.modal-body{padding:20px;}
.modal-type{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:600;}
.modal-title{font-family:'Crimson Pro',serif;font-size:26px;font-weight:700;margin:6px 0;color:var(--brown);}
.modal-location{font-size:13px;color:var(--brown-light);margin-bottom:16px;}
.modal-section{margin-bottom:20px;}
.modal-section h3{font-family:'Crimson Pro',serif;font-size:16px;font-weight:600;color:var(--burgundy);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.modal-section p{font-size:13.5px;line-height:1.7;color:var(--brown);}
.modal-prayer{background:var(--cream);border-left:3px solid var(--gold);padding:14px 16px;border-radius:0 10px 10px 0;font-family:'Crimson Pro',serif;font-size:15px;font-style:italic;line-height:1.7;color:var(--brown);}
.modal-visit-btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;transition:all 0.2s;background:var(--burgundy);color:var(--cream);}
.modal-visit-btn.visited-btn{background:var(--cream-dark);color:var(--gold);}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.4);color:white;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
.modal-maps-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:2px solid var(--cream-dark);border-radius:12px;background:none;color:var(--brown-light);font-family:'Jost',sans-serif;font-size:14px;font-weight:500;text-decoration:none;margin-top:10px;cursor:pointer;transition:all 0.2s;}
.modal-premium-btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;background:linear-gradient(135deg,var(--gold),#b8842e);color:var(--brown);}

/* PROFILE */
.screen-title{font-family:'Crimson Pro',serif;font-size:24px;font-weight:700;color:var(--brown);margin-bottom:20px;}
.profile-screen{background:var(--cream);padding:20px;}
.profile-card{background:var(--white);border-radius:16px;padding:30px 20px;text-align:center;box-shadow:var(--shadow);margin-bottom:20px;}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--burgundy),var(--gold));display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px;}
.profile-name{font-family:'Crimson Pro',serif;font-size:22px;font-weight:600;}
.profile-rank{font-size:13px;color:var(--gold);font-weight:500;margin-top:4px;}
.profile-premium-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),#b8842e);color:var(--brown);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px;letter-spacing:0.5px;}
.profile-option{background:var(--white);border-radius:12px;padding:16px 18px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;cursor:pointer;font-size:14px;font-weight:500;}
.profile-option-icon{font-size:20px;}
.premium-banner{background:linear-gradient(135deg,var(--burgundy),var(--burgundy-dark));border-radius:14px;padding:20px;margin-bottom:16px;color:var(--cream);text-align:center;}
.premium-banner-title{font-family:'Crimson Pro',serif;font-size:20px;font-weight:700;margin-bottom:6px;}
.premium-banner-sub{font-size:13px;opacity:0.8;margin-bottom:14px;line-height:1.5;}
.premium-banner-btn{background:linear-gradient(135deg,var(--gold),#b8842e);color:var(--brown);border:none;border-radius:10px;padding:11px 24px;font-family:'Jost',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--burgundy);color:var(--cream);padding:12px 20px 12px 16px;border-radius:12px;font-size:14px;font-weight:500;z-index:3000;transition:transform 0.35s cubic-bezier(0.16,1,0.3,1),opacity 0.35s;box-shadow:var(--shadow-lg);white-space:nowrap;border-left:4px solid var(--gold);opacity:0;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ONBOARDING */
#onboarding{position:fixed;inset:0;background:linear-gradient(170deg,#1a0a0e 0%,var(--burgundy-dark) 40%,var(--burgundy) 70%,#2a1015 100%);z-index:10000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center;color:var(--cream);overflow:hidden;}
#onboarding.open{display:flex;}
#onboarding::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 60%,rgba(197,150,58,0.08) 0%,transparent 50%);animation:onb-glow 4s ease-in-out infinite alternate;}
@keyframes onb-glow{0%{opacity:0.5;transform:scale(1);}100%{opacity:1;transform:scale(1.1);}}
.onb-cross{position:relative;width:80px;height:110px;margin-bottom:28px;}
.onb-cross::before{content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);width:8px;height:110px;background:linear-gradient(180deg,var(--gold-light),var(--gold),#8B6914);border-radius:4px;box-shadow:0 0 30px rgba(197,150,58,0.4);}
.onb-cross::after{content:'';position:absolute;top:28px;left:50%;transform:translateX(-50%);width:56px;height:8px;background:linear-gradient(90deg,var(--gold-light),var(--gold),var(--gold-light));border-radius:4px;box-shadow:0 0 30px rgba(197,150,58,0.4);}
.onb-logo{font-family:'Crimson Pro',serif;font-size:46px;font-weight:700;letter-spacing:4px;margin-bottom:6px;position:relative;}
.onb-logo span{color:var(--gold-light);}
.onb-tagline{font-family:'Crimson Pro',serif;font-size:14px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);opacity:0.8;margin-bottom:36px;}
.onb-stats{display:flex;gap:20px;margin-bottom:32px;position:relative;}
.onb-stat{display:flex;flex-direction:column;align-items:center;gap:4px;}
.onb-stat-num{font-family:'Crimson Pro',serif;font-size:32px;font-weight:700;color:var(--gold-light);line-height:1;}
.onb-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;opacity:0.6;}
.onb-stat-div{width:1px;height:40px;background:linear-gradient(transparent,rgba(197,150,58,0.3),transparent);align-self:center;}
.onb-icons{display:flex;gap:16px;margin-bottom:36px;}
.onb-icon-item{width:44px;height:44px;border-radius:50%;background:rgba(197,150,58,0.1);border:1px solid rgba(197,150,58,0.25);display:flex;align-items:center;justify-content:center;font-size:20px;}
.onb-btn{width:100%;max-width:280px;padding:16px;background:linear-gradient(135deg,var(--gold),#b8842e);color:var(--brown);border:none;border-radius:14px;font-family:'Crimson Pro',serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(197,150,58,0.35);position:relative;letter-spacing:0.5px;}
.onb-footer{position:absolute;bottom:24px;font-size:10px;opacity:0.3;letter-spacing:1px;}

/* COUNTRY SELECTOR */
.country-selector{background:var(--white);border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);}
.country-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--cream-dark);cursor:pointer;transition:background 0.15s;}
.country-item:last-child{border-bottom:none;}
.country-item:active{background:var(--cream);}
.country-flag{font-size:24px;width:36px;text-align:center;}
.country-info{flex:1;}
.country-name{font-family:'Crimson Pro',serif;font-size:16px;font-weight:600;}
.country-count{font-size:12px;color:var(--brown-light);}
.country-lock{font-size:16px;color:var(--brown-light);}

.screen::-webkit-scrollbar{width:0;}

/* Language selector */
.lang-selector{background:var(--white);border-radius:12px;padding:16px 18px;margin-bottom:8px;box-shadow:var(--shadow);}
.lang-selector-label{font-size:11px;color:var(--brown-light);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600;}
.lang-buttons{display:flex;gap:6px;flex-wrap:wrap;}
.lang-btn{flex:1 1 auto;min-width:52px;padding:10px 4px;border-radius:10px;border:2px solid var(--cream-dark);background:var(--cream);font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;color:var(--brown-light);white-space:nowrap;}
.lang-btn.active{border-color:var(--burgundy);background:var(--burgundy);color:var(--cream);font-weight:600;}
@media(min-width:500px){body{max-width:420px;margin:0 auto;box-shadow:var(--shadow-lg);}}
</style>
</head>

const sanctuaries = [
  // ===== BELGIUM =====
  {id:1,country:'be',lat:50.979,lng:4.980,icon:'⛪',name:'Basilica of Scherpenheuvel',type:'Basilica',city:'Scherpenheuvel',province:'Flemish Brabant',description:'The most important Marian shrine in Belgium, drawing thousands of pilgrims each year. The circular Baroque basilica was built between 1609 and 1627 by Archdukes Albert and Isabella.',history:'The devotion dates back to the 14th century, when a small statue of the Virgin was placed in an oak tree. Miracles attributed to the statue attracted pilgrims from all over Europe. In 1922 the church was elevated to a minor basilica.',prayer:'Holy Mary of Scherpenheuvel, Mother of mercy, welcome your pilgrim children who come to you with faith and hope. Intercede for us before your Son. Amen.',feast:'Sunday after September 8',es:{name:'Basílica de Scherpenheuvel',type:'Basílica',city:'Scherpenheuvel',province:'Brabante Flamenco',description:'El santuario mariano más importante de Bélgica, que atrae a miles de peregrinos cada año. La basílica barroca de planta circular fue construida entre 1609 y 1627 por los archiduques Alberto e Isabel.',history:'La devoción se remonta al siglo XIV, cuando una pequeña estatua de la Virgen fue colocada en un roble. Los milagros atribuidos atrajeron peregrinos de toda Europa. En 1922 la iglesia fue elevada al rango de basílica menor.',prayer:'Santa María de Scherpenheuvel, Madre de misericordia, acoge a tus hijos peregrinos que venimos a ti con fe y esperanza. Intercede por nosotros ante tu Hijo. Amén.',feast:'Domingo después del 8 de septiembre'},fr:{name:'Basilique de Scherpenheuvel',type:'Basilique',city:'Scherpenheuvel',province:'Brabant flamand',description:'Le sanctuaire marial le plus important de Belgique, attirant des milliers de pèlerins chaque année. La basilique baroque de plan circulaire fut construite entre 1609 et 1627.',history:'La dévotion remonte au XIVe siècle, quand une statue de la Vierge fut placée dans un chêne. Les miracles attirèrent des pèlerins de toute l\'Europe. En 1922, l\'église fut élevée au rang de basilique mineure.',prayer:'Sainte Marie de Scherpenheuvel, Mère de miséricorde, accueille tes enfants pèlerins. Intercède pour nous auprès de ton Fils. Amen.',feast:'Dimanche après le 8 septembre'},it:{name:'Basilica di Scherpenheuvel',type:'Basilica',city:'Scherpenheuvel',province:'Brabante Fiammingo',description:'Il santuario mariano più importante del Belgio, che attira migliaia di pellegrini ogni anno. La basilica barocca a pianta circolare fu costruita tra il 1609 e il 1627.',history:'La devozione risale al XIV secolo, quando una statua della Vergine fu posta in una quercia. I miracoli attirarono pellegrini da tutta Europa. Nel 1922 la chiesa fu elevata a basilica minore.',prayer:'Santa Maria di Scherpenheuvel, Madre di misericordia, accogli i tuoi figli pellegrini. Intercedi per noi presso tuo Figlio. Amen.',feast:'Domenica dopo l\'8 settembre'},pt:{name:'Basílica de Scherpenheuvel',type:'Basílica',city:'Scherpenheuvel',province:'Brabante Flamengo',description:'O santuário mariano mais importante da Bélgica, atraindo milhares de peregrinos todos os anos. A basílica barroca de planta circular foi construída entre 1609 e 1627.',history:'A devoção remonta ao século XIV, quando uma estátua da Virgem foi colocada num carvalho. Os milagres atraíram peregrinos de toda a Europa. Em 1922 a igreja foi elevada a basílica menor.',prayer:'Santa Maria de Scherpenheuvel, Mãe de misericórdia, acolhe os teus filhos peregrinos. Intercede por nós junto do teu Filho. Ámen.',feast:'Domingo após 8 de setembro'}},
  {id:2,country:'be',lat:50.866,lng:4.321,icon:'🏛️',name:'Basilica of the Sacred Heart',type:'Basilica',city:'Koekelberg, Brussels',province:'Brussels',description:'The fifth largest church in the world. This impressive Art Deco basilica dominates the Brussels skyline. Construction began in 1905 under King Leopold II and was not completed until 1969.',history:'Leopold II laid the foundation stone in 1905 for the 75th anniversary of Belgian independence. Two World Wars delayed construction. Today it houses a museum and offers panoramic views from its dome.',prayer:'Sacred Heart of Jesus, in you I trust. May this temple be a sign of your immense love for your people. Pour out your grace upon all who seek you here. Amen.',feast:'Solemnity of the Sacred Heart',es:{name:'Basílica del Sagrado Corazón',type:'Basílica',city:'Koekelberg, Bruselas',province:'Bruselas',description:'La quinta iglesia más grande del mundo. Esta impresionante basílica Art Déco domina el horizonte de Bruselas. Su construcción comenzó en 1905 bajo el rey Leopoldo II y no se completó hasta 1969.',history:'Leopoldo II puso la primera piedra en 1905 con motivo del 75 aniversario de la independencia belga. Las dos guerras mundiales retrasaron su construcción. Hoy alberga un museo y ofrece vistas panorámicas desde su cúpula.',prayer:'Sagrado Corazón de Jesús, en ti confío. Que este templo sea signo de tu amor inmenso por tu pueblo. Derrama tu gracia sobre todos los que aquí te buscan. Amén.',feast:'Solemnidad del Sagrado Corazón'},fr:{name:'Basilique du Sacré-Cœur',type:'Basilique',city:'Koekelberg, Bruxelles',province:'Bruxelles',description:'La cinquième plus grande église du monde. Basilique Art déco dont la construction débuta en 1905 et ne fut achevée qu\'en 1969.',history:'Léopold II posa la première pierre en 1905. Les deux guerres mondiales retardèrent la construction. Elle abrite un musée et offre des vues panoramiques.',prayer:'Sacré-Cœur de Jésus, en toi je place ma confiance. Que ce temple soit le signe de ton amour immense. Amen.',feast:'Solennité du Sacré-Cœur'},it:{name:'Basilica del Sacro Cuore',type:'Basilica',city:'Koekelberg, Bruxelles',province:'Bruxelles',description:'La quinta chiesa più grande del mondo. Basilica Art Déco la cui costruzione iniziò nel 1905 e fu completata solo nel 1969.',history:'Leopoldo II pose la prima pietra nel 1905. Le due guerre mondiali ritardarono la costruzione. Ospita un museo e offre viste panoramiche.',prayer:'Sacro Cuore di Gesù, in te confido. Che questo tempio sia segno del tuo immenso amore. Amen.',feast:'Solennità del Sacro Cuore'},pt:{name:'Basílica do Sagrado Coração',type:'Basílica',city:'Koekelberg, Bruxelas',province:'Bruxelas',description:'A quinta maior igreja do mundo. Basílica Art Déco cuja construção começou em 1905 e só foi concluída em 1969.',history:'Leopoldo II lançou a primeira pedra em 1905. As duas guerras mundiais atrasaram a construção. Hoje alberga um museu e oferece vistas panorâmicas.',prayer:'Sagrado Coração de Jesus, em ti confio. Que este templo seja sinal do teu imenso amor. Ámen.',feast:'Solenidade do Sagrado Coração'}},
  {id:3,country:'be',lat:51.208,lng:3.227,icon:'🩸',name:'Basilica of the Holy Blood',type:'Basilica',city:'Bruges',province:'West Flanders',description:'It houses a relic of the Blood of Christ brought from the Holy Land during the Crusades. Each year the Procession of the Holy Blood is celebrated — a UNESCO Intangible Cultural Heritage.',history:'According to tradition, Thierry of Alsace brought the relic from Jerusalem in 1150. The lower chapel is Romanesque (12th c.), while the upper chapel was rebuilt in neo-Gothic style in the 19th c.',prayer:'Lord Jesus Christ, who shed your precious Blood for the salvation of the world, grant us the grace to venerate you with living faith and a contrite heart. Amen.',feast:'Ascension Day (Procession of the Holy Blood)',es:{name:'Basílica de la Santa Sangre',type:'Basílica',city:'Brujas',province:'Flandes Occidental',description:'Custodia una reliquia de la Sangre de Cristo traída de Tierra Santa durante las Cruzadas. Cada año se celebra la Procesión de la Santa Sangre, Patrimonio Inmaterial de la Humanidad por la UNESCO.',history:'Según la tradición, Thierry de Alsacia trajo la reliquia de Jerusalén en 1150. La capilla inferior es románica (s. XII), mientras que la superior fue reconstruida en estilo neogótico en el s. XIX.',prayer:'Señor Jesucristo, que derramaste tu preciosa Sangre por la salvación del mundo, concédenos la gracia de venerarte con fe viva y corazón contrito. Amén.',feast:'Día de la Ascensión (Procesión de la Santa Sangre)'},fr:{name:'Basilique du Saint-Sang',type:'Basilique',city:'Bruges',province:'Flandre-Occidentale',description:'Conserve une relique du Sang du Christ rapportée de Terre Sainte. La Procession du Saint-Sang est Patrimoine immatériel de l\'UNESCO.',history:'Thierry d\'Alsace rapporta la relique de Jérusalem en 1150. La chapelle inférieure est romane, la supérieure néogothique.',prayer:'Seigneur Jésus-Christ, qui as versé ton précieux Sang pour le salut du monde, accorde-nous de te vénérer avec foi vive et cœur contrit. Amen.',feast:'Jour de l\'Ascension'},it:{name:'Basilica del Sacro Sangue',type:'Basilica',city:'Bruges',province:'Fiandre Occidentali',description:'Custodisce una reliquia del Sangue di Cristo dalla Terra Santa. La Processione del Sacro Sangue è Patrimonio Immateriale dell\'UNESCO.',history:'Thierry d\'Alsazia portò la reliquia da Gerusalemme nel 1150. La cappella inferiore è romanica, la superiore neogotica.',prayer:'Signore Gesù Cristo, che hai versato il tuo prezioso Sangue per la salvezza del mondo, concedici di venerarti con fede viva e cuore contrito. Amen.',feast:'Giorno dell\'Ascensione'},pt:{name:'Basílica do Santo Sangue',type:'Basílica',city:'Bruges',province:'Flandres Ocidental',description:'Conserva uma relíquia do Sangue de Cristo trazida da Terra Santa. A Procissão do Santo Sangue é Património Imaterial da UNESCO.',history:'Thierry da Alsácia trouxe a relíquia de Jerusalém em 1150. A capela inferior é românica, a superior neogótica.',prayer:'Senhor Jesus Cristo, que derramaste o teu precioso Sangue pela salvação do mundo, concede-nos venerá-lo com fé viva e coração contrito. Ámen.',feast:'Dia da Ascensão'}},
  {id:4,country:'be',lat:50.110,lng:4.958,icon:'🌟',name:'Sanctuary of Beauraing',type:'Marian shrine',city:'Beauraing',province:'Namur',description:'Site of the 1932–1933 Marian apparitions officially recognized by the Church. The Virgin of the Golden Heart appeared 33 times to five children near a convent.',history:'Between November 1932 and January 1933, five children claimed to see the Virgin Mary. The apparitions were recognized by the Bishop of Namur in 1949. The shrine receives over 500,000 pilgrims a year.',prayer:'Our Lady of Beauraing, Virgin of the Golden Heart, show us your Immaculate Heart and always guide us toward your Son Jesus. Amen.',feast:'August 22',es:{name:'Santuario de Beauraing',type:'Santuario mariano',city:'Beauraing',province:'Namur',description:'Lugar de las apariciones marianas de 1932-1933, reconocidas oficialmente por la Iglesia. La Virgen del Corazón de Oro se apareció 33 veces a cinco niños junto a un convento.',history:'Entre noviembre de 1932 y enero de 1933, cinco niños afirmaron ver a la Virgen María. Las apariciones fueron reconocidas por el obispo de Namur en 1949. El santuario recibe más de 500.000 peregrinos al año.',prayer:'Nuestra Señora de Beauraing, Virgen del Corazón de Oro, muéstranos tu Corazón Inmaculado y guíanos siempre hacia tu Hijo Jesús. Amén.',feast:'22 de agosto'},fr:{name:'Sanctuaire de Beauraing',type:'Sanctuaire marial',city:'Beauraing',province:'Namur',description:'Lieu des apparitions mariales de 1932-1933 reconnues par l\'Église. La Vierge au Cœur d\'Or apparut 33 fois à cinq enfants.',history:'Les apparitions furent reconnues par l\'évêque de Namur en 1949. Plus de 500 000 pèlerins par an.',prayer:'Notre-Dame de Beauraing, Vierge au Cœur d\'Or, montre-nous ton Cœur Immaculé et guide-nous vers ton Fils Jésus. Amen.',feast:'22 août'},it:{name:'Santuario di Beauraing',type:'Santuario mariano',city:'Beauraing',province:'Namur',description:'Luogo delle apparizioni mariane del 1932-1933 riconosciute dalla Chiesa. La Vergine dal Cuore d\'Oro apparve 33 volte a cinque bambini.',history:'Le apparizioni furono riconosciute dal vescovo di Namur nel 1949. Oltre 500.000 pellegrini all\'anno.',prayer:'Nostra Signora di Beauraing, Vergine dal Cuore d\'Oro, mostraci il tuo Cuore Immacolato e guidaci verso tuo Figlio Gesù. Amen.',feast:'22 agosto'},pt:{name:'Santuário de Beauraing',type:'Santuário mariano',city:'Beauraing',province:'Namur',description:'Local das aparições marianas de 1932-1933 reconhecidas pela Igreja. A Virgem do Coração de Ouro apareceu 33 vezes a cinco crianças.',history:'As aparições foram reconhecidas pelo bispo de Namur em 1949. Mais de 500.000 peregrinos por ano.',prayer:'Nossa Senhora de Beauraing, Virgem do Coração de Ouro, mostra-nos o teu Coração Imaculado e guia-nos para o teu Filho Jesus. Ámen.',feast:'22 de agosto'}},
  {id:5,country:'be',lat:50.532,lng:5.768,icon:'💧',name:'Sanctuary of Banneux',type:'Marian shrine',city:'Banneux',province:'Liège',description:"Known as the Belgian Lourdes. In 1933 the Virgin of the Poor appeared eight times to 11-year-old Mariette Beco, pointing to a spring of water. Officially recognized in 1949.",history:"The apparitions took place between January and March 1933. The Virgin asked for a chapel and pointed to a spring saying: 'This spring is reserved for me'. Today it is one of Europe's most visited Marian shrines.",prayer:'Virgin of the Poor, you who come to relieve suffering and bring hope, intercede for us and for all who suffer. Lead us to Jesus, source of all grace. Amen.',feast:'January 15',es:{name:'Santuario de Banneux',type:'Santuario mariano',city:'Banneux',province:'Lieja',description:'Conocido como la Lourdes belga. En 1933 la Virgen de los Pobres se apareció ocho veces a Mariette Beco, una niña de 11 años, señalándole una fuente de agua. Reconocido oficialmente en 1949.',history:'Las apariciones tuvieron lugar entre enero y marzo de 1933. La Virgen pidió una capilla y señaló un manantial: Esta fuente está reservada para mí. Hoy es uno de los santuarios marianos más visitados de Europa.',prayer:'Virgen de los Pobres, tú que vienes a aliviar el sufrimiento y a llevar esperanza, intercede por nosotros y por todos los que sufren. Llévanos a Jesús, fuente de toda gracia. Amén.',feast:'15 de enero'},fr:{name:'Sanctuaire de Banneux',type:'Sanctuaire marial',city:'Banneux',province:'Liège',description:'La Lourdes belge. En 1933 la Vierge des Pauvres apparut huit fois à Mariette Beco, lui indiquant une source d\'eau.',history:'Les apparitions eurent lieu entre janvier et mars 1933. L\'un des sanctuaires mariaux les plus visités d\'Europe.',prayer:'Vierge des Pauvres, intercède pour nous et pour tous ceux qui souffrent. Conduis-nous à Jésus, source de toute grâce. Amen.',feast:'15 janvier'},it:{name:'Santuario di Banneux',type:'Santuario mariano',city:'Banneux',province:'Liegi',description:'La Lourdes belga. Nel 1933 la Vergine dei Poveri apparve otto volte a Mariette Beco, indicandole una sorgente d\'acqua.',history:'Le apparizioni ebbero luogo tra gennaio e marzo 1933. Uno dei santuari mariani più visitati d\'Europa.',prayer:'Vergine dei Poveri, intercedi per noi e per tutti coloro che soffrono. Conducici a Gesù, fonte di ogni grazia. Amen.',feast:'15 gennaio'},pt:{name:'Santuário de Banneux',type:'Santuário mariano',city:'Banneux',province:'Liège',description:'A Lourdes belga. Em 1933 a Virgem dos Pobres apareceu oito vezes a Mariette Beco, indicando-lhe uma fonte de água.',history:'As aparições ocorreram entre janeiro e março de 1933. Um dos santuários marianos mais visitados da Europa.',prayer:'Virgem dos Pobres, intercede por nós e por todos os que sofrem. Conduz-nos a Jesus, fonte de toda a graça. Ámen.',feast:'15 de janeiro'}},
  {id:6,country:'be',lat:49.638,lng:5.347,icon:'🍺',name:'Orval Abbey',type:'Abbey',city:'Villers-devant-Orval',province:'Luxembourg',description:'Trappist abbey founded in 1132, world-famous for its beer and cheese. The medieval ruins alongside the current monastery create an ensemble of great spiritual and architectural beauty.',history:'Founded by Benedictine monks from Calabria in 1070 and reformed as a Cistercian abbey in 1132. Destroyed during the French Revolution in 1793, it was rebuilt in 1926.',prayer:'Lord, may we find your presence in the silence of this place. Bless the monks who serve you here through prayer and work. Ora et labora. Amen.',feast:'Feast of Saint Bernard, August 20',es:{name:'Abadía de Orval',type:'Abadía',city:'Villers-devant-Orval',province:'Luxemburgo',description:'Abadía trapense fundada en 1132, famosa mundialmente por su cerveza y queso. Las ruinas medievales junto al monasterio actual crean un conjunto de gran belleza espiritual y arquitectónica.',history:'Fundada por monjes benedictinos de Calabria en 1070 y reformada como abadía cisterciense en 1132. Destruida durante la Revolución Francesa en 1793, fue reconstruida en 1926.',prayer:'Señor, que en el silencio de este lugar encontremos tu presencia. Bendice a los monjes que aquí te sirven con oración y trabajo. Ora et labora. Amén.',feast:'Fiesta de San Bernardo, 20 de agosto'},fr:{name:'Abbaye d\'Orval',type:'Abbaye',city:'Villers-devant-Orval',province:'Luxembourg',description:'Abbaye trappiste fondée en 1132, célèbre pour sa bière et son fromage. Les ruines médiévales et le monastère forment un ensemble magnifique.',history:'Fondée en 1070, réformée en 1132. Détruite en 1793, reconstruite en 1926.',prayer:'Seigneur, que dans le silence de ce lieu nous trouvions ta présence. Ora et labora. Amen.',feast:'Fête de saint Bernard, 20 août'},it:{name:'Abbazia di Orval',type:'Abbazia',city:'Villers-devant-Orval',province:'Lussemburgo',description:'Abbazia trappista fondata nel 1132, famosa per la birra e il formaggio. Le rovine medievali e il monastero formano un insieme magnifico.',history:'Fondata nel 1070, riformata nel 1132. Distrutta nel 1793, ricostruita nel 1926.',prayer:'Signore, che nel silenzio di questo luogo troviamo la tua presenza. Ora et labora. Amen.',feast:'Festa di San Bernardo, 20 agosto'},pt:{name:'Abadia de Orval',type:'Abadia',city:'Villers-devant-Orval',province:'Luxemburgo',description:'Abadia trapista fundada em 1132, famosa pela sua cerveja e queijo. As ruínas medievais e o mosteiro formam um conjunto magnífico.',history:'Fundada em 1070, reformada em 1132. Destruída em 1793, reconstruída em 1926.',prayer:'Senhor, que no silêncio deste lugar encontremos a tua presença. Ora et labora. Ámen.',feast:'Festa de São Bernardo, 20 de agosto'}},

  {id:8,country:'be',lat:50.734,lng:4.233,icon:'👑',name:'Basilica of Saint Martin',type:'Basilica',city:'Halle',province:'Flemish Brabant',description:'A great Marian tradition. The Black Virgin of Halle has been venerated since the 13th century and is attributed with numerous miracles, including protecting the city during several sieges.',history:'The statue of the Black Virgin was donated by Saint Elizabeth of Hungary in the 13th century. During the siege of 1489, legend says the Virgin gathered cannonballs in her lap.',prayer:'Our Lady of Halle, faithful protector of your people, cover us with your mantle and protect us from all evil. We come to you with filial trust. Amen.',feast:'Pentecost Sunday',es:{name:'Basílica de San Martín',type:'Basílica',city:'Halle',province:'Brabante Flamenco',description:'Gran tradición mariana. La Virgen Negra de Halle es venerada desde el siglo XIII y se le atribuyen numerosos milagros, incluida la protección de la ciudad durante varios asedios.',history:'La estatua de la Virgen Negra fue donada por Santa Isabel de Hungría en el siglo XIII. Durante el asedio de 1489, según la leyenda, la Virgen recogió las balas de cañón en su regazo.',prayer:'Nuestra Señora de Halle, protectora fiel de tu pueblo, cúbrenos con tu manto y líbranos de todo mal. A ti acudimos con confianza filial. Amén.',feast:'Domingo de Pentecostés'},fr:{name:'Basilique Saint-Martin',type:'Basilique',city:'Hal',province:'Brabant flamand',description:'La Vierge Noire de Hal est vénérée depuis le XIIIe siècle avec de nombreux miracles attribués.',history:'La statue fut donnée par sainte Élisabeth de Hongrie. Lors du siège de 1489, la Vierge aurait recueilli les boulets de canon.',prayer:'Notre-Dame de Hal, protectrice fidèle, couvre-nous de ton manteau et préserve-nous de tout mal. Amen.',feast:'Dimanche de Pentecôte'},it:{name:'Basilica di San Martino',type:'Basilica',city:'Halle',province:'Brabante Fiammingo',description:'La Vergine Nera di Halle è venerata dal XIII secolo con numerosi miracoli attribuiti.',history:'La statua fu donata da Santa Elisabetta d\'Ungheria. Durante l\'assedio del 1489, la Vergine avrebbe raccolto le palle di cannone.',prayer:'Nostra Signora di Halle, protettrice fedele, coprici con il tuo manto e liberaci da ogni male. Amen.',feast:'Domenica di Pentecoste'},pt:{name:'Basílica de São Martinho',type:'Basílica',city:'Halle',province:'Brabante Flamengo',description:'A Virgem Negra de Halle é venerada desde o século XIII com numerosos milagres atribuídos.',history:'A estátua foi doada por Santa Isabel da Hungria. Durante o cerco de 1489, a Virgem teria recolhido as balas de canhão.',prayer:'Nossa Senhora de Halle, protectora fiel, cobre-nos com o teu manto e livra-nos de todo o mal. Ámen.',feast:'Domingo de Pentecostes'}},




  {id:101,country:'es',lat:42.880,lng:-8.544,icon:'🌟',name:'Cathedral of Santiago de Compostela',type:'Cathedral',city:'Santiago de Compostela',province:'Galicia',description:'One of the most important pilgrimage sites in Christendom, housing the tomb of Saint James the Apostle. The end point of the famous Camino de Santiago, walked by millions each year.',history:'The tomb of Saint James was discovered in the 9th century. The current Romanesque cathedral was begun in 1075. The Plaza del Obradoiro and the Botafumeiro are iconic symbols of the pilgrimage tradition.',prayer:'Saint James, Apostle and patron of pilgrims, accompany us on the roads of life. Help us walk with faith, hope and charity toward the heavenly Jerusalem. Amen.',feast:'July 25 (Saint James)',es:{name:'Catedral de Santiago de Compostela',type:'Catedral',city:'Santiago de Compostela',province:'Galicia',description:'Uno de los lugares de peregrinación más importantes de la Cristiandad, que alberga la tumba del apóstol Santiago. Destino final del famoso Camino de Santiago, recorrido por millones cada año.',history:'La tumba del apóstol Santiago fue descubierta en el siglo IX. La actual catedral románica comenzó en 1075. La Plaza del Obradoiro y el Botafumeiro son símbolos icónicos de la tradición jacobea.',prayer:'Santiago apóstol, patrono de los peregrinos, acompáñanos en los caminos de la vida. Ayúdanos a caminar con fe, esperanza y caridad hacia la Jerusalén celestial. Amén.',feast:'25 de julio (Santiago Apóstol)'},fr:{name:'Cathédrale de Saint-Jacques-de-Compostelle',type:'Cathédrale',city:'Saint-Jacques-de-Compostelle',province:'Galice',description:'L\'un des lieux de pèlerinage les plus importants de la Chrétienté, abritant le tombeau de l\'apôtre saint Jacques. Destination du célèbre Chemin de Saint-Jacques.',history:'Le tombeau fut découvert au IXe siècle. La cathédrale romane actuelle fut commencée en 1075. La Plaza del Obradoiro et le Botafumeiro sont emblématiques.',prayer:'Saint Jacques, apôtre et patron des pèlerins, accompagne-nous sur les chemins de la vie. Aide-nous à marcher avec foi, espérance et charité. Amen.',feast:'25 juillet (Saint Jacques)'},it:{name:'Cattedrale di Santiago de Compostela',type:'Cattedrale',city:'Santiago de Compostela',province:'Galizia',description:'Uno dei luoghi di pellegrinaggio più importanti della Cristianità, che custodisce la tomba dell\'apostolo San Giacomo. Destinazione del famoso Cammino di Santiago.',history:'La tomba fu scoperta nel IX secolo. L\'attuale cattedrale romanica fu iniziata nel 1075. La Plaza del Obradoiro e il Botafumeiro sono iconici.',prayer:'San Giacomo, apostolo e patrono dei pellegrini, accompagnaci sui cammini della vita. Aiutaci a camminare con fede, speranza e carità. Amen.',feast:'25 luglio (San Giacomo)'},pt:{name:'Catedral de Santiago de Compostela',type:'Catedral',city:'Santiago de Compostela',province:'Galiza',description:'Um dos lugares de peregrinação mais importantes da Cristandade, que alberga o túmulo do apóstolo São Tiago. Destino do famoso Caminho de Santiago.',history:'O túmulo foi descoberto no século IX. A catedral românica atual foi iniciada em 1075.',prayer:'São Tiago, apóstolo e padroeiro dos peregrinos, acompanha-nos nos caminhos da vida. Ajuda-nos a caminhar com fé, esperança e caridade. Ámen.',feast:'25 de julho (São Tiago)'}},
  {id:102,country:'es',lat:41.6566,lng:-0.8781,icon:'💎',name:'Basilica of Our Lady of the Pillar',type:'Basilica',city:'Zaragoza',province:'Aragon',description:'One of the most venerated Marian shrines in the world. Legend holds that the Virgin Mary appeared to Saint James here, making it the first Marian shrine in history.',history:'The small chapel built by Saint James was replaced by successive churches over the centuries. The current basilica, with its distinctive towers and domes, was completed in the 18th century.',prayer:'Our Lady of the Pillar, Queen and Mistress of Aragon and all of Hispania, do not abandon those who invoke your name. Amen.',feast:'October 12',es:{name:'Basílica de Nuestra Señora del Pilar',type:'Basílica',city:'Zaragoza',province:'Aragón',description:'Uno de los santuarios marianos más venerados del mundo. La tradición cuenta que la Virgen María se apareció a Santiago aquí, siendo el primer santuario mariano de la historia.',history:'La pequeña capilla construida por Santiago fue reemplazada por sucesivas iglesias a lo largo de los siglos. La actual basílica, con sus distintivas torres y cúpulas, se completó en el siglo XVIII.',prayer:'Virgen del Pilar, Reina y Señora de Aragón y de toda Hispania, no abandones a quienes invocan tu nombre. Amén.',feast:'12 de octubre'},fr:{name:'Basilique Notre-Dame du Pilier',type:'Basilique',city:'Saragosse',province:'Aragon',description:'L\'un des sanctuaires mariaux les plus vénérés au monde. La tradition veut que la Vierge soit apparue ici à saint Jacques.',history:'La basilique actuelle avec ses tours et coupoles fut achevée au XVIIIe siècle.',prayer:'Notre-Dame du Pilier, Reine d\'Aragon, n\'abandonne pas ceux qui invoquent ton nom. Amen.',feast:'12 octobre'},it:{name:'Basilica di Nostra Signora del Pilar',type:'Basilica',city:'Saragozza',province:'Aragona',description:'Uno dei santuari mariani più venerati al mondo. La tradizione narra che la Vergine apparve qui a San Giacomo.',history:'L\'attuale basilica con le sue torri e cupole fu completata nel XVIII secolo.',prayer:'Vergine del Pilar, Regina d\'Aragona, non abbandonare coloro che invocano il tuo nome. Amen.',feast:'12 ottobre'},pt:{name:'Basílica de Nossa Senhora do Pilar',type:'Basílica',city:'Saragoça',province:'Aragão',description:'Um dos santuários marianos mais venerados do mundo. A tradição conta que a Virgem Maria apareceu aqui a São Tiago.',history:'A basílica atual com as suas torres e cúpulas foi concluída no século XVIII.',prayer:'Virgem do Pilar, Rainha de Aragão, não abandones aqueles que invocam o teu nome. Ámen.',feast:'12 de outubro'}},
  {id:103,country:'es',lat:41.591,lng:1.837,icon:'⛰️',name:'Sanctuary of Montserrat',type:'Monastery',city:'Montserrat',province:'Catalonia',description:'Perched dramatically on the Montserrat mountain, this Benedictine monastery houses La Moreneta, the Black Madonna of Catalonia, one of the most venerated images in Spain.',history:'The monastery was founded in the 11th century. La Moreneta is attributed with numerous miracles. Saint Ignatius of Loyola made his spiritual conversion here before founding the Jesuits.',prayer:'Our Lady of Montserrat, Black Virgin enthroned among the rocks, hear the prayers of those who climb to your sanctuary with faith. Amen.',feast:'April 27 (Our Lady of Montserrat)',es:{name:'Santuario de Montserrat',type:'Monasterio',city:'Montserrat',province:'Cataluña',description:'Encaramado dramáticamente en la montaña de Montserrat, este monasterio benedictino alberga a La Moreneta, la Virgen Negra de Cataluña, una de las imágenes más veneradas de España.',history:'El monasterio fue fundado en el siglo XI. A La Moreneta se le atribuyen numerosos milagros. San Ignacio de Loyola realizó aquí su conversión espiritual antes de fundar la Compañía de Jesús.',prayer:'Nuestra Señora de Montserrat, Virgen Negra entronizada entre las rocas, escucha las oraciones de quienes suben a tu santuario con fe. Amén.',feast:'27 de abril (Nuestra Señora de Montserrat)'},fr:{name:'Sanctuaire de Montserrat',type:'Monastère',city:'Montserrat',province:'Catalogne',description:'Monastère bénédictin perché sur la montagne de Montserrat, abritant La Moreneta, la Vierge Noire de Catalogne.',history:'Fondé au XIe siècle. Saint Ignace de Loyola y vécut sa conversion spirituelle avant de fonder les Jésuites.',prayer:'Notre-Dame de Montserrat, Vierge Noire, écoute les prières de ceux qui montent à ton sanctuaire avec foi. Amen.',feast:'27 avril (Notre-Dame de Montserrat)'},it:{name:'Santuario di Montserrat',type:'Monastero',city:'Montserrat',province:'Catalogna',description:'Monastero benedettino arroccato sulla montagna di Montserrat, che ospita La Moreneta, la Madonna Nera della Catalogna.',history:'Fondato nell\'XI secolo. Sant\'Ignazio di Loyola vi visse la conversione spirituale prima di fondare i Gesuiti.',prayer:'Nostra Signora di Montserrat, Vergine Nera, ascolta le preghiere di chi sale al tuo santuario con fede. Amen.',feast:'27 aprile (Nostra Signora di Montserrat)'},pt:{name:'Santuário de Montserrat',type:'Mosteiro',city:'Montserrat',province:'Catalunha',description:'Mosteiro beneditino empoleirado na montanha de Montserrat, que alberga La Moreneta, a Virgem Negra da Catalunha.',history:'Fundado no século XI. Santo Inácio de Loyola viveu aqui a sua conversão espiritual antes de fundar os Jesuítas.',prayer:'Nossa Senhora de Montserrat, Virgem Negra, ouve as orações de quem sobe ao teu santuário com fé. Ámen.',feast:'27 de abril (Nossa Senhora de Montserrat)'}},
  {id:104,country:'es',lat:39.4528,lng:-5.3308,icon:'🌿',name:'Monastery of Guadalupe',type:'Monastery',city:'Guadalupe',province:'Extremadura',description:'Home to the famous Black Madonna of Guadalupe, patron of Extremadura and the Hispanic world. A UNESCO World Heritage Site and one of the most important pilgrimage centres in Spain.',history:'The image was reportedly found in the 14th century. The monastery became a major cultural centre and Christopher Columbus visited after returning from America to give thanks.',prayer:'Our Lady of Guadalupe, Mother of the Hispanic world, intercede for all your children. May your mantle of mercy cover us always. Amen.',feast:'September 8',es:{name:'Monasterio de Guadalupe',type:'Monasterio',city:'Guadalupe',province:'Extremadura',description:'Sede de la famosa Virgen Negra de Guadalupe, patrona de Extremadura y del mundo hispánico. Patrimonio de la Humanidad de la UNESCO y uno de los centros de peregrinación más importantes de España.',history:'La imagen fue encontrada, según la tradición, en el siglo XIV. El monasterio se convirtió en un gran centro cultural y Cristóbal Colón lo visitó tras regresar de América para dar gracias.',prayer:'Nuestra Señora de Guadalupe, Madre del mundo hispánico, intercede por todos tus hijos. Que tu manto de misericordia nos cubra siempre. Amén.',feast:'8 de septiembre'},fr:{name:'Monastère de Guadalupe',type:'Monastère',city:'Guadalupe',province:'Estrémadure',description:'Siège de la Vierge Noire de Guadalupe, patronne d\'Estrémadure. Patrimoine mondial de l\'UNESCO.',history:'L\'image fut trouvée au XIVe siècle. Christophe Colomb le visita après son retour d\'Amérique.',prayer:'Notre-Dame de Guadalupe, Mère du monde hispanique, intercède pour tous tes enfants. Amen.',feast:'8 septembre'},it:{name:'Monastero di Guadalupe',type:'Monastero',city:'Guadalupe',province:'Estremadura',description:'Sede della Madonna Nera di Guadalupe, patrona dell\'Estremadura. Patrimonio dell\'Umanità UNESCO.',history:'L\'immagine fu trovata nel XIV secolo. Cristoforo Colombo lo visitò dopo il ritorno dall\'America.',prayer:'Nostra Signora di Guadalupe, Madre del mondo ispanico, intercedi per tutti i tuoi figli. Amen.',feast:'8 settembre'},pt:{name:'Mosteiro de Guadalupe',type:'Mosteiro',city:'Guadalupe',province:'Extremadura',description:'Sede da Virgem Negra de Guadalupe, padroeira da Extremadura. Património da Humanidade da UNESCO.',history:'A imagem foi encontrada no século XIV. Cristóvão Colombo visitou o mosteiro após o regresso da América.',prayer:'Nossa Senhora de Guadalupe, Mãe do mundo hispânico, intercede por todos os teus filhos. Ámen.',feast:'8 de setembro'}},
  {id:105,country:'es',lat:36.7264,lng:-4.4175,icon:'🕯️',name:'Sanctuary of Our Lady of the Victory',type:'Basilica',city:'Málaga',province:'Andalusia',description:'Houses one of the most venerated images in Málaga, the Virgin of Victory, patroness of the city. A place of deep popular devotion and one of Andalusia\'s most visited shrines.',history:'The sanctuary was built by the Catholic Monarchs after the conquest of Málaga in 1487. The image of the Virgin was given to the Minimum Friars who have guarded it ever since.',prayer:'Virgin of Victory, Queen of Málaga, look upon your people with eyes of mercy. Give us strength in trials and joy in your love. Amen.',feast:'September 8',es:{name:'Santuario de Nuestra Señora de la Victoria',type:'Basílica',city:'Málaga',province:'Andalucía',description:'Alberga una de las imágenes más veneradas de Málaga, la Virgen de la Victoria, patrona de la ciudad. Lugar de profunda devoción popular y uno de los santuarios más visitados de Andalucía.',history:'El santuario fue construido por los Reyes Católicos tras la conquista de Málaga en 1487. La imagen de la Virgen fue entregada a los Frailes Mínimos, quienes la han custodiado desde entonces.',prayer:'Virgen de la Victoria, Reina de Málaga, mira a tu pueblo con ojos de misericordia. Danos fortaleza en las pruebas y alegría en tu amor. Amén.',feast:'8 de septiembre'},fr:{name:'Sanctuaire de Notre-Dame de la Victoire',type:'Basilique',city:'Malaga',province:'Andalousie',description:'Abrite la Vierge de la Victoire, patronne de Malaga. Lieu de profonde dévotion populaire.',history:'Construit par les Rois Catholiques après la conquête de Malaga en 1487.',prayer:'Vierge de la Victoire, Reine de Malaga, regarde ton peuple avec miséricorde. Amen.',feast:'8 septembre'},it:{name:'Santuario di Nostra Signora della Vittoria',type:'Basilica',city:'Malaga',province:'Andalusia',description:'Custodisce la Vergine della Vittoria, patrona di Malaga. Luogo di profonda devozione popolare.',history:'Costruito dai Re Cattolici dopo la conquista di Malaga nel 1487.',prayer:'Vergine della Vittoria, Regina di Malaga, guarda il tuo popolo con misericordia. Amen.',feast:'8 settembre'},pt:{name:'Santuário de Nossa Senhora da Vitória',type:'Basílica',city:'Málaga',province:'Andaluzia',description:'Custódia a Virgem da Vitória, padroeira de Málaga. Lugar de profunda devoção popular.',history:'Construído pelos Reis Católicos após a conquista de Málaga em 1487.',prayer:'Virgem da Vitória, Rainha de Málaga, olha para o teu povo com misericórdia. Ámen.',feast:'8 de setembro'}},
  {id:106,country:'es',lat:40.416,lng:-3.700,icon:'🏰',name:'Cathedral of the Almudena',type:'Cathedral',city:'Madrid',province:'Madrid',description:'The main cathedral of Madrid, dedicated to the patroness of the city, Our Lady of the Almudena. Consecrated by Pope John Paul II in 1993, it faces the Royal Palace.',history:'Construction began in 1879 but was not completed until 1993 — over a century of building. The crypt houses one of the most ancient Marian images venerated in Madrid.',prayer:'Our Lady of the Almudena, patroness of Madrid, watch over this city and all who dwell in it. Bring us always closer to your Son Jesus. Amen.',feast:'November 9',es:{name:'Catedral de la Almudena',type:'Catedral',city:'Madrid',province:'Madrid',description:'La catedral principal de Madrid, dedicada a la patrona de la ciudad, Nuestra Señora de la Almudena. Consagrada por el Papa Juan Pablo II en 1993, se enfrenta al Palacio Real.',history:'La construcción comenzó en 1879 pero no se completó hasta 1993, más de un siglo de obras. La cripta alberga una de las imágenes marianas más antiguas veneradas en Madrid.',prayer:'Nuestra Señora de la Almudena, patrona de Madrid, vela por esta ciudad y por todos los que en ella habitan. Llévanos siempre más cerca de tu Hijo Jesús. Amén.',feast:'9 de noviembre'},fr:{name:'Cathédrale de l\'Almudena',type:'Cathédrale',city:'Madrid',province:'Madrid',description:'Cathédrale principale de Madrid, dédiée à la patronne de la ville. Consacrée par Jean-Paul II en 1993.',history:'Construction de 1879 à 1993. La crypte abrite une des plus anciennes images mariales de Madrid.',prayer:'Notre-Dame de l\'Almudena, patronne de Madrid, veille sur cette ville. Rapproche-nous de ton Fils. Amen.',feast:'9 novembre'},it:{name:'Cattedrale dell\'Almudena',type:'Cattedrale',city:'Madrid',province:'Madrid',description:'Cattedrale principale di Madrid, dedicata alla patrona della città. Consacrata da Giovanni Paolo II nel 1993.',history:'Costruzione dal 1879 al 1993. La cripta custodisce una delle più antiche immagini mariane di Madrid.',prayer:'Nostra Signora dell\'Almudena, patrona di Madrid, veglia su questa città. Portaci vicino a tuo Figlio. Amen.',feast:'9 novembre'},pt:{name:'Catedral de Almudena',type:'Catedral',city:'Madrid',province:'Madrid',description:'Catedral principal de Madrid, dedicada à padroeira da cidade. Consagrada por João Paulo II em 1993.',history:'Construção de 1879 a 1993. A cripta alberga uma das mais antigas imagens marianas de Madrid.',prayer:'Nossa Senhora de Almudena, padroeira de Madrid, vela por esta cidade. Aproxima-nos do teu Filho. Ámen.',feast:'9 de novembro'}},
  {id:107,country:'es',lat:37.386,lng:-5.993,icon:'✨',name:'Cathedral of Seville',type:'Cathedral',city:'Seville',province:'Andalusia',description:'The largest Gothic cathedral in the world and a UNESCO World Heritage Site. It houses the tomb of Christopher Columbus and the Giralda tower, a symbol of Seville.',history:'Built between 1401 and 1519 on the site of a mosque. Its sheer scale was intended to show the wealth and power of Seville. The Giralda was originally a minaret.',prayer:'Lord, in this immense temple raised to your glory, may we find the silence of your presence and the warmth of your love. Amen.',feast:'August 15 (Assumption — Cathedral dedication)',es:{name:'Catedral de Sevilla',type:'Catedral',city:'Sevilla',province:'Andalucía',description:'La catedral gótica más grande del mundo y Patrimonio de la Humanidad. Alberga la tumba de Cristóbal Colón y la Giralda, símbolo de Sevilla.',history:'Construida entre 1401 y 1519 sobre el emplazamiento de una mezquita. Su escala monumental pretendía mostrar la riqueza y el poder de Sevilla. La Giralda fue originalmente un minarete.',prayer:'Señor, en este inmenso templo levantado a tu gloria, que encontremos el silencio de tu presencia y el calor de tu amor. Amén.',feast:'15 de agosto (Asunción — dedicación de la Catedral)'},fr:{name:'Cathédrale de Séville',type:'Cathédrale',city:'Séville',province:'Andalousie',description:'La plus grande cathédrale gothique du monde. Patrimoine mondial. Abrite le tombeau de Christophe Colomb et la Giralda.',history:'Construite entre 1401 et 1519 sur l\'emplacement d\'une mosquée. La Giralda était un minaret.',prayer:'Seigneur, dans cet immense temple, que nous trouvions le silence de ta présence et la chaleur de ton amour. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Siviglia',type:'Cattedrale',city:'Siviglia',province:'Andalusia',description:'La cattedrale gotica più grande del mondo. Patrimonio dell\'Umanità. Custodisce la tomba di Cristoforo Colombo e la Giralda.',history:'Costruita tra il 1401 e il 1519 sul sito di una moschea. La Giralda era un minareto.',prayer:'Signore, in questo immenso tempio, che troviamo il silenzio della tua presenza e il calore del tuo amore. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Catedral de Sevilha',type:'Catedral',city:'Sevilha',province:'Andaluzia',description:'A maior catedral gótica do mundo. Património da Humanidade. Alberga o túmulo de Cristóvão Colombo e a Giralda.',history:'Construída entre 1401 e 1519 no local de uma mesquita. A Giralda era um minarete.',prayer:'Senhor, neste imenso templo, que encontremos o silêncio da tua presença e o calor do teu amor. Ámen.',feast:'15 de agosto (Assunção)'}},

  // ===== PORTUGAL =====
  {id:201,country:'pt',lat:39.629,lng:-8.659,icon:'🌸',name:'Sanctuary of Fatima',type:'Marian shrine',city:'Fátima',province:'Santarém',description:'One of the most visited Catholic pilgrimage sites in the world. In 1917 the Virgin Mary appeared six times to three shepherd children. Millions of pilgrims come each year, especially on May 13.',history:'The apparitions began on May 13, 1917. Our Lady asked for prayer, penance and consecration of Russia to her Immaculate Heart. The three seers were Lúcia, Francisco and Jacinta. Francisco and Jacinta were canonised in 2017.',prayer:'Our Lady of Fátima, you came to call us to prayer and conversion. Help us to respond generously to your message. Immaculate Heart of Mary, pray for us! Amen.',feast:'May 13 and October 13',es:{name:'Santuario de Fátima',type:'Santuario mariano',city:'Fátima',province:'Santarém',description:'Uno de los lugares de peregrinación católica más visitados del mundo. En 1917 la Virgen María se apareció seis veces a tres pastorcillos. Millones de peregrinos acuden cada año, especialmente el 13 de mayo.',history:'Las apariciones comenzaron el 13 de mayo de 1917. Nuestra Señora pidió oración, penitencia y la consagración de Rusia a su Inmaculado Corazón. Los tres videntes fueron Lucía, Francisco y Jacinta. Francisco y Jacinta fueron canonizados en 2017.',prayer:'Nuestra Señora de Fátima, viniste a llamarnos a la oración y la conversión. Ayúdanos a responder generosamente a tu mensaje. ¡Inmaculado Corazón de María, ruega por nosotros! Amén.',feast:'13 de mayo y 13 de octubre'},fr:{name:'Sanctuaire de Fátima',type:'Sanctuaire marial',city:'Fátima',province:'Santarém',description:'L\'un des lieux de pèlerinage les plus visités au monde. En 1917 la Vierge apparut six fois à trois petits bergers.',history:'Les apparitions commencèrent le 13 mai 1917. Francisco et Jacinta furent canonisés en 2017.',prayer:'Notre-Dame de Fátima, aide-nous à répondre à ton message. Cœur Immaculé de Marie, priez pour nous ! Amen.',feast:'13 mai et 13 octobre'},it:{name:'Santuario di Fatima',type:'Santuario mariano',city:'Fatima',province:'Santarém',description:'Uno dei luoghi di pellegrinaggio più visitati al mondo. Nel 1917 la Vergine apparve sei volte a tre pastorelli.',history:'Le apparizioni iniziarono il 13 maggio 1917. Francesco e Giacinta furono canonizzati nel 2017.',prayer:'Nostra Signora di Fatima, aiutaci a rispondere al tuo messaggio. Cuore Immacolato di Maria, prega per noi! Amen.',feast:'13 maggio e 13 ottobre'},pt:{name:'Santuário de Fátima',type:'Santuário mariano',city:'Fátima',province:'Santarém',description:'Um dos lugares de peregrinação mais visitados do mundo. Em 1917 a Virgem Maria apareceu seis vezes a três pastorinhos.',history:'As aparições começaram a 13 de maio de 1917. Francisco e Jacinta foram canonizados em 2017.',prayer:'Nossa Senhora de Fátima, ajuda-nos a responder à tua mensagem. Coração Imaculado de Maria, rogai por nós! Ámen.',feast:'13 de maio e 13 de outubro'}},
  {id:202,country:'pt',lat:41.5542,lng:-8.3755,icon:'⛪',name:'Sanctuary of Bom Jesus do Monte',type:'Sanctuary',city:'Braga',province:'Braga',description:'A stunning hilltop sanctuary with a famous Baroque stairway representing the Via Crucis. One of Portugal\'s most iconic religious monuments and a UNESCO World Heritage Site.',history:'The sanctuary was founded in the 15th century. The famous zigzag stairway was built in the 18th century. Many pilgrims climb it on their knees as an act of penance and devotion.',prayer:'Lord Jesus, as we climb these steps in your name, may each step bring us closer to you. Purify our hearts and renew our faith. Amen.',feast:'Ascension Thursday',es:{name:'Santuario del Buen Jesús del Monte',type:'Santuario',city:'Braga',province:'Braga',description:'Un impresionante santuario en la cima de una colina con una famosa escalinata barroca que representa el Vía Crucis. Uno de los monumentos religiosos más icónicos de Portugal y Patrimonio de la Humanidad.',history:'El santuario fue fundado en el siglo XV. La famosa escalinata en zigzag fue construida en el siglo XVIII. Muchos peregrinos la suben de rodillas como acto de penitencia y devoción.',prayer:'Señor Jesús, al subir estos escalones en tu nombre, que cada paso nos acerque más a ti. Purifica nuestros corazones y renueva nuestra fe. Amén.',feast:'Jueves de la Ascensión'},fr:{name:'Sanctuaire du Bon Jésus du Mont',type:'Sanctuaire',city:'Braga',province:'Braga',description:'Sanctuaire spectaculaire avec escalier baroque représentant le Chemin de Croix. Patrimoine mondial.',history:'Fondé au XVe siècle. L\'escalier en zigzag fut construit au XVIIIe siècle.',prayer:'Seigneur Jésus, que chaque pas nous rapproche de toi. Purifie nos cœurs et renouvelle notre foi. Amen.',feast:'Jeudi de l\'Ascension'},it:{name:'Santuario del Buon Gesù del Monte',type:'Santuario',city:'Braga',province:'Braga',description:'Spettacolare santuario con scalinata barocca che rappresenta la Via Crucis. Patrimonio dell\'Umanità.',history:'Fondato nel XV secolo. La scalinata a zigzag fu costruita nel XVIII secolo.',prayer:'Signore Gesù, che ogni passo ci avvicini a te. Purifica i nostri cuori e rinnova la nostra fede. Amen.',feast:'Giovedì dell\'Ascensione'},pt:{name:'Santuário do Bom Jesus do Monte',type:'Santuário',city:'Braga',province:'Braga',description:'Santuário espetacular com escadaria barroca que representa a Via-Sacra. Património da Humanidade.',history:'Fundado no século XV. A escadaria em ziguezague foi construída no século XVIII.',prayer:'Senhor Jesus, que cada passo nos aproxime de ti. Purifica os nossos corações e renova a nossa fé. Ámen.',feast:'Quinta-feira da Ascensão'}},
  {id:203,country:'pt',lat:38.699,lng:-9.206,icon:'🏛️',name:'Jerónimos Monastery',type:'Monastery',city:'Lisbon',province:'Lisbon',description:'A masterpiece of Manueline architecture and UNESCO World Heritage Site. Built to give thanks for Vasco da Gama\'s successful voyage to India, it houses his tomb and that of poet Luís de Camões.',history:'Construction began in 1501 under King Manuel I. The monastery was home to Hieronymite monks who prayed for seafarers. It survived the 1755 earthquake and remains largely intact.',prayer:'Lord, as sailors of old entrusted their journeys to you, we entrust our lives to your providence. Guide us safely to the port of eternal life. Amen.',feast:'June 13 (Saint Anthony of Lisbon)',es:{name:'Monasterio de los Jerónimos',type:'Monasterio',city:'Lisboa',province:'Lisboa',description:'Una obra maestra de la arquitectura manuelina y Patrimonio de la Humanidad. Construido para dar gracias por el exitoso viaje de Vasco da Gama a la India, alberga su tumba y la del poeta Luís de Camões.',history:'La construcción comenzó en 1501 bajo el rey Manuel I. El monasterio fue hogar de monjes jerónimos que rezaban por los marineros. Sobrevivió al terremoto de 1755 y permanece prácticamente intacto.',prayer:'Señor, como los marineros de antaño encomendaban sus travesías a tu cuidado, nosotros te confiamos nuestras vidas. Guíanos con seguridad al puerto de la vida eterna. Amén.',feast:'13 de junio (San Antonio de Lisboa)'},fr:{name:'Monastère des Hiéronymites',type:'Monastère',city:'Lisbonne',province:'Lisbonne',description:'Chef-d\'œuvre manuélin et Patrimoine mondial. Construit pour le voyage de Vasco de Gama en Inde.',history:'Construction débutée en 1501. Il survécut au tremblement de terre de 1755.',prayer:'Seigneur, nous te confions nos vies. Guide-nous vers le port de la vie éternelle. Amen.',feast:'13 juin (Saint Antoine de Lisbonne)'},it:{name:'Monastero dos Jerónimos',type:'Monastero',city:'Lisbona',province:'Lisbona',description:'Capolavoro manuelino e Patrimonio dell\'Umanità. Costruito per il viaggio di Vasco da Gama in India.',history:'Costruzione iniziata nel 1501. Sopravvisse al terremoto del 1755.',prayer:'Signore, ti affidiamo le nostre vite. Guidaci al porto della vita eterna. Amen.',feast:'13 giugno (Sant\'Antonio di Lisbona)'},pt:{name:'Mosteiro dos Jerónimos',type:'Mosteiro',city:'Lisboa',province:'Lisboa',description:'Obra-prima da arquitetura manuelina e Património da Humanidade. Construído para a viagem de Vasco da Gama à Índia.',history:'Construção iniciada em 1501. Sobreviveu ao terramoto de 1755.',prayer:'Senhor, confiamos-te as nossas vidas. Guia-nos ao porto da vida eterna. Ámen.',feast:'13 de junho (Santo António de Lisboa)'}},
  {id:204,country:'pt',lat:41.5554,lng:-8.3849,icon:'🌿',name:'Sanctuary of Our Lady of Sameiro',type:'Marian shrine',city:'Braga',province:'Braga',description:'One of the most important Marian shrines in Portugal, perched on a hill with panoramic views. The sanctuary attracts hundreds of thousands of pilgrims each year.',history:'The sanctuary was built in the 19th century after a vision reported by a local priest. Pope Pius IX granted it a Canonical Coronation in 1904. Pope John Paul II visited in 1982.',prayer:'Our Lady of Sameiro, Queen enthroned on the hill, extend your protection over all of Portugal. May your intercession draw us ever closer to God. Amen.',feast:'Sunday after Pentecost',es:{name:'Santuario de Nuestra Señora del Sameiro',type:'Santuario mariano',city:'Braga',province:'Braga',description:'Uno de los santuarios marianos más importantes de Portugal, enclavado en una colina con vistas panorámicas. Atrae a cientos de miles de peregrinos cada año.',history:'El santuario fue construido en el siglo XIX tras una visión relatada por un sacerdote local. El Papa Pío IX concedió la Coronación Canónica en 1904. El Papa Juan Pablo II visitó el lugar en 1982.',prayer:'Nuestra Señora del Sameiro, Reina entronizada en la colina, extiende tu protección sobre todo Portugal. Que tu intercesión nos acerque cada vez más a Dios. Amén.',feast:'Domingo de Pentecostés'},fr:{name:'Sanctuaire de Notre-Dame du Sameiro',type:'Sanctuaire marial',city:'Braga',province:'Braga',description:'L\'un des sanctuaires mariaux les plus importants du Portugal, sur une colline avec vues panoramiques.',history:'Construit au XIXe siècle. Couronnement Canonique en 1904. Jean-Paul II le visita en 1982.',prayer:'Notre-Dame du Sameiro, étends ta protection sur tout le Portugal. Amen.',feast:'Dimanche après la Pentecôte'},it:{name:'Santuario di Nostra Signora del Sameiro',type:'Santuario mariano',city:'Braga',province:'Braga',description:'Uno dei santuari mariani più importanti del Portogallo, su una collina con viste panoramiche.',history:'Costruito nel XIX secolo. Incoronazione Canonica nel 1904. Giovanni Paolo II lo visitò nel 1982.',prayer:'Nostra Signora del Sameiro, estendi la tua protezione su tutto il Portogallo. Amen.',feast:'Domenica dopo Pentecoste'},pt:{name:'Santuário de Nossa Senhora do Sameiro',type:'Santuário mariano',city:'Braga',province:'Braga',description:'Um dos santuários marianos mais importantes de Portugal, numa colina com vistas panorâmicas.',history:'Construído no século XIX. Coroação Canónica em 1904. João Paulo II visitou em 1982.',prayer:'Nossa Senhora do Sameiro, estende a tua proteção sobre todo o Portugal. Ámen.',feast:'Domingo após Pentecostes'}},
  {id:205,country:'pt',lat:37.018,lng:-7.936,icon:'💫',name:'Cathedral of Faro',type:'Cathedral',city:'Faro',province:'Algarve',description:'The oldest cathedral in the Algarve, a deeply atmospheric place of worship combining Gothic, Renaissance and Baroque elements. The tower offers views over the Ria Formosa lagoon.',history:'Built in the 13th century on the site of a mosque, the cathedral was largely destroyed by Sir Francis Drake in 1596 and by the 1755 earthquake, and rebuilt each time.',prayer:'Lord, this ancient cathedral speaks of the faith of generations. May we too build our lives on the rock of your word. Amen.',feast:'August 15 (Assumption)',es:{name:'Catedral de Faro',type:'Catedral',city:'Faro',province:'Algarve',description:'La catedral más antigua del Algarve, un lugar de culto de gran atmósfera que combina elementos góticos, renacentistas y barrocos. La torre ofrece vistas sobre la laguna de la Ría Formosa.',history:'Construida en el siglo XIII sobre el emplazamiento de una mezquita, la catedral fue destruida en gran parte por Sir Francis Drake en 1596 y por el terremoto de 1755, y reconstruida en cada ocasión.',prayer:'Señor, esta antigua catedral habla de la fe de generaciones. Que nosotros también edifiquemos nuestras vidas sobre la roca de tu palabra. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Cathédrale de Faro',type:'Cathédrale',city:'Faro',province:'Algarve',description:'La plus ancienne cathédrale de l\'Algarve, mêlant gothique, Renaissance et baroque.',history:'Construite au XIIIe siècle sur une mosquée. Détruite et reconstruite plusieurs fois.',prayer:'Seigneur, que nous bâtissions nos vies sur le roc de ta parole. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Faro',type:'Cattedrale',city:'Faro',province:'Algarve',description:'La cattedrale più antica dell\'Algarve, che combina gotico, Rinascimento e barocco.',history:'Costruita nel XIII secolo su una moschea. Distrutta e ricostruita più volte.',prayer:'Signore, che ed
