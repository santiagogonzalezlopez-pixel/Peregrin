  {id:604,country:'ie',lat:51.896,lng:-8.468,icon:'💒',name:'Shandon Church',type:'Church',city:'Cork',province:'County Cork',description:'Saint Anne\'s Church, known as Shandon, is one of Cork\'s most beloved landmarks. Visitors can ring the famous Shandon Bells, an experience unique in Irish religious heritage.',history:'Built in 1722 on the site of a church destroyed by Williamite forces. The famous steeple has four clock faces that were historically known as the four-faced liar because they showed different times.',prayer:'Lord, as these bells have called generations of Cork people to prayer, may their sound call us too to lift our hearts to you in gratitude and praise. Amen.',feast:'July 26 (Saint Anne)',es:{name:'Iglesia de Shandon',type:'Iglesia',city:'Cork',province:'Condado de Cork',description:'La Iglesia de Santa Ana, conocida como Shandon, es uno de los monumentos más queridos de Cork. Los visitantes pueden tocar las famosas Campanas de Shandon, una experiencia única en el patrimonio religioso irlandés.',history:'Construida en 1722 sobre el emplazamiento de una iglesia destruida por las fuerzas williamitas. El famoso campanario tiene cuatro esferas de reloj que históricamente se conocían como el mentiroso de cuatro caras porque marcaban horas distintas.',prayer:'Señor, así como estas campanas han llamado a generaciones de habitantes de Cork a la oración, que su sonido nos llame también a nosotros a elevar nuestros corazones hacia ti con gratitud y alabanza. Amén.',feast:'26 de julio (Santa Ana)'}},
  {id:605,country:'ie',lat:51.656,lng:-8.630,icon:'✝️',name:'Timoleague Abbey',type:'Abbey',city:'Timoleague',province:'County Cork',description:'Hauntingly beautiful ruins of a Franciscan friary founded in 1240, set beside a tidal estuary. One of the most atmospheric medieval religious sites in Ireland.',history:'Founded by the MacCarthy family, Timoleague was one of the largest Franciscan houses in medieval Ireland. It was suppressed during the Reformation in the 16th century. The ruins include the church, cloister and tower.',prayer:'Lord, though these walls are ruined, the faith that built them endures. May we too build on the rock of your love, withstanding every storm. Amen.',feast:'October 4 (Saint Francis)',es:{name:'Abadía de Timoleague',type:'Abadía',city:'Timoleague',province:'Condado de Cork',description:'Ruinas de una sobrecogedora belleza de un convento franciscano fundado en 1240, junto a un estuario de marea. Uno de los lugares religiosos medievales más atmosféricos de Irlanda.',history:'Fundada por la familia MacCarthy, Timoleague fue una de las casas franciscanas más grandes de la Irlanda medieval. Fue suprimida durante la Reforma en el siglo XVI. Las ruinas incluyen la iglesia, el claustro y la torre.',prayer:'Señor, aunque estas paredes estén en ruinas, la fe que las construyó permanece. Que nosotros también edifiquemos sobre la roca de tu amor, resistiendo todas las tempestades. Amén.',feast:'4 de octubre (San Francisco)'}},

  // ===== GERMANY =====
  {id:701,country:'de',lat:47.770,lng:10.302,icon:'🙏',name:'Wieskirche',type:'Church',city:'Steingaden',province:'Bavaria',description:'The Pilgrimage Church of Wies, a UNESCO World Heritage Site. This extraordinary Rococo church in the Bavarian foothills is considered one of the finest examples of Rococo art in the world.',history:'Built between 1745 and 1754 by Dominikus Zimmermann after a miraculous image of the Scourged Christ wept. Pilgrims immediately began flocking to the site and the church was built to accommodate them.',prayer:'Lord Jesus, Scourged Saviour, you shed tears for our sins. Touch our hearts with true contrition and renew in us the joy of your salvation. Amen.',feast:'Sunday after Pentecost',es:{name:'Wieskirche',type:'Iglesia',city:'Steingaden',province:'Baviera',description:'La Iglesia de Peregrinación de Wies, Patrimonio de la Humanidad de la UNESCO. Esta extraordinaria iglesia rococó en las estribaciones bávaras es considerada uno de los mejores ejemplos de arte rococó del mundo.',history:'Construida entre 1745 y 1754 por Dominikus Zimmermann, tras relatos de que una imagen del Cristo Flagelado derramó lágrimas. Los peregrinos comenzaron a acudir inmediatamente y la iglesia fue construida para acogerlos.',prayer:'Señor Jesús, Salvador Flagelado, derramaste lágrimas por nuestros pecados. Toca nuestros corazones con verdadero arrepentimiento y renueva en nosotros el gozo de tu salvación. Amén.',feast:'Domingo de Pentecostés'}},
  {id:702,country:'de',lat:48.137,lng:11.575,icon:'⛪',name:'Frauenkirche Munich',type:'Cathedral',city:'Munich',province:'Bavaria',description:'The Cathedral of Our Dear Lady, symbol of Munich. Its twin towers are iconic landmarks of the Bavarian capital. A place of Marian devotion at the heart of the city.',history:'Built in a mere 20 years (1468–1488), a remarkable feat for a cathedral of this size. According to legend, the Devil left a footprint in the doorway when he found no windows from inside — an optical illusion still visible today.',prayer:'Our Lady of Munich, gentle mother under whose patronage this city has lived for centuries, watch over us and lead us to your Son. Amen.',feast:'August 15 (Assumption)',es:{name:'Frauenkirche de Múnich',type:'Catedral',city:'Múnich',province:'Baviera',description:'La Catedral de Nuestra Querida Señora, símbolo de Múnich. Sus torres gemelas son monumentos icónicos de la capital bávara. Lugar de devoción mariana en el corazón de la ciudad.',history:'Construida en solo 20 años (1468-1488), un logro notable para una catedral de este tamaño. Según la leyenda, el diablo dejó una huella en el umbral cuando descubrió que no se veían ventanas desde dentro, una ilusión óptica aún visible hoy.',prayer:'Nuestra Señora de Múnich, madre gentil bajo cuyo patrocinio esta ciudad ha vivido durante siglos, vela por nosotros y llévanos a tu Hijo. Amén.',feast:'15 de agosto (Asunción)'}},
  {id:703,country:'de',lat:47.557,lng:10.751,icon:'💒',name:'Ettal Abbey',type:'Abbey',city:'Ettal',province:'Bavaria',description:'A Benedictine monastery in the Bavarian Alps, founded in 1330, housing a miraculous marble image of Our Lady. Famous for its distillery and as a centre of learning and culture.',history:'Founded by Emperor Louis IV, the abbey was largely rebuilt in the 18th century after a fire. It runs one of Germany\'s top boarding schools. The Baroque church is one of the finest in Bavaria.',prayer:'Our Lady of Ettal, Queen enthroned in the mountains, may your alpine home remind us of the heights to which God calls each of us. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Abadía de Ettal',type:'Abadía',city:'Ettal',province:'Baviera',description:'Un monasterio benedictino en los Alpes bávaros, fundado en 1330, que alberga una milagrosa imagen de mármol de Nuestra Señora. Famoso por su destilería y como centro de aprendizaje y cultura.',history:'Fundada por el emperador Luis IV, la abadía fue reconstruida en gran parte en el siglo XVIII tras un incendio. Gestiona uno de los mejores internados de Alemania. La iglesia barroca es una de las más bellas de Baviera.',prayer:'Nuestra Señora de Ettal, Reina entronizada en las montañas, que tu hogar alpino nos recuerde las alturas a las que Dios llama a cada uno de nosotros. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'}},
  {id:704,country:'de',lat:48.223,lng:12.676,icon:'🌟',name:'Sanctuary of Altötting',type:'Sanctuary',city:'Altötting',province:'Bavaria',description:'Bavaria\'s most important Marian pilgrimage site, home to the Black Madonna of Altötting. The Chapel of Grace is the heart of this ancient shrine visited by millions.',history:'Miracles were reported here as early as 1489. Bavaria\'s royal House of Wittelsbach gave special patronage to the shrine. Joseph Ratzinger (later Pope Benedict XVI) was baptised nearby and maintained lifelong devotion to Our Lady of Altötting.',prayer:'Our Lady of Altötting, Black Madonna of Bavaria, you have heard the prayers of millions. Hear ours too, and bring them to your Son Jesus. Amen.',feast:'August 15 (Assumption)',es:{name:'Santuario de Altötting',type:'Santuario',city:'Altötting',province:'Baviera',description:'El lugar de peregrinación mariana más importante de Baviera, hogar de la Virgen Negra de Altötting. La Capilla de la Gracia es el corazón de este antiguo santuario visitado por millones.',history:'Los milagros aquí fueron reportados ya en 1489. La casa real bávara de los Wittelsbach dio especial patronazgo al santuario. Joseph Ratzinger (luego Papa Benedicto XVI) fue bautizado cerca y mantuvo devoción de por vida a Nuestra Señora de Altötting.',prayer:'Nuestra Señora de Altötting, Virgen Negra de Baviera, has escuchado las oraciones de millones. Escucha también las nuestras y llévalas a tu Hijo Jesús. Amén.',feast:'15 de agosto (Asunción)'}},
  {id:705,country:'de',lat:50.939,lng:6.957,icon:'🏰',name:'Cologne Cathedral',type:'Cathedral',city:'Cologne',province:'North Rhine-Westphalia',description:'A UNESCO World Heritage Site and one of the greatest Gothic cathedrals in the world. It houses the Shrine of the Three Kings, the largest medieval reliquary in the Western world.',history:'Construction began in 1248 and was not completed until 1880 — over 600 years. The cathedral survived World War II bombing while surrounding Cologne was devastated. It remains Germany\'s most visited landmark.',prayer:'Lord, the Three Magi came from afar seeking you and offered their finest gifts. May we too seek you with the same determination and offer you the gift of our lives. Amen.',feast:'January 6 (Epiphany)',es:{name:'Catedral de Colonia',type:'Catedral',city:'Colonia',province:'Renania del Norte-Westfalia',description:'Patrimonio de la Humanidad de la UNESCO y una de las mayores catedrales góticas del mundo. Alberga el Relicario de los Reyes Magos, el relicario medieval más grande del mundo occidental.',history:'La construcción comenzó en 1248 y no se completó hasta 1880, más de 600 años. La catedral sobrevivió a los bombardeos de la Segunda Guerra Mundial mientras el Colonia circundante quedaba devastado. Sigue siendo el monumento más visitado de Alemania.',prayer:'Señor, los Tres Magos vinieron de lejos buscándote y ofrecieron sus mejores dones. Que nosotros también te busquemos con la misma determinación y te ofrezcamos el don de nuestras vidas. Amén.',feast:'6 de enero (Epifanía)'}},

  // ===== AUSTRIA =====
  {id:801,country:'at',lat:47.772,lng:15.323,icon:'🏔️',name:'Mariazell Basilica',type:'Basilica',city:'Mariazell',province:'Styria',description:'The most important pilgrimage destination in Central Europe, drawing pilgrims from Austria, Hungary, Czech Republic, Slovakia and beyond. Home to the miraculous statue of the Madonna of Mariazell.',history:'Founded in 1157 when Benedictine monk Magnus placed a linden wood statue of the Madonna on a rock. The basilica was rebuilt in Baroque style in the 17th century. Fourteen Habsburg emperors visited.',prayer:'Mother of Mercy, Gate of Heaven, help of those who call upon you, we come to lay our needs before your throne. Take them to the heart of your Son Jesus. Amen.',feast:'September 8',es:{name:'Basílica de Mariazell',type:'Basílica',city:'Mariazell',province:'Estiria',description:'El destino de peregrinación más importante de Europa Central, que atrae peregrinos de Austria, Hungría, República Checa, Eslovaquia y más allá. Hogar de la milagrosa imagen de la Madonna de Mariazell.',history:'Fundada en 1157 cuando el monje benedictino Magnus colocó una estatua de madera de tilo de la Madonna sobre una roca. La basílica fue reconstruida en estilo barroco en el siglo XVII. Catorce emperadores habsburgo la visitaron.',prayer:'Madre de Misericordia, Puerta del Cielo, auxilio de quienes te invocan, venimos a depositar nuestras necesidades ante tu trono. Llévalas al corazón de tu Hijo Jesús. Amén.',feast:'8 de septiembre'}},
  {id:802,country:'at',lat:48.208,lng:16.373,icon:'🎵',name:'Saint Stephen\'s Cathedral',type:'Cathedral',city:'Vienna',province:'Vienna',description:'The mother church of the Archdiocese of Vienna and one of Europe\'s greatest Gothic cathedrals. The multicoloured tile roof and soaring South Tower are symbols of Vienna.',history:'Built between 1137 and 1511. The famous Pummerin bell was recast from Ottoman cannons captured at the 1683 Battle of Vienna. Mozart\'s funeral was held here. The Habsburg catacombs lie beneath.',prayer:'Lord, in this cathedral where emperors prayed and saints were honoured, may we too find you present in the beauty of your house. Amen.',feast:'August 15 (Assumption — Cathedral dedication)',es:{name:'Catedral de San Esteban',type:'Catedral',city:'Viena',province:'Viena',description:'La iglesia madre de la Archidiócesis de Viena y una de las mayores catedrales góticas de Europa. El tejado de tejas multicolores y la imponente Torre Sur son símbolos de Viena.',history:'Construida entre 1137 y 1511. La famosa campana Pummerin fue refundida con cañones otomanos capturados en la batalla de Viena de 1683. El funeral de Mozart se celebró aquí. Las catacumbas de los Habsburgo se encuentran debajo.',prayer:'Señor, en esta catedral donde rezaron emperadores y se honró a los santos, que nosotros también te encontremos presente en la belleza de tu templo. Amén.',feast:'15 de agosto (Asunción — dedicación)'}},
  {id:803,country:'at',lat:47.803,lng:13.045,icon:'✝️',name:'Nonnberg Abbey',type:'Abbey',city:'Salzburg',province:'Salzburg',description:'The oldest convent in the German-speaking world, founded around 714 AD by Saint Rupert. It overlooks Salzburg from its rocky perch and was immortalised in The Sound of Music.',history:'Founded by Saint Rupert and his niece Saint Erentrudis, the first abbess. The Romanesque church dates from the 12th century. The convent has been continuously inhabited by Benedictine nuns for over 1,300 years.',prayer:'Lord, in this place consecrated to your praise for over thirteen centuries, may the prayers of the nuns of Nonnberg rise with ours to you as a sweet fragrance. Amen.',feast:'June 30 (Saint Erentrudis)',es:{name:'Abadía de Nonnberg',type:'Abadía',city:'Salzburgo',province:'Salzburgo',description:'El convento más antiguo del mundo de habla alemana, fundado hacia el año 714 d.C. por San Ruperto. Domina Salzburgo desde su emplazamiento rocoso y fue inmortalizado en Sonrisas y lágrimas.',history:'Fundada por San Ruperto y su sobrina Santa Erentruda, la primera abadesa. La iglesia románica data del siglo XII. El convento ha sido habitado de forma continua por monjas benedictinas durante más de 1.300 años.',prayer:'Señor, en este lugar consagrado a tu alabanza durante más de trece siglos, que las oraciones de las monjas de Nonnberg se unan a las nuestras hacia ti como suave fragancia. Amén.',feast:'30 de junio (Santa Erentruda)'}},
  {id:804,country:'at',lat:47.279,lng:11.393,icon:'⛰️',name:'Wilten Basilica',type:'Basilica',city:'Innsbruck',province:'Tyrol',description:'A stunning yellow Baroque basilica in the Tyrolian capital, housing a revered 14th-century statue of Our Lady known as the Patroness of Tyrol, Magna Mater Austriae.',history:'The basilica was built between 1751 and 1756. The statue of Our Lady was already venerated in the 14th century. Emperor Franz Joseph visited in 1883 and elevated it to the status of basilica.',prayer:'Our Lady, Great Mother of Austria, under your mantle this Alpine land has sheltered for centuries. Continue to watch over us and our families. Amen.',feast:'September 8',es:{name:'Basílica de Wilten',type:'Basílica',city:'Innsbruck',province:'Tirol',description:'Una impresionante basílica barroca amarilla en la capital tirolesa, que alberga una venerada estatua del siglo XIV de Nuestra Señora, conocida como la Patrona del Tirol, Magna Mater Austriae.',history:'La basílica fue construida entre 1751 y 1756. La estatua de Nuestra Señora ya era venerada en el siglo XIV. El emperador Francisco José la visitó en 1883 y la elevó al rango de basílica.',prayer:'Nuestra Señora, Gran Madre de Austria, bajo tu manto esta tierra alpina ha encontrado cobijo durante siglos. Continúa velando por nosotros y nuestras familias. Amén.',feast:'8 de septiembre'}},
  {id:805,country:'at',lat:48.361,lng:14.513,icon:'📿',name:'Kremsmünster Abbey',type:'Abbey',city:'Kremsmünster',province:'Upper Austria',description:'One of Austria\'s oldest and most magnificent Benedictine abbeys, founded in 777 AD by Duke Tassilo III. Its fish ponds, observatory and library make it a remarkable cultural and spiritual landmark.',history:'Founded as a memorial to Duke Tassilo\'s son killed in a hunting accident. The abbey has operated continuously for over 1,200 years and houses the Tassilo Chalice, one of the finest pieces of early medieval art.',prayer:'Lord, like Duke Tassilo who gave his grief to God, may we too transform our sorrows into offerings of love and build something lasting for your glory. Amen.',feast:'October 11 (Saint Gunther)',es:{name:'Abadía de Kremsmünster',type:'Abadía',city:'Kremsmünster',province:'Alta Austria',description:'Una de las abadías benedictinas más antiguas y magníficas de Austria, fundada en el año 777 d.C. por el duque Tasilo III. Sus estanques de peces, observatorio y biblioteca la convierten en un notable hito cultural y espiritual.',history:'Fundada en memoria del hijo del duque Tasilo, muerto en una cacería. La abadía ha funcionado de forma continua durante más de 1.200 años y alberga el Cáliz de Tasilo, una de las mejores piezas del arte medieval temprano.',prayer:'Señor, como el duque Tasilo que entregó su dolor a Dios, que nosotros también transformemos nuestros sufrimientos en ofrendas de amor y construyamos algo duradero para tu gloria. Amén.',feast:'11 de octubre (San Günther)'}},

  // ===== CROATIA =====
  {id:901,country:'hr',lat:43.194,lng:17.677,icon:'🌟',name:'Shrine of Our Lady of Medjugorje',type:'Marian shrine',city:'Međugorje',province:'Herzegovina',description:'One of the most visited pilgrimage sites in the world, where six visionaries have reported apparitions of the Virgin Mary since 1981. Millions of pilgrims come each year seeking peace and conversion.',history:'The first apparition occurred on June 24, 1981. The messages emphasise prayer, fasting, conversion, peace and faith. The Church is still investigating the apparitions. An estimated 40 million pilgrims have visited.',prayer:'Our Lady of Medjugorje, Queen of Peace, you call us to prayer, fasting and conversion. Help us to respond to your messages and become apostles of your peace. Amen.',feast:'June 25 (Anniversary of the apparitions)',es:{name:'Santuario de Nuestra Señora de Medjugorje',type:'Santuario mariano',city:'Medjugorje',province:'Herzegovina',description:'Uno de los lugares de peregrinación más visitados del mundo, donde seis videntes han relatado apariciones de la Virgen María desde 1981. Millones de peregrinos acuden cada año buscando paz y conversión.',history:'La primera aparición ocurrió el 24 de junio de 1981. Los mensajes enfatizan la oración, el ayuno, la conversión, la paz y la fe. La Iglesia sigue investigando las apariciones. Se estima que 40 millones de peregrinos han visitado el lugar.',prayer:'Nuestra Señora de Medjugorje, Reina de la Paz, nos llamas a la oración, el ayuno y la conversión. Ayúdanos a responder a tus mensajes y a convertirnos en apóstoles de tu paz. Amén.',feast:'25 de junio (Aniversario de las apariciones)'}},
  {id:902,country:'hr',lat:43.508,lng:16.440,icon:'⛪',name:'Cathedral of Saint Domnius',type:'Cathedral',city:'Split',province:'Dalmatia',description:'The world\'s oldest cathedral in continuous use, converted from the mausoleum of Roman Emperor Diocletian — the very emperor who persecuted Saint Domnius, whose relics it now houses.',history:'Built as Diocletian\'s mausoleum in the 4th century, it was converted to a Christian cathedral in the 7th century. The ancient columns and peristyle of the original Roman palace still surround it.',prayer:'Saint Domnius, martyr of Salona, whose relics rest in the tomb of the very emperor who condemned you — a remarkable reversal! Help us to trust in God\'s ultimate victory. Amen.',feast:'May 7 (Saint Domnius)',es:{name:'Catedral de San Doymo',type:'Catedral',city:'Split',province:'Dalmacia',description:'La catedral del mundo en uso continuo más antigua, convertida del mausoleo del emperador romano Diocleciano, el mismo que persiguió a San Doymo, cuyas reliquias alberga ahora.',history:'Construida como mausoleo de Diocleciano en el siglo IV, fue convertida en catedral cristiana en el siglo VII. Las antiguas columnas y el peristilo del palacio romano original aún la rodean.',prayer:'San Doymo, mártir de Salona, cuyas reliquias reposan en la tumba del mismo emperador que te condenó, ¡una notable inversión! Ayúdanos a confiar en la victoria final de Dios. Amén.',feast:'7 de mayo (San Doymo)'}},
  {id:903,country:'hr',lat:45.814,lng:15.977,icon:'🏛️',name:'Zagreb Cathedral',type:'Cathedral',city:'Zagreb',province:'Zagreb',description:'The tallest building in Croatia and the most monumental building of Gothic style in southeastern Europe. It dominates the Zagreb skyline with its twin neo-Gothic spires.',history:'The first cathedral was consecrated in 1217. Destroyed by the Mongols in 1242 and rebuilt. The current neo-Gothic appearance results from extensive rebuilding after the 1880 earthquake. It houses the tomb of Cardinal Alojzije Stepinac.',prayer:'Blessed Cardinal Stepinac, you defended human dignity and the rights of your people at the cost of your freedom. Pray for Croatia and all those who suffer for justice. Amen.',feast:'February 10 (Blessed Alojzije Stepinac)',es:{name:'Catedral de Zagreb',type:'Catedral',city:'Zagreb',province:'Zagreb',description:'El edificio más alto de Croacia y el más monumental en estilo gótico del sureste de Europa. Domina el horizonte de Zagreb con sus dos agujas neogóticas.',history:'La primera catedral fue consagrada en 1217. Destruida por los mongoles en 1242 y reconstruida. El aspecto neogótico actual es el resultado de una amplia reconstrucción tras el terremoto de 1880. Alberga la tumba del cardenal Alojzije Stepinac.',prayer:'Beato cardenal Stepinac, defendiste la dignidad humana y los derechos de tu pueblo al precio de tu libertad. Ruega por Croacia y por todos los que sufren por la justicia. Amén.',feast:'10 de febrero (Beato Alojzije Stepinac)'}},
  {id:904,country:'hr',lat:45.327,lng:14.442,icon:'🌊',name:'Sanctuary of Our Lady of Trsat',type:'Sanctuary',city:'Rijeka',province:'Primorje',description:'Perched on a cliff above Rijeka, Trsat is one of the oldest and most visited Marian shrines in Croatia. Legend holds that the Holy House of Nazareth stopped here on its way to Loreto.',history:'The shrine dates to the 13th century. A 13th-century chapel was built by Prince Nicholas Frankopan after miraculous cures were reported. The current church was rebuilt in Baroque style. A monumental staircase of 561 steps leads up to it.',prayer:'Our Lady of Trsat, who rested on this cliff above the sea, give rest to our hearts too. Be our companion on every journey and bring us safely home. Amen.',feast:'May 10 (Our Lady of Trsat)',es:{name:'Santuario de Nuestra Señora de Trsat',type:'Santuario',city:'Rijeka',province:'Primorje',description:'Enclavado en un acantilado sobre Rijeka, Trsat es uno de los santuarios marianos más antiguos y visitados de Croacia. La leyenda cuenta que la Santa Casa de Nazaret se detuvo aquí de camino a Loreto.',history:'El santuario data del siglo XIII. El príncipe Nicolás Frankopan construyó una capilla del siglo XIII tras relatarse curaciones milagrosas. La actual iglesia fue reconstruida en estilo barroco. Una escalinata monumental de 561 escalones sube hasta ella.',prayer:'Nuestra Señora de Trsat, que reposaste en este acantilado sobre el mar, da también descanso a nuestros corazones. Sé nuestra compañera en cada viaje y llévanos sanos a casa. Amén.',feast:'10 de mayo (Nuestra Señora de Trsat)'}},
  {id:905,country:'hr',lat:43.509,lng:17.000,icon:'💒',name:'Cathedral of Saint James',type:'Cathedral',city:'Šibenik',province:'Dalmatia',description:'A UNESCO World Heritage Site and one of the most significant architectural monuments of the Renaissance period. Built entirely of stone without any brick or wood, a remarkable engineering achievement.',history:'Construction spanned 105 years (1431–1536). Three architects oversaw the building. The innovative all-stone construction technique developed here influenced architecture across the Mediterranean.',prayer:'Saint James, patron of pilgrims, may your cathedral inspire us with the perseverance of its builders, who worked across generations for the glory of God. Amen.',feast:'July 25 (Saint James)',es:{name:'Catedral de Santiago',type:'Catedral',city:'Šibenik',province:'Dalmacia',description:'Patrimonio de la Humanidad de la UNESCO y uno de los monumentos arquitectónicos más significativos del período renacentista. Construida íntegramente en piedra, sin ladrillo ni madera, un notable logro de ingeniería.',history:'La construcción se prolongó 105 años (1431-1536). Tres arquitectos supervisaron las obras. La innovadora técnica de construcción en piedra desarrollada aquí influyó en la arquitectura de todo el Mediterráneo.',prayer:'Santiago apóstol, patrón de los peregrinos, que tu catedral nos inspire con la perseverancia de sus constructores, que trabajaron a lo largo de generaciones para la gloria de Dios. Amén.',feast:'25 de julio (Santiago Apóstol)'}},

  // ===== MEXICO =====
  {id:1001,country:'mx',lat:19.4846,lng:-99.1177,icon:'🌹',name:'Basilica of Our Lady of Guadalupe',type:'Marian shrine',city:'Mexico City',province:'Mexico City',description:'The most visited Catholic pilgrimage site in the world after the Vatican, receiving over 20 million pilgrims a year. Home to the miraculous tilma of Juan Diego, imprinted with the image of Our Lady.',history:'The Virgin Mary appeared to the indigenous Juan Diego in 1531 on Tepeyac Hill. The image of Our Lady miraculously appeared on his cloak. The current modern basilica was built in 1974 next to the original church. Juan Diego was canonised by Pope John Paul II in 2002.',prayer:'Our Lady of Guadalupe, Mother of all the Americas, you appeared to the humble Juan Diego and left us your image as a sign of your love. Protect your people and draw all hearts to your Son Jesus. Amen.',feast:'December 12',es:{name:'Basílica de Nuestra Señora de Guadalupe',type:'Santuario mariano',city:'Ciudad de México',province:'Ciudad de México',description:'El lugar de peregrinación católica más visitado del mundo después del Vaticano, con más de 20 millones de peregrinos al año. Alberga la milagrosa tilma de Juan Diego, con la imagen de Nuestra Señora impresa en ella.',history:'La Virgen María se apareció al indígena Juan Diego en 1531 en el Cerro del Tepeyac. La imagen de Nuestra Señora apareció milagrosamente en su manto. La moderna basílica actual fue construida en 1974 junto a la iglesia original. Juan Diego fue canonizado por el Papa Juan Pablo II en 2002.',prayer:'Nuestra Señora de Guadalupe, Madre de todas las Américas, te apareciste al humilde Juan Diego y nos dejaste tu imagen como signo de tu amor. Protege a tu pueblo y acerca todos los corazones a tu Hijo Jesús. Amén.',feast:'12 de diciembre'}},
  {id:1002,country:'mx',lat:21.0036,lng:-102.3244,icon:'⭐',name:'Sanctuary of Our Lady of San Juan de los Lagos',type:'Marian shrine',city:'San Juan de los Lagos',province:'Jalisco',description:'One of the most important Marian shrines in Mexico, receiving over 8 million pilgrims a year. The small ceramic image of the Immaculate Conception has been venerated here since the 17th century.',history:'The image was brought by Franciscan missionaries in 1542. In 1623 a miraculous healing was attributed to it and devotion spread rapidly. The current neo-classical basilica dates from the 18th century. It is the second most visited shrine in Mexico.',prayer:'Our Lady of San Juan de los Lagos, you have heard the prayers of millions of pilgrims who cross deserts and mountains to reach you. Hear our prayer too and bring us closer to your Son. Amen.',feast:'February 2 (Candlemas)',es:{name:'Santuario de Nuestra Señora de San Juan de los Lagos',type:'Santuario mariano',city:'San Juan de los Lagos',province:'Jalisco',description:'Uno de los santuarios marianos más importantes de México, con más de 8 millones de peregrinos al año. La pequeña imagen de cerámica de la Inmaculada Concepción es venerada aquí desde el siglo XVII.',history:'La imagen fue traída por misioneros franciscanos en 1542. En 1623 se le atribuyó una curación milagrosa y la devoción se extendió rápidamente. La actual basílica neoclásica data del siglo XVIII. Es el segundo santuario más visitado de México.',prayer:'Nuestra Señora de San Juan de los Lagos, has escuchado las oraciones de millones de peregrinos que cruzan desiertos y montañas para llegar a ti. Escucha también la nuestra y acércanos a tu Hijo. Amén.',feast:'2 de febrero (Candelaria)'}},
  {id:1003,country:'mx',lat:19.2926,lng:-98.2175,icon:'🕯️',name:'Sanctuary of the Lord of Chalma',type:'Sanctuary',city:'Chalma',province:'State of Mexico',description:'The second most visited pilgrimage site in Mexico after Guadalupe. The miraculous image of the Lord of Chalma, a dark-skinned Christ crucified, attracts millions who walk for days to reach it.',history:'An image of Christ appeared miraculously in a cave in 1537, replacing a pre-Hispanic idol. The cave became a chapel, then a church, and today an Augustinian monastery surrounds it. Pilgrims traditionally arrive wearing flower crowns.',prayer:'Lord of Chalma, you appeared in the darkness of a cave to bring light to your people. In the darkest moments of our lives, be our light and our strength. Amen.',feast:'First Sunday of January',es:{name:'Santuario del Señor de Chalma',type:'Santuario',city:'Chalma',province:'Estado de México',description:'El segundo lugar de peregrinación más visitado de México después de Guadalupe. La milagrosa imagen del Señor de Chalma, un Cristo crucificado de tez oscura, atrae a millones que caminan días para llegar.',history:'Una imagen de Cristo apareció milagrosamente en una cueva en 1537, reemplazando a un ídolo prehispánico. La cueva se convirtió en capilla, luego en iglesia, y hoy un monasterio agustino la rodea. Los peregrinos llegan tradicionalmente con coronas de flores.',prayer:'Señor de Chalma, te apareciste en la oscuridad de una cueva para traer luz a tu pueblo. En los momentos más oscuros de nuestra vida, sé nuestra luz y nuestra fortaleza. Amén.',feast:'Primer domingo de enero'}},
  {id:1004,country:'mx',lat:19.7074,lng:-98.9829,icon:'🌺',name:'Sanctuary of Our Lady of Ocotlán',type:'Marian shrine',city:'Tlaxcala',province:'Tlaxcala',description:'One of Mexico\'s most beautiful Baroque sanctuaries, built on the site where the Virgin appeared to Juan Diego Bernardino in 1541 during a smallpox epidemic. The elaborate white Churrigueresque facade is extraordinary.',history:'The apparition occurred just ten years after Guadalupe. Our Lady led the indigenous man to a spring of healing water during the smallpox plague. The current church was built over two centuries and is considered the finest example of Mexican Baroque architecture.',prayer:'Our Lady of Ocotlán, you brought healing to the sick and hope to the despairing. May your spring of living water refresh our souls and bring us closer to the source of all life. Amen.',feast:'Third Monday of May',es:{name:'Santuario de Nuestra Señora de Ocotlán',type:'Santuario mariano',city:'Tlaxcala',province:'Tlaxcala',description:'Uno de los santuarios barrocos más hermosos de México, construido en el lugar donde la Virgen se apareció a Juan Diego Bernardino en 1541 durante una epidemia de viruela. La elaborada fachada churrigueresca blanca es extraordinaria.',history:'La aparición ocurrió apenas diez años después de Guadalupe. Nuestra Señora condujo al indígena hacia un manantial de agua curativa durante la plaga de viruela. La iglesia actual fue construida a lo largo de dos siglos y es considerada el mejor ejemplo de arquitectura barroca mexicana.',prayer:'Nuestra Señora de Ocotlán, trajiste curación a los enfermos y esperanza a los desesperados. Que tu manantial de agua viva refresque nuestras almas y nos acerque a la fuente de toda vida. Amén.',feast:'Tercer lunes de mayo'}},
  {id:1005,country:'mx',lat:20.9670,lng:-89.6237,icon:'🏛️',name:'Cathedral of Mérida',type:'Cathedral',city:'Mérida',province:'Yucatán',description:'The oldest cathedral on the American mainland, begun in 1561. Built with stones from Maya temples, it stands as a symbol of the encounter between two civilisations and the deep roots of Mexican Catholicism.',history:'Construction began in 1561 and was completed in 1598, making it the oldest functioning cathedral in the Americas. It was built partly with stones from the Maya pyramid at T\'hó. It houses the Cristo de las Ampollas, a miraculous image carved from a tree struck by lightning.',prayer:'Lord, in this cathedral built from the stones of ancient temples, may all peoples find unity in you. You are the God of every nation and every culture. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Catedral de Mérida',type:'Catedral',city:'Mérida',province:'Yucatán',description:'La catedral más antigua del continente americano, iniciada en 1561. Construida con piedras de templos mayas, es símbolo del encuentro entre dos civilizaciones y de las profundas raíces del catolicismo mexicano.',history:'La construcción comenzó en 1561 y se completó en 1598, convirtiéndola en la catedral en funcionamiento más antigua de América. Se construyó en parte con piedras de la pirámide maya de T\'hó. Alberga el Cristo de las Ampollas, una imagen milagrosa tallada en un árbol alcanzado por un rayo.',prayer:'Señor, en esta catedral construida con las piedras de los antiguos templos, que todos los pueblos encuentren en ti su unidad. Eres el Dios de cada nación y cada cultura. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'}},

  // ===== BRAZIL =====
  {id:1101,country:'br',lat:-22.9588,lng:-45.3828,icon:'👑',name:'Basilica of Our Lady of Aparecida',type:'Basilica',city:'Aparecida',province:'São Paulo',description:'The patroness of Brazil and one of the largest Catholic basilicas in the world. The small terracotta image of Our Lady found by fishermen in 1717 draws 12 million pilgrims a year.',history:'Three fishermen found a broken image of Our Lady in the Paraíba River in 1717. The image was declared patroness of Brazil by Pope Pius XI in 1930. Pope John Paul II crowned the image and Pope Francis visited in 2013 for World Youth Day.',prayer:'Our Lady of Aparecida, Patroness of Brazil, you were found broken in the waters of a river and became a source of hope for an entire nation. Mend what is broken in our lives and make us whole in God\'s love. Amen.',feast:'October 12 (Patroness of Brazil)',es:{name:'Basílica de Nuestra Señora de Aparecida',type:'Basílica',city:'Aparecida',province:'São Paulo',description:'La patrona de Brasil y una de las basílicas católicas más grandes del mundo. La pequeña imagen de terracota de Nuestra Señora encontrada por pescadores en 1717 atrae a 12 millones de peregrinos al año.',history:'Tres pescadores encontraron una imagen rota de Nuestra Señora en el río Paraíba en 1717. La imagen fue declarada patrona de Brasil por el Papa Pío XI en 1930. El Papa Juan Pablo II coronó la imagen y el Papa Francisco la visitó en 2013 para la Jornada Mundial de la Juventud.',prayer:'Nuestra Señora de Aparecida, Patrona de Brasil, fuiste encontrada rota en las aguas de un río y te convertiste en fuente de esperanza para toda una nación. Repara lo que está roto en nuestras vidas y hazlos íntegros en el amor de Dios. Amén.',feast:'12 de octubre (Patrona de Brasil)'}},
  {id:1102,country:'br',lat:-1.4554,lng:-48.4898,icon:'🕊️',name:'Basilica of Our Lady of Nazareth',type:'Basilica',city:'Belém',province:'Pará',description:'Home to the famous Círio de Nazaré, the largest Catholic procession in the world with over 2 million participants. The small image of Our Lady of Nazareth has been venerated in Belém since the 18th century.',history:'The image was found in the jungle in 1700. Each October, Belém celebrates the Círio de Nazaré, a massive procession through the city that has taken place for over 225 years. It is listed as UNESCO Intangible Cultural Heritage.',prayer:'Our Lady of Nazareth, carried in procession by millions of hands, may you be carried above all in our hearts. Guide us through the forests of life to the clearing of your Son\'s peace. Amen.',feast:'Second Sunday of October (Círio de Nazaré)',es:{name:'Basílica de Nuestra Señora de Nazaré',type:'Basílica',city:'Belém',province:'Pará',description:'Sede del famoso Círio de Nazaré, la procesión católica más grande del mundo con más de 2 millones de participantes. La pequeña imagen de Nuestra Señora de Nazaré es venerada en Belém desde el siglo XVIII.',history:'La imagen fue encontrada en la selva en 1700. Cada octubre, Belém celebra el Círio de Nazaré, una masiva procesión por la ciudad que lleva más de 225 años realizándose. Está declarada Patrimonio Cultural Inmaterial de la UNESCO.',prayer:'Nuestra Señora de Nazaré, llevada en procesión por millones de manos, que seas llevada sobre todo en nuestros corazones. Guíanos a través de los bosques de la vida hasta el claro de la paz de tu Hijo. Amén.',feast:'Segundo domingo de octubre (Círio de Nazaré)'}},
  {id:1103,country:'br',lat:-12.9714,lng:-38.5014,icon:'⛪',name:'Cathedral Basilica of Salvador',type:'Cathedral',city:'Salvador',province:'Bahia',description:'The oldest Catholic cathedral in Brazil, built by the Jesuits in the 17th century. Salvador was the first capital of colonial Brazil and remains the heart of Afro-Brazilian Catholic devotion.',history:'Built between 1657 and 1672, the cathedral was originally the Jesuit College church. It has an extraordinary gilded interior with Portuguese azulejos tiles. Salvador hosts the most vibrant Catholic popular festivals in Brazil, blending African and European traditions.',prayer:'Lord, in this city where so many peoples met — European, African, indigenous — may your Church be a home for all. Make us one in the diversity of your gifts. Amen.',feast:'November 1 (All Saints)',es:{name:'Catedral Basílica de Salvador',type:'Catedral',city:'Salvador',province:'Bahía',description:'La catedral católica más antigua de Brasil, construida por los jesuitas en el siglo XVII. Salvador fue la primera capital del Brasil colonial y sigue siendo el corazón de la devoción católica afrobrasileña.',history:'Construida entre 1657 y 1672, la catedral fue originalmente la iglesia del Colegio Jesuita. Tiene un extraordinario interior dorado con azulejos portugueses. Salvador acoge los festivales católicos populares más vibrantes de Brasil, mezclando tradiciones africanas y europeas.',prayer:'Señor, en esta ciudad donde se encontraron tantos pueblos — europeos, africanos, indígenas — que tu Iglesia sea un hogar para todos. Haznos uno en la diversidad de tus dones. Amén.',feast:'1 de noviembre (Todos los Santos)'}},
  {id:1104,country:'br',lat:-15.7942,lng:-47.8825,icon:'✝️',name:'Sanctuary of Dom Bosco',type:'Sanctuary',city:'Brasília',province:'Federal District',description:'Built in 1963 in the newly created capital of Brazil, this iconic sanctuary is famous for its extraordinary blue stained glass windows that bathe the interior in a supernatural light.',history:'Don Bosco, the Italian saint, reportedly had a vision in 1883 of a great civilisation arising between the 15th and 20th parallels in South America. Brasília was built exactly in that region, and this sanctuary was built in his honour.',prayer:'Saint John Bosco, visionary and friend of young people, you dreamed of a great civilisation of peace and justice. May Brazil fulfil the dream God gave you and may its young people build a world of faith. Amen.',feast:'January 31 (Saint John Bosco)',es:{name:'Santuario Dom Bosco',type:'Santuario',city:'Brasilia',province:'Distrito Federal',description:'Construido en 1963 en la recién creada capital de Brasil, este icónico santuario es famoso por sus extraordinarias vidrieras azules que bañan el interior en una luz sobrenatural.',history:'Don Bosco, el santo italiano, tuvo supuestamente una visión en 1883 de una gran civilización que surgiría entre los paralelos 15 y 20 en América del Sur. Brasilia fue construida exactamente en esa región, y este santuario fue construido en su honor.',prayer:'San Juan Bosco, visionario y amigo de los jóvenes, soñaste con una gran civilización de paz y justicia. Que Brasil cumpla el sueño que Dios te dio y que sus jóvenes construyan un mundo de fe. Amén.',feast:'31 de enero (San Juan Bosco)'}},

  // ===== ARGENTINA =====
  {id:1201,country:'ar',lat:-34.5658,lng:-59.1072,icon:'🌟',name:'Basilica of Our Lady of Luján',type:'Basilica',city:'Luján',province:'Buenos Aires',description:'The patroness of Argentina, Uruguay and Paraguay. The small terracotta image of Our Lady refused to move from Luján in 1630 and has been venerated there ever since. The Gothic basilica receives 7 million pilgrims a year.',history:'According to tradition, an ox cart carrying the image stopped and could not be moved until the image was left behind. A chapel was built, then successive churches, and finally the current neo-Gothic basilica completed in 1937. Pope John Paul II prayed here in 1982.',prayer:'Our Lady of Luján, Patroness of the Southern Cone, you chose to stay among your people and have never abandoned them. Stay with us too, especially in times of crisis and uncertainty. Amen.',feast:'May 8 (Our Lady of Luján)',es:{name:'Basílica de Nuestra Señora de Luján',type:'Basílica',city:'Luján',province:'Buenos Aires',description:'La patrona de Argentina, Uruguay y Paraguay. La pequeña imagen de terracota de Nuestra Señora se negó a moverse de Luján en 1630 y ha sido venerada allí desde entonces. La basílica gótica recibe 7 millones de peregrinos al año.',history:'Según la tradición, una carreta de bueyes que transportaba la imagen se detuvo y no pudo moverse hasta que la imagen fue dejada allí. Se construyó una capilla, luego sucesivas iglesias, y finalmente la actual basílica neogótica completada en 1937. El Papa Juan Pablo II rezó aquí en 1982.',prayer:'Nuestra Señora de Luján, Patrona del Cono Sur, elegiste quedarte entre tu pueblo y nunca lo has abandonado. Quédate con nosotros también, especialmente en tiempos de crisis e incertidumbre. Amén.',feast:'8 de mayo (Nuestra Señora de Luján)'}},
  {id:1202,country:'ar',lat:-27.4854,lng:-58.8341,icon:'💎',name:'Basilica of Our Lady of Itatí',type:'Basilica',city:'Itatí',province:'Corrientes',description:'One of Argentina\'s most important Marian shrines, home to the crowned image of Our Lady of Itatí venerated by the Guaraní people since the 17th century. The basilica dominates the banks of the Paraná River.',history:'The devotion began among the indigenous Guaraní in 1615. Our Lady of Itatí was crowned by Pope Leo XIII in 1900. The current basilica was completed in 1950. Thousands of pilgrims arrive by boat along the Paraná River, a unique pilgrimage tradition.',prayer:'Our Lady of Itatí, beloved of the Guaraní people, you have watched over this river land for four centuries. May your protection extend to all who live on the margins, forgotten by the world but remembered by God. Amen.',feast:'July 9 (Our Lady of Itatí)',es:{name:'Basílica de Nuestra Señora de Itatí',type:'Basílica',city:'Itatí',province:'Corrientes',description:'Uno de los santuarios marianos más importantes de Argentina, sede de la imagen coronada de Nuestra Señora de Itatí venerada por el pueblo guaraní desde el siglo XVII. La basílica domina las orillas del río Paraná.',history:'La devoción comenzó entre los indígenas guaraníes en 1615. Nuestra Señora de Itatí fue coronada por el Papa León XIII en 1900. La basílica actual se completó en 1950. Miles de peregrinos llegan en barco por el río Paraná, una tradición de peregrinación única.',prayer:'Nuestra Señora de Itatí, amada del pueblo guaraní, has velado por estas tierras fluviales durante cuatro siglos. Que tu protección se extienda a todos los que viven en los márgenes, olvidados por el mundo pero recordados por Dios. Amén.',feast:'9 de julio (Nuestra Señora de Itatí)'}},
  {id:1203,country:'ar',lat:-31.4167,lng:-64.1833,icon:'🏔️',name:'Cathedral of Córdoba',type:'Cathedral',city:'Córdoba',province:'Córdoba',description:'The oldest functioning cathedral in Argentina, begun in 1577. A masterpiece of colonial Baroque architecture at the heart of one of Latin America\'s oldest university cities.',history:'Construction began in 1577 and continued for over 150 years. The cathedral has witnessed the entire history of Argentina, from colonial times through independence and the modern era. The Jesuit Block of Córdoba, of which it is part, is a UNESCO World Heritage Site.',prayer:'Lord, this cathedral has stood for nearly 450 years, witnessing the joys and sorrows of a nation being born. May we too stand firm in faith, a sign of your enduring presence among your people. Amen.',feast:'August 15 (Assumption)',es:{name:'Catedral de Córdoba',type:'Catedral',city:'Córdoba',province:'Córdoba',description:'La catedral en funcionamiento más antigua de Argentina, iniciada en 1577. Una obra maestra de la arquitectura colonial barroca en el corazón de una de las ciudades universitarias más antiguas de América Latina.',history:'La construcción comenzó en 1577 y continuó durante más de 150 años. La catedral ha sido testigo de toda la historia de Argentina, desde la época colonial hasta la independencia y la era moderna. La Manzana Jesuítica de Córdoba, de la que forma parte, es Patrimonio de la Humanidad de la UNESCO.',prayer:'Señor, esta catedral lleva casi 450 años en pie, siendo testigo de las alegrías y tristezas de una nación que nacía. Que nosotros también nos mantengamos firmes en la fe, signo de tu presencia duradera entre tu pueblo. Amén.',feast:'15 de agosto (Asunción)'}},
  {id:1204,country:'ar',lat:-24.7827,lng:-65.4232,icon:'🌸',name:'Sanctuary of Our Lady of the Rosary of Río Blanco',type:'Marian shrine',city:'Salta',province:'Salta',description:'Home to the miraculous images of Christ and Our Lady of the Rosary, famous for their role in the Battle of Salta in 1813. The procession of the miracles held each September draws massive crowds.',history:'The images were donated to the city of Salta in 1592. When earthquake and epidemic struck in 1692, the images were carried in procession and the disasters ceased. The annual Procession of the Miracles commemorates this event and is one of the most impressive in South America.',prayer:'Our Lady of the Rosary of Salta, you brought peace to a city in crisis. Bring your peace to our hearts and our communities, that we may always trust in God\'s providence. Amen.',feast:'Second Sunday of September (Procession of the Miracles)',es:{name:'Santuario de Nuestra Señora del Rosario de Río Blanco',type:'Santuario mariano',city:'Salta',province:'Salta',description:'Sede de las milagrosas imágenes de Cristo y Nuestra Señora del Rosario, famosas por su papel en la Batalla de Salta en 1813. La procesión de los milagros que se celebra cada septiembre atrae multitudes.',history:'Las imágenes fueron donadas a la ciudad de Salta en 1592. Cuando un terremoto y una epidemia azotaron en 1692, las imágenes fueron llevadas en procesión y los desastres cesaron. La Procesión de los Milagros conmemora este evento y es una de las más impresionantes de América del Sur.',prayer:'Nuestra Señora del Rosario de Salta, trajiste paz a una ciudad en crisis. Trae tu paz a nuestros corazones y comunidades, para que siempre confiemos en la providencia de Dios. Amén.',feast:'Segundo domingo de septiembre (Procesión de los Milagros)'}},

  // ===== PERU =====
  {id:1301,country:'pe',lat:-12.0464,lng:-77.0428,icon:'🟣',name:'Church of Las Nazarenas',type:'Church',city:'Lima',province:'Lima',description:'Home of the Lord of Miracles, the most venerated image in Peru and perhaps the most popular in all of Latin America. The October procession draws over 2 million people in a sea of purple.',history:'The image was painted by an Angolan slave on a wall in the 17th century. When an earthquake destroyed all surrounding buildings in 1655, the wall remained intact. The October procession has been held continuously since 1687, making it one of the oldest in the Americas.',prayer:'Lord of Miracles, you stood firm when the earth shook and all around you fell. Teach us your strength. When our world trembles, may we remain standing, trusting in your power. Amen.',feast:'October 18 (Lord of Miracles)',es:{name:'Iglesia de Las Nazarenas',type:'Iglesia',city:'Lima',province:'Lima',description:'Sede del Señor de los Milagros, la imagen más venerada del Perú y quizás la más popular de toda América Latina. La procesión de octubre reúne a más de 2 millones de personas en un mar de morado.',history:'La imagen fue pintada por un esclavo angoleño en una pared en el siglo XVII. Cuando un terremoto destruyó todos los edificios circundantes en 1655, la pared permaneció intacta. La procesión de octubre se celebra ininterrumpidamente desde 1687, siendo una de las más antiguas de América.',prayer:'Señor de los Milagros, permaneciste firme cuando la tierra tembló y todo a tu alrededor cayó. Enséñanos tu fortaleza. Cuando nuestro mundo tiembla, que permanezcamos en pie, confiando en tu poder. Amén.',feast:'18 de octubre (Señor de los Milagros)'}},
  {id:1302,country:'pe',lat:-15.8402,lng:-70.0219,icon:'🌊',name:'Sanctuary of Our Lady of Copacabana',type:'Marian shrine',city:'Copacabana',province:'Puno',description:'Perched on the shores of Lake Titicaca, the highest navigable lake in the world, this sanctuary is a sacred pilgrimage site for Bolivia and Peru. The image of Our Lady was carved by the indigenous sculptor Francisco Tito Yupanqui in 1583.',history:'Francisco Tito Yupanqui, a descendant of the Inca, carved the image after the Virgin appeared to him. The image was canonically crowned in 1925. Pilgrims walk from as far as La Paz to reach this sanctuary on the shores of the sacred lake.',prayer:'Our Lady of Copacabana, enthroned above the sacred waters of Titicaca, bless the peoples of the altiplano and all pilgrims who climb to you. May the height of this place remind us of the heights to which God calls us. Amen.',feast:'August 5 (Our Lady of Copacabana)',es:{name:'Santuario de Nuestra Señora de Copacabana',type:'Santuario mariano',city:'Copacabana',province:'Puno',description:'Enclavado a orillas del lago Titicaca, el lago navegable más alto del mundo, este santuario es un lugar de peregrinación sagrado para Bolivia y Perú. La imagen de Nuestra Señora fue tallada por el escultor indígena Francisco Tito Yupanqui en 1583.',history:'Francisco Tito Yupanqui, descendiente del Inca, talló la imagen tras aparecérsele la Virgen. La imagen fue coronada canónicamente en 1925. Los peregrinos caminan desde tan lejos como La Paz para llegar a este santuario a orillas del lago sagrado.',prayer:'Nuestra Señora de Copacabana, entronizada sobre las sagradas aguas del Titicaca, bendice a los pueblos del altiplano y a todos los peregrinos que suben hasta ti. Que la altura de este lugar nos recuerde las alturas a las que Dios nos llama. Amén.',feast:'5 de agosto (Nuestra Señora de Copacabana)'}},
  {id:1303,country:'pe',lat:-13.5170,lng:-71.9785,icon:'🏔️',name:'Cathedral of Cusco',type:'Cathedral',city:'Cusco',province:'Cusco',description:'Built on the foundations of the palace of the Inca Viracocha, this Renaissance cathedral took nearly a century to complete. It is a powerful symbol of the encounter between Inca civilisation and Christianity.',history:'Construction began in 1559 on the site of the Inca palace. It was completed in 1654, housing the largest collection of colonial paintings in the Americas — the Cusco School. It contains a famous image of the Last Supper with guinea pig on the table, painted by the indigenous artist Marcos Zapata.',prayer:'Lord of Cusco, God of the Inca and God of the conquerors, you are God of all people. Teach us to honour every human dignity and to find you in every culture and tradition. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Catedral de Cusco',type:'Catedral',city:'Cusco',province:'Cusco',description:'Construida sobre los cimientos del palacio del inca Viracocha, esta catedral renacentista tardó casi un siglo en completarse. Es un poderoso símbolo del encuentro entre la civilización inca y el cristianismo.',history:'La construcción comenzó en 1559 sobre el emplazamiento del palacio inca. Se completó en 1654, albergando la mayor colección de pinturas coloniales de América — la Escuela Cusqueña. Contiene una famosa imagen de la Última Cena con cuy sobre la mesa, pintada por el artista indígena Marcos Zapata.',prayer:'Señor de Cusco, Dios de los incas y Dios de los conquistadores, eres el Dios de todos los pueblos. Enséñanos a honrar cada dignidad humana y a encontrarte en cada cultura y tradición. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'}},

// ===================== STATE =====================
let visits={}, isPremium=false, currentLang='en', currentScreen='map', currentCountry='be', map=null, markers={}, activeRouteFilter=null;

// ===================== FIREBASE =====================
window._loadUserData = async function(uid){
  try{
    const snap=await window._fbGetDoc(uid);
    if(snap.exists()){
      const d=snap.data();
      visits=d.visits||{};
      isPremium=d.isPremium||false;
      if(d.lang) currentLang=d.lang;
    }else{visits={};isPremium=false;}
  }catch(e){visits={};isPremium=false;}
  applyLang();
  refreshAll();
  if(map) updateMarkerStyles();
};

async function saveVisits(){
  try{
    if(window._currentUser) await window._fbSetDoc(window._currentUser.uid,{visits});
  }catch(e){}
}

async function setLang(lang){
  currentLang=lang;
  try{ if(window._currentUser) await window._fbSetDoc(window._currentUser.uid,{lang}); }catch(e){}
  applyLang();
  refreshAll();
  rebindMapPopups();
}

function applyLang(){
  document.getElementById('header-sub').textContent = t('appSubtitle');
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.textContent = t(el.dataset.nav);
  });
  // Update auth screen
  const tabLogin = document.getElementById('tab-login');
  const tabReg = document.getElementById('tab-register');
  const btnSubmit = document.getElementById('auth-submit');
  const emailEl = document.getElementById('auth-email');
  const passEl = document.getElementById('auth-password');
  if(tabLogin) tabLogin.textContent = t('signIn');
  if(tabReg) tabReg.textContent = t('register');
  if(btnSubmit) btnSubmit.textContent = currentAuthTab==='login'?t('signIn'):t('createAccount');
  if(emailEl) emailEl.placeholder = t('emailPlaceholder');
  if(passEl) passEl.placeholder = t('passwordPlaceholder');
}

// ===================== AUTH =====================
var currentAuthTab='login';
function switchAuthTab(tab){
  currentAuthTab=tab;
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('auth-submit').textContent=tab==='login'?'Sign in':'Create account';
  document.getElementById('auth-error').textContent='';
}
async function handleEmailAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-password').value;
  const errEl=document.getElementById('auth-error');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Please fill in all fields.';return;}
  try{
    if(currentAuthTab==='login') await window._fbSignInEmail(email,pass);
    else await window._fbCreateUser(email,pass);
  }catch(e){
    const msgs={'auth/user-not-found':'User not found.','auth/wrong-password':'Incorrect password.','auth/email-already-in-use':'This email is already registered.','auth/weak-password':'Password must be at least 6 characters.','auth/invalid-email':'Invalid email.','auth/invalid-credential':'Incorrect email or password.'};
    errEl.textContent=msgs[e.code]||'Sign in error. Please try again.';
  }
}

async function handleSignOut(){
  await window._fbSignOut();
  visits={};isPremium=false;
}

// ===================== VISITS =====================
function isVisited(id){return !!visits[id];}
function getVisitCount(){return Object.keys(visits).length;}
function isCountryUnlocked(cid){return countries.find(c=>c.id===cid)?.free||isPremium;}

function toggleVisit(id){
  const s=sanctuaries.find(x=>x.id===id);
  if(!isCountryUnlocked(s.country)){openPremiumModal();return;}
  if(visits[id]){delete visits[id];}
  else{visits[id]=new Date().toISOString().split('T')[0];showToast(t('visitToast')(sd(s).name));}
  saveVisits();refreshAll();updateMarkerStyles();
}

function getRank(){
  const c=getVisitCount();
  if(c>=50) return t('rank50');
  if(c>=30) return t('rank30');
  if(c>=15) return t('rank10');
  if(c>=5)  return t('rank5');
  if(c>=1)  return t('rank1');
  return t('rank0');
}

// ===================== NAVIGATION =====================
document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>switchScreen(btn.dataset.screen)));
function switchScreen(screen){
  currentScreen=screen;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`[data-screen="${screen}"]`).classList.add('active');
  if(screen==='map'&&map){
    setTimeout(()=>map.invalidateSize(),50);
  }
}

// ===================== MAP =====================
function createMarkerIcon(s,visited,highlight){
  const locked=!isCountryUnlocked(s.country);
  let cls='custom-marker';
  if(visited) cls+=' visited-marker';
  else if(locked) cls+=' locked-marker';
  if(highlight) cls+=' route-highlight-marker';
  const badge=visited?'<span class="visited-check">✓</span>':locked?'<span class="lock-badge">🔒</span>':'';
  return L.divIcon({className:'',html:`<div class="${cls}">${s.icon}${badge}</div>`,
    iconSize:visited?[42,42]:[32,32],iconAnchor:visited?[21,21]:[16,16],popupAnchor:[0,visited?-24:-18]});
}

function buildPopupContent(s){
  const d=sd(s), visited=isVisited(s.id), locked=!isCountryUnlocked(s.country);
  return `<div class="popup-body">
    <div class="popup-type">${d.type}</div>
    <div class="popup-name">${d.name}</div>
    <div class="popup-loc">📍 ${d.city}, ${d.province}</div>
    <div class="popup-desc">${d.description.substring(0,120)}...</div>
    ${locked
      ? `<button class="popup-locked" onclick="openPremiumModal();map.closePopup();">${t('lockBtn')}</button>`
      : `<button class="popup-btn ${visited?'visited':'visit'}" onclick="toggleVisit(${s.id});map.closePopup();">${visited?t('visited_btn'):'🥾 '+t('registerVisit')}</button>`}
    <button class="popup-btn detail" onclick="openModal(${s.id});map.closePopup();">${t('viewDetails')}</button>
    <a class="popup-maps-link" href="https://www.google.com/maps/search/${encodeURIComponent(d.name+' '+d.city)}/@${s.lat},${s.lng},17z" target="_blank">🗺️ ${t('howToGet')}</a>
  </div>`
}

function initMap(){
  map=L.map('map',{zoomControl:false,tap:false,tapTolerance:15}).setView([48,12],5);
  L.control.zoom({position:'topright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:18}).addTo(map);
  sanctuaries.forEach(s=>{
    const marker=L.marker([s.lat,s.lng],{icon:createMarkerIcon(s,false,false)}).addTo(map);
    markers[s.id]=marker;
    marker.bindPopup(buildPopupContent(s),{maxWidth:280,closeButton:true});
  });
}

function updateMarkerStyles(){
  sanctuaries.forEach(s=>{
    const visited=isVisited(s.id);
    const inRoute=!activeRouteFilter||activeRouteFilter.includes(s.id);
    const highlight=!!activeRouteFilter&&inRoute;
    markers[s.id].setIcon(createMarkerIcon(s,visited,highlight));
    markers[s.id].setOpacity(inRoute?1:0.25);
    markers[s.id].unbindPopup();
    markers[s.id].bindPopup(buildPopupContent(s),{maxWidth:280,closeButton:true});
  });
}

function showRouteOnMap(idx){
  const r=routes[idx];
  activeRouteFilter=r.stops;
  switchScreen('map');
  updateMarkerStyles();
  document.getElementById('map-route-name').textContent='🗺️ '+(r[currentLang]||r.en).name;
  document.getElementById('map-route-banner').style.display='flex';
}
function clearRouteFilter(){activeRouteFilter=null;updateMarkerStyles();document.getElementById('map-route-banner').style.display='none';}

function rebindMapPopups(){
  if(!map) return;
  sanctuaries.forEach(s=>{
    if(markers[s.id]){
      markers[s.id].unbindPopup();
      markers[s.id].bindPopup(buildPopupContent(s),{maxWidth:280,closeButton:true});
    }
  });
}

function focusCountry(cid){
  currentCountry=cid;
  const cs=sanctuaries.filter(s=>s.country===cid);
  if(cs.length&&map){
    const lats=cs.map(s=>s.lat),lngs=cs.map(s=>s.lng);
    map.fitBounds([[Math.min(...lats)-0.5,Math.min(...lngs)-0.5],[Math.max(...lats)+0.5,Math.max(...lngs)+0.5]]);
  }
  switchScreen('map');
}

function openModal(id){
  const s=sanctuaries.find(x=>x.id===id);if(!s)return;

  document.getElementById('modal-content').innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-hero" style="position:relative">${s.icon}<button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="modal-type">${d.type}</div>
      <div class="modal-title">${d.name}</div>
      <div class="modal-location">📍 ${d.city}, ${d.province} · 🎉 ${d.feast}</div>
      <div class="modal-section"><h3>📖 ${t('descLabel')}</h3><p>${d.description}</p></div>
      <div class="modal-section"><h3>🏛️ ${t('histLabel')}</h3><p>${d.history}</p></div>
      <div class="modal-section"><h3>🙏 ${t('prayerLabel')}</h3><div class="modal-prayer">${d.prayer}</div></div>

      <a class="modal-maps-btn" href="https://www.google.com/maps/search/${encodeURIComponent(d.name+' '+d.city)}/@${s.lat},${s.lng},17z" target="_blank">🗺️ ${t('howToGetFull')}</a>

function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

// ===================== TOAST =====================
let toastTimeout=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg;
  if(toastTimeout)clearTimeout(toastTimeout);
  t.classList.add('show');
  toastTimeout=setTimeout(()=>{t.classList.remove('show');toastTimeout=null;},3000);
}

// ===================== CERTIFICATE =====================
function generateCertificate(countryId){
  const country = countries.find(c => c.id === countryId);
  const cs = sanctuaries.filter(s => s.country === countryId);
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const W = 210, H = 297;
  const BURG  = [114, 47, 55];
  const GOLD  = [197, 150, 58];
  const GOLDL = [232, 201, 122];
  const CREAM = [253, 245, 230];
  const CREAMD= [240, 228, 210];
  const BROWN = [62, 39, 35];
  const BROWNL= [109, 76, 65];
  const WHITE = [255, 255, 255];

  // BACKGROUND
  doc.setFillColor(...CREAM);
  doc.rect(0, 0, W, H, 'F');

  // OUTER BURGUNDY FRAME
  doc.setFillColor(...BURG);
  doc.rect(0, 0, W, 10, 'F');
  doc.rect(0, H-10, W, 10, 'F');
  doc.rect(0, 0, 10, H, 'F');
  doc.rect(W-10, 0, 10, H, 'F');

  // GOLD CORNERS
  doc.setFillColor(...GOLD);
  [[0,0],[W-18,0],[0,H-18],[W-18,H-18]].forEach(([x,y])=>doc.rect(x,y,18,18,'F'));
  doc.setFillColor(...BURG);
  [[9,9],[W-9,9],[9,H-9],[W-9,H-9]].forEach(([cx,cy])=>doc.rect(cx-2,cy-2,4,4,'F'));

  // INNER GOLD BORDER
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.7);
  doc.rect(13, 13, W-26, H-26);

  // HEADER
  doc.setFillColor(...BURG);
  doc.rect(13, 13, W-26, 70, 'F');
  doc.setFillColor(...GOLD);
  doc.rect(13, 83, W-26, 2, 'F');

  // CROSS
  doc.setFillColor(...GOLD);
  doc.rect(W/2-2, 22, 4, 22, 'F');
  doc.rect(W/2-9, 30, 18, 4, 'F');

  // PEREGRIN
  doc.setFont('helvetica','bold');
  doc.setFontSize(26);
  doc.setTextColor(...WHITE);
  doc.text('PEREGRIN', W/2, 58, {align:'center'});
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(...GOLDL);
  doc.text(currentLang==='es'?'EL PASAPORTE DIGITAL DEL PEREGRINO CAT\u00d3LICO':'THE DIGITAL PASSPORT OF THE CATHOLIC PILGRIM', W/2, 67, {align:'center'});

  // CERTIFICATE TITLE
  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.setTextColor(...BURG);
  doc.text('PILGRIMAGE CERTIFICATE', W/2, 98, {align:'center'});
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.4);
  doc.line(20, 94, 65, 94);
  doc.line(145, 94, W-20, 94);

  // COUNTRY
  doc.setFont('helvetica','normal');
  doc.setFontSize(11);
  doc.setTextColor(...BROWN);
  doc.text((currentLang==='es'&&country.nameEs?country.nameEs:country.name).toUpperCase() + '   \u2022   ' + new Date().getFullYear(), W/2, 107, {align:'center'});
  doc.setDrawColor(...GOLDL);
  doc.setLineWidth(0.25);
  doc.line(25, 111, W-25, 111);

  // PILGRIM NAME
  const user = window._currentUser;
  const raw = user?.displayName || user?.email?.split('@')[0] || 'Pilgrim';
  const name = raw.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\x20-\x7E]/g,'').trim()||'Pilgrim';

  doc.setFont('helvetica','italic');
  doc.setFontSize(10);
  doc.setTextColor(...BROWNL);
  doc.text(t('certText1'), W/2, 121, {align:'center'});

  doc.setFont('times','bolditalic');
  doc.setFontSize(22);
  doc.setTextColor(...BURG);
  doc.text(name, W/2, 133, {align:'center'});
  const nw = doc.getTextWidth(name);
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.5);
  doc.line(W/2-nw/2, 136, W/2+nw/2, 136);

  doc.setFont('helvetica','italic');
  doc.setFontSize(10);
  doc.setTextColor(...BROWNL);
  doc.text(t('certText2'), W/2, 145, {align:'center'});
  doc.setFont('helvetica','bolditalic');
  doc.setFontSize(12);
  doc.setTextColor(...BURG);
  doc.text(cs.length + ' ' + t('certText3') + ' ' + (currentLang==='es'&&country.nameEs?country.nameEs:country.name), W/2, 154, {align:'center'});

  // SANCTUARY LIST — single column, names only
  const listY = 163;
  const rowH = 10;
  const listH = cs.length * rowH + 8;

  doc.setFillColor(...CREAMD);
  doc.roundedRect(25, listY, W-50, listH, 2, 2, 'F');
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.25);
  doc.roundedRect(25, listY, W-50, listH, 2, 2);

  cs.forEach((s, i) => {
    const y = listY + 7 + i * rowH;
    if (i % 2 === 0) {
      doc.setFillColor(246, 236, 218);
      doc.rect(26, y-6, W-52, rowH, 'F');
    }
    // Gold bullet
    doc.setFillColor(...GOLD);
    doc.circle(33, y-1.5, 1.2, 'F');
    // Name
    doc.setFont('helvetica', i%2===0 ? 'normal' : 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...BROWN);
    const maxW = W - 50 - 20;
    let sname = s.name;
    while(doc.getTextWidth(sname) > maxW && sname.length > 8) sname = sname.slice(0,-1);
    if(sname !== s.name) sname = sname.slice(0,-2)+'..';
    doc.text(sname, 37, y);
  });

  // FOOTER
  const footY = listY + listH + 12;
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.4);
  doc.line(25, footY, W-25, footY);

  const locale = currentLang==='es'?'es-ES':'en-GB';
  const issued = new Date().toLocaleDateString(locale,{day:'numeric',month:'long',year:'numeric'});
  doc.setFont('helvetica','italic');
  doc.setFontSize(9);
  doc.setTextColor(...BROWN);
  doc.text(t('certIssued') + ' ' + issued, W/2, footY+9, {align:'center'});

  doc.setFont('helvetica','bolditalic');
  doc.setFontSize(8);
  doc.setTextColor(...BURG);
  doc.text(currentLang==='es'?'"Caminante, no hay camino, se hace camino al andar"':'"Traveller, there is no path \u2014 the path is made by walking"', W/2, footY+17, {align:'center'});

  // SEAL
  const sx = W-38, sy = footY+9;
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.7);
  doc.circle(sx, sy, 12);
  doc.setLineWidth(0.2);
  doc.circle(sx, sy, 9.5);
  doc.setFillColor(...BURG);
  doc.circle(sx, sy, 8, 'F');
  doc.setFillColor(...GOLD);
  doc.rect(sx-1, sy-5, 2, 10, 'F');
  doc.rect(sx-4, sy-1, 8, 2, 'F');

  // FOOTER BAR
  doc.setFillColor(...BURG);
  doc.rect(0, H-10, W, 10, 'F');
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.setTextColor(...GOLDL);

    refreshAll();
    updateMarkerStyles();
  }
}
