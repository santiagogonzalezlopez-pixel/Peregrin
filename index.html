  {id:306,country:'fr',lat:48.887,lng:2.343,icon:'💒',name:'Sacré-Cœur Basilica',type:'Basilica',city:'Paris',province:'Île-de-France',description:'Perched atop Montmartre, the highest point in Paris, this white Romano-Byzantine basilica is a symbol of faith and one of the most visited monuments in France.',history:'Built as an act of national penance after the Franco-Prussian War (1871), construction began in 1875 and the basilica was consecrated in 1919. Perpetual adoration has been maintained since 1885.',prayer:'Sacred Heart of Jesus, to you we consecrate ourselves and our nation. May your love reign in every heart and your kingdom of peace embrace the world. Amen.',feast:'Solemnity of the Sacred Heart',es:{name:'Basílica del Sagrado Corazón',type:'Basílica',city:'París',province:'Isla de Francia',description:'Encaramada en lo alto de Montmartre, el punto más alto de París, esta basílica blanca romano-bizantina es un símbolo de fe y uno de los monumentos más visitados de Francia.',history:'Construida como acto de penitencia nacional tras la guerra franco-prusiana (1871), la construcción comenzó en 1875 y la basílica fue consagrada en 1919. La adoración perpetua se mantiene desde 1885.',prayer:'Sagrado Corazón de Jesús, a ti nos consagramos a nosotros mismos y a nuestra nación. Que tu amor reine en cada corazón y tu reino de paz abrace al mundo. Amén.',feast:'Solemnidad del Sagrado Corazón'},fr:{name:'Basilique du Sacré-Cœur',type:'Basilique',city:'Paris',province:'Île-de-France',description:'Au sommet de Montmartre, basilique blanche romano-byzantine, symbole de foi et l\'un des monuments les plus visités de France.',history:'Construite en pénitence nationale après 1871. Adoration perpétuelle depuis 1885.',prayer:'Sacré-Cœur de Jésus, que ton amour règne dans chaque cœur et que ton royaume de paix embrasse le monde. Amen.',feast:'Solennité du Sacré-Cœur'},it:{name:'Basilica del Sacro Cuore',type:'Basilica',city:'Parigi',province:'Île-de-France',description:'In cima a Montmartre, basilica bianca romano-bizantina, simbolo di fede e uno dei monumenti più visitati di Francia.',history:'Costruita come penitenza nazionale dopo il 1871. Adorazione perpetua dal 1885.',prayer:'Sacro Cuore di Gesù, che il tuo amore regni in ogni cuore e il tuo regno di pace abbracci il mondo. Amen.',feast:'Solennità del Sacro Cuore'}},

  // ===== ITALY =====
  {id:401,country:'it',lat:41.902,lng:12.453,icon:'✝️',name:'Saint Peter\'s Basilica',type:'Basilica',city:'Vatican City',province:'Vatican',description:'The heart of Christendom. Built over the tomb of Saint Peter the Apostle, it is the largest church in the world. The centre of the Catholic faith for over a billion faithful.',history:'The first basilica was built by Emperor Constantine in 320 AD. The current basilica was designed by Michelangelo and completed in 1626. The dome remains the tallest in the world.',prayer:'Lord, on this rock you built your Church. Strengthen our faith, deepen our love, and make us worthy witnesses of the Gospel in our time. Amen.',feast:'June 29 (Saints Peter and Paul)',es:{name:'Basílica de San Pedro',type:'Basílica',city:'Ciudad del Vaticano',province:'Vaticano',description:'El corazón de la Cristiandad. Construida sobre la tumba del apóstol San Pedro, es la iglesia más grande del mundo. Centro de la fe católica para más de mil millones de fieles.',history:'La primera basílica fue construida por el emperador Constantino en el año 320 d.C. La basílica actual fue diseñada por Miguel Ángel y completada en 1626. La cúpula sigue siendo la más alta del mundo.',prayer:'Señor, sobre esta roca edificaste tu Iglesia. Fortalece nuestra fe, profundiza nuestro amor y haznos dignos testigos del Evangelio en nuestro tiempo. Amén.',feast:'29 de junio (Santos Pedro y Pablo)'},fr:{name:'Basilique Saint-Pierre',type:'Basilique',city:'Cité du Vatican',province:'Vatican',description:'Le cœur de la Chrétienté. La plus grande église du monde, construite sur le tombeau de saint Pierre.',history:'Première basilique construite par Constantin en 320. L\'actuelle conçue par Michel-Ange, achevée en 1626.',prayer:'Seigneur, sur cette pierre tu as bâti ton Église. Fortifie notre foi et fais de nous des témoins de l\'Évangile. Amen.',feast:'29 juin (Saints Pierre et Paul)'},it:{name:'Basilica di San Pietro',type:'Basilica',city:'Città del Vaticano',province:'Vaticano',description:'Il cuore della Cristianità. La chiesa più grande del mondo, costruita sulla tomba di San Pietro.',history:'Prima basilica costruita da Costantino nel 320. L\'attuale progettata da Michelangelo, completata nel 1626.',prayer:'Signore, su questa pietra hai edificato la tua Chiesa. Rafforza la nostra fede e rendici testimoni del Vangelo. Amen.',feast:'29 giugno (Santi Pietro e Paolo)'}},
  {id:402,country:'it',lat:43.070,lng:12.614,icon:'🕊️',name:'Basilica of Saint Francis',type:'Basilica',city:'Assisi',province:'Umbria',description:'The spiritual home of Saint Francis of Assisi. This magnificent double basilica, decorated by Giotto and Cimabue, is one of Italy\'s greatest artistic and spiritual treasures.',history:'Built immediately after Francis\'s canonisation in 1228, the basilica houses his tomb. The famous frescoes by Giotto illustrate the life of the saint. It is a UNESCO World Heritage Site.',prayer:'Lord, make me an instrument of your peace. Where there is hatred let me sow love, where there is doubt, faith, where there is darkness, light. Amen. (Prayer of Saint Francis)',feast:'October 4 (Saint Francis)',es:{name:'Basílica de San Francisco de Asís',type:'Basílica',city:'Asís',province:'Umbría',description:'El hogar espiritual de San Francisco de Asís. Esta magnífica doble basílica, decorada por Giotto y Cimabue, es uno de los mayores tesoros artísticos y espirituales de Italia.',history:'Construida inmediatamente después de la canonización de Francisco en 1228, la basílica alberga su tumba. Los famosos frescos de Giotto ilustran la vida del santo. Es Patrimonio de la Humanidad.',prayer:'Señor, hazme instrumento de tu paz. Donde haya odio, que yo ponga amor; donde haya duda, fe; donde haya oscuridad, luz. Amén. (Oración de San Francisco)',feast:'4 de octubre (San Francisco)'},fr:{name:'Basilique Saint-François d\'Assise',type:'Basilique',city:'Assise',province:'Ombrie',description:'Foyer spirituel de saint François. Double basilique décorée par Giotto et Cimabue. Patrimoine mondial.',history:'Construite après la canonisation de François en 1228. Les fresques de Giotto illustrent sa vie.',prayer:'Seigneur, fais de moi un instrument de ta paix. Là où il y a la haine, que je mette l\'amour. Amen.',feast:'4 octobre (Saint François)'},it:{name:'Basilica di San Francesco d\'Assisi',type:'Basilica',city:'Assisi',province:'Umbria',description:'Dimora spirituale di San Francesco. Doppia basilica decorata da Giotto e Cimabue. Patrimonio dell\'Umanità.',history:'Costruita dopo la canonizzazione di Francesco nel 1228. Gli affreschi di Giotto illustrano la sua vita.',prayer:'Signore, fa\' di me uno strumento della tua pace. Dove c\'è odio, che io porti amore. Amen.',feast:'4 ottobre (San Francesco)'}},
  {id:403,country:'it',lat:43.723,lng:10.396,icon:'🏛️',name:'Cathedral of Pisa',type:'Cathedral',city:'Pisa',province:'Tuscany',description:'A masterpiece of Romanesque architecture forming part of the famous Piazza dei Miracoli. Together with the Baptistery, Cemetery and Leaning Tower, it is a UNESCO World Heritage Site.',history:'Construction began in 1063 after a naval victory over Saracens. The cathedral\'s architect Buscheto introduced the Pisan Romanesque style that influenced churches across Tuscany and Sardinia.',prayer:'Lord, this cathedral built in thanksgiving for victory reminds us that all our achievements are gifts from you. May we always return glory to you alone. Amen.',feast:'August 15 (Assumption)',es:{name:'Catedral de Pisa',type:'Catedral',city:'Pisa',province:'Toscana',description:'Obra maestra del románico que forma parte de la famosa Piazza dei Miracoli. Junto al Baptisterio, el Camposanto y la Torre Inclinada, es Patrimonio de la Humanidad de la UNESCO.',history:'La construcción comenzó en 1063 tras una victoria naval sobre los sarracenos. El arquitecto Buschetto introdujo el estilo románico pisano que influyó en iglesias de toda la Toscana y Cerdeña.',prayer:'Señor, esta catedral construida en acción de gracias por una victoria nos recuerda que todos nuestros logros son dones tuyos. Que siempre te devolvamos la gloria. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Cathédrale de Pise',type:'Cathédrale',city:'Pise',province:'Toscane',description:'Chef-d\'œuvre roman de la Piazza dei Miracoli. Patrimoine mondial avec le Baptistère et la Tour penchée.',history:'Construction débutée en 1063. Le style roman pisan influença toute la Toscane.',prayer:'Seigneur, que nous te rendions toujours la gloire pour tes dons. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Pisa',type:'Cattedrale',city:'Pisa',province:'Toscana',description:'Capolavoro romanico della Piazza dei Miracoli. Patrimonio dell\'Umanità con il Battistero e la Torre Pendente.',history:'Costruzione iniziata nel 1063. Lo stile romanico pisano influenzò tutta la Toscana.',prayer:'Signore, che ti rendiamo sempre la gloria per i tuoi doni. Amen.',feast:'15 agosto (Assunzione)'}},
  {id:404,country:'it',lat:45.437,lng:12.336,icon:'🌊',name:'Basilica of Santa Maria della Salute',type:'Basilica',city:'Venice',province:'Veneto',description:'One of Venice\'s most iconic buildings, built as a votive offering for the city\'s deliverance from a devastating plague in 1630. Its imposing dome dominates the entrance to the Grand Canal.',history:'Built between 1631 and 1687 by architect Baldassare Longhena. Every November 21st, Venetians walk across a pontoon bridge to give thanks at the Feast of the Madonna della Salute.',prayer:'Our Lady of Health, you interceded for Venice in its hour of plague. Intercede for us in our hour of need, and bring healing to all who are sick. Amen.',feast:'November 21',es:{name:'Basílica de Santa María della Salute',type:'Basílica',city:'Venecia',province:'Véneto',description:'Uno de los edificios más icónicos de Venecia, construido como ofrenda votiva por la liberación de la ciudad de una devastadora peste en 1630. Su imponente cúpula domina la entrada al Gran Canal.',history:'Construida entre 1631 y 1687 por el arquitecto Baldassare Longhena. Cada 21 de noviembre los venecianos cruzan un puente flotante para dar gracias en la Fiesta de la Madonna della Salute.',prayer:'Nuestra Señora de la Salud, intercediste por Venecia en su hora de la peste. Intercede por nosotros en nuestra hora de necesidad y trae curación a todos los enfermos. Amén.',feast:'21 de noviembre'},fr:{name:'Basilique Santa Maria della Salute',type:'Basilique',city:'Venise',province:'Vénétie',description:'Édifice emblématique de Venise, construit en action de grâces pour la délivrance de la peste de 1630.',history:'Construite entre 1631 et 1687. Chaque 21 novembre, les Vénitiens traversent un pont flottant pour la fête.',prayer:'Notre-Dame de la Santé, intercède pour nous et apporte la guérison à tous les malades. Amen.',feast:'21 novembre'},it:{name:'Basilica di Santa Maria della Salute',type:'Basilica',city:'Venezia',province:'Veneto',description:'Edificio iconico di Venezia, costruito come offerta votiva per la liberazione dalla peste del 1630.',history:'Costruita tra il 1631 e il 1687. Ogni 21 novembre i veneziani attraversano un ponte galleggiante per la festa.',prayer:'Nostra Signora della Salute, intercedi per noi e porta guarigione a tutti i malati. Amen.',feast:'21 novembre'}},
  {id:405,country:'it',lat:41.477,lng:13.826,icon:'🌿',name:'Abbey of Monte Cassino',type:'Abbey',city:'Monte Cassino',province:'Lazio',description:'The mother monastery of Western monasticism, founded by Saint Benedict of Nursia around 529 AD. Largely destroyed in World War II, it has been faithfully rebuilt as a symbol of peace.',history:'Saint Benedict founded the monastery and wrote his Rule here, which became the foundation of monastic life in the West. The abbey was destroyed and rebuilt four times. The war cemetery below holds thousands of soldiers.',prayer:'Saint Benedict, father of Western monks, teach us to seek God above all things, to receive all guests as Christ, and to work and pray in holy balance. Amen.',feast:'July 11 (Saint Benedict)',es:{name:'Abadía de Monte Cassino',type:'Abadía',city:'Monte Cassino',province:'Lacio',description:'El monasterio madre del monacato occidental, fundado por San Benito de Nursia hacia el año 529 d.C. Destruido en la Segunda Guerra Mundial, ha sido fielmente reconstruido como símbolo de paz.',history:'San Benito fundó el monasterio y escribió aquí su Regla, que se convirtió en el fundamento de la vida monástica en Occidente. La abadía fue destruida y reconstruida cuatro veces. El cementerio de guerra alberga a miles de soldados.',prayer:'San Benito, padre de los monjes occidentales, enséñanos a buscar a Dios sobre todas las cosas, a recibir a todos los huéspedes como a Cristo y a trabajar y orar en santa armonía. Amén.',feast:'11 de julio (San Benito)'},fr:{name:'Abbaye du Mont-Cassin',type:'Abbaye',city:'Mont-Cassin',province:'Latium',description:'Monastère mère du monachisme occidental, fondé par saint Benoît vers 529. Reconstruit après la Seconde Guerre mondiale.',history:'Saint Benoît y écrivit sa Règle, fondement de la vie monastique occidentale. Détruit et reconstruit quatre fois.',prayer:'Saint Benoît, apprends-nous à chercher Dieu avant tout et à travailler et prier en saint équilibre. Amen.',feast:'11 juillet (Saint Benoît)'},it:{name:'Abbazia di Montecassino',type:'Abbazia',city:'Montecassino',province:'Lazio',description:'Monastero madre del monachesimo occidentale, fondato da San Benedetto verso il 529. Ricostruito dopo la Seconda Guerra Mondiale.',history:'San Benedetto vi scrisse la sua Regola, fondamento della vita monastica occidentale. Distrutto e ricostruito quattro volte.',prayer:'San Benedetto, insegnaci a cercare Dio sopra ogni cosa e a lavorare e pregare in santo equilibrio. Amen.',feast:'11 luglio (San Benedetto)'}},
  {id:406,country:'it',lat:41.173,lng:15.555,icon:'💒',name:'Sanctuary of San Giovanni Rotondo',type:'Sanctuary',city:'San Giovanni Rotondo',province:'Puglia',description:'Home of Padre Pio of Pietrelcina, one of the most popular saints of the 20th century. Millions of pilgrims visit each year to pray at his tomb.',history:'Padre Pio lived here from 1916 until his death in 1968. He bore the stigmata for 50 years, was renowned for reading souls and miracles of healing. He was canonised by John Paul II in 2002.',prayer:'Padre Pio, faithful servant of God who bore in your body the wounds of Christ, pray for us. Obtain for us from God the grace we need and draw us closer to the Sacred Heart of Jesus. Amen.',feast:'September 23 (Padre Pio)',es:{name:'Santuario de San Giovanni Rotondo',type:'Santuario',city:'San Giovanni Rotondo',province:'Apulia',description:'Hogar del Padre Pío de Pietrelcina, uno de los santos más populares del siglo XX. Millones de peregrinos visitan cada año su tumba.',history:'El Padre Pío vivió aquí desde 1916 hasta su muerte en 1968. Llevó los estigmas durante 50 años, y fue famoso por leer las almas y los milagros de curación. Fue canonizado por Juan Pablo II en 2002.',prayer:'Padre Pío, fiel servidor de Dios que llevaste en tu cuerpo las llagas de Cristo, ruega por nosotros. Obten de Dios la gracia que necesitamos y llévanos más cerca del Sagrado Corazón de Jesús. Amén.',feast:'23 de septiembre (Padre Pío)'},fr:{name:'Sanctuaire de San Giovanni Rotondo',type:'Sanctuaire',city:'San Giovanni Rotondo',province:'Pouilles',description:'Demeure de Padre Pio, l\'un des saints les plus populaires du XXe siècle. Des millions visitent sa tombe chaque année.',history:'Padre Pio vécut ici de 1916 à 1968. Il porta les stigmates pendant 50 ans. Canonisé en 2002.',prayer:'Padre Pio, obtiens-nous la grâce dont nous avons besoin et rapproche-nous du Sacré-Cœur de Jésus. Amen.',feast:'23 septembre (Padre Pio)'},it:{name:'Santuario di San Giovanni Rotondo',type:'Santuario',city:'San Giovanni Rotondo',province:'Puglia',description:'Dimora di Padre Pio, uno dei santi più popolari del XX secolo. Milioni visitano la sua tomba ogni anno.',history:'Padre Pio visse qui dal 1916 al 1968. Portò le stimmate per 50 anni. Canonizzato nel 2002.',prayer:'Padre Pio, ottienici la grazia di cui abbiamo bisogno e avvicinaci al Sacro Cuore di Gesù. Amen.',feast:'23 settembre (Padre Pio)'}},
  {id:407,country:'it',lat:40.850,lng:14.268,icon:'🩸',name:'Cathedral of Naples',type:'Cathedral',city:'Naples',province:'Campania',description:'Home to the liquefaction miracle of the blood of Saint Januarius, patron of Naples. Three times a year, the dried blood liquefies — an event witnessed by thousands for centuries.',history:'The cathedral was built in the 13th century. The Chapel of San Gennaro houses the relics of the martyr. The liquefaction miracle has been recorded since 1389 and is the subject of intense popular devotion.',prayer:'Saint Januarius, martyr and patron of Naples, intercede for this city and its people. May the miracle of your blood be a sign of God\'s faithfulness to his people. Amen.',feast:'September 19 (Saint Januarius)',es:{name:'Catedral de Nápoles',type:'Catedral',city:'Nápoles',province:'Campania',description:'Sede del milagro de la licuefacción de la sangre de San Jenaro, patrón de Nápoles. Tres veces al año la sangre seca se licúa, un acontecimiento presenciado por miles desde hace siglos.',history:'La catedral fue construida en el siglo XIII. La Capilla de San Jenaro alberga las reliquias del mártir. El milagro de la licuefacción está documentado desde 1389 y es objeto de intensa devoción popular.',prayer:'San Jenaro, mártir y patrón de Nápoles, intercede por esta ciudad y su pueblo. Que el milagro de tu sangre sea signo de la fidelidad de Dios hacia su pueblo. Amén.',feast:'19 de septiembre (San Jenaro)'},fr:{name:'Cathédrale de Naples',type:'Cathédrale',city:'Naples',province:'Campanie',description:'Siège du miracle de la liquéfaction du sang de saint Janvier. Trois fois par an le sang séché se liquéfie.',history:'Construite au XIIIe siècle. Le miracle est documenté depuis 1389.',prayer:'Saint Janvier, martyr et patron de Naples, que le miracle de ton sang soit signe de la fidélité de Dieu. Amen.',feast:'19 septembre (Saint Janvier)'},it:{name:'Cattedrale di Napoli',type:'Cattedrale',city:'Napoli',province:'Campania',description:'Sede del miracolo della liquefazione del sangue di San Gennaro. Tre volte all\'anno il sangue secco si liquefa.',history:'Costruita nel XIII secolo. Il miracolo è documentato dal 1389.',prayer:'San Gennaro, martire e patrono di Napoli, che il miracolo del tuo sangue sia segno della fedeltà di Dio. Amen.',feast:'19 settembre (San Gennaro)'}},

  // ===== POLAND =====
  {id:501,country:'pl',lat:50.814,lng:19.097,icon:'👑',name:'Jasna Góra Monastery',type:'Monastery',city:'Częstochowa',province:'Silesia',description:'The spiritual capital of Poland, home to the Black Madonna of Częstochowa — one of the most venerated Marian images in the world. The monastery has never been conquered.',history:'Founded in 1382, the monastery survived the Swedish Deluge of 1655 — a miracle attributed to the Black Madonna. King John II Casimir consecrated Poland to the Virgin Mary here. Pope John Paul II visited multiple times.',prayer:'Our Lady of Częstochowa, Black Madonna, Queen of Poland, be our refuge and strength. Under your protection we place our nation, our families and ourselves. Amen.',feast:'August 26',es:{name:'Monasterio de Jasna Góra',type:'Monasterio',city:'Częstochowa',province:'Silesia',description:'La capital espiritual de Polonia, hogar de la Virgen Negra de Częstochowa, una de las imágenes marianas más veneradas del mundo. El monasterio nunca ha sido conquistado.',history:'Fundado en 1382, el monasterio sobrevivió al Diluvio Sueco de 1655, milagro atribuido a la Virgen Negra. El rey Juan II Casimiro consagró Polonia a la Virgen María aquí. El Papa Juan Pablo II lo visitó varias veces.',prayer:'Nuestra Señora de Częstochowa, Virgen Negra, Reina de Polonia, sé nuestro refugio y fortaleza. Bajo tu protección ponemos nuestra nación, nuestras familias y a nosotros mismos. Amén.',feast:'26 de agosto'},fr:{name:'Monastère de Jasna Góra',type:'Monastère',city:'Częstochowa',province:'Silésie',description:'Capitale spirituelle de la Pologne, abritant la Vierge Noire de Częstochowa.',history:'Fondé en 1382. Survécut au Déluge suédois de 1655. Jean-Paul II le visita plusieurs fois.',prayer:'Notre-Dame de Częstochowa, Vierge Noire, Reine de Pologne, sois notre refuge et notre force. Amen.',feast:'26 août'},it:{name:'Monastero di Jasna Góra',type:'Monastero',city:'Częstochowa',province:'Slesia',description:'Capitale spirituale della Polonia, sede della Madonna Nera di Częstochowa.',history:'Fondato nel 1382. Sopravvisse al Diluvio svedese del 1655. Giovanni Paolo II lo visitò più volte.',prayer:'Nostra Signora di Częstochowa, Madonna Nera, Regina di Polonia, sii il nostro rifugio e la nostra forza. Amen.',feast:'26 agosto'}},
  {id:502,country:'pl',lat:50.044,lng:19.966,icon:'⛪',name:'Divine Mercy Sanctuary',type:'Sanctuary',city:'Kraków',province:'Lesser Poland',description:'The global centre of the Divine Mercy devotion, based on the visions of Saint Faustina Kowalska. Millions of pilgrims come to venerate the famous Divine Mercy image.',history:'Sister Faustina received her visions here in the 1930s. Pope John Paul II, a native of Kraków, was devoted to Divine Mercy and canonised Faustina in 2000. He proclaimed the second Sunday of Easter as Divine Mercy Sunday.',prayer:'Jesus, I trust in you. For the sake of your sorrowful Passion, have mercy on us and on the whole world. Amen.',feast:'Second Sunday of Easter (Divine Mercy Sunday)',es:{name:'Santuario de la Divina Misericordia',type:'Santuario',city:'Cracovia',province:'Pequeña Polonia',description:'El centro mundial de la devoción a la Divina Misericordia, basada en las visiones de Santa Faustina Kowalska. Millones de peregrinos vienen a venerar la famosa imagen de la Divina Misericordia.',history:'La hermana Faustina recibió sus visiones aquí en los años 1930. El Papa Juan Pablo II, natural de Cracovia, era devoto de la Divina Misericordia y canonizó a Faustina en 2000. Proclamó el segundo domingo de Pascua como Domingo de la Divina Misericordia.',prayer:'Jesús, en ti confío. Por tu dolorosa Pasión, ten misericordia de nosotros y del mundo entero. Amén.',feast:'Segundo domingo de Pascua (Domingo de la Divina Misericordia)'},fr:{name:'Sanctuaire de la Divine Miséricorde',type:'Sanctuaire',city:'Cracovie',province:'Petite-Pologne',description:'Centre mondial de la dévotion à la Divine Miséricorde, basé sur les visions de sainte Faustine.',history:'Sœur Faustine reçut ses visions dans les années 1930. Canonisée en 2000 par Jean-Paul II.',prayer:'Jésus, j\'ai confiance en toi. Par ta douloureuse Passion, aie pitié de nous et du monde entier. Amen.',feast:'Deuxième dimanche de Pâques'},it:{name:'Santuario della Divina Misericordia',type:'Santuario',city:'Cracovia',province:'Piccola Polonia',description:'Centro mondiale della devozione alla Divina Misericordia, basato sulle visioni di Santa Faustina.',history:'Suor Faustina ricevette le visioni negli anni 1930. Canonizzata nel 2000 da Giovanni Paolo II.',prayer:'Gesù, confido in te. Per la tua dolorosa Passione, abbi misericordia di noi e del mondo intero. Amen.',feast:'Seconda domenica di Pasqua'}},
  {id:503,country:'pl',lat:52.302,lng:18.143,icon:'🌊',name:'Basilica of Our Lady of Licheń',type:'Basilica',city:'Licheń Stary',province:'Greater Poland',description:'The largest church in Poland and one of the largest in the world. An extraordinary place of pilgrimage dedicated to Our Lady of Licheń, Sorrowful Queen of Poland.',history:'The devotion to Our Lady of Licheń began in the 19th century. The enormous new basilica was built between 1994 and 2004, financed entirely by donations from Polish faithful worldwide.',prayer:'Our Lady of Licheń, Sorrowful Queen of Poland, wipe away the tears of your children, give strength to the afflicted and hope to the despairing. Amen.',feast:'September 12',es:{name:'Basílica de Nuestra Señora de Licheń',type:'Basílica',city:'Licheń Stary',province:'Gran Polonia',description:'La iglesia más grande de Polonia y una de las más grandes del mundo. Un extraordinario lugar de peregrinación dedicado a Nuestra Señora de Licheń, Reina Dolorosa de Polonia.',history:'La devoción a Nuestra Señora de Licheń comenzó en el siglo XIX. La enorme basílica nueva fue construida entre 1994 y 2004, financiada íntegramente por donativos de fieles polacos de todo el mundo.',prayer:'Nuestra Señora de Licheń, Reina Dolorosa de Polonia, enjuga las lágrimas de tus hijos, da fuerza a los afligidos y esperanza a los desesperados. Amén.',feast:'12 de septiembre'},fr:{name:'Basilique de Notre-Dame de Licheń',type:'Basilique',city:'Licheń Stary',province:'Grande-Pologne',description:'La plus grande église de Pologne. Lieu de pèlerinage dédié à Notre-Dame de Licheń, Reine Douloureuse.',history:'Dévotion commencée au XIXe siècle. La basilique fut construite entre 1994 et 2004.',prayer:'Notre-Dame de Licheń, essuie les larmes de tes enfants et donne espérance aux désespérés. Amen.',feast:'12 septembre'},it:{name:'Basilica di Nostra Signora di Licheń',type:'Basilica',city:'Licheń Stary',province:'Grande Polonia',description:'La chiesa più grande della Polonia. Luogo di pellegrinaggio dedicato a Nostra Signora di Licheń, Regina Addolorata.',history:'Devozione iniziata nel XIX secolo. La basilica fu costruita tra il 1994 e il 2004.',prayer:'Nostra Signora di Licheń, asciuga le lacrime dei tuoi figli e dai speranza ai disperati. Amen.',feast:'12 settembre'}},
  {id:504,country:'pl',lat:50.054,lng:19.935,icon:'🏰',name:'Wawel Cathedral',type:'Cathedral',city:'Kraków',province:'Lesser Poland',description:'The royal cathedral of Poland, burial place of kings, saints and national heroes. The Sigismund Bell and the relics of Saint Stanislaus make it the spiritual heart of the Polish nation.',history:'The current Gothic cathedral was completed in 1364. It contains 18 chapels including the golden Sigismund Chapel. Among those buried here are Saint Jadwiga, King John III Sobieski and President Lech Kaczyński.',prayer:'Saint Stanislaus, patron of Poland and bishop and martyr, intercede for this nation. May Poland always remain faithful to Christ and to his Church. Amen.',feast:'May 8 (Saint Stanislaus)',es:{name:'Catedral del Wawel',type:'Catedral',city:'Cracovia',province:'Pequeña Polonia',description:'La catedral real de Polonia, lugar de sepultura de reyes, santos y héroes nacionales. La Campana Segismundo y las reliquias de San Estanislao la convierten en el corazón espiritual de la nación polaca.',history:'La actual catedral gótica se completó en 1364. Contiene 18 capillas, incluida la dorada Capilla Segismundo. Entre los aquí enterrados se encuentran Santa Jadwiga, el rey Juan III Sobieski y el presidente Lech Kaczyński.',prayer:'San Estanislao, patrón de Polonia y obispo mártir, intercede por esta nación. Que Polonia permanezca siempre fiel a Cristo y a su Iglesia. Amén.',feast:'8 de mayo (San Estanislao)'},fr:{name:'Cathédrale du Wawel',type:'Cathédrale',city:'Cracovie',province:'Petite-Pologne',description:'Cathédrale royale de Pologne, sépulture des rois, saints et héros nationaux.',history:'Cathédrale gothique achevée en 1364. Contient 18 chapelles dont la Chapelle Sigismond.',prayer:'Saint Stanislas, patron de la Pologne, que la Pologne reste fidèle au Christ et à son Église. Amen.',feast:'8 mai (Saint Stanislas)'},it:{name:'Cattedrale del Wawel',type:'Cattedrale',city:'Cracovia',province:'Piccola Polonia',description:'Cattedrale reale della Polonia, sepoltura di re, santi e eroi nazionali.',history:'Cattedrale gotica completata nel 1364. Contiene 18 cappelle tra cui la Cappella Sigismondo.',prayer:'San Stanislao, patrono della Polonia, che la Polonia resti fedele a Cristo e alla sua Chiesa. Amen.',feast:'8 maggio (San Stanislao)'}},
  {id:505,country:'pl',lat:51.764,lng:19.456,icon:'🌿',name:'Sanctuary of Our Lady of Łódź',type:'Sanctuary',city:'Łódź',province:'Łódź',description:'One of the most important Marian sanctuaries in central Poland, housing an ancient image of Our Lady venerated for centuries of miracles and answered prayers.',history:'The sanctuary has been a place of pilgrimage since the 17th century. The image of Our Lady has been venerated through wars, partitions and communist persecution, standing as a symbol of hope.',prayer:'Our Lady of Łódź, gentle mother who has watched over this city through its joys and sorrows, continue to pray for us and lead us to your Son. Amen.',feast:'August 15 (Assumption)',es:{name:'Santuario de Nuestra Señora de Łódź',type:'Santuario',city:'Łódź',province:'Łódź',description:'Uno de los santuarios marianos más importantes del centro de Polonia, que alberga una antigua imagen de Nuestra Señora venerada durante siglos por sus milagros y plegarias atendidas.',history:'El santuario ha sido lugar de peregrinación desde el siglo XVII. La imagen de Nuestra Señora ha sido venerada a través de guerras, particiones y la persecución comunista, como símbolo de esperanza.',prayer:'Nuestra Señora de Łódź, madre gentil que has velado por esta ciudad en sus alegrías y tristezas, continúa rezando por nosotros y llévanos a tu Hijo. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Sanctuaire de Notre-Dame de Łódź',type:'Sanctuaire',city:'Łódź',province:'Łódź',description:'Important sanctuaire marial du centre de la Pologne avec une ancienne image vénérée pour ses miracles.',history:'Lieu de pèlerinage depuis le XVIIe siècle, symbole d\'espérance à travers guerres et persécutions.',prayer:'Notre-Dame de Łódź, continue de prier pour nous et conduis-nous à ton Fils. Amen.',feast:'15 août (Assomption)'},it:{name:'Santuario di Nostra Signora di Łódź',type:'Santuario',city:'Łódź',province:'Łódź',description:'Importante santuario mariano della Polonia centrale con un\'antica immagine venerata per i suoi miracoli.',history:'Luogo di pellegrinaggio dal XVII secolo, simbolo di speranza attraverso guerre e persecuzioni.',prayer:'Nostra Signora di Łódź, continua a pregare per noi e conducici a tuo Figlio. Amen.',feast:'15 agosto (Assunzione)'}},

  // ===== IRELAND =====
  {id:601,country:'ie',lat:53.778,lng:-8.918,icon:'🕊️',name:'Knock Shrine',type:'Marian shrine',city:'Knock',province:'County Mayo',description:'Ireland\'s national Marian shrine. On August 21, 1879, an apparition of Our Lady, Saint Joseph and Saint John the Evangelist was witnessed by 15 people on the gable of the village church.',history:'The apparition lasted two hours in rain. The witnesses — ranging from children to elderly — were consistent in their accounts. Pope John Paul II visited in 1979 for the centenary. One million pilgrims visit annually.',prayer:'Our Lady of Knock, Queen of Ireland, you gave hope to our people in a time of famine and despair. Be with us still as we face the challenges of our time. Amen.',feast:'August 21 (Knock Apparition)',es:{name:'Santuario de Knock',type:'Santuario mariano',city:'Knock',province:'Condado de Mayo',description:'El santuario mariano nacional de Irlanda. El 21 de agosto de 1879, una aparición de Nuestra Señora, San José y San Juan Evangelista fue presenciada por 15 personas en el frontón de la iglesia del pueblo.',history:'La aparición duró dos horas bajo la lluvia. Los testigos, de niños a ancianos, fueron consistentes en sus relatos. El Papa Juan Pablo II visitó el lugar en 1979 para el centenario. Un millón de peregrinos visitan anualmente.',prayer:'Nuestra Señora de Knock, Reina de Irlanda, diste esperanza a tu pueblo en un tiempo de hambre y desesperación. Permanece con nosotros mientras afrontamos los retos de nuestro tiempo. Amén.',feast:'21 de agosto (Aparición de Knock)'},fr:{name:'Sanctuaire de Knock',type:'Sanctuaire marial',city:'Knock',province:'Comté de Mayo',description:'Sanctuaire marial national d\'Irlande. En 1879, apparition de Notre-Dame, saint Joseph et saint Jean devant 15 témoins.',history:'L\'apparition dura deux heures sous la pluie. Jean-Paul II visita le lieu en 1979. Un million de pèlerins par an.',prayer:'Notre-Dame de Knock, Reine d\'Irlande, reste avec nous face aux défis de notre temps. Amen.',feast:'21 août (Apparition de Knock)'},it:{name:'Santuario di Knock',type:'Santuario mariano',city:'Knock',province:'Contea di Mayo',description:'Santuario mariano nazionale d\'Irlanda. Nel 1879, apparizione di Nostra Signora, San Giuseppe e San Giovanni davanti a 15 testimoni.',history:'L\'apparizione durò due ore sotto la pioggia. Giovanni Paolo II visitò il luogo nel 1979. Un milione di pellegrini all\'anno.',prayer:'Nostra Signora di Knock, Regina d\'Irlanda, resta con noi nelle sfide del nostro tempo. Amen.',feast:'21 agosto (Apparizione di Knock)'}},
  {id:602,country:'ie',lat:53.339,lng:-6.269,icon:'🏛️',name:'Saint Patrick\'s Cathedral',type:'Cathedral',city:'Dublin',province:'County Dublin',description:'Ireland\'s largest cathedral, built on the site where Saint Patrick is said to have baptised converts in the 5th century. An imposing Gothic landmark in the heart of Dublin.',history:'Founded in 1191 and elevated to cathedral status in 1213. Jonathan Swift, author of Gulliver\'s Travels, served as Dean here. The cathedral has been a place of worship for over 800 years.',prayer:'Saint Patrick, Apostle of Ireland, you drove out the darkness of paganism and brought the light of Christ to our shores. May Ireland remain ever faithful to your legacy. Amen.',feast:'March 17 (Saint Patrick)',es:{name:'Catedral de San Patricio',type:'Catedral',city:'Dublín',province:'Condado de Dublín',description:'La catedral más grande de Irlanda, construida en el lugar donde se dice que San Patricio bautizó a conversos en el siglo V. Un imponente monumento gótico en el corazón de Dublín.',history:'Fundada en 1191 y elevada al rango de catedral en 1213. Jonathan Swift, autor de Los viajes de Gulliver, fue deán aquí. La catedral ha sido lugar de culto durante más de 800 años.',prayer:'San Patricio, apóstol de Irlanda, alejaste las tinieblas del paganismo y trajiste la luz de Cristo a estas tierras. Que Irlanda permanezca siempre fiel a tu legado. Amén.',feast:'17 de marzo (San Patricio)'},fr:{name:'Cathédrale Saint-Patrick',type:'Cathédrale',city:'Dublin',province:'Comté de Dublin',description:'La plus grande cathédrale d\'Irlande, construite où saint Patrick aurait baptisé des convertis au Ve siècle.',history:'Fondée en 1191. Jonathan Swift en fut le doyen. Lieu de culte depuis plus de 800 ans.',prayer:'Saint Patrick, apôtre d\'Irlande, que l\'Irlande reste fidèle à ton héritage. Amen.',feast:'17 mars (Saint Patrick)'},it:{name:'Cattedrale di San Patrizio',type:'Cattedrale',city:'Dublino',province:'Contea di Dublino',description:'La cattedrale più grande d\'Irlanda, costruita dove San Patrizio avrebbe battezzato convertiti nel V secolo.',history:'Fondata nel 1191. Jonathan Swift ne fu il decano. Luogo di culto da oltre 800 anni.',prayer:'San Patrizio, apostolo d\'Irlanda, che l\'Irlanda resti fedele alla tua eredità. Amen.',feast:'17 marzo (San Patrizio)'}},
  {id:603,country:'ie',lat:53.760,lng:-9.659,icon:'⛰️',name:'Croagh Patrick',type:'Pilgrimage site',city:'Westport',province:'County Mayo',description:'Ireland\'s holy mountain, where Saint Patrick fasted for 40 days in 441 AD. Each year on Reek Sunday, tens of thousands climb the 764-metre summit, many barefoot.',history:'The mountain has been a place of pilgrimage since pre-Christian times. Patrick\'s fast on the summit is one of Ireland\'s foundational spiritual narratives. The small oratory at the top is a modern replacement of successive earlier chapels.',prayer:'Lord, as we climb this holy mountain in the footsteps of your servant Patrick, purify our hearts and strengthen our resolve to follow you. Amen.',feast:'Last Sunday of July (Reek Sunday)',es:{name:'Croagh Patrick',type:'Lugar de peregrinación',city:'Westport',province:'Condado de Mayo',description:'La montaña sagrada de Irlanda, donde San Patricio ayunó durante 40 días en el año 441 d.C. Cada año el Domingo del Reek, decenas de miles suben a la cima de 764 metros, muchos descalzos.',history:'La montaña ha sido lugar de peregrinación desde tiempos precristianos. El ayuno de Patricio en la cumbre es una de las narraciones espirituales fundacionales de Irlanda. El pequeño oratorio en la cima es un reemplazo moderno de sucesivas capillas anteriores.',prayer:'Señor, al subir esta montaña sagrada siguiendo los pasos de tu siervo Patricio, purifica nuestros corazones y fortalece nuestra determinación de seguirte. Amén.',feast:'Último domingo de julio (Domingo del Reek)'},fr:{name:'Croagh Patrick',type:'Lieu de pèlerinage',city:'Westport',province:'Comté de Mayo',description:'Montagne sacrée d\'Irlande. Saint Patrick y jeûna 40 jours en 441. Des dizaines de milliers y grimpent chaque année.',history:'Lieu de pèlerinage depuis les temps préchrétiens. Le jeûne de Patrick est fondateur de la spiritualité irlandaise.',prayer:'Seigneur, en gravissant cette montagne, purifie nos cœurs et fortifie notre résolution de te suivre. Amen.',feast:'Dernier dimanche de juillet'},it:{name:'Croagh Patrick',type:'Luogo di pellegrinaggio',city:'Westport',province:'Contea di Mayo',description:'Montagna sacra d\'Irlanda. San Patrizio vi digiunò 40 giorni nel 441. Decine di migliaia vi salgono ogni anno.',history:'Luogo di pellegrinaggio fin dai tempi precristiani. Il digiuno di Patrizio è fondante della spiritualità irlandese.',prayer:'Signore, salendo questa montagna, purifica i nostri cuori e rafforza la nostra determinazione a seguirti. Amen.',feast:'Ultima domenica di luglio'}},
  {id:604,country:'ie',lat:51.896,lng:-8.468,icon:'💒',name:'Shandon Church',type:'Church',city:'Cork',province:'County Cork',description:'Saint Anne\'s Church, known as Shandon, is one of Cork\'s most beloved landmarks. Visitors can ring the famous Shandon Bells, an experience unique in Irish religious heritage.',history:'Built in 1722 on the site of a church destroyed by Williamite forces. The famous steeple has four clock faces that were historically known as the four-faced liar because they showed different times.',prayer:'Lord, as these bells have called generations of Cork people to prayer, may their sound call us too to lift our hearts to you in gratitude and praise. Amen.',feast:'July 26 (Saint Anne)',es:{name:'Iglesia de Shandon',type:'Iglesia',city:'Cork',province:'Condado de Cork',description:'La Iglesia de Santa Ana, conocida como Shandon, es uno de los monumentos más queridos de Cork. Los visitantes pueden tocar las famosas Campanas de Shandon, una experiencia única en el patrimonio religioso irlandés.',history:'Construida en 1722 sobre el emplazamiento de una iglesia destruida por las fuerzas williamitas. El famoso campanario tiene cuatro esferas de reloj que históricamente se conocían como el mentiroso de cuatro caras porque marcaban horas distintas.',prayer:'Señor, así como estas campanas han llamado a generaciones de habitantes de Cork a la oración, que su sonido nos llame también a nosotros a elevar nuestros corazones hacia ti con gratitud y alabanza. Amén.',feast:'26 de julio (Santa Ana)'},fr:{name:'Église de Shandon',type:'Église',city:'Cork',province:'Comté de Cork',description:'L\'Église Sainte-Anne, monument emblématique de Cork. Les visiteurs peuvent sonner les célèbres Cloches de Shandon.',history:'Construite en 1722. Le clocher a quatre cadrans qui montraient des heures différentes.',prayer:'Seigneur, que ces cloches nous appellent à élever nos cœurs vers toi en gratitude. Amen.',feast:'26 juillet (Sainte Anne)'},it:{name:'Chiesa di Shandon',type:'Chiesa',city:'Cork',province:'Contea di Cork',description:'La Chiesa di Sant\'Anna, monumento emblematico di Cork. I visitatori possono suonare le famose Campane di Shandon.',history:'Costruita nel 1722. Il campanile ha quattro quadranti che segnavano ore diverse.',prayer:'Signore, che queste campane ci chiamino a elevare i nostri cuori verso di te con gratitudine. Amen.',feast:'26 luglio (Sant\'Anna)'}},
  {id:605,country:'ie',lat:51.656,lng:-8.630,icon:'✝️',name:'Timoleague Abbey',type:'Abbey',city:'Timoleague',province:'County Cork',description:'Hauntingly beautiful ruins of a Franciscan friary founded in 1240, set beside a tidal estuary. One of the most atmospheric medieval religious sites in Ireland.',history:'Founded by the MacCarthy family, Timoleague was one of the largest Franciscan houses in medieval Ireland. It was suppressed during the Reformation in the 16th century. The ruins include the church, cloister and tower.',prayer:'Lord, though these walls are ruined, the faith that built them endures. May we too build on the rock of your love, withstanding every storm. Amen.',feast:'October 4 (Saint Francis)',es:{name:'Abadía de Timoleague',type:'Abadía',city:'Timoleague',province:'Condado de Cork',description:'Ruinas de una sobrecogedora belleza de un convento franciscano fundado en 1240, junto a un estuario de marea. Uno de los lugares religiosos medievales más atmosféricos de Irlanda.',history:'Fundada por la familia MacCarthy, Timoleague fue una de las casas franciscanas más grandes de la Irlanda medieval. Fue suprimida durante la Reforma en el siglo XVI. Las ruinas incluyen la iglesia, el claustro y la torre.',prayer:'Señor, aunque estas paredes estén en ruinas, la fe que las construyó permanece. Que nosotros también edifiquemos sobre la roca de tu amor, resistiendo todas las tempestades. Amén.',feast:'4 de octubre (San Francisco)'},fr:{name:'Abbaye de Timoleague',type:'Abbaye',city:'Timoleague',province:'Comté de Cork',description:'Ruines d\'un couvent franciscain fondé en 1240. L\'un des sites religieux médiévaux les plus atmosphériques d\'Irlande.',history:'Fondée par les MacCarthy. Supprimée lors de la Réforme au XVIe siècle.',prayer:'Seigneur, la foi qui a bâti ces murs perdure. Que nous aussi bâtissions sur le roc de ton amour. Amen.',feast:'4 octobre (Saint François)'},it:{name:'Abbazia di Timoleague',type:'Abbazia',city:'Timoleague',province:'Contea di Cork',description:'Rovine di un convento francescano fondato nel 1240. Uno dei siti religiosi medievali più evocativi d\'Irlanda.',history:'Fondata dai MacCarthy. Soppressa durante la Riforma nel XVI secolo.',prayer:'Signore, la fede che ha costruito queste mura perdura. Che anche noi edifichiamo sulla roccia del tuo amore. Amen.',feast:'4 ottobre (San Francesco)'}},

  // ===== GERMANY =====
  {id:701,country:'de',lat:47.770,lng:10.302,icon:'🙏',name:'Wieskirche',type:'Church',city:'Steingaden',province:'Bavaria',description:'The Pilgrimage Church of Wies, a UNESCO World Heritage Site. This extraordinary Rococo church in the Bavarian foothills is considered one of the finest examples of Rococo art in the world.',history:'Built between 1745 and 1754 by Dominikus Zimmermann after a miraculous image of the Scourged Christ wept. Pilgrims immediately began flocking to the site and the church was built to accommodate them.',prayer:'Lord Jesus, Scourged Saviour, you shed tears for our sins. Touch our hearts with true contrition and renew in us the joy of your salvation. Amen.',feast:'Sunday after Pentecost',es:{name:'Wieskirche',type:'Iglesia',city:'Steingaden',province:'Baviera',description:'La Iglesia de Peregrinación de Wies, Patrimonio de la Humanidad de la UNESCO. Esta extraordinaria iglesia rococó en las estribaciones bávaras es considerada uno de los mejores ejemplos de arte rococó del mundo.',history:'Construida entre 1745 y 1754 por Dominikus Zimmermann, tras relatos de que una imagen del Cristo Flagelado derramó lágrimas. Los peregrinos comenzaron a acudir inmediatamente y la iglesia fue construida para acogerlos.',prayer:'Señor Jesús, Salvador Flagelado, derramaste lágrimas por nuestros pecados. Toca nuestros corazones con verdadero arrepentimiento y renueva en nosotros el gozo de tu salvación. Amén.',feast:'Domingo de Pentecostés'},fr:{name:'Wieskirche',type:'Église',city:'Steingaden',province:'Bavière',description:'Église de pèlerinage de Wies, Patrimoine mondial. Extraordinaire église rococo dans les Alpes bavaroises.',history:'Construite entre 1745 et 1754 après qu\'une image du Christ Flagellé aurait pleuré.',prayer:'Seigneur Jésus, touche nos cœurs d\'un vrai repentir et renouvelle en nous la joie de ton salut. Amen.',feast:'Dimanche de Pentecôte'},it:{name:'Wieskirche',type:'Chiesa',city:'Steingaden',province:'Baviera',description:'Chiesa di pellegrinaggio di Wies, Patrimonio dell\'Umanità. Straordinaria chiesa rococò nelle Alpi bavaresi.',history:'Costruita tra il 1745 e il 1754 dopo che un\'immagine del Cristo Flagellato avrebbe pianto.',prayer:'Signore Gesù, tocca i nostri cuori con vero pentimento e rinnova in noi la gioia della tua salvezza. Amen.',feast:'Domenica di Pentecoste'}},
  {id:702,country:'de',lat:48.137,lng:11.575,icon:'⛪',name:'Frauenkirche Munich',type:'Cathedral',city:'Munich',province:'Bavaria',description:'The Cathedral of Our Dear Lady, symbol of Munich. Its twin towers are iconic landmarks of the Bavarian capital. A place of Marian devotion at the heart of the city.',history:'Built in a mere 20 years (1468–1488), a remarkable feat for a cathedral of this size. According to legend, the Devil left a footprint in the doorway when he found no windows from inside — an optical illusion still visible today.',prayer:'Our Lady of Munich, gentle mother under whose patronage this city has lived for centuries, watch over us and lead us to your Son. Amen.',feast:'August 15 (Assumption)',es:{name:'Frauenkirche de Múnich',type:'Catedral',city:'Múnich',province:'Baviera',description:'La Catedral de Nuestra Querida Señora, símbolo de Múnich. Sus torres gemelas son monumentos icónicos de la capital bávara. Lugar de devoción mariana en el corazón de la ciudad.',history:'Construida en solo 20 años (1468-1488), un logro notable para una catedral de este tamaño. Según la leyenda, el diablo dejó una huella en el umbral cuando descubrió que no se veían ventanas desde dentro, una ilusión óptica aún visible hoy.',prayer:'Nuestra Señora de Múnich, madre gentil bajo cuyo patrocinio esta ciudad ha vivido durante siglos, vela por nosotros y llévanos a tu Hijo. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Frauenkirche de Munich',type:'Cathédrale',city:'Munich',province:'Bavière',description:'Cathédrale Notre-Dame, symbole de Munich. Ses tours jumelles sont emblématiques de la capitale bavaroise.',history:'Construite en 20 ans (1468-1488). Selon la légende, le diable y laissa son empreinte.',prayer:'Notre-Dame de Munich, veille sur nous et conduis-nous à ton Fils. Amen.',feast:'15 août (Assomption)'},it:{name:'Frauenkirche di Monaco',type:'Cattedrale',city:'Monaco di Baviera',province:'Baviera',description:'Cattedrale di Nostra Signora, simbolo di Monaco. Le torri gemelle sono iconiche della capitale bavarese.',history:'Costruita in 20 anni (1468-1488). Secondo la leggenda, il diavolo vi lasciò la sua impronta.',prayer:'Nostra Signora di Monaco, veglia su di noi e conducici a tuo Figlio. Amen.',feast:'15 agosto (Assunzione)'}},
  {id:703,country:'de',lat:47.557,lng:10.751,icon:'💒',name:'Ettal Abbey',type:'Abbey',city:'Ettal',province:'Bavaria',description:'A Benedictine monastery in the Bavarian Alps, founded in 1330, housing a miraculous marble image of Our Lady. Famous for its distillery and as a centre of learning and culture.',history:'Founded by Emperor Louis IV, the abbey was largely rebuilt in the 18th century after a fire. It runs one of Germany\'s top boarding schools. The Baroque church is one of the finest in Bavaria.',prayer:'Our Lady of Ettal, Queen enthroned in the mountains, may your alpine home remind us of the heights to which God calls each of us. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Abadía de Ettal',type:'Abadía',city:'Ettal',province:'Baviera',description:'Un monasterio benedictino en los Alpes bávaros, fundado en 1330, que alberga una milagrosa imagen de mármol de Nuestra Señora. Famoso por su destilería y como centro de aprendizaje y cultura.',history:'Fundada por el emperador Luis IV, la abadía fue reconstruida en gran parte en el siglo XVIII tras un incendio. Gestiona uno de los mejores internados de Alemania. La iglesia barroca es una de las más bellas de Baviera.',prayer:'Nuestra Señora de Ettal, Reina entronizada en las montañas, que tu hogar alpino nos recuerde las alturas a las que Dios llama a cada uno de nosotros. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'},fr:{name:'Abbaye d\'Ettal',type:'Abbaye',city:'Ettal',province:'Bavière',description:'Monastère bénédictin dans les Alpes bavaroises fondé en 1330 avec une image miraculeuse de Notre-Dame.',history:'Fondée par l\'empereur Louis IV. Reconstruite au XVIIIe siècle. L\'église baroque est l\'une des plus belles de Bavière.',prayer:'Notre-Dame d\'Ettal, que ton foyer alpin nous rappelle les hauteurs auxquelles Dieu nous appelle. Amen.',feast:'8 décembre (Immaculée Conception)'},it:{name:'Abbazia di Ettal',type:'Abbazia',city:'Ettal',province:'Baviera',description:'Monastero benedettino nelle Alpi bavaresi fondato nel 1330 con un\'immagine miracolosa di Nostra Signora.',history:'Fondato dall\'imperatore Ludovico IV. Ricostruito nel XVIII secolo. La chiesa barocca è una delle più belle della Baviera.',prayer:'Nostra Signora di Ettal, che la tua dimora alpina ci ricordi le altezze a cui Dio ci chiama. Amen.',feast:'8 dicembre (Immacolata Concezione)'}},
  {id:704,country:'de',lat:48.223,lng:12.676,icon:'🌟',name:'Sanctuary of Altötting',type:'Sanctuary',city:'Altötting',province:'Bavaria',description:'Bavaria\'s most important Marian pilgrimage site, home to the Black Madonna of Altötting. The Chapel of Grace is the heart of this ancient shrine visited by millions.',history:'Miracles were reported here as early as 1489. Bavaria\'s royal House of Wittelsbach gave special patronage to the shrine. Joseph Ratzinger (later Pope Benedict XVI) was baptised nearby and maintained lifelong devotion to Our Lady of Altötting.',prayer:'Our Lady of Altötting, Black Madonna of Bavaria, you have heard the prayers of millions. Hear ours too, and bring them to your Son Jesus. Amen.',feast:'August 15 (Assumption)',es:{name:'Santuario de Altötting',type:'Santuario',city:'Altötting',province:'Baviera',description:'El lugar de peregrinación mariana más importante de Baviera, hogar de la Virgen Negra de Altötting. La Capilla de la Gracia es el corazón de este antiguo santuario visitado por millones.',history:'Los milagros aquí fueron reportados ya en 1489. La casa real bávara de los Wittelsbach dio especial patronazgo al santuario. Joseph Ratzinger (luego Papa Benedicto XVI) fue bautizado cerca y mantuvo devoción de por vida a Nuestra Señora de Altötting.',prayer:'Nuestra Señora de Altötting, Virgen Negra de Baviera, has escuchado las oraciones de millones. Escucha también las nuestras y llévalas a tu Hijo Jesús. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Sanctuaire d\'Altötting',type:'Sanctuaire',city:'Altötting',province:'Bavière',description:'Le plus important lieu de pèlerinage marial de Bavière avec la Vierge Noire d\'Altötting.',history:'Miracles rapportés dès 1489. Joseph Ratzinger (Benoît XVI) garda une dévotion de toute sa vie.',prayer:'Notre-Dame d\'Altötting, Vierge Noire de Bavière, entends nos prières et porte-les à ton Fils Jésus. Amen.',feast:'15 août (Assomption)'},it:{name:'Santuario di Altötting',type:'Santuario',city:'Altötting',province:'Baviera',description:'Il più importante luogo di pellegrinaggio mariano della Baviera con la Madonna Nera di Altötting.',history:'Miracoli segnalati dal 1489. Joseph Ratzinger (Benedetto XVI) mantenne una devozione per tutta la vita.',prayer:'Nostra Signora di Altötting, Madonna Nera della Baviera, ascolta le nostre preghiere e portale a tuo Figlio Gesù. Amen.',feast:'15 agosto (Assunzione)'}},
  {id:705,country:'de',lat:50.939,lng:6.957,icon:'🏰',name:'Cologne Cathedral',type:'Cathedral',city:'Cologne',province:'North Rhine-Westphalia',description:'A UNESCO World Heritage Site and one of the greatest Gothic cathedrals in the world. It houses the Shrine of the Three Kings, the largest medieval reliquary in the Western world.',history:'Construction began in 1248 and was not completed until 1880 — over 600 years. The cathedral survived World War II bombing while surrounding Cologne was devastated. It remains Germany\'s most visited landmark.',prayer:'Lord, the Three Magi came from afar seeking you and offered their finest gifts. May we too seek you with the same determination and offer you the gift of our lives. Amen.',feast:'January 6 (Epiphany)',es:{name:'Catedral de Colonia',type:'Catedral',city:'Colonia',province:'Renania del Norte-Westfalia',description:'Patrimonio de la Humanidad de la UNESCO y una de las mayores catedrales góticas del mundo. Alberga el Relicario de los Reyes Magos, el relicario medieval más grande del mundo occidental.',history:'La construcción comenzó en 1248 y no se completó hasta 1880, más de 600 años. La catedral sobrevivió a los bombardeos de la Segunda Guerra Mundial mientras el Colonia circundante quedaba devastado. Sigue siendo el monumento más visitado de Alemania.',prayer:'Señor, los Tres Magos vinieron de lejos buscándote y ofrecieron sus mejores dones. Que nosotros también te busquemos con la misma determinación y te ofrezcamos el don de nuestras vidas. Amén.',feast:'6 de enero (Epifanía)'},fr:{name:'Cathédrale de Cologne',type:'Cathédrale',city:'Cologne',province:'Rhénanie-du-Nord-Westphalie',description:'Patrimoine mondial et l\'une des plus grandes cathédrales gothiques. Abrite le Reliquaire des Rois Mages.',history:'Construction de 1248 à 1880. Survécut aux bombardements de la Seconde Guerre mondiale.',prayer:'Seigneur, que nous te cherchions avec la même détermination que les Mages et t\'offrions nos vies. Amen.',feast:'6 janvier (Épiphanie)'},it:{name:'Cattedrale di Colonia',type:'Cattedrale',city:'Colonia',province:'Renania Settentrionale-Vestfalia',description:'Patrimonio dell\'Umanità e una delle più grandi cattedrali gotiche. Custodisce il Reliquiario dei Re Magi.',history:'Costruzione dal 1248 al 1880. Sopravvisse ai bombardamenti della Seconda Guerra Mondiale.',prayer:'Signore, che ti cerchiamo con la stessa determinazione dei Magi e ti offriamo le nostre vite. Amen.',feast:'6 gennaio (Epifania)'}},

  // ===== AUSTRIA =====
  {id:801,country:'at',lat:47.772,lng:15.323,icon:'🏔️',name:'Mariazell Basilica',type:'Basilica',city:'Mariazell',province:'Styria',description:'The most important pilgrimage destination in Central Europe, drawing pilgrims from Austria, Hungary, Czech Republic, Slovakia and beyond. Home to the miraculous statue of the Madonna of Mariazell.',history:'Founded in 1157 when Benedictine monk Magnus placed a linden wood statue of the Madonna on a rock. The basilica was rebuilt in Baroque style in the 17th century. Fourteen Habsburg emperors visited.',prayer:'Mother of Mercy, Gate of Heaven, help of those who call upon you, we come to lay our needs before your throne. Take them to the heart of your Son Jesus. Amen.',feast:'September 8',es:{name:'Basílica de Mariazell',type:'Basílica',city:'Mariazell',province:'Estiria',description:'El destino de peregrinación más importante de Europa Central, que atrae peregrinos de Austria, Hungría, República Checa, Eslovaquia y más allá. Hogar de la milagrosa imagen de la Madonna de Mariazell.',history:'Fundada en 1157 cuando el monje benedictino Magnus colocó una estatua de madera de tilo de la Madonna sobre una roca. La basílica fue reconstruida en estilo barroco en el siglo XVII. Catorce emperadores habsburgo la visitaron.',prayer:'Madre de Misericordia, Puerta del Cielo, auxilio de quienes te invocan, venimos a depositar nuestras necesidades ante tu trono. Llévalas al corazón de tu Hijo Jesús. Amén.',feast:'8 de septiembre'},fr:{name:'Basilique de Mariazell',type:'Basilique',city:'Mariazell',province:'Styrie',description:'La destination de pèlerinage la plus importante d\'Europe centrale.',history:'Fondée en 1157. Reconstruite en baroque au XVIIe siècle. Quatorze empereurs Habsbourg la visitèrent.',prayer:'Mère de Miséricorde, nous venons déposer nos besoins devant ton trône. Porte-les au cœur de ton Fils. Amen.',feast:'8 septembre'},it:{name:'Basilica di Mariazell',type:'Basilica',city:'Mariazell',province:'Stiria',description:'La destinazione di pellegrinaggio più importante dell\'Europa centrale.',history:'Fondata nel 1157. Ricostruita in barocco nel XVII secolo. Quattordici imperatori asburgici la visitarono.',prayer:'Madre di Misericordia, veniamo a deporre le nostre necessità davanti al tuo trono. Portale al cuore di tuo Figlio. Amen.',feast:'8 settembre'}},
  {id:802,country:'at',lat:48.208,lng:16.373,icon:'🎵',name:'Saint Stephen\'s Cathedral',type:'Cathedral',city:'Vienna',province:'Vienna',description:'The mother church of the Archdiocese of Vienna and one of Europe\'s greatest Gothic cathedrals. The multicoloured tile roof and soaring South Tower are symbols of Vienna.',history:'Built between 1137 and 1511. The famous Pummerin bell was recast from Ottoman cannons captured at the 1683 Battle of Vienna. Mozart\'s funeral was held here. The Habsburg catacombs lie beneath.',prayer:'Lord, in this cathedral where emperors prayed and saints were honoured, may we too find you present in the beauty of your house. Amen.',feast:'August 15 (Assumption — Cathedral dedication)',es:{name:'Catedral de San Esteban',type:'Catedral',city:'Viena',province:'Viena',description:'La iglesia madre de la Archidiócesis de Viena y una de las mayores catedrales góticas de Europa. El tejado de tejas multicolores y la imponente Torre Sur son símbolos de Viena.',history:'Construida entre 1137 y 1511. La famosa campana Pummerin fue refundida con cañones otomanos capturados en la batalla de Viena de 1683. El funeral de Mozart se celebró aquí. Las catacumbas de los Habsburgo se encuentran debajo.',prayer:'Señor, en esta catedral donde rezaron emperadores y se honró a los santos, que nosotros también te encontremos presente en la belleza de tu templo. Amén.',feast:'15 de agosto (Asunción — dedicación)'},fr:{name:'Cathédrale Saint-Étienne',type:'Cathédrale',city:'Vienne',province:'Vienne',description:'L\'une des plus grandes cathédrales gothiques d\'Europe. Le toit multicolore et la Tour Sud symbolisent Vienne.',history:'Construite entre 1137 et 1511. La cloche Pummerin fut refondue avec des canons ottomans de 1683. Funérailles de Mozart.',prayer:'Seigneur, que nous te trouvions dans la beauté de ta maison. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Santo Stefano',type:'Cattedrale',city:'Vienna',province:'Vienna',description:'Una delle più grandi cattedrali gotiche d\'Europa. Il tetto multicolore e la Torre Sud simboleggiano Vienna.',history:'Costruita tra il 1137 e il 1511. La campana Pummerin fu rifusa con cannoni ottomani del 1683. Funerale di Mozart.',prayer:'Signore, che ti troviamo nella bellezza della tua casa. Amen.',feast:'15 agosto (Assunzione)'}},
  {id:803,country:'at',lat:47.803,lng:13.045,icon:'✝️',name:'Nonnberg Abbey',type:'Abbey',city:'Salzburg',province:'Salzburg',description:'The oldest convent in the German-speaking world, founded around 714 AD by Saint Rupert. It overlooks Salzburg from its rocky perch and was immortalised in The Sound of Music.',history:'Founded by Saint Rupert and his niece Saint Erentrudis, the first abbess. The Romanesque church dates from the 12th century. The convent has been continuously inhabited by Benedictine nuns for over 1,300 years.',prayer:'Lord, in this place consecrated to your praise for over thirteen centuries, may the prayers of the nuns of Nonnberg rise with ours to you as a sweet fragrance. Amen.',feast:'June 30 (Saint Erentrudis)',es:{name:'Abadía de Nonnberg',type:'Abadía',city:'Salzburgo',province:'Salzburgo',description:'El convento más antiguo del mundo de habla alemana, fundado hacia el año 714 d.C. por San Ruperto. Domina Salzburgo desde su emplazamiento rocoso y fue inmortalizado en Sonrisas y lágrimas.',history:'Fundada por San Ruperto y su sobrina Santa Erentruda, la primera abadesa. La iglesia románica data del siglo XII. El convento ha sido habitado de forma continua por monjas benedictinas durante más de 1.300 años.',prayer:'Señor, en este lugar consagrado a tu alabanza durante más de trece siglos, que las oraciones de las monjas de Nonnberg se unan a las nuestras hacia ti como suave fragancia. Amén.',feast:'30 de junio (Santa Erentruda)'},fr:{name:'Abbaye de Nonnberg',type:'Abbaye',city:'Salzbourg',province:'Salzbourg',description:'Le plus ancien couvent du monde germanophone, fondé vers 714 par saint Rupert. Immortalisé dans La Mélodie du bonheur.',history:'Habité continuellement par des bénédictines depuis plus de 1 300 ans.',prayer:'Seigneur, que les prières des moniales s\'élèvent avec les nôtres vers toi. Amen.',feast:'30 juin (Sainte Erentrudis)'},it:{name:'Abbazia di Nonnberg',type:'Abbazia',city:'Salisburgo',province:'Salisburgo',description:'Il convento più antico del mondo germanofono, fondato verso il 714 da San Ruperto. Immortalato in Tutti insieme appassionatamente.',history:'Abitato continuamente da benedettine da oltre 1.300 anni.',prayer:'Signore, che le preghiere delle monache si uniscano alle nostre verso di te. Amen.',feast:'30 giugno (Santa Erentrude)'}},
  {id:804,country:'at',lat:47.279,lng:11.393,icon:'⛰️',name:'Wilten Basilica',type:'Basilica',city:'Innsbruck',province:'Tyrol',description:'A stunning yellow Baroque basilica in the Tyrolian capital, housing a revered 14th-century statue of Our Lady known as the Patroness of Tyrol, Magna Mater Austriae.',history:'The basilica was built between 1751 and 1756. The statue of Our Lady was already venerated in the 14th century. Emperor Franz Joseph visited in 1883 and elevated it to the status of basilica.',prayer:'Our Lady, Great Mother of Austria, under your mantle this Alpine land has sheltered for centuries. Continue to watch over us and our families. Amen.',feast:'September 8',es:{name:'Basílica de Wilten',type:'Basílica',city:'Innsbruck',province:'Tirol',description:'Una impresionante basílica barroca amarilla en la capital tirolesa, que alberga una venerada estatua del siglo XIV de Nuestra Señora, conocida como la Patrona del Tirol, Magna Mater Austriae.',history:'La basílica fue construida entre 1751 y 1756. La estatua de Nuestra Señora ya era venerada en el siglo XIV. El emperador Francisco José la visitó en 1883 y la elevó al rango de basílica.',prayer:'Nuestra Señora, Gran Madre de Austria, bajo tu manto esta tierra alpina ha encontrado cobijo durante siglos. Continúa velando por nosotros y nuestras familias. Amén.',feast:'8 de septiembre'},fr:{name:'Basilique de Wilten',type:'Basilique',city:'Innsbruck',province:'Tyrol',description:'Magnifique basilique baroque jaune avec la statue vénérée de la Magna Mater Austriae.',history:'Construite entre 1751 et 1756. Élevée au rang de basilique par François-Joseph en 1883.',prayer:'Notre-Dame, Grande Mère d\'Autriche, continue de veiller sur nous et nos familles. Amen.',feast:'8 septembre'},it:{name:'Basilica di Wilten',type:'Basilica',city:'Innsbruck',province:'Tirolo',description:'Splendida basilica barocca gialla con la venerata statua della Magna Mater Austriae.',history:'Costruita tra il 1751 e il 1756. Elevata a basilica da Francesco Giuseppe nel 1883.',prayer:'Nostra Signora, Grande Madre d\'Austria, continua a vegliare su di noi e le nostre famiglie. Amen.',feast:'8 settembre'}},
  {id:805,country:'at',lat:48.361,lng:14.513,icon:'📿',name:'Kremsmünster Abbey',type:'Abbey',city:'Kremsmünster',province:'Upper Austria',description:'One of Austria\'s oldest and most magnificent Benedictine abbeys, founded in 777 AD by Duke Tassilo III. Its fish ponds, observatory and library make it a remarkable cultural and spiritual landmark.',history:'Founded as a memorial to Duke Tassilo\'s son killed in a hunting accident. The abbey has operated continuously for over 1,200 years and houses the Tassilo Chalice, one of the finest pieces of early medieval art.',prayer:'Lord, like Duke Tassilo who gave his grief to God, may we too transform our sorrows into offerings of love and build something lasting for your glory. Amen.',feast:'October 11 (Saint Gunther)',es:{name:'Abadía de Kremsmünster',type:'Abadía',city:'Kremsmünster',province:'Alta Austria',description:'Una de las abadías benedictinas más antiguas y magníficas de Austria, fundada en el año 777 d.C. por el duque Tasilo III. Sus estanques de peces, observatorio y biblioteca la convierten en un notable hito cultural y espiritual.',history:'Fundada en memoria del hijo del duque Tasilo, muerto en una cacería. La abadía ha funcionado de forma continua durante más de 1.200 años y alberga el Cáliz de Tasilo, una de las mejores piezas del arte medieval temprano.',prayer:'Señor, como el duque Tasilo que entregó su dolor a Dios, que nosotros también transformemos nuestros sufrimientos en ofrendas de amor y construyamos algo duradero para tu gloria. Amén.',feast:'11 de octubre (San Günther)'},fr:{name:'Abbaye de Kremsmünster',type:'Abbaye',city:'Kremsmünster',province:'Haute-Autriche',description:'L\'une des plus anciennes abbayes bénédictines d\'Autriche, fondée en 777 par le duc Tassilo III.',history:'Fonctionne depuis plus de 1 200 ans. Abrite le Calice de Tassilo, chef-d\'œuvre de l\'art médiéval.',prayer:'Seigneur, que nous transformions nos peines en offrandes d\'amour pour ta gloire. Amen.',feast:'11 octobre (Saint Günther)'},it:{name:'Abbazia di Kremsmünster',type:'Abbazia',city:'Kremsmünster',province:'Alta Austria',description:'Una delle più antiche abbazie benedettine d\'Austria, fondata nel 777 dal duca Tassilone III.',history:'Funziona da oltre 1.200 anni. Custodisce il Calice di Tassilone, capolavoro dell\'arte medievale.',prayer:'Signore, che trasformiamo le nostre sofferenze in offerte d\'amore per la tua gloria. Amen.',feast:'11 ottobre (San Günther)'}},

  // ===== CROATIA =====
  {id:901,country:'hr',lat:43.194,lng:17.677,icon:'🌟',name:'Shrine of Our Lady of Medjugorje',type:'Marian shrine',city:'Međugorje',province:'Herzegovina',description:'One of the most visited pilgrimage sites in the world, where six visionaries have reported apparitions of the Virgin Mary since 1981. Millions of pilgrims come each year seeking peace and conversion.',history:'The first apparition occurred on June 24, 1981. The messages emphasise prayer, fasting, conversion, peace and faith. The Church is still investigating the apparitions. An estimated 40 million pilgrims have visited.',prayer:'Our Lady of Medjugorje, Queen of Peace, you call us to prayer, fasting and conversion. Help us to respond to your messages and become apostles of your peace. Amen.',feast:'June 25 (Anniversary of the apparitions)',es:{name:'Santuario de Nuestra Señora de Medjugorje',type:'Santuario mariano',city:'Medjugorje',province:'Herzegovina',description:'Uno de los lugares de peregrinación más visitados del mundo, donde seis videntes han relatado apariciones de la Virgen María desde 1981. Millones de peregrinos acuden cada año buscando paz y conversión.',history:'La primera aparición ocurrió el 24 de junio de 1981. Los mensajes enfatizan la oración, el ayuno, la conversión, la paz y la fe. La Iglesia sigue investigando las apariciones. Se estima que 40 millones de peregrinos han visitado el lugar.',prayer:'Nuestra Señora de Medjugorje, Reina de la Paz, nos llamas a la oración, el ayuno y la conversión. Ayúdanos a responder a tus mensajes y a convertirnos en apóstoles de tu paz. Amén.',feast:'25 de junio (Aniversario de las apariciones)'},fr:{name:'Sanctuaire de Notre-Dame de Medjugorje',type:'Sanctuaire marial',city:'Medjugorje',province:'Herzégovine',description:'L\'un des lieux les plus visités au monde. Six voyants rapportent des apparitions de la Vierge depuis 1981.',history:'Première apparition le 24 juin 1981. Les messages insistent sur prière, jeûne et conversion. Environ 40 millions de pèlerins.',prayer:'Notre-Dame de Medjugorje, Reine de la Paix, aide-nous à devenir des apôtres de ta paix. Amen.',feast:'25 juin (Anniversaire des apparitions)'},it:{name:'Santuario di Nostra Signora di Medjugorje',type:'Santuario mariano',city:'Medjugorje',province:'Erzegovina',description:'Uno dei luoghi più visitati al mondo. Sei veggenti riferiscono apparizioni della Vergine dal 1981.',history:'Prima apparizione il 24 giugno 1981. I messaggi insistono su preghiera, digiuno e conversione. Circa 40 milioni di pellegrini.',prayer:'Nostra Signora di Medjugorje, Regina della Pace, aiutaci a diventare apostoli della tua pace. Amen.',feast:'25 giugno (Anniversario delle apparizioni)'}},
  {id:902,country:'hr',lat:43.508,lng:16.440,icon:'⛪',name:'Cathedral of Saint Domnius',type:'Cathedral',city:'Split',province:'Dalmatia',description:'The world\'s oldest cathedral in continuous use, converted from the mausoleum of Roman Emperor Diocletian — the very emperor who persecuted Saint Domnius, whose relics it now houses.',history:'Built as Diocletian\'s mausoleum in the 4th century, it was converted to a Christian cathedral in the 7th century. The ancient columns and peristyle of the original Roman palace still surround it.',prayer:'Saint Domnius, martyr of Salona, whose relics rest in the tomb of the very emperor who condemned you — a remarkable reversal! Help us to trust in God\'s ultimate victory. Amen.',feast:'May 7 (Saint Domnius)',es:{name:'Catedral de San Doymo',type:'Catedral',city:'Split',province:'Dalmacia',description:'La catedral del mundo en uso continuo más antigua, convertida del mausoleo del emperador romano Diocleciano, el mismo que persiguió a San Doymo, cuyas reliquias alberga ahora.',history:'Construida como mausoleo de Diocleciano en el siglo IV, fue convertida en catedral cristiana en el siglo VII. Las antiguas columnas y el peristilo del palacio romano original aún la rodean.',prayer:'San Doymo, mártir de Salona, cuyas reliquias reposan en la tumba del mismo emperador que te condenó, ¡una notable inversión! Ayúdanos a confiar en la victoria final de Dios. Amén.',feast:'7 de mayo (San Doymo)'},fr:{name:'Cathédrale Saint-Domnius',type:'Cathédrale',city:'Split',province:'Dalmatie',description:'La plus ancienne cathédrale en usage continu, convertie du mausolée de Dioclétien.',history:'Mausolée du IVe siècle converti en cathédrale au VIIe siècle.',prayer:'Saint Domnius, aide-nous à croire en la victoire finale de Dieu. Amen.',feast:'7 mai (Saint Domnius)'},it:{name:'Cattedrale di San Doimo',type:'Cattedrale',city:'Spalato',province:'Dalmazia',description:'La cattedrale in uso continuo più antica al mondo, convertita dal mausoleo di Diocleziano.',history:'Mausoleo del IV secolo convertito in cattedrale nel VII secolo.',prayer:'San Doimo, aiutaci a credere nella vittoria finale di Dio. Amen.',feast:'7 maggio (San Doimo)'}},
  {id:903,country:'hr',lat:45.814,lng:15.977,icon:'🏛️',name:'Zagreb Cathedral',type:'Cathedral',city:'Zagreb',province:'Zagreb',description:'The tallest building in Croatia and the most monumental building of Gothic style in southeastern Europe. It dominates the Zagreb skyline with its twin neo-Gothic spires.',history:'The first cathedral was consecrated in 1217. Destroyed by the Mongols in 1242 and rebuilt. The current neo-Gothic appearance results from extensive rebuilding after the 1880 earthquake. It houses the tomb of Cardinal Alojzije Stepinac.',prayer:'Blessed Cardinal Stepinac, you defended human dignity and the rights of your people at the cost of your freedom. Pray for Croatia and all those who suffer for justice. Amen.',feast:'February 10 (Blessed Alojzije Stepinac)',es:{name:'Catedral de Zagreb',type:'Catedral',city:'Zagreb',province:'Zagreb',description:'El edificio más alto de Croacia y el más monumental en estilo gótico del sureste de Europa. Domina el horizonte de Zagreb con sus dos agujas neogóticas.',history:'La primera catedral fue consagrada en 1217. Destruida por los mongoles en 1242 y reconstruida. El aspecto neogótico actual es el resultado de una amplia reconstrucción tras el terremoto de 1880. Alberga la tumba del cardenal Alojzije Stepinac.',prayer:'Beato cardenal Stepinac, defendiste la dignidad humana y los derechos de tu pueblo al precio de tu libertad. Ruega por Croacia y por todos los que sufren por la justicia. Amén.',feast:'10 de febrero (Beato Alojzije Stepinac)'},fr:{name:'Cathédrale de Zagreb',type:'Cathédrale',city:'Zagreb',province:'Zagreb',description:'Le bâtiment le plus haut de Croatie en style gothique. Abrite la tombe du cardinal Stepinac.',history:'Première consécration en 1217. Reconstruite en néogothique après le séisme de 1880.',prayer:'Bienheureux Stepinac, prie pour la Croatie et tous ceux qui souffrent pour la justice. Amen.',feast:'10 février (Bienheureux Stepinac)'},it:{name:'Cattedrale di Zagabria',type:'Cattedrale',city:'Zagabria',province:'Zagabria',description:'L\'edificio più alto della Croazia in stile gotico. Custodisce la tomba del cardinale Stepinac.',history:'Prima consacrazione nel 1217. Ricostruita in neogotico dopo il terremoto del 1880.',prayer:'Beato Stepinac, prega per la Croazia e tutti coloro che soffrono per la giustizia. Amen.',feast:'10 febbraio (Beato Stepinac)'}},
  {id:904,country:'hr',lat:45.327,lng:14.442,icon:'🌊',name:'Sanctuary of Our Lady of Trsat',type:'Sanctuary',city:'Rijeka',province:'Primorje',description:'Perched on a cliff above Rijeka, Trsat is one of the oldest and most visited Marian shrines in Croatia. Legend holds that the Holy House of Nazareth stopped here on its way to Loreto.',history:'The shrine dates to the 13th century. A 13th-century chapel was built by Prince Nicholas Frankopan after miraculous cures were reported. The current church was rebuilt in Baroque style. A monumental staircase of 561 steps leads up to it.',prayer:'Our Lady of Trsat, who rested on this cliff above the sea, give rest to our hearts too. Be our companion on every journey and bring us safely home. Amen.',feast:'May 10 (Our Lady of Trsat)',es:{name:'Santuario de Nuestra Señora de Trsat',type:'Santuario',city:'Rijeka',province:'Primorje',description:'Enclavado en un acantilado sobre Rijeka, Trsat es uno de los santuarios marianos más antiguos y visitados de Croacia. La leyenda cuenta que la Santa Casa de Nazaret se detuvo aquí de camino a Loreto.',history:'El santuario data del siglo XIII. El príncipe Nicolás Frankopan construyó una capilla del siglo XIII tras relatarse curaciones milagrosas. La actual iglesia fue reconstruida en estilo barroco. Una escalinata monumental de 561 escalones sube hasta ella.',prayer:'Nuestra Señora de Trsat, que reposaste en este acantilado sobre el mar, da también descanso a nuestros corazones. Sé nuestra compañera en cada viaje y llévanos sanos a casa. Amén.',feast:'10 de mayo (Nuestra Señora de Trsat)'},fr:{name:'Sanctuaire de Notre-Dame de Trsat',type:'Sanctuaire',city:'Rijeka',province:'Primorje',description:'L\'un des plus anciens sanctuaires mariaux de Croatie, sur une falaise au-dessus de Rijeka.',history:'Date du XIIIe siècle. Escalier monumental de 561 marches.',prayer:'Notre-Dame de Trsat, donne le repos à nos cœurs. Sois notre compagne à chaque voyage. Amen.',feast:'10 mai (Notre-Dame de Trsat)'},it:{name:'Santuario di Nostra Signora di Trsat',type:'Santuario',city:'Rijeka',province:'Primorje',description:'Uno dei più antichi santuari mariani della Croazia, su una scogliera sopra Rijeka.',history:'Risale al XIII secolo. Scalinata monumentale di 561 gradini.',prayer:'Nostra Signora di Trsat, dai riposo ai nostri cuori. Sii la nostra compagna in ogni viaggio. Amen.',feast:'10 maggio (Nostra Signora di Trsat)'}},
  {id:905,country:'hr',lat:43.509,lng:17.000,icon:'💒',name:'Cathedral of Saint James',type:'Cathedral',city:'Šibenik',province:'Dalmatia',description:'A UNESCO World Heritage Site and one of the most significant architectural monuments of the Renaissance period. Built entirely of stone without any brick or wood, a remarkable engineering achievement.',history:'Construction spanned 105 years (1431–1536). Three architects oversaw the building. The innovative all-stone construction technique developed here influenced architecture across the Mediterranean.',prayer:'Saint James, patron of pilgrims, may your cathedral inspire us with the perseverance of its builders, who worked across generations for the glory of God. Amen.',feast:'July 25 (Saint James)',es:{name:'Catedral de Santiago',type:'Catedral',city:'Šibenik',province:'Dalmacia',description:'Patrimonio de la Humanidad de la UNESCO y uno de los monumentos arquitectónicos más significativos del período renacentista. Construida íntegramente en piedra, sin ladrillo ni madera, un notable logro de ingeniería.',history:'La construcción se prolongó 105 años (1431-1536). Tres arquitectos supervisaron las obras. La innovadora técnica de construcción en piedra desarrollada aquí influyó en la arquitectura de todo el Mediterráneo.',prayer:'Santiago apóstol, patrón de los peregrinos, que tu catedral nos inspire con la perseverancia de sus constructores, que trabajaron a lo largo de generaciones para la gloria de Dios. Amén.',feast:'25 de julio (Santiago Apóstol)'},fr:{name:'Cathédrale Saint-Jacques',type:'Cathédrale',city:'Šibenik',province:'Dalmatie',description:'Patrimoine mondial. Monument Renaissance construit entièrement en pierre, sans brique ni bois.',history:'Construction de 1431 à 1536. La technique en pierre influença l\'architecture méditerranéenne.',prayer:'Saint Jacques, que ta cathédrale nous inspire par la persévérance de ses bâtisseurs. Amen.',feast:'25 juillet (Saint Jacques)'},it:{name:'Cattedrale di San Giacomo',type:'Cattedrale',city:'Sebenico',province:'Dalmazia',description:'Patrimonio dell\'Umanità. Monumento rinascimentale costruito interamente in pietra, senza mattoni né legno.',history:'Costruzione dal 1431 al 1536. La tecnica in pietra influenzò l\'architettura mediterranea.',prayer:'San Giacomo, che la tua cattedrale ci ispiri con la perseveranza dei suoi costruttori. Amen.',feast:'25 luglio (San Giacomo)'}},

  // ===== MEXICO =====
