  {id:1001,country:'mx',lat:19.4846,lng:-99.1177,icon:'🌹',name:'Basilica of Our Lady of Guadalupe',type:'Marian shrine',city:'Mexico City',province:'Mexico City',description:'The most visited Catholic pilgrimage site in the world after the Vatican, receiving over 20 million pilgrims a year. Home to the miraculous tilma of Juan Diego, imprinted with the image of Our Lady.',history:'The Virgin Mary appeared to the indigenous Juan Diego in 1531 on Tepeyac Hill. The image of Our Lady miraculously appeared on his cloak. The current modern basilica was built in 1974 next to the original church. Juan Diego was canonised by Pope John Paul II in 2002.',prayer:'Our Lady of Guadalupe, Mother of all the Americas, you appeared to the humble Juan Diego and left us your image as a sign of your love. Protect your people and draw all hearts to your Son Jesus. Amen.',feast:'December 12',es:{name:'Basílica de Nuestra Señora de Guadalupe',type:'Santuario mariano',city:'Ciudad de México',province:'Ciudad de México',description:'El lugar de peregrinación católica más visitado del mundo después del Vaticano, con más de 20 millones de peregrinos al año. Alberga la milagrosa tilma de Juan Diego, con la imagen de Nuestra Señora impresa en ella.',history:'La Virgen María se apareció al indígena Juan Diego en 1531 en el Cerro del Tepeyac. La imagen de Nuestra Señora apareció milagrosamente en su manto. La moderna basílica actual fue construida en 1974 junto a la iglesia original. Juan Diego fue canonizado por el Papa Juan Pablo II en 2002.',prayer:'Nuestra Señora de Guadalupe, Madre de todas las Américas, te apareciste al humilde Juan Diego y nos dejaste tu imagen como signo de tu amor. Protege a tu pueblo y acerca todos los corazones a tu Hijo Jesús. Amén.',feast:'12 de diciembre'},fr:{name:'Basilique Notre-Dame de Guadalupe',type:'Sanctuaire marial',city:'Mexico',province:'Mexico',description:'Le lieu de pèlerinage le plus visité au monde après le Vatican. Plus de 20 millions de pèlerins par an.',history:'La Vierge apparut à Juan Diego en 1531. L\'image apparut sur sa tilma. Canonisé en 2002.',prayer:'Notre-Dame de Guadalupe, Mère des Amériques, protège ton peuple et attire tous les cœurs vers ton Fils. Amen.',feast:'12 décembre'},it:{name:'Basilica di Nostra Signora di Guadalupe',type:'Santuario mariano',city:'Città del Messico',province:'Città del Messico',description:'Il luogo di pellegrinaggio più visitato al mondo dopo il Vaticano. Oltre 20 milioni di pellegrini all\'anno.',history:'La Vergine apparve a Juan Diego nel 1531. L\'immagine apparve sulla sua tilma. Canonizzato nel 2002.',prayer:'Nostra Signora di Guadalupe, Madre delle Americhe, proteggi il tuo popolo e attira tutti i cuori verso tuo Figlio. Amen.',feast:'12 dicembre'}},
  {id:1002,country:'mx',lat:21.0036,lng:-102.3244,icon:'⭐',name:'Sanctuary of Our Lady of San Juan de los Lagos',type:'Marian shrine',city:'San Juan de los Lagos',province:'Jalisco',description:'One of the most important Marian shrines in Mexico, receiving over 8 million pilgrims a year. The small ceramic image of the Immaculate Conception has been venerated here since the 17th century.',history:'The image was brought by Franciscan missionaries in 1542. In 1623 a miraculous healing was attributed to it and devotion spread rapidly. The current neo-classical basilica dates from the 18th century. It is the second most visited shrine in Mexico.',prayer:'Our Lady of San Juan de los Lagos, you have heard the prayers of millions of pilgrims who cross deserts and mountains to reach you. Hear our prayer too and bring us closer to your Son. Amen.',feast:'February 2 (Candlemas)',es:{name:'Santuario de Nuestra Señora de San Juan de los Lagos',type:'Santuario mariano',city:'San Juan de los Lagos',province:'Jalisco',description:'Uno de los santuarios marianos más importantes de México, con más de 8 millones de peregrinos al año. La pequeña imagen de cerámica de la Inmaculada Concepción es venerada aquí desde el siglo XVII.',history:'La imagen fue traída por misioneros franciscanos en 1542. En 1623 se le atribuyó una curación milagrosa y la devoción se extendió rápidamente. La actual basílica neoclásica data del siglo XVIII. Es el segundo santuario más visitado de México.',prayer:'Nuestra Señora de San Juan de los Lagos, has escuchado las oraciones de millones de peregrinos que cruzan desiertos y montañas para llegar a ti. Escucha también la nuestra y acércanos a tu Hijo. Amén.',feast:'2 de febrero (Candelaria)'},fr:{name:'Sanctuaire de Notre-Dame de San Juan de los Lagos',type:'Sanctuaire marial',city:'San Juan de los Lagos',province:'Jalisco',description:'L\'un des sanctuaires les plus importants du Mexique avec plus de 8 millions de pèlerins par an.',history:'Image apportée par des franciscains en 1542. Guérison miraculeuse en 1623. Deuxième sanctuaire du Mexique.',prayer:'Notre-Dame de San Juan de los Lagos, entends notre prière et rapproche-nous de ton Fils. Amen.',feast:'2 février (Chandeleur)'},it:{name:'Santuario di Nostra Signora di San Juan de los Lagos',type:'Santuario mariano',city:'San Juan de los Lagos',province:'Jalisco',description:'Uno dei santuari più importanti del Messico con oltre 8 milioni di pellegrini all\'anno.',history:'Immagine portata dai francescani nel 1542. Guarigione miracolosa nel 1623. Secondo santuario del Messico.',prayer:'Nostra Signora di San Juan de los Lagos, ascolta la nostra preghiera e avvicinaci a tuo Figlio. Amen.',feast:'2 febbraio (Candelora)'}},
  {id:1003,country:'mx',lat:19.2926,lng:-98.2175,icon:'🕯️',name:'Sanctuary of the Lord of Chalma',type:'Sanctuary',city:'Chalma',province:'State of Mexico',description:'The second most visited pilgrimage site in Mexico after Guadalupe. The miraculous image of the Lord of Chalma, a dark-skinned Christ crucified, attracts millions who walk for days to reach it.',history:'An image of Christ appeared miraculously in a cave in 1537, replacing a pre-Hispanic idol. The cave became a chapel, then a church, and today an Augustinian monastery surrounds it. Pilgrims traditionally arrive wearing flower crowns.',prayer:'Lord of Chalma, you appeared in the darkness of a cave to bring light to your people. In the darkest moments of our lives, be our light and our strength. Amen.',feast:'First Sunday of January',es:{name:'Santuario del Señor de Chalma',type:'Santuario',city:'Chalma',province:'Estado de México',description:'El segundo lugar de peregrinación más visitado de México después de Guadalupe. La milagrosa imagen del Señor de Chalma, un Cristo crucificado de tez oscura, atrae a millones que caminan días para llegar.',history:'Una imagen de Cristo apareció milagrosamente en una cueva en 1537, reemplazando a un ídolo prehispánico. La cueva se convirtió en capilla, luego en iglesia, y hoy un monasterio agustino la rodea. Los peregrinos llegan tradicionalmente con coronas de flores.',prayer:'Señor de Chalma, te apareciste en la oscuridad de una cueva para traer luz a tu pueblo. En los momentos más oscuros de nuestra vida, sé nuestra luz y nuestra fortaleza. Amén.',feast:'Primer domingo de enero'},fr:{name:'Sanctuaire du Seigneur de Chalma',type:'Sanctuaire',city:'Chalma',province:'État de Mexico',description:'Deuxième lieu de pèlerinage du Mexique. L\'image d\'un Christ crucifié attire des millions de pèlerins.',history:'Image apparue dans une grotte en 1537. Les pèlerins arrivent avec des couronnes de fleurs.',prayer:'Seigneur de Chalma, dans les moments les plus sombres, sois notre lumière et notre force. Amen.',feast:'Premier dimanche de janvier'},it:{name:'Santuario del Signore di Chalma',type:'Santuario',city:'Chalma',province:'Stato del Messico',description:'Secondo luogo di pellegrinaggio del Messico. L\'immagine di un Cristo crocifisso attira milioni di pellegrini.',history:'Immagine apparsa in una grotta nel 1537. I pellegrini arrivano con corone di fiori.',prayer:'Signore di Chalma, nei momenti più bui, sii la nostra luce e la nostra forza. Amen.',feast:'Prima domenica di gennaio'}},
  {id:1004,country:'mx',lat:19.7074,lng:-98.9829,icon:'🌺',name:'Sanctuary of Our Lady of Ocotlán',type:'Marian shrine',city:'Tlaxcala',province:'Tlaxcala',description:'One of Mexico\'s most beautiful Baroque sanctuaries, built on the site where the Virgin appeared to Juan Diego Bernardino in 1541 during a smallpox epidemic. The elaborate white Churrigueresque facade is extraordinary.',history:'The apparition occurred just ten years after Guadalupe. Our Lady led the indigenous man to a spring of healing water during the smallpox plague. The current church was built over two centuries and is considered the finest example of Mexican Baroque architecture.',prayer:'Our Lady of Ocotlán, you brought healing to the sick and hope to the despairing. May your spring of living water refresh our souls and bring us closer to the source of all life. Amen.',feast:'Third Monday of May',es:{name:'Santuario de Nuestra Señora de Ocotlán',type:'Santuario mariano',city:'Tlaxcala',province:'Tlaxcala',description:'Uno de los santuarios barrocos más hermosos de México, construido en el lugar donde la Virgen se apareció a Juan Diego Bernardino en 1541 durante una epidemia de viruela. La elaborada fachada churrigueresca blanca es extraordinaria.',history:'La aparición ocurrió apenas diez años después de Guadalupe. Nuestra Señora condujo al indígena hacia un manantial de agua curativa durante la plaga de viruela. La iglesia actual fue construida a lo largo de dos siglos y es considerada el mejor ejemplo de arquitectura barroca mexicana.',prayer:'Nuestra Señora de Ocotlán, trajiste curación a los enfermos y esperanza a los desesperados. Que tu manantial de agua viva refresque nuestras almas y nos acerque a la fuente de toda vida. Amén.',feast:'Tercer lunes de mayo'},fr:{name:'Sanctuaire de Notre-Dame d\'Ocotlán',type:'Sanctuaire marial',city:'Tlaxcala',province:'Tlaxcala',description:'L\'un des plus beaux sanctuaires baroques du Mexique. Apparition de la Vierge en 1541 durant une épidémie de variole.',history:'Apparition dix ans après Guadalupe. La Vierge indiqua une source de guérison. Plus bel exemple d\'architecture baroque mexicaine.',prayer:'Notre-Dame d\'Ocotlán, que ta source d\'eau vive rafraîchisse nos âmes. Amen.',feast:'Troisième lundi de mai'},it:{name:'Santuario di Nostra Signora di Ocotlán',type:'Santuario mariano',city:'Tlaxcala',province:'Tlaxcala',description:'Uno dei santuari barocchi più belli del Messico. Apparizione della Vergine nel 1541 durante un\'epidemia di vaiolo.',history:'Apparizione dieci anni dopo Guadalupe. La Vergine indicò una sorgente di guarigione. Miglior esempio di architettura barocca messicana.',prayer:'Nostra Signora di Ocotlán, che la tua sorgente d\'acqua viva rinfreschi le nostre anime. Amen.',feast:'Terzo lunedì di maggio'}},
  {id:1005,country:'mx',lat:20.9670,lng:-89.6237,icon:'🏛️',name:'Cathedral of Mérida',type:'Cathedral',city:'Mérida',province:'Yucatán',description:'The oldest cathedral on the American mainland, begun in 1561. Built with stones from Maya temples, it stands as a symbol of the encounter between two civilisations and the deep roots of Mexican Catholicism.',history:'Construction began in 1561 and was completed in 1598, making it the oldest functioning cathedral in the Americas. It was built partly with stones from the Maya pyramid at T\'hó. It houses the Cristo de las Ampollas, a miraculous image carved from a tree struck by lightning.',prayer:'Lord, in this cathedral built from the stones of ancient temples, may all peoples find unity in you. You are the God of every nation and every culture. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Catedral de Mérida',type:'Catedral',city:'Mérida',province:'Yucatán',description:'La catedral más antigua del continente americano, iniciada en 1561. Construida con piedras de templos mayas, es símbolo del encuentro entre dos civilizaciones y de las profundas raíces del catolicismo mexicano.',history:'La construcción comenzó en 1561 y se completó en 1598, convirtiéndola en la catedral en funcionamiento más antigua de América. Se construyó en parte con piedras de la pirámide maya de T\'hó. Alberga el Cristo de las Ampollas, una imagen milagrosa tallada en un árbol alcanzado por un rayo.',prayer:'Señor, en esta catedral construida con las piedras de los antiguos templos, que todos los pueblos encuentren en ti su unidad. Eres el Dios de cada nación y cada cultura. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'},fr:{name:'Cathédrale de Mérida',type:'Cathédrale',city:'Mérida',province:'Yucatán',description:'La plus ancienne cathédrale du continent américain, commencée en 1561. Construite avec des pierres de temples mayas.',history:'Achevée en 1598. Abrite le Cristo de las Ampollas, image miraculeuse.',prayer:'Seigneur, que tous les peuples trouvent en toi leur unité. Amen.',feast:'8 décembre (Immaculée Conception)'},it:{name:'Cattedrale di Mérida',type:'Cattedrale',city:'Mérida',province:'Yucatán',description:'La cattedrale più antica del continente americano, iniziata nel 1561. Costruita con pietre di templi maya.',history:'Completata nel 1598. Custodisce il Cristo de las Ampollas, immagine miracolosa.',prayer:'Signore, che tutti i popoli trovino in te la loro unità. Amen.',feast:'8 dicembre (Immacolata Concezione)'}},

  // ===== BRAZIL =====
  {id:1101,country:'br',lat:-22.9588,lng:-45.3828,icon:'👑',name:'Basilica of Our Lady of Aparecida',type:'Basilica',city:'Aparecida',province:'São Paulo',description:'The patroness of Brazil and one of the largest Catholic basilicas in the world. The small terracotta image of Our Lady found by fishermen in 1717 draws 12 million pilgrims a year.',history:'Three fishermen found a broken image of Our Lady in the Paraíba River in 1717. The image was declared patroness of Brazil by Pope Pius XI in 1930. Pope John Paul II crowned the image and Pope Francis visited in 2013 for World Youth Day.',prayer:'Our Lady of Aparecida, Patroness of Brazil, you were found broken in the waters of a river and became a source of hope for an entire nation. Mend what is broken in our lives and make us whole in God\'s love. Amen.',feast:'October 12 (Patroness of Brazil)',es:{name:'Basílica de Nuestra Señora de Aparecida',type:'Basílica',city:'Aparecida',province:'São Paulo',description:'La patrona de Brasil y una de las basílicas católicas más grandes del mundo. La pequeña imagen de terracota de Nuestra Señora encontrada por pescadores en 1717 atrae a 12 millones de peregrinos al año.',history:'Tres pescadores encontraron una imagen rota de Nuestra Señora en el río Paraíba en 1717. La imagen fue declarada patrona de Brasil por el Papa Pío XI en 1930. El Papa Juan Pablo II coronó la imagen y el Papa Francisco la visitó en 2013 para la Jornada Mundial de la Juventud.',prayer:'Nuestra Señora de Aparecida, Patrona de Brasil, fuiste encontrada rota en las aguas de un río y te convertiste en fuente de esperanza para toda una nación. Repara lo que está roto en nuestras vidas y hazlos íntegros en el amor de Dios. Amén.',feast:'12 de octubre (Patrona de Brasil)'},fr:{name:'Basilique Notre-Dame d\'Aparecida',type:'Basilique',city:'Aparecida',province:'São Paulo',description:'Patronne du Brésil. L\'une des plus grandes basiliques au monde. 12 millions de pèlerins par an.',history:'Image trouvée brisée dans le fleuve Paraíba en 1717. Patronne du Brésil depuis 1930.',prayer:'Notre-Dame d\'Aparecida, répare ce qui est brisé dans nos vies et rends-nous entiers dans l\'amour de Dieu. Amen.',feast:'12 octobre (Patronne du Brésil)'},it:{name:'Basilica di Nostra Signora di Aparecida',type:'Basilica',city:'Aparecida',province:'San Paolo',description:'Patrona del Brasile. Una delle più grandi basiliche al mondo. 12 milioni di pellegrini all\'anno.',history:'Immagine trovata rotta nel fiume Paraíba nel 1717. Patrona del Brasile dal 1930.',prayer:'Nostra Signora di Aparecida, ripara ciò che è rotto nelle nostre vite e rendici integri nell\'amore di Dio. Amen.',feast:'12 ottobre (Patrona del Brasile)'}},
  {id:1102,country:'br',lat:-1.4554,lng:-48.4898,icon:'🕊️',name:'Basilica of Our Lady of Nazareth',type:'Basilica',city:'Belém',province:'Pará',description:'Home to the famous Círio de Nazaré, the largest Catholic procession in the world with over 2 million participants. The small image of Our Lady of Nazareth has been venerated in Belém since the 18th century.',history:'The image was found in the jungle in 1700. Each October, Belém celebrates the Círio de Nazaré, a massive procession through the city that has taken place for over 225 years. It is listed as UNESCO Intangible Cultural Heritage.',prayer:'Our Lady of Nazareth, carried in procession by millions of hands, may you be carried above all in our hearts. Guide us through the forests of life to the clearing of your Son\'s peace. Amen.',feast:'Second Sunday of October (Círio de Nazaré)',es:{name:'Basílica de Nuestra Señora de Nazaré',type:'Basílica',city:'Belém',province:'Pará',description:'Sede del famoso Círio de Nazaré, la procesión católica más grande del mundo con más de 2 millones de participantes. La pequeña imagen de Nuestra Señora de Nazaré es venerada en Belém desde el siglo XVIII.',history:'La imagen fue encontrada en la selva en 1700. Cada octubre, Belém celebra el Círio de Nazaré, una masiva procesión por la ciudad que lleva más de 225 años realizándose. Está declarada Patrimonio Cultural Inmaterial de la UNESCO.',prayer:'Nuestra Señora de Nazaré, llevada en procesión por millones de manos, que seas llevada sobre todo en nuestros corazones. Guíanos a través de los bosques de la vida hasta el claro de la paz de tu Hijo. Amén.',feast:'Segundo domingo de octubre (Círio de Nazaré)'},fr:{name:'Basilique Notre-Dame de Nazareth',type:'Basilique',city:'Belém',province:'Pará',description:'Siège du Círio de Nazaré, la plus grande procession catholique du monde. Patrimoine immatériel de l\'UNESCO.',history:'Image trouvée dans la jungle en 1700. Le Círio se célèbre depuis plus de 225 ans.',prayer:'Notre-Dame de Nazareth, que tu sois portée avant tout dans nos cœurs. Amen.',feast:'Deuxième dimanche d\'octobre'},it:{name:'Basilica di Nostra Signora di Nazareth',type:'Basilica',city:'Belém',province:'Pará',description:'Sede del Círio de Nazaré, la più grande processione cattolica al mondo. Patrimonio Immateriale UNESCO.',history:'Immagine trovata nella giungla nel 1700. Il Círio si celebra da oltre 225 anni.',prayer:'Nostra Signora di Nazareth, che tu sia portata soprattutto nei nostri cuori. Amen.',feast:'Seconda domenica di ottobre'}},
  {id:1103,country:'br',lat:-12.9714,lng:-38.5014,icon:'⛪',name:'Cathedral Basilica of Salvador',type:'Cathedral',city:'Salvador',province:'Bahia',description:'The oldest Catholic cathedral in Brazil, built by the Jesuits in the 17th century. Salvador was the first capital of colonial Brazil and remains the heart of Afro-Brazilian Catholic devotion.',history:'Built between 1657 and 1672, the cathedral was originally the Jesuit College church. It has an extraordinary gilded interior with Portuguese azulejos tiles. Salvador hosts the most vibrant Catholic popular festivals in Brazil, blending African and European traditions.',prayer:'Lord, in this city where so many peoples met — European, African, indigenous — may your Church be a home for all. Make us one in the diversity of your gifts. Amen.',feast:'November 1 (All Saints)',es:{name:'Catedral Basílica de Salvador',type:'Catedral',city:'Salvador',province:'Bahía',description:'La catedral católica más antigua de Brasil, construida por los jesuitas en el siglo XVII. Salvador fue la primera capital del Brasil colonial y sigue siendo el corazón de la devoción católica afrobrasileña.',history:'Construida entre 1657 y 1672, la catedral fue originalmente la iglesia del Colegio Jesuita. Tiene un extraordinario interior dorado con azulejos portugueses. Salvador acoge los festivales católicos populares más vibrantes de Brasil, mezclando tradiciones africanas y europeas.',prayer:'Señor, en esta ciudad donde se encontraron tantos pueblos — europeos, africanos, indígenas — que tu Iglesia sea un hogar para todos. Haznos uno en la diversidad de tus dones. Amén.',feast:'1 de noviembre (Todos los Santos)'},fr:{name:'Cathédrale Basilique de Salvador',type:'Cathédrale',city:'Salvador',province:'Bahia',description:'La plus ancienne cathédrale du Brésil, construite par les Jésuites au XVIIe siècle.',history:'Construite entre 1657 et 1672. Intérieur doré avec azulejos portugais.',prayer:'Seigneur, que ton Église soit un foyer pour tous. Fais de nous un dans la diversité de tes dons. Amen.',feast:'1er novembre (Toussaint)'},it:{name:'Cattedrale Basilica di Salvador',type:'Cattedrale',city:'Salvador',province:'Bahia',description:'La cattedrale più antica del Brasile, costruita dai Gesuiti nel XVII secolo.',history:'Costruita tra il 1657 e il 1672. Interno dorato con azulejos portoghesi.',prayer:'Signore, che la tua Chiesa sia una casa per tutti. Rendici uno nella diversità dei tuoi doni. Amen.',feast:'1° novembre (Ognissanti)'}},
  {id:1104,country:'br',lat:-15.7942,lng:-47.8825,icon:'✝️',name:'Sanctuary of Dom Bosco',type:'Sanctuary',city:'Brasília',province:'Federal District',description:'Built in 1963 in the newly created capital of Brazil, this iconic sanctuary is famous for its extraordinary blue stained glass windows that bathe the interior in a supernatural light.',history:'Don Bosco, the Italian saint, reportedly had a vision in 1883 of a great civilisation arising between the 15th and 20th parallels in South America. Brasília was built exactly in that region, and this sanctuary was built in his honour.',prayer:'Saint John Bosco, visionary and friend of young people, you dreamed of a great civilisation of peace and justice. May Brazil fulfil the dream God gave you and may its young people build a world of faith. Amen.',feast:'January 31 (Saint John Bosco)',es:{name:'Santuario Dom Bosco',type:'Santuario',city:'Brasilia',province:'Distrito Federal',description:'Construido en 1963 en la recién creada capital de Brasil, este icónico santuario es famoso por sus extraordinarias vidrieras azules que bañan el interior en una luz sobrenatural.',history:'Don Bosco, el santo italiano, tuvo supuestamente una visión en 1883 de una gran civilización que surgiría entre los paralelos 15 y 20 en América del Sur. Brasilia fue construida exactamente en esa región, y este santuario fue construido en su honor.',prayer:'San Juan Bosco, visionario y amigo de los jóvenes, soñaste con una gran civilización de paz y justicia. Que Brasil cumpla el sueño que Dios te dio y que sus jóvenes construyan un mundo de fe. Amén.',feast:'31 de enero (San Juan Bosco)'},fr:{name:'Sanctuaire Dom Bosco',type:'Sanctuaire',city:'Brasília',province:'District Fédéral',description:'Construit en 1963, célèbre pour ses vitraux bleus extraordinaires qui baignent l\'intérieur d\'une lumière surnaturelle.',history:'Don Bosco aurait eu une vision en 1883 d\'une civilisation entre les 15e et 20e parallèles.',prayer:'Saint Jean Bosco, que le Brésil accomplisse le rêve que Dieu t\'a donné. Amen.',feast:'31 janvier (Saint Jean Bosco)'},it:{name:'Santuario Dom Bosco',type:'Santuario',city:'Brasilia',province:'Distretto Federale',description:'Costruito nel 1963, famoso per le straordinarie vetrate blu che bagnano l\'interno di luce soprannaturale.',history:'Don Bosco avrebbe avuto una visione nel 1883 di una civiltà tra il 15° e il 20° parallelo.',prayer:'San Giovanni Bosco, che il Brasile realizzi il sogno che Dio ti ha dato. Amen.',feast:'31 gennaio (San Giovanni Bosco)'}},

  // ===== ARGENTINA =====
  {id:1201,country:'ar',lat:-34.5658,lng:-59.1072,icon:'🌟',name:'Basilica of Our Lady of Luján',type:'Basilica',city:'Luján',province:'Buenos Aires',description:'The patroness of Argentina, Uruguay and Paraguay. The small terracotta image of Our Lady refused to move from Luján in 1630 and has been venerated there ever since. The Gothic basilica receives 7 million pilgrims a year.',history:'According to tradition, an ox cart carrying the image stopped and could not be moved until the image was left behind. A chapel was built, then successive churches, and finally the current neo-Gothic basilica completed in 1937. Pope John Paul II prayed here in 1982.',prayer:'Our Lady of Luján, Patroness of the Southern Cone, you chose to stay among your people and have never abandoned them. Stay with us too, especially in times of crisis and uncertainty. Amen.',feast:'May 8 (Our Lady of Luján)',es:{name:'Basílica de Nuestra Señora de Luján',type:'Basílica',city:'Luján',province:'Buenos Aires',description:'La patrona de Argentina, Uruguay y Paraguay. La pequeña imagen de terracota de Nuestra Señora se negó a moverse de Luján en 1630 y ha sido venerada allí desde entonces. La basílica gótica recibe 7 millones de peregrinos al año.',history:'Según la tradición, una carreta de bueyes que transportaba la imagen se detuvo y no pudo moverse hasta que la imagen fue dejada allí. Se construyó una capilla, luego sucesivas iglesias, y finalmente la actual basílica neogótica completada en 1937. El Papa Juan Pablo II rezó aquí en 1982.',prayer:'Nuestra Señora de Luján, Patrona del Cono Sur, elegiste quedarte entre tu pueblo y nunca lo has abandonado. Quédate con nosotros también, especialmente en tiempos de crisis e incertidumbre. Amén.',feast:'8 de mayo (Nuestra Señora de Luján)'},fr:{name:'Basilique Notre-Dame de Luján',type:'Basilique',city:'Luján',province:'Buenos Aires',description:'Patronne d\'Argentine, Uruguay et Paraguay. 7 millions de pèlerins par an.',history:'En 1630, une charrette s\'arrêta et ne put être bougée. Basilique néogothique achevée en 1937.',prayer:'Notre-Dame de Luján, reste avec nous surtout dans les temps de crise. Amen.',feast:'8 mai (Notre-Dame de Luján)'},it:{name:'Basilica di Nostra Signora di Luján',type:'Basilica',city:'Luján',province:'Buenos Aires',description:'Patrona di Argentina, Uruguay e Paraguay. 7 milioni di pellegrini all\'anno.',history:'Nel 1630, un carro si fermò e non poté essere mosso. Basilica neogotica completata nel 1937.',prayer:'Nostra Signora di Luján, resta con noi specialmente nei tempi di crisi. Amen.',feast:'8 maggio (Nostra Signora di Luján)'}},
  {id:1202,country:'ar',lat:-27.4854,lng:-58.8341,icon:'💎',name:'Basilica of Our Lady of Itatí',type:'Basilica',city:'Itatí',province:'Corrientes',description:'One of Argentina\'s most important Marian shrines, home to the crowned image of Our Lady of Itatí venerated by the Guaraní people since the 17th century. The basilica dominates the banks of the Paraná River.',history:'The devotion began among the indigenous Guaraní in 1615. Our Lady of Itatí was crowned by Pope Leo XIII in 1900. The current basilica was completed in 1950. Thousands of pilgrims arrive by boat along the Paraná River, a unique pilgrimage tradition.',prayer:'Our Lady of Itatí, beloved of the Guaraní people, you have watched over this river land for four centuries. May your protection extend to all who live on the margins, forgotten by the world but remembered by God. Amen.',feast:'July 9 (Our Lady of Itatí)',es:{name:'Basílica de Nuestra Señora de Itatí',type:'Basílica',city:'Itatí',province:'Corrientes',description:'Uno de los santuarios marianos más importantes de Argentina, sede de la imagen coronada de Nuestra Señora de Itatí venerada por el pueblo guaraní desde el siglo XVII. La basílica domina las orillas del río Paraná.',history:'La devoción comenzó entre los indígenas guaraníes en 1615. Nuestra Señora de Itatí fue coronada por el Papa León XIII en 1900. La basílica actual se completó en 1950. Miles de peregrinos llegan en barco por el río Paraná, una tradición de peregrinación única.',prayer:'Nuestra Señora de Itatí, amada del pueblo guaraní, has velado por estas tierras fluviales durante cuatro siglos. Que tu protección se extienda a todos los que viven en los márgenes, olvidados por el mundo pero recordados por Dios. Amén.',feast:'9 de julio (Nuestra Señora de Itatí)'},fr:{name:'Basilique Notre-Dame d\'Itatí',type:'Basilique',city:'Itatí',province:'Corrientes',description:'Sanctuaire mariano important d\'Argentine, vénéré par le peuple guarani depuis le XVIIe siècle.',history:'Dévotion commencée en 1615. Couronnée par Léon XIII en 1900. Pèlerins arrivent en bateau par le Paraná.',prayer:'Notre-Dame d\'Itatí, que ta protection s\'étende à tous ceux qui vivent en marge. Amen.',feast:'9 juillet (Notre-Dame d\'Itatí)'},it:{name:'Basilica di Nostra Signora di Itatí',type:'Basilica',city:'Itatí',province:'Corrientes',description:'Importante santuario mariano argentino, venerato dal popolo guaraní dal XVII secolo.',history:'Devozione iniziata nel 1615. Incoronata da Leone XIII nel 1900. Pellegrini arrivano in barca sul Paraná.',prayer:'Nostra Signora di Itatí, che la tua protezione si estenda a tutti coloro che vivono ai margini. Amen.',feast:'9 luglio (Nostra Signora di Itatí)'}},
  {id:1203,country:'ar',lat:-31.4167,lng:-64.1833,icon:'🏔️',name:'Cathedral of Córdoba',type:'Cathedral',city:'Córdoba',province:'Córdoba',description:'The oldest functioning cathedral in Argentina, begun in 1577. A masterpiece of colonial Baroque architecture at the heart of one of Latin America\'s oldest university cities.',history:'Construction began in 1577 and continued for over 150 years. The cathedral has witnessed the entire history of Argentina, from colonial times through independence and the modern era. The Jesuit Block of Córdoba, of which it is part, is a UNESCO World Heritage Site.',prayer:'Lord, this cathedral has stood for nearly 450 years, witnessing the joys and sorrows of a nation being born. May we too stand firm in faith, a sign of your enduring presence among your people. Amen.',feast:'August 15 (Assumption)',es:{name:'Catedral de Córdoba',type:'Catedral',city:'Córdoba',province:'Córdoba',description:'La catedral en funcionamiento más antigua de Argentina, iniciada en 1577. Una obra maestra de la arquitectura colonial barroca en el corazón de una de las ciudades universitarias más antiguas de América Latina.',history:'La construcción comenzó en 1577 y continuó durante más de 150 años. La catedral ha sido testigo de toda la historia de Argentina, desde la época colonial hasta la independencia y la era moderna. La Manzana Jesuítica de Córdoba, de la que forma parte, es Patrimonio de la Humanidad de la UNESCO.',prayer:'Señor, esta catedral lleva casi 450 años en pie, siendo testigo de las alegrías y tristezas de una nación que nacía. Que nosotros también nos mantengamos firmes en la fe, signo de tu presencia duradera entre tu pueblo. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Cathédrale de Córdoba',type:'Cathédrale',city:'Córdoba',province:'Córdoba',description:'La plus ancienne cathédrale d\'Argentine, commencée en 1577. Architecture coloniale baroque. Patrimoine mondial.',history:'Construction durant plus de 150 ans. Le Bloc Jésuite est Patrimoine mondial.',prayer:'Seigneur, que nous restions fermes dans la foi, signes de ta présence durable. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Córdoba',type:'Cattedrale',city:'Córdoba',province:'Córdoba',description:'La cattedrale più antica dell\'Argentina, iniziata nel 1577. Architettura coloniale barocca. Patrimonio dell\'Umanità.',history:'Costruzione durata più di 150 anni. La Manzana Gesuitica è Patrimonio dell\'Umanità.',prayer:'Signore, che restiamo saldi nella fede, segni della tua presenza duratura. Amen.',feast:'15 agosto (Assunzione)'}},
  {id:1204,country:'ar',lat:-24.7827,lng:-65.4232,icon:'🌸',name:'Sanctuary of Our Lady of the Rosary of Río Blanco',type:'Marian shrine',city:'Salta',province:'Salta',description:'Home to the miraculous images of Christ and Our Lady of the Rosary, famous for their role in the Battle of Salta in 1813. The procession of the miracles held each September draws massive crowds.',history:'The images were donated to the city of Salta in 1592. When earthquake and epidemic struck in 1692, the images were carried in procession and the disasters ceased. The annual Procession of the Miracles commemorates this event and is one of the most impressive in South America.',prayer:'Our Lady of the Rosary of Salta, you brought peace to a city in crisis. Bring your peace to our hearts and our communities, that we may always trust in God\'s providence. Amen.',feast:'Second Sunday of September (Procession of the Miracles)',es:{name:'Santuario de Nuestra Señora del Rosario de Río Blanco',type:'Santuario mariano',city:'Salta',province:'Salta',description:'Sede de las milagrosas imágenes de Cristo y Nuestra Señora del Rosario, famosas por su papel en la Batalla de Salta en 1813. La procesión de los milagros que se celebra cada septiembre atrae multitudes.',history:'Las imágenes fueron donadas a la ciudad de Salta en 1592. Cuando un terremoto y una epidemia azotaron en 1692, las imágenes fueron llevadas en procesión y los desastres cesaron. La Procesión de los Milagros conmemora este evento y es una de las más impresionantes de América del Sur.',prayer:'Nuestra Señora del Rosario de Salta, trajiste paz a una ciudad en crisis. Trae tu paz a nuestros corazones y comunidades, para que siempre confiemos en la providencia de Dios. Amén.',feast:'Segundo domingo de septiembre (Procesión de los Milagros)'},fr:{name:'Sanctuaire de Notre-Dame du Rosaire de Río Blanco',type:'Sanctuaire marial',city:'Salta',province:'Salta',description:'Siège des images miraculeuses du Christ et de Notre-Dame du Rosaire. Procession des Miracles en septembre.',history:'Images données en 1592. Lors du séisme de 1692, portées en procession et les désastres cessèrent.',prayer:'Notre-Dame du Rosaire de Salta, apporte ta paix à nos cœurs et nos communautés. Amen.',feast:'Deuxième dimanche de septembre'},it:{name:'Santuario di Nostra Signora del Rosario di Río Blanco',type:'Santuario mariano',city:'Salta',province:'Salta',description:'Sede delle immagini miracolose del Cristo e di Nostra Signora del Rosario. Processione dei Miracoli a settembre.',history:'Immagini donate nel 1592. Durante il terremoto del 1692, portate in processione e i disastri cessarono.',prayer:'Nostra Signora del Rosario di Salta, porta la tua pace nei nostri cuori e nelle nostre comunità. Amen.',feast:'Seconda domenica di settembre'}},

  // ===== PERU =====
  {id:1301,country:'pe',lat:-12.0464,lng:-77.0428,icon:'🟣',name:'Church of Las Nazarenas',type:'Church',city:'Lima',province:'Lima',description:'Home of the Lord of Miracles, the most venerated image in Peru and perhaps the most popular in all of Latin America. The October procession draws over 2 million people in a sea of purple.',history:'The image was painted by an Angolan slave on a wall in the 17th century. When an earthquake destroyed all surrounding buildings in 1655, the wall remained intact. The October procession has been held continuously since 1687, making it one of the oldest in the Americas.',prayer:'Lord of Miracles, you stood firm when the earth shook and all around you fell. Teach us your strength. When our world trembles, may we remain standing, trusting in your power. Amen.',feast:'October 18 (Lord of Miracles)',es:{name:'Iglesia de Las Nazarenas',type:'Iglesia',city:'Lima',province:'Lima',description:'Sede del Señor de los Milagros, la imagen más venerada del Perú y quizás la más popular de toda América Latina. La procesión de octubre reúne a más de 2 millones de personas en un mar de morado.',history:'La imagen fue pintada por un esclavo angoleño en una pared en el siglo XVII. Cuando un terremoto destruyó todos los edificios circundantes en 1655, la pared permaneció intacta. La procesión de octubre se celebra ininterrumpidamente desde 1687, siendo una de las más antiguas de América.',prayer:'Señor de los Milagros, permaneciste firme cuando la tierra tembló y todo a tu alrededor cayó. Enséñanos tu fortaleza. Cuando nuestro mundo tiembla, que permanezcamos en pie, confiando en tu poder. Amén.',feast:'18 de octubre (Señor de los Milagros)'},fr:{name:'Église de Las Nazarenas',type:'Église',city:'Lima',province:'Lima',description:'Siège du Seigneur des Miracles, l\'image la plus vénérée du Pérou. Plus de 2 millions en procession d\'octobre.',history:'Image peinte par un esclave angolais au XVIIe siècle. Le mur survécut à un séisme en 1655. Procession depuis 1687.',prayer:'Seigneur des Miracles, tu es resté debout quand la terre tremblait. Apprends-nous ta force. Amen.',feast:'18 octobre (Seigneur des Miracles)'},it:{name:'Chiesa di Las Nazarenas',type:'Chiesa',city:'Lima',province:'Lima',description:'Sede del Signore dei Miracoli, l\'immagine più venerata del Perù. Oltre 2 milioni nella processione di ottobre.',history:'Immagine dipinta da uno schiavo angolano nel XVII secolo. Il muro sopravvisse a un terremoto nel 1655. Processione dal 1687.',prayer:'Signore dei Miracoli, sei rimasto in piedi quando la terra tremava. Insegnaci la tua forza. Amen.',feast:'18 ottobre (Signore dei Miracoli)'}},
  {id:1302,country:'pe',lat:-15.8402,lng:-70.0219,icon:'🌊',name:'Sanctuary of Our Lady of Copacabana',type:'Marian shrine',city:'Copacabana',province:'Puno',description:'Perched on the shores of Lake Titicaca, the highest navigable lake in the world, this sanctuary is a sacred pilgrimage site for Bolivia and Peru. The image of Our Lady was carved by the indigenous sculptor Francisco Tito Yupanqui in 1583.',history:'Francisco Tito Yupanqui, a descendant of the Inca, carved the image after the Virgin appeared to him. The image was canonically crowned in 1925. Pilgrims walk from as far as La Paz to reach this sanctuary on the shores of the sacred lake.',prayer:'Our Lady of Copacabana, enthroned above the sacred waters of Titicaca, bless the peoples of the altiplano and all pilgrims who climb to you. May the height of this place remind us of the heights to which God calls us. Amen.',feast:'August 5 (Our Lady of Copacabana)',es:{name:'Santuario de Nuestra Señora de Copacabana',type:'Santuario mariano',city:'Copacabana',province:'Puno',description:'Enclavado a orillas del lago Titicaca, el lago navegable más alto del mundo, este santuario es un lugar de peregrinación sagrado para Bolivia y Perú. La imagen de Nuestra Señora fue tallada por el escultor indígena Francisco Tito Yupanqui en 1583.',history:'Francisco Tito Yupanqui, descendiente del Inca, talló la imagen tras aparecérsele la Virgen. La imagen fue coronada canónicamente en 1925. Los peregrinos caminan desde tan lejos como La Paz para llegar a este santuario a orillas del lago sagrado.',prayer:'Nuestra Señora de Copacabana, entronizada sobre las sagradas aguas del Titicaca, bendice a los pueblos del altiplano y a todos los peregrinos que suben hasta ti. Que la altura de este lugar nos recuerde las alturas a las que Dios nos llama. Amén.',feast:'5 de agosto (Nuestra Señora de Copacabana)'},fr:{name:'Sanctuaire de Notre-Dame de Copacabana',type:'Sanctuaire marial',city:'Copacabana',province:'Puno',description:'Sur les rives du lac Titicaca. Image sculptée par l\'indigène Francisco Tito Yupanqui en 1583.',history:'Francisco Tito Yupanqui, descendant de l\'Inca, sculpta l\'image après une apparition. Les pèlerins marchent depuis La Paz.',prayer:'Notre-Dame de Copacabana, bénis les peuples de l\'altiplano et tous les pèlerins. Amen.',feast:'5 août (Notre-Dame de Copacabana)'},it:{name:'Santuario di Nostra Signora di Copacabana',type:'Santuario mariano',city:'Copacabana',province:'Puno',description:'Sulle rive del lago Titicaca. Immagine scolpita dall\'indigeno Francisco Tito Yupanqui nel 1583.',history:'Francisco Tito Yupanqui, discendente dell\'Inca, scolpì l\'immagine dopo un\'apparizione. I pellegrini camminano da La Paz.',prayer:'Nostra Signora di Copacabana, benedici i popoli dell\'altipiano e tutti i pellegrini. Amen.',feast:'5 agosto (Nostra Signora di Copacabana)'}},
  {id:1303,country:'pe',lat:-13.5170,lng:-71.9785,icon:'🏔️',name:'Cathedral of Cusco',type:'Cathedral',city:'Cusco',province:'Cusco',description:'Built on the foundations of the palace of the Inca Viracocha, this Renaissance cathedral took nearly a century to complete. It is a powerful symbol of the encounter between Inca civilisation and Christianity.',history:'Construction began in 1559 on the site of the Inca palace. It was completed in 1654, housing the largest collection of colonial paintings in the Americas — the Cusco School. It contains a famous image of the Last Supper with guinea pig on the table, painted by the indigenous artist Marcos Zapata.',prayer:'Lord of Cusco, God of the Inca and God of the conquerors, you are God of all people. Teach us to honour every human dignity and to find you in every culture and tradition. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Catedral de Cusco',type:'Catedral',city:'Cusco',province:'Cusco',description:'Construida sobre los cimientos del palacio del inca Viracocha, esta catedral renacentista tardó casi un siglo en completarse. Es un poderoso símbolo del encuentro entre la civilización inca y el cristianismo.',history:'La construcción comenzó en 1559 sobre el emplazamiento del palacio inca. Se completó en 1654, albergando la mayor colección de pinturas coloniales de América — la Escuela Cusqueña. Contiene una famosa imagen de la Última Cena con cuy sobre la mesa, pintada por el artista indígena Marcos Zapata.',prayer:'Señor de Cusco, Dios de los incas y Dios de los conquistadores, eres el Dios de todos los pueblos. Enséñanos a honrar cada dignidad humana y a encontrarte en cada cultura y tradición. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'},fr:{name:'Cathédrale de Cusco',type:'Cathédrale',city:'Cusco',province:'Cusco',description:'Construite sur les fondations du palais inca de Viracocha. Symbole de la rencontre entre civilisation inca et christianisme.',history:'Construction de 1559 à 1654. Contient une Dernière Cène avec un cochon d\'Inde, peinte par Marcos Zapata.',prayer:'Seigneur, Dieu de tous les peuples, apprends-nous à honorer chaque dignité humaine. Amen.',feast:'8 décembre (Immaculée Conception)'},it:{name:'Cattedrale di Cusco',type:'Cattedrale',city:'Cusco',province:'Cusco',description:'Costruita sulle fondamenta del palazzo inca di Viracocha. Simbolo dell\'incontro tra civiltà inca e cristianesimo.',history:'Costruzione dal 1559 al 1654. Contiene un\'Ultima Cena con il cuy, dipinta da Marcos Zapata.',prayer:'Signore, Dio di tutti i popoli, insegnaci a onorare ogni dignità umana. Amen.',feast:'8 dicembre (Immacolata Concezione)'}},
  {id:1304,country:'pe',lat:-16.3989,lng:-71.5350,icon:'✨',name:'Sanctuary of Our Lady of Chapi',type:'Marian shrine',city:'Polobaya',province:'Arequipa',description:'The most important Marian shrine in southern Peru, located in a dramatic desert canyon. Each May 1st, hundreds of thousands of pilgrims walk through the night to reach the sanctuary at dawn.',history:'The image of Our Lady was placed in the chapel in the 17th century. The May pilgrimage, during which pilgrims walk 45 km through the night, is one of the most striking acts of popular piety in Peru. The canyon setting, surrounded by volcanic peaks, adds to the spiritual atmosphere.',prayer:'Our Lady of Chapi, sought by pilgrims who walk through the desert night, be our light in the darkness. May our own spiritual journeys lead us, as theirs do, to find you at the break of dawn. Amen.',feast:'May 1 (Our Lady of Chapi)',es:{name:'Santuario de Nuestra Señora de Chapi',type:'Santuario mariano',city:'Polobaya',province:'Arequipa',description:'El santuario mariano más importante del sur del Perú, ubicado en un dramático cañón desértico. Cada 1 de mayo, cientos de miles de peregrinos caminan de noche para llegar al santuario al amanecer.',history:'La imagen de Nuestra Señora fue colocada en la capilla en el siglo XVII. La peregrinación de mayo, durante la cual los peregrinos caminan 45 km de noche, es uno de los actos de piedad popular más llamativos del Perú. El entorno del cañón, rodeado de cumbres volcánicas, añade a la atmósfera espiritual.',prayer:'Nuestra Señora de Chapi, buscada por peregrinos que caminan de noche por el desierto, sé nuestra luz en la oscuridad. Que nuestros propios caminos espirituales nos lleven, como los suyos, a encontrarte al amanecer. Amén.',feast:'1 de mayo (Nuestra Señora de Chapi)'},fr:{name:'Sanctuaire de Notre-Dame de Chapi',type:'Sanctuaire marial',city:'Polobaya',province:'Arequipa',description:'Le plus important sanctuaire marial du sud du Pérou, dans un canyon désertique. Chaque 1er mai, des centaines de milliers marchent de nuit.',history:'Image placée au XVIIe siècle. La marche de 45 km de nuit est l\'un des actes de piété les plus frappants du Pérou.',prayer:'Notre-Dame de Chapi, sois notre lumière dans l\'obscurité. Que nos chemins spirituels nous mènent à toi à l\'aube. Amen.',feast:'1er mai (Notre-Dame de Chapi)'},it:{name:'Santuario di Nostra Signora di Chapi',type:'Santuario mariano',city:'Polobaya',province:'Arequipa',description:'Il santuario mariano più importante del Perù meridionale, in un canyon desertico. Ogni 1° maggio centinaia di migliaia camminano di notte.',history:'Immagine posta nel XVII secolo. La marcia di 45 km notturna è uno degli atti di pietà più impressionanti del Perù.',prayer:'Nostra Signora di Chapi, sii la nostra luce nell\'oscurità. Che i nostri cammini spirituali ci portino a te all\'alba. Amen.',feast:'1° maggio (Nostra Signora di Chapi)'}},

  // ===== COLOMBIA =====
  {id:1401,country:'co',lat:0.8219,lng:-77.5946,icon:'🌈',name:'Sanctuary of Our Lady of Las Lajas',type:'Marian shrine',city:'Ipiales',province:'Nariño',description:'One of the most spectacular sanctuaries in the world, built inside a gorge over the Guáitara River. The neo-Gothic basilica seems to grow out of the canyon walls, and a miraculous image of Our Lady appeared on the rock face in 1754.',history:'The image appeared on the rock to an indigenous woman and her deaf-mute daughter, who was miraculously cured. The current basilica was built between 1916 and 1949. The walls inside are covered with thousands of plaques left by pilgrims giving thanks for miracles.',prayer:'Our Lady of Las Lajas, you revealed yourself in the rock of the canyon, a sign that God is present even in the hardest places of our lives. When we feel trapped in our own gorges, help us see your face. Amen.',feast:'September 15 (Our Lady of Sorrows)',es:{name:'Santuario de Nuestra Señora de Las Lajas',type:'Santuario mariano',city:'Ipiales',province:'Nariño',description:'Uno de los santuarios más espectaculares del mundo, construido dentro de un desfiladero sobre el río Guáitara. La basílica neogótica parece brotar de las paredes del cañón, y una imagen milagrosa de Nuestra Señora apareció en la roca en 1754.',history:'La imagen apareció en la roca a una mujer indígena y a su hija sordomuda, que fue curada milagrosamente. La basílica actual fue construida entre 1916 y 1949. Las paredes interiores están cubiertas de miles de placas dejadas por peregrinos en agradecimiento por milagros.',prayer:'Nuestra Señora de Las Lajas, te revelaste en la roca del desfiladero, señal de que Dios está presente incluso en los lugares más duros de nuestra vida. Cuando nos sentimos atrapados en nuestros propios desfiladeros, ayúdanos a ver tu rostro. Amén.',feast:'15 de septiembre (Nuestra Señora de los Dolores)'},fr:{name:'Sanctuaire de Notre-Dame de Las Lajas',type:'Sanctuaire marial',city:'Ipiales',province:'Nariño',description:'L\'un des sanctuaires les plus spectaculaires au monde, dans un canyon au-dessus du fleuve Guáitara. Image miraculeuse sur la roche en 1754.',history:'Image apparue à une femme indigène et sa fille sourde-muette, miraculeusement guérie. Basilique construite 1916-1949.',prayer:'Notre-Dame de Las Lajas, aide-nous à voir ton visage même dans les lieux les plus durs de notre vie. Amen.',feast:'15 septembre (Notre-Dame des Douleurs)'},it:{name:'Santuario di Nostra Signora di Las Lajas',type:'Santuario mariano',city:'Ipiales',province:'Nariño',description:'Uno dei santuari più spettacolari al mondo, in un canyon sopra il fiume Guáitara. Immagine miracolosa sulla roccia nel 1754.',history:'Immagine apparsa a una donna indigena e alla figlia sordomuta, miracolosamente guarita. Basilica costruita 1916-1949.',prayer:'Nostra Signora di Las Lajas, aiutaci a vedere il tuo volto anche nei luoghi più duri della nostra vita. Amen.',feast:'15 settembre (Nostra Signora dei Dolori)'}},
  {id:1402,country:'co',lat:5.6207,lng:-73.8190,icon:'🙏',name:'Sanctuary of Our Lady of Chiquinquirá',type:'Marian shrine',city:'Chiquinquirá',province:'Boyacá',description:'The national shrine of Colombia, home to the image of Our Lady of Chiquinquirá which underwent a miraculous renovation in 1586. Declared Patroness of Colombia, she is known as La Chinita by the faithful.',history:'A deteriorated canvas of Our Lady was donated to a chapel in 1586. When a woman placed it in a window, the image miraculously renewed itself before witnesses. The image was crowned in 1919 and Pope John Paul II prayed before it in 1986.',prayer:'Our Lady of Chiquinquirá, La Chinita, Patroness of Colombia, you renewed a faded image as a sign that God renews all things. Renew what is faded in us — our faith, our hope, our love — and make us shine with your Son\'s glory. Amen.',feast:'July 9 (Our Lady of Chiquinquirá)',es:{name:'Santuario de Nuestra Señora de Chiquinquirá',type:'Santuario mariano',city:'Chiquinquirá',province:'Boyacá',description:'El santuario nacional de Colombia, sede de la imagen de Nuestra Señora de Chiquinquirá que sufrió una renovación milagrosa en 1586. Declarada Patrona de Colombia, es conocida por los fieles como La Chinita.',history:'Un deteriorado lienzo de Nuestra Señora fue donado a una capilla en 1586. Cuando una mujer lo colocó en una ventana, la imagen se renovó milagrosamente ante testigos. La imagen fue coronada en 1919 y el Papa Juan Pablo II rezó ante ella en 1986.',prayer:'Nuestra Señora de Chiquinquirá, La Chinita, Patrona de Colombia, renovaste una imagen desvanecida como señal de que Dios renueva todas las cosas. Renueva lo que en nosotros está desvanecido — nuestra fe, nuestra esperanza, nuestro amor — y haznos brillar con la gloria de tu Hijo. Amén.',feast:'9 de julio (Nuestra Señora de Chiquinquirá)'},fr:{name:'Sanctuaire de Notre-Dame de Chiquinquirá',type:'Sanctuaire marial',city:'Chiquinquirá',province:'Boyacá',description:'Sanctuaire national de Colombie. Image miraculeusement rénovée en 1586, Patronne de Colombie.',history:'Un tableau détérioré se rénova miraculeusement en 1586 devant témoins. Couronnée en 1919. Jean-Paul II pria ici en 1986.',prayer:'Notre-Dame de Chiquinquirá, renouvelle ce qui est fané en nous — notre foi, notre espérance, notre amour. Amen.',feast:'9 juillet (Notre-Dame de Chiquinquirá)'},it:{name:'Santuario di Nostra Signora di Chiquinquirá',type:'Santuario mariano',city:'Chiquinquirá',province:'Boyacá',description:'Santuario nazionale della Colombia. Immagine miracolosamente rinnovata nel 1586, Patrona della Colombia.',history:'Un quadro deteriorato si rinnovò miracolosamente nel 1586 davanti a testimoni. Incoronata nel 1919. Giovanni Paolo II pregò qui nel 1986.',prayer:'Nostra Signora di Chiquinquirá, rinnova ciò che è sbiadito in noi — la nostra fede, la nostra speranza, il nostro amore. Amen.',feast:'9 luglio (Nostra Signora di Chiquinquirá)'}},

// ===================== STATE =====================
let visits={}, isPremium=false, currentLang='en', currentScreen='map', currentCountry='be', map=null, markers={}, activeRouteFilter=null;

// ===================== FIREBASE =====================
window._loadUserData = async function(uid){
  try{
    const snap=await window._fbGetDoc(uid);
    if(snap.exists()){
      const d=snap.data();
      visits=d.visits||{};
      isPremium=d.isPremium||false;
      if(d.lang) currentLang=d.lang;
    }else{visits={};isPremium=false;}
  }catch(e){visits={};isPremium=false;}
  applyLang();
  refreshAll();
  if(map) updateMarkerStyles();
};

async function saveVisits(){
  try{
    if(window._currentUser) await window._fbSetDoc(window._currentUser.uid,{visits});
  }catch(e){}
}

async function setLang(lang){
  currentLang=lang;
  try{ if(window._currentUser) await window._fbSetDoc(window._currentUser.uid,{lang}); }catch(e){}
  applyLang();
  refreshAll();
  rebindMapPopups();
}

function applyLang(){
  document.getElementById('header-sub').textContent = t('appSubtitle');
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.textContent = t(el.dataset.nav);
  });
  // Update auth screen
  const tabLogin = document.getElementById('tab-login');
  const tabReg = document.getElementById('tab-register');
  const btnSubmit = document.getElementById('auth-submit');
  const emailEl = document.getElementById('auth-email');
  const passEl = document.getElementById('auth-password');
  if(tabLogin) tabLogin.textContent = t('signIn');
  if(tabReg) tabReg.textContent = t('register');
  if(btnSubmit) btnSubmit.textContent = currentAuthTab==='login'?t('signIn'):t('createAccount');
  if(emailEl) emailEl.placeholder = t('emailPlaceholder');
  if(passEl) passEl.placeholder = t('passwordPlaceholder');
  const nameEl = document.getElementById('auth-name');
  if(nameEl) nameEl.placeholder = t('namePlaceholder');
}

// ===================== AUTH =====================
var currentAuthTab='login';
function switchAuthTab(tab){
  currentAuthTab=tab;
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('auth-submit').textContent=tab==='login'?t('signIn'):t('createAccount');
  document.getElementById('auth-name').style.display=tab==='register'?'block':'none';
  document.getElementById('auth-error').textContent='';
}
async function handleEmailAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-password').value;
  const nameVal=document.getElementById('auth-name').value.trim();
  const errEl=document.getElementById('auth-error');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent=t('authErrFields');return;}
  if(currentAuthTab==='register'&&!nameVal){errEl.textContent=t('authErrName');return;}
  try{
    if(currentAuthTab==='login') await window._fbSignInEmail(email,pass);
    else {
      const cred=await window._fbCreateUser(email,pass);
      await cred.user.updateProfile({displayName:nameVal});
      await window._fbSetDoc(cred.user.uid,{displayName:nameVal});
    }
  }catch(e){
    const msgs={'auth/user-not-found':t('authErrNotFound'),'auth/wrong-password':t('authErrWrongPass'),'auth/email-already-in-use':t('authErrInUse'),'auth/weak-password':t('authErrWeak'),'auth/invalid-email':t('authErrInvalidEmail'),'auth/invalid-credential':t('authErrInvalidCred')};
    errEl.textContent=msgs[e.code]||t('authErrGeneric');
  }
}

async function handleSignOut(){
  await window._fbSignOut();
  visits={};isPremium=false;
}

function toggleVisit(id){
  const s=sanctuaries.find(x=>x.id===id);
  if(!isCountryUnlocked(s.country)){openPremiumModal();return;}
  if(visits[id]){delete visits[id];}
  else{visits[id]=new Date().toISOString().split('T')[0];showToast(t('visitToast')(sd(s).name));}
  saveVisits();refreshAll();updateMarkerStyles();
}

function getRank(){
  const c=getVisitCount();
  if(c>=50) return t('rank50');
  if(c>=30) return t('rank30');
  if(c>=15) return t('rank10');
  if(c>=5)  return t('rank5');
  if(c>=1)  return t('rank1');
  return t('rank0');
}

// ===================== NAVIGATION =====================
document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>switchScreen(btn.dataset.screen)));
function switchScreen(screen){
  currentScreen=screen;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`[data-screen="${screen}"]`).classList.add('active');
  if(screen==='map'&&map){
    setTimeout(()=>map.invalidateSize(),50);
  }
}

// ===================== MAP =====================
function createMarkerIcon(s,visited,highlight){
  const locked=!isCountryUnlocked(s.country);
  let cls='custom-marker';
  if(visited) cls+=' visited-marker';
  else if(locked) cls+=' locked-marker';
  if(highlight) cls+=' route-highlight-marker';
  const badge=visited?'<span class="visited-check">✓</span>':locked?'<span class="lock-badge">🔒</span>':'';
  return L.divIcon({className:'',html:`<div class="${cls}">${s.icon}${badge}</div>`,
    iconSize:visited?[42,42]:[32,32],iconAnchor:visited?[21,21]:[16,16],popupAnchor:[0,visited?-24:-18]});
}

function buildPopupContent(s){
  const d=sd(s), visited=isVisited(s.id), locked=!isCountryUnlocked(s.country);
  return `<div class="popup-body">
    <div class="popup-type">${d.type}</div>
    <div class="popup-name">${d.name}</div>
    <div class="popup-loc">📍 ${d.city}, ${d.province}</div>
    <div class="popup-desc">${d.description.substring(0,120)}...</div>
    ${locked
      ? `<button class="popup-locked" onclick="openPremiumModal();map.closePopup();">${t('lockBtn')}</button>`
      : `<button class="popup-btn ${visited?'visited':'visit'}" onclick="toggleVisit(${s.id});map.closePopup();">${visited?t('visited_btn'):'🥾 '+t('registerVisit')}</button>`}
    <button class="popup-btn detail" onclick="openModal(${s.id});map.closePopup();">${t('viewDetails')}</button>
    <a class="popup-maps-link" href="https://www.google.com/maps/search/${encodeURIComponent(d.name+' '+d.city)}/@${s.lat},${s.lng},17z" target="_blank">🗺️ ${t('howToGet')}</a>
  </div>`
}

function initMap(){
  map=L.map('map',{zoomControl:false,tap:false,tapTolerance:15}).setView([48,12],5);
  L.control.zoom({position:'topright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:18}).addTo(map);
  sanctuaries.forEach(s=>{
    const marker=L.marker([s.lat,s.lng],{icon:createMarkerIcon(s,false,false)}).addTo(map);
    markers[s.id]=marker;
    marker.bindPopup(buildPopupContent(s),{maxWidth:280,closeButton:true});
  });
}

function updateMarkerStyles(){
  sanctuaries.forEach(s=>{
    const visited=isVisited(s.id);
    const inRoute=!activeRouteFilter||activeRouteFilter.includes(s.id);
    const highlight=!!activeRouteFilter&&inRoute;
    markers[s.id].setIcon(createMarkerIcon(s,visited,highlight));
    markers[s.id].setOpacity(inRoute?1:0.25);
    markers[s.id].unbindPopup();
    markers[s.id].bindPopup(buildPopupContent(s),{maxWidth:280,closeButton:true});
  });
}

function showRouteOnMap(idx){
  const r=routes[idx];
  activeRouteFilter=r.stops;
  switchScreen('map');
  updateMarkerStyles();
  document.getElementById('map-route-name').textContent='🗺️ '+(r[currentLang]||r.en).name;
  document.getElementById('map-route-banner').style.display='flex';
}
function clearRouteFilter(){activeRouteFilter=null;updateMarkerStyles();document.getElementById('map-route-banner').style.display='none';}

function rebindMapPopups(){
  if(!map) return;
  sanctuaries.forEach(s=>{
    if(markers[s.id]){
      markers[s.id].unbindPopup();
      markers[s.id].bindPopup(buildPopupContent(s),{maxWidth:280,closeButton:true});
    }
  });
}

function focusCountry(cid){
  currentCountry=cid;
  const cs=sanctuaries.filter(s=>s.country===cid);
  if(cs.length&&map){
    const lats=cs.map(s=>s.lat),lngs=cs.map(s=>s.lng);
    map.fitBounds([[Math.min(...lats)-0.5,Math.min(...lngs)-0.5],[Math.max(...lats)+0.5,Math.max(...lngs)+0.5]]);
  }
  switchScreen('map');
}

// ===================== MODAL =====================
function openModal(id){
  const s=sanctuaries.find(x=>x.id===id);if(!s)return;
  const d=sd(s), visited=isVisited(s.id), locked=!isCountryUnlocked(s.country);
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-hero" style="position:relative">${s.icon}<button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="modal-type">${d.type}</div>
      <div class="modal-title">${d.name}</div>
      <div class="modal-location">📍 ${d.city}, ${d.province} · 🎉 ${d.feast}</div>
      <div class="modal-section"><h3>📖 ${t('descLabel')}</h3><p>${d.description}</p></div>
      <div class="modal-section"><h3>🏛️ ${t('histLabel')}</h3><p>${d.history}</p></div>
      <div class="modal-section"><h3>🙏 ${t('prayerLabel')}</h3><div class="modal-prayer">${d.prayer}</div></div>
      ${locked
        ? `<button class="modal-premium-btn" onclick="openPremiumModal()">🔒 ${t('lockBtn')}</button>`
        : `<button class="modal-visit-btn ${visited?'visited-btn':''}" onclick="toggleVisit(${s.id});openModal(${s.id});">${visited?t('removeVisit'):'🥾 '+t('registerVisit')}</button>`}
      <a class="modal-maps-btn" href="https://www.google.com/maps/search/${encodeURIComponent(d.name+' '+d.city)}/@${s.lat},${s.lng},17z" target="_blank">🗺️ ${t('howToGetFull')}</a>
    </div>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

// ===================== TOAST =====================
let toastTimeout=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg;
  if(toastTimeout)clearTimeout(toastTimeout);
  t.classList.add('show');
  toastTimeout=setTimeout(()=>{t.classList.remove('show');toastTimeout=null;},3000);
}

function renderAchievements(){
  const vc=getVisitCount();
  const visitedCountries=new Set(sanctuaries.filter(s=>isVisited(s.id)).map(s=>s.country));
  const container=document.querySelector('.achievements-screen');
  container.innerHTML=`
    <div class="screen-title">${t('achievementsTitle')}</div>
    ${achievements.map(a=>{
      let progress=0,unlocked=false;
      if(a.special==='countries5'){const n=visitedCountries.size;progress=Math.min(n/5,1);unlocked=n>=5;}
      else if(a.special==='americas3'){const americaIds=new Set(['mx','br','ar','pe','co']);const n=new Set([...visitedCountries].filter(x=>americaIds.has(x))).size;progress=Math.min(n/3,1);unlocked=n>=3;}
      else if(a.condition){progress=Math.min(vc/a.total,1);unlocked=a.condition(vc);}
      else if(a.ids){const done=a.ids.filter(id=>isVisited(id)).length;progress=done/a.total;unlocked=done>=a.total;}
      return `<div class="achievement-card ${unlocked?'unlocked':'locked'}">
        <div class="achievement-icon">${a.icon}</div>
        <div class="achievement-info">
          <div class="achievement-name">${(a[currentLang]||a.en).name}</div>
          <div class="achievement-desc">${(a[currentLang]||a.en).desc}</div>
          <div class="achievement-progress"><div class="achievement-progress-bar" style="width:${progress*100}%"></div></div>
        </div>
      </div>`;
    }).join('')}`;
}

// ===================== CERTIFICATE =====================
function generateCertificate(countryId){
  const country = countries.find(c => c.id === countryId);
  const cs = sanctuaries.filter(s => s.country === countryId);
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
  const W = 297, H = 210;
  const BURG  = [114, 47, 55];
  const GOLD  = [197, 150, 58];
  const GOLDL = [232, 201, 122];
  const CREAM = [253, 245, 230];
  const BROWN = [62, 39, 35];
  const BROWNL= [109, 76, 65];
  const WHITE = [255, 255, 255];

  const locales = {en:'en-GB',es:'es-ES',fr:'fr-FR',it:'it-IT'};
  const locale = locales[currentLang]||'en-GB';
  const quotes = {
    en:'"Traveller, there is no path — the path is made by walking"',
    es:'"Caminante, no hay camino, se hace camino al andar"',
    fr:'"Voyageur, il n\'y a pas de chemin, le chemin se fait en marchant"',
    it:'"Viandante, non c\'\u00e8 sentiero, il sentiero si fa camminando"'
  };
  const subtitles = {
    en:'THE DIGITAL PASSPORT OF THE CATHOLIC PILGRIM',
    es:'EL PASAPORTE DIGITAL DEL PEREGRINO CAT\u00d3LICO',
    fr:'LE PASSEPORT NUM\u00c9RIQUE DU P\u00c8LERIN CATHOLIQUE',
    it:'IL PASSAPORTO DIGITALE DEL PELLEGRINO CATTOLICO'
  };
  const footers = {
    en:'PEREGRIN  \u2014  THE DIGITAL PASSPORT OF THE CATHOLIC PILGRIM',
    es:'PEREGRIN  \u2014  EL PASAPORTE DIGITAL DEL PEREGRINO CAT\u00d3LICO',
    fr:'PEREGRIN  \u2014  LE PASSEPORT NUM\u00c9RIQUE DU P\u00c8LERIN CATHOLIQUE',
    it:'PEREGRIN  \u2014  IL PASSAPORTO DIGITALE DEL PELLEGRINO CATTOLICO'
  };

  // === BACKGROUND ===
  doc.setFillColor(...CREAM);
  doc.rect(0, 0, W, H, 'F');

  // === BURGUNDY BORDER FRAME ===
  doc.setFillColor(...BURG);
  doc.rect(0, 0, W, 8, 'F');
  doc.rect(0, H-8, W, 8, 'F');
  doc.rect(0, 0, 8, H, 'F');
  doc.rect(W-8, 0, 8, H, 'F');

  // === INNER GOLD DOUBLE BORDER ===
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.8);
  doc.rect(11, 11, W-22, H-22);
  doc.setLineWidth(0.3);
  doc.rect(14, 14, W-28, H-28);

  // === CORNER DECORATIONS ===
  [[14,14],[W-14,14],[14,H-14],[W-14,H-14]].forEach(([x,y])=>{
    doc.setDrawColor(...GOLD);
    doc.setLineWidth(0.5);
    const len=15;
    const dx=x<W/2?1:-1, dy=y<H/2?1:-1;
    doc.line(x,y,x+len*dx,y);
    doc.line(x,y,x,y+len*dy);
  });

  // === LEFT PANEL (burgundy) ===
  const panelW = 85;
  doc.setFillColor(...BURG);
  doc.rect(14, 14, panelW, H-28, 'F');
  doc.setFillColor(...GOLD);
  doc.rect(14+panelW, 14, 2, H-28, 'F');

  // Cross on panel
  const cx = 14 + panelW/2;
  doc.setFillColor(...GOLD);
  doc.rect(cx-2.5, 30, 5, 30, 'F');
  doc.rect(cx-12, 42, 24, 5, 'F');
  doc.setFillColor(...BURG);
  doc.rect(cx-0.8, 33, 1.6, 24, 'F');
  doc.rect(cx-9.5, 43.5, 19, 2, 'F');

  // PEREGRIN title
  doc.setFont('helvetica','bold');
  doc.setFontSize(28);
  doc.setTextColor(...WHITE);
  doc.text('PEREGRIN', cx, 78, {align:'center'});

  // Subtitle
  doc.setFont('helvetica','normal');
  doc.setFontSize(6.5);
  doc.setTextColor(...GOLDL);
  const subLines = doc.splitTextToSize(subtitles[currentLang]||subtitles.en, panelW-16);
  doc.text(subLines, cx, 86, {align:'center'});

  // Decorative line
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.4);
  doc.line(cx-25, 94, cx+25, 94);

  // Country name
  doc.setFont('helvetica','bold');
  doc.setFontSize(14);
  doc.setTextColor(...GOLDL);
  doc.text(cn(country).toUpperCase(), cx, 105, {align:'center'});
  doc.setFontSize(10);
  doc.setTextColor(...WHITE);
  doc.text(new Date().getFullYear().toString(), cx, 114, {align:'center'});

  // Seal
  const sy = 145;
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.8);
  doc.circle(cx, sy, 16);
  doc.setLineWidth(0.3);
  doc.circle(cx, sy, 13);
  doc.setLineWidth(0.2);
  doc.circle(cx, sy, 10.5);
  doc.setFillColor(...GOLD);
  doc.circle(cx, sy, 9, 'F');
  doc.setFillColor(...BURG);
  doc.rect(cx-1.5, sy-6, 3, 12, 'F');
  doc.rect(cx-5, sy-1.5, 10, 3, 'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(4);
  doc.setTextColor(...BURG);
  doc.text('PEREGRIN', cx, sy-13.5, {align:'center'});
  doc.text('OFFICIAL', cx, sy+17, {align:'center'});

  // Quote
  doc.setFont('helvetica','italic');
  doc.setFontSize(6);
  doc.setTextColor(...GOLDL);
  const qLines = doc.splitTextToSize(quotes[currentLang]||quotes.en, panelW-14);
  doc.text(qLines, cx, H-32, {align:'center'});

  // === RIGHT SIDE ===
  const rLeft = 14 + panelW + 2 + 12;
  const rWidth = W - rLeft - 20;
  const rCenter = rLeft + rWidth/2;

  // Certificate title
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(...GOLD);
  doc.text(t('certTitle').toUpperCase(), rCenter, 30, {align:'center'});
  const titleW = doc.getTextWidth(t('certTitle').toUpperCase());
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.3);
  doc.line(rLeft, 32, rCenter-titleW/2-6, 32);
  doc.line(rCenter+titleW/2+6, 32, rLeft+rWidth, 32);

  // Certify text
  doc.setFont('helvetica','italic');
  doc.setFontSize(10);
  doc.setTextColor(...BROWNL);
  doc.text(t('certText1'), rCenter, 44, {align:'center'});

  // Pilgrim name
  const user = window._currentUser;
  const raw = user?.displayName || user?.email?.split('@')[0] || 'Pilgrim';
  const name = raw.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\x20-\x7E]/g,'').trim()||'Pilgrim';
  doc.setFont('times','bolditalic');
  doc.setFontSize(26);
  doc.setTextColor(...BURG);
  doc.text(name, rCenter, 56, {align:'center'});
  const nw = doc.getTextWidth(name);
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.5);
  doc.line(rCenter-nw/2-4, 59, rCenter+nw/2+4, 59);

  // Completed text
  doc.setFont('helvetica','italic');
  doc.setFontSize(10);
  doc.setTextColor(...BROWNL);
  doc.text(t('certText2'), rCenter, 68, {align:'center'});
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(...BURG);
  doc.text(cs.length + ' ' + t('certText3') + ' ' + cn(country), rCenter, 77, {align:'center'});

  // Divider
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.3);
  doc.line(rLeft+10, 82, rLeft+rWidth-10, 82);

  // === SANCTUARY LIST ===
  const listStartY = 88;
  const rowH = Math.min(10, (H - 60 - listStartY) / cs.length);
  const listH = cs.length * rowH + 6;
  doc.setFillColor(...WHITE);
  doc.roundedRect(rLeft+4, listStartY-2, rWidth-8, listH+2, 2, 2, 'F');
  doc.setDrawColor(...GOLDL);
  doc.setLineWidth(0.2);
  doc.roundedRect(rLeft+4, listStartY-2, rWidth-8, listH+2, 2, 2);

  cs.forEach((s, i) => {
    const y = listStartY + 5 + i * rowH;
    if (i % 2 === 0) {
      doc.setFillColor(246, 236, 218);
      doc.rect(rLeft+5, y-5.5, rWidth-10, rowH, 'F');
    }
    doc.setFillColor(...GOLD);
    doc.circle(rLeft+10, y-1, 1.2, 'F');
    doc.setFont('helvetica','normal');
    doc.setFontSize(8);
    doc.setTextColor(...BROWN);
    const sname = sd(s).name;
    const maxNameW = rWidth - 60;
    let displayName = sname;
    while(doc.getTextWidth(displayName) > maxNameW && displayName.length > 10) displayName = displayName.slice(0,-1);
    if(displayName !== sname) displayName = displayName.slice(0,-2)+'..';
    doc.text(displayName, rLeft+14, y);
    if(visits[s.id]){
      const vDate = new Date(visits[s.id]).toLocaleDateString(locale,{day:'numeric',month:'short',year:'numeric'});
      doc.setFont('helvetica','italic');
      doc.setFontSize(7);
      doc.setTextColor(...BROWNL);
      doc.text('('+vDate+')', rLeft+rWidth-14, y, {align:'right'});
    }
  });

  // Footer
  const footY = listStartY + listH + 8;
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.4);
  doc.line(rLeft+10, footY, rLeft+rWidth-10, footY);
  const issued = new Date().toLocaleDateString(locale,{day:'numeric',month:'long',year:'numeric'});
  doc.setFont('helvetica','italic');
  doc.setFontSize(9);
  doc.setTextColor(...BROWN);
  doc.text(t('certIssued') + ' ' + issued, rCenter, footY+8, {align:'center'});

  // Bottom bar
  doc.setFillColor(...BURG);
  doc.rect(0, H-8, W, 8, 'F');
  doc.setFont('helvetica','normal');
  doc.setFontSize(6);
  doc.setTextColor(...GOLDL);
  doc.text(footers[currentLang]||footers.en, W/2, H-3, {align:'center'});

  doc.save('Peregrin_' + country.name + '_' + new Date().getFullYear() + '.pdf');
  showToast(t('certDownloaded'));
}

let devTapCount=0, devTapTimer=null;
function handleDevTap(){
  devTapCount++;
  if(devTapTimer) clearTimeout(devTapTimer);
  devTapTimer=setTimeout(()=>devTapCount=0, 2000);
  if(devTapCount>=5){
    devTapCount=0;
    isPremium=!isPremium;
    if(window._currentUser) window._fbSetDoc(window._currentUser.uid,{isPremium});
    showToast(isPremium?'🔓 Premium activated (test)':'🔒 Premium deactivated');
    refreshAll();
    updateMarkerStyles();
  }
}
