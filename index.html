ifichiamo le nostre vite sulla roccia della tua parola. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Catedral de Faro',type:'Catedral',city:'Faro',province:'Algarve',description:'A catedral mais antiga do Algarve, combinando gótico, Renascimento e barroco.',history:'Construída no século XIII sobre uma mesquita. Destruída e reconstruída várias vezes.',prayer:'Senhor, que edifiquemos as nossas vidas sobre a rocha da tua palavra. Ámen.',feast:'15 de agosto (Assunção)'}},
  {id:206,country:'pt',lat:39.6011,lng:-9.0700,icon:'🕊️',name:'Sanctuary of Our Lady of Nazaré',type:'Marian shrine',city:'Nazaré',province:'Leiria',description:'One of the most beloved Marian shrines in Portugal, set dramatically above the Atlantic Ocean. The Black Madonna of Nazaré has been venerated here for centuries.',history:'The devotion dates to the 8th century when a monk brought a statue of Our Lady from Nazareth. A medieval legend tells of a miraculous rescue of a horseman from the cliff edge.',prayer:'Our Lady of Nazaré, Star of the Sea, protect all sailors and pilgrims. Guide us through the storms of life to the safe harbour of eternal peace. Amen.',feast:'September 8',es:{name:'Santuario de Nuestra Señora de Nazaré',type:'Santuario mariano',city:'Nazaré',province:'Leiria',description:'Uno de los santuarios marianos más queridos de Portugal, situado dramáticamente sobre el Atlántico. La Virgen Negra de Nazaré ha sido venerada aquí durante siglos.',history:'La devoción se remonta al siglo VIII cuando un monje trajo una estatua de Nuestra Señora desde Nazaret. Una leyenda medieval cuenta el rescate milagroso de un jinete al borde del acantilado.',prayer:'Nuestra Señora de Nazaré, Estrella del Mar, protege a todos los marineros y peregrinos. Guíanos a través de las tormentas de la vida hasta el puerto seguro de la paz eterna. Amén.',feast:'8 de septiembre'},fr:{name:'Sanctuaire de Notre-Dame de Nazaré',type:'Sanctuaire marial',city:'Nazaré',province:'Leiria',description:'L\'un des sanctuaires les plus aimés du Portugal, au-dessus de l\'Atlantique. La Vierge Noire y est vénérée depuis des siècles.',history:'La dévotion remonte au VIIIe siècle. Une légende raconte le sauvetage miraculeux d\'un cavalier.',prayer:'Notre-Dame de Nazaré, Étoile de la Mer, guide-nous vers le port de la paix éternelle. Amen.',feast:'8 septembre'},it:{name:'Santuario di Nostra Signora di Nazaré',type:'Santuario mariano',city:'Nazaré',province:'Leiria',description:'Uno dei santuari più amati del Portogallo, sopra l\'Atlantico. La Madonna Nera è venerata qui da secoli.',history:'La devozione risale all\'VIII secolo. Una leggenda narra il salvataggio miracoloso di un cavaliere.',prayer:'Nostra Signora di Nazaré, Stella del Mare, guidaci al porto della pace eterna. Amen.',feast:'8 settembre'},pt:{name:'Santuário de Nossa Senhora da Nazaré',type:'Santuário mariano',city:'Nazaré',province:'Leiria',description:'Um dos santuários mais amados de Portugal, sobre o Atlântico. A Virgem Negra é venerada aqui há séculos.',history:'A devoção remonta ao século VIII. Uma lenda conta o salvamento milagroso de um cavaleiro.',prayer:'Nossa Senhora da Nazaré, Estrela do Mar, guia-nos ao porto da paz eterna. Ámen.',feast:'8 de setembro'}},

  // ===== FRANCE =====
  {id:301,country:'fr',lat:43.099,lng:-0.047,icon:'💧',name:'Sanctuary of Lourdes',type:'Marian shrine',city:'Lourdes',province:'Hautes-Pyrénées',description:'One of the world\'s greatest pilgrimage sites. In 1858 the Virgin Mary appeared 18 times to Bernadette Soubirous. Millions come each year seeking healing at the miraculous spring.',history:'The apparitions occurred between February and July 1858. Our Lady identified herself as the Immaculate Conception. Bernadette was canonised in 1933. The spring has produced thousands of reported cures.',prayer:'Our Lady of Lourdes, you appeared to the humble Bernadette and revealed the spring of healing. Intercede for the sick, the suffering and all pilgrims who come to you with faith. Amen.',feast:'February 11 (Our Lady of Lourdes)',es:{name:'Santuario de Lourdes',type:'Santuario mariano',city:'Lourdes',province:'Altos Pirineos',description:'Uno de los grandes lugares de peregrinación del mundo. En 1858 la Virgen María se apareció 18 veces a Bernadette Soubirous. Millones acuden cada año buscando curación en el manantial milagroso.',history:'Las apariciones ocurrieron entre febrero y julio de 1858. Nuestra Señora se identificó como la Inmaculada Concepción. Bernadette fue canonizada en 1933. El manantial ha producido miles de curaciones registradas.',prayer:'Nuestra Señora de Lourdes, te apareciste a la humilde Bernadette y revelaste el manantial de curación. Intercede por los enfermos, los que sufren y todos los peregrinos que acuden a ti con fe. Amén.',feast:'11 de febrero (Nuestra Señora de Lourdes)'},fr:{name:'Sanctuaire de Lourdes',type:'Sanctuaire marial',city:'Lourdes',province:'Hautes-Pyrénées',description:'L\'un des plus grands lieux de pèlerinage au monde. En 1858 la Vierge apparut 18 fois à Bernadette Soubirous.',history:'Notre-Dame s\'identifia comme l\'Immaculée Conception. Bernadette fut canonisée en 1933. Des milliers de guérisons rapportées.',prayer:'Notre-Dame de Lourdes, intercède pour les malades et tous les pèlerins qui viennent à toi avec foi. Amen.',feast:'11 février (Notre-Dame de Lourdes)'},it:{name:'Santuario di Lourdes',type:'Santuario mariano',city:'Lourdes',province:'Alti Pirenei',description:'Uno dei più grandi luoghi di pellegrinaggio al mondo. Nel 1858 la Vergine apparve 18 volte a Bernadette Soubirous.',history:'La Madonna si identificò come l\'Immacolata Concezione. Bernadette fu canonizzata nel 1933. Migliaia di guarigioni riportate.',prayer:'Nostra Signora di Lourdes, intercedi per i malati e tutti i pellegrini che vengono a te con fede. Amen.',feast:'11 febbraio (Nostra Signora di Lourdes)'},pt:{name:'Santuário de Lourdes',type:'Santuário mariano',city:'Lourdes',province:'Altos Pirenéus',description:'Um dos maiores lugares de peregrinação do mundo. Em 1858 a Virgem apareceu 18 vezes a Bernadette Soubirous.',history:'Nossa Senhora identificou-se como a Imaculada Conceição. Bernadette foi canonizada em 1933. Milhares de curas relatadas.',prayer:'Nossa Senhora de Lourdes, intercede pelos doentes e todos os peregrinos que vêm a ti com fé. Ámen.',feast:'11 de fevereiro (Nossa Senhora de Lourdes)'}},
  {id:302,country:'fr',lat:49.897,lng:2.301,icon:'⚔️',name:'Sanctuary of Our Lady of Amiens',type:'Cathedral',city:'Amiens',province:'Hauts-de-France',description:'The largest Gothic cathedral in France and a UNESCO World Heritage Site. Its soaring nave is the tallest of any complete French cathedral, a masterpiece of High Gothic architecture.',history:'Construction began in 1220 and was largely complete by 1270 — remarkably fast for a cathedral of this scale. It houses the relic of Saint John the Baptist\'s head.',prayer:'Lord, in this cathedral raised so high toward heaven, may our hearts too rise toward you in prayer and praise. Amen.',feast:'August 15 (Assumption — Cathedral dedication)',es:{name:'Catedral de Nuestra Señora de Amiens',type:'Catedral',city:'Amiens',province:'Altos de Francia',description:'La catedral gótica más grande de Francia y Patrimonio de la Humanidad. Su nave es la más alta de cualquier catedral francesa completa, una obra maestra del gótico radiante.',history:'La construcción comenzó en 1220 y estaba prácticamente completa en 1270, una velocidad notable para una catedral de esta escala. Alberga la reliquia de la cabeza de San Juan Bautista.',prayer:'Señor, en esta catedral elevada tan alto hacia el cielo, que nuestros corazones también se eleven hacia ti en oración y alabanza. Amén.',feast:'15 de agosto (Asunción — dedicación)'},fr:{name:'Cathédrale Notre-Dame d\'Amiens',type:'Cathédrale',city:'Amiens',province:'Hauts-de-France',description:'La plus grande cathédrale gothique de France. Patrimoine mondial. Sa nef est la plus haute de France.',history:'Construction de 1220 à 1270. Abrite la relique de la tête de saint Jean-Baptiste.',prayer:'Seigneur, que nos cœurs s\'élèvent vers toi en prière et louange. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Nostra Signora di Amiens',type:'Cattedrale',city:'Amiens',province:'Alta Francia',description:'La cattedrale gotica più grande di Francia. Patrimonio dell\'Umanità. La navata è la più alta di Francia.',history:'Costruzione dal 1220 al 1270. Custodisce la reliquia della testa di San Giovanni Battista.',prayer:'Signore, che i nostri cuori si elevino verso di te in preghiera e lode. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Catedral de Nossa Senhora de Amiens',type:'Catedral',city:'Amiens',province:'Alta França',description:'A maior catedral gótica de França. Património da Humanidade.',history:'Construção de 1220 a 1270. Alberga a relíquia da cabeça de São João Batista.',prayer:'Senhor, que os nossos corações se elevem até ti em oração e louvor. Ámen.',feast:'15 de agosto (Assunção)'}},
  {id:303,country:'fr',lat:48.447,lng:1.489,icon:'🌹',name:'Chartres Cathedral',type:'Cathedral',city:'Chartres',province:'Eure-et-Loir',description:'One of the finest examples of French Gothic architecture. A UNESCO World Heritage Site, famous for its extraordinary stained glass windows and ancient Marian devotion.',history:'The current cathedral was built in just 26 years after a fire in 1194. It houses the Veil of the Virgin, a relic venerated since the 9th century. Its labyrinth is used for walking meditation.',prayer:'Our Lady of Chartres, Star under whose mantle generations have sought refuge, hear our prayers and intercede for us before your Son. Amen.',feast:'August 15 (Assumption)',es:{name:'Catedral de Chartres',type:'Catedral',city:'Chartres',province:'Eure y Loir',description:'Uno de los mejores ejemplos de arquitectura gótica francesa. Patrimonio de la Humanidad, famosa por sus extraordinarias vidrieras y la antigua devoción mariana.',history:'La catedral actual fue construida en tan solo 26 años tras un incendio en 1194. Alberga el Velo de la Virgen, reliquia venerada desde el siglo IX. Su laberinto se usa para meditación caminada.',prayer:'Nuestra Señora de Chartres, Estrella bajo cuyo manto generaciones han buscado refugio, escucha nuestras oraciones e intercede por nosotros ante tu Hijo. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Cathédrale de Chartres',type:'Cathédrale',city:'Chartres',province:'Eure-et-Loir',description:'L\'un des plus beaux exemples de gothique français. Patrimoine mondial, célèbre pour ses vitraux et le Voile de la Vierge.',history:'Construite en 26 ans après un incendie en 1194. Son labyrinthe est utilisé pour la méditation.',prayer:'Notre-Dame de Chartres, écoute nos prières et intercède pour nous auprès de ton Fils. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Chartres',type:'Cattedrale',city:'Chartres',province:'Eure e Loir',description:'Uno dei migliori esempi di gotico francese. Patrimonio dell\'Umanità, famosa per le vetrate e il Velo della Vergine.',history:'Costruita in 26 anni dopo un incendio nel 1194. Il labirinto è usato per la meditazione.',prayer:'Nostra Signora di Chartres, ascolta le nostre preghiere e intercedi per noi presso tuo Figlio. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Catedral de Chartres',type:'Catedral',city:'Chartres',province:'Eure-et-Loir',description:'Um dos melhores exemplos de gótico francês. Património da Humanidade, famosa pelos vitrais e o Véu da Virgem.',history:'Construída em 26 anos após um incêndio em 1194. O labirinto é usado para meditação.',prayer:'Nossa Senhora de Chartres, ouve as nossas orações e intercede por nós junto do teu Filho. Ámen.',feast:'15 de agosto (Assunção)'}},
  {id:304,country:'fr',lat:47.8181,lng:1.7561,icon:'🏛️',name:'Cathedral of Our Lady of Cléry',type:'Basilica',city:'Cléry-Saint-André',province:'Loiret',description:'A royal pilgrimage church that was the favourite sanctuary of King Louis XI, who is buried here. The statue of Our Lady of Cléry is one of the oldest Marian images in France.',history:'The statue was discovered in the 13th century. Louis XI had the church rebuilt in the 15th century and made it his burial place. He visited dozens of times throughout his reign.',prayer:'Our Lady of Cléry, beloved of kings and pilgrims, we come to you with our needs. Present them to your Son who can refuse you nothing. Amen.',feast:'September 8',es:{name:'Basílica de Nuestra Señora de Cléry',type:'Basílica',city:'Cléry-Saint-André',province:'Loiret',description:'Iglesia de peregrinación real, lugar favorito del rey Luis XI, quien está enterrado aquí. La estatua de Nuestra Señora de Cléry es una de las imágenes marianas más antiguas de Francia.',history:'La estatua fue descubierta en el siglo XIII. Luis XI hizo reconstruir la iglesia en el siglo XV y eligió este lugar como su sepultura. La visitó decenas de veces a lo largo de su reinado.',prayer:'Nuestra Señora de Cléry, amada de reyes y peregrinos, venimos a ti con nuestras necesidades. Preséntalas a tu Hijo, que no puede negarte nada. Amén.',feast:'8 de septiembre'},fr:{name:'Basilique Notre-Dame de Cléry',type:'Basilique',city:'Cléry-Saint-André',province:'Loiret',description:'Église royale, lieu favori de Louis XI qui y est enterré. L\'une des plus anciennes images mariales de France.',history:'La statue fut découverte au XIIIe siècle. Louis XI fit reconstruire l\'église et y fut inhumé.',prayer:'Notre-Dame de Cléry, présente nos besoins à ton Fils qui ne peut rien te refuser. Amen.',feast:'8 septembre'},it:{name:'Basilica di Nostra Signora di Cléry',type:'Basilica',city:'Cléry-Saint-André',province:'Loiret',description:'Chiesa reale, luogo preferito di Luigi XI che vi è sepolto. Una delle più antiche immagini mariane di Francia.',history:'La statua fu scoperta nel XIII secolo. Luigi XI fece ricostruire la chiesa e vi fu sepolto.',prayer:'Nostra Signora di Cléry, presenta le nostre necessità a tuo Figlio che non può negarti nulla. Amen.',feast:'8 settembre'},pt:{name:'Basílica de Nossa Senhora de Cléry',type:'Basílica',city:'Cléry-Saint-André',province:'Loiret',description:'Igreja real, lugar favorito de Luís XI que aqui está sepultado. Uma das mais antigas imagens marianas de França.',history:'A estátua foi descoberta no século XIII. Luís XI mandou reconstruir a igreja e foi aqui sepultado.',prayer:'Nossa Senhora de Cléry, apresenta as nossas necessidades ao teu Filho que nada te pode recusar. Ámen.',feast:'8 de setembro'}},
  {id:305,country:'fr',lat:45.0425,lng:3.8849,icon:'🕯️',name:'Sanctuary of Our Lady of Le Puy',type:'Cathedral',city:'Le Puy-en-Velay',province:'Haute-Loire',description:'One of the great medieval pilgrimage destinations, perched dramatically on volcanic peaks. The starting point of one of the main routes of the Camino de Santiago.',history:'The Marian devotion at Le Puy dates to the 3rd century. The medieval cathedral complex includes a Black Madonna, a Romanesque cloister, and chapels built on volcanic rocks.',prayer:'Our Lady of Le Puy, ancient guide of pilgrims and travellers, bless all who begin their journey here and bring them safely to Santiago and beyond. Amen.',feast:'August 15 (Assumption)',es:{name:'Santuario de Nuestra Señora de Le Puy',type:'Catedral',city:'Le Puy-en-Velay',province:'Alto Loira',description:'Uno de los grandes destinos de peregrinación medievales, enclavado dramáticamente en cimas volcánicas. Punto de partida de una de las principales rutas del Camino de Santiago.',history:'La devoción mariana en Le Puy se remonta al siglo III. El complejo catedralicio medieval incluye una Virgen Negra, un claustro románico y capillas construidas sobre rocas volcánicas.',prayer:'Nuestra Señora de Le Puy, antigua guía de peregrinos y viajeros, bendice a todos los que aquí inician su camino y condúcelos sanos y salvos a Santiago y más allá. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Sanctuaire de Notre-Dame du Puy',type:'Cathédrale',city:'Le Puy-en-Velay',province:'Haute-Loire',description:'Grande destination de pèlerinage médiévale sur des pics volcaniques. Départ d\'une route principale du Chemin de Saint-Jacques.',history:'La dévotion mariale remonte au IIIe siècle. Comprend une Vierge Noire et un cloître roman.',prayer:'Notre-Dame du Puy, guide ancienne des pèlerins, bénis tous ceux qui commencent ici leur chemin. Amen.',feast:'15 août (Assomption)'},it:{name:'Santuario di Nostra Signora di Le Puy',type:'Cattedrale',city:'Le Puy-en-Velay',province:'Alta Loira',description:'Grande destinazione di pellegrinaggio medievale su cime vulcaniche. Partenza di una via principale del Cammino di Santiago.',history:'La devozione mariana risale al III secolo. Comprende una Madonna Nera e un chiostro romanico.',prayer:'Nostra Signora di Le Puy, antica guida dei pellegrini, benedici tutti coloro che qui iniziano il cammino. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Santuário de Nossa Senhora de Le Puy',type:'Catedral',city:'Le Puy-en-Velay',province:'Alto Loire',description:'Grande destino de peregrinação medieval em picos vulcânicos. Ponto de partida de uma das principais vias do Caminho de Santiago.',history:'A devoção mariana remonta ao século III. Inclui uma Virgem Negra e um claustro românico.',prayer:'Nossa Senhora de Le Puy, guia antiga dos peregrinos, abençoa todos os que aqui começam o caminho. Ámen.',feast:'15 de agosto (Assunção)'}},
  {id:306,country:'fr',lat:48.887,lng:2.343,icon:'💒',name:'Sacré-Cœur Basilica',type:'Basilica',city:'Paris',province:'Île-de-France',description:'Perched atop Montmartre, the highest point in Paris, this white Romano-Byzantine basilica is a symbol of faith and one of the most visited monuments in France.',history:'Built as an act of national penance after the Franco-Prussian War (1871), construction began in 1875 and the basilica was consecrated in 1919. Perpetual adoration has been maintained since 1885.',prayer:'Sacred Heart of Jesus, to you we consecrate ourselves and our nation. May your love reign in every heart and your kingdom of peace embrace the world. Amen.',feast:'Solemnity of the Sacred Heart',es:{name:'Basílica del Sagrado Corazón',type:'Basílica',city:'París',province:'Isla de Francia',description:'Encaramada en lo alto de Montmartre, el punto más alto de París, esta basílica blanca romano-bizantina es un símbolo de fe y uno de los monumentos más visitados de Francia.',history:'Construida como acto de penitencia nacional tras la guerra franco-prusiana (1871), la construcción comenzó en 1875 y la basílica fue consagrada en 1919. La adoración perpetua se mantiene desde 1885.',prayer:'Sagrado Corazón de Jesús, a ti nos consagramos a nosotros mismos y a nuestra nación. Que tu amor reine en cada corazón y tu reino de paz abrace al mundo. Amén.',feast:'Solemnidad del Sagrado Corazón'},fr:{name:'Basilique du Sacré-Cœur',type:'Basilique',city:'Paris',province:'Île-de-France',description:'Au sommet de Montmartre, basilique blanche romano-byzantine, symbole de foi et l\'un des monuments les plus visités de France.',history:'Construite en pénitence nationale après 1871. Adoration perpétuelle depuis 1885.',prayer:'Sacré-Cœur de Jésus, que ton amour règne dans chaque cœur et que ton royaume de paix embrasse le monde. Amen.',feast:'Solennité du Sacré-Cœur'},it:{name:'Basilica del Sacro Cuore',type:'Basilica',city:'Parigi',province:'Île-de-France',description:'In cima a Montmartre, basilica bianca romano-bizantina, simbolo di fede e uno dei monumenti più visitati di Francia.',history:'Costruita come penitenza nazionale dopo il 1871. Adorazione perpetua dal 1885.',prayer:'Sacro Cuore di Gesù, che il tuo amore regni in ogni cuore e il tuo regno di pace abbracci il mondo. Amen.',feast:'Solennità del Sacro Cuore'},pt:{name:'Basílica do Sagrado Coração',type:'Basílica',city:'Paris',province:'Île-de-France',description:'No topo de Montmartre, basílica branca romano-bizantina, símbolo de fé e um dos monumentos mais visitados de França.',history:'Construída como penitência nacional após 1871. Adoração perpétua desde 1885.',prayer:'Sagrado Coração de Jesus, que o teu amor reine em cada coração e o teu reino de paz abrace o mundo. Ámen.',feast:'Solenidade do Sagrado Coração'}},

  // ===== ITALY =====
  {id:401,country:'it',lat:41.902,lng:12.453,icon:'✝️',name:'Saint Peter\'s Basilica',type:'Basilica',city:'Vatican City',province:'Vatican',description:'The heart of Christendom. Built over the tomb of Saint Peter the Apostle, it is the largest church in the world. The centre of the Catholic faith for over a billion faithful.',history:'The first basilica was built by Emperor Constantine in 320 AD. The current basilica was designed by Michelangelo and completed in 1626. The dome remains the tallest in the world.',prayer:'Lord, on this rock you built your Church. Strengthen our faith, deepen our love, and make us worthy witnesses of the Gospel in our time. Amen.',feast:'June 29 (Saints Peter and Paul)',es:{name:'Basílica de San Pedro',type:'Basílica',city:'Ciudad del Vaticano',province:'Vaticano',description:'El corazón de la Cristiandad. Construida sobre la tumba del apóstol San Pedro, es la iglesia más grande del mundo. Centro de la fe católica para más de mil millones de fieles.',history:'La primera basílica fue construida por el emperador Constantino en el año 320 d.C. La basílica actual fue diseñada por Miguel Ángel y completada en 1626. La cúpula sigue siendo la más alta del mundo.',prayer:'Señor, sobre esta roca edificaste tu Iglesia. Fortalece nuestra fe, profundiza nuestro amor y haznos dignos testigos del Evangelio en nuestro tiempo. Amén.',feast:'29 de junio (Santos Pedro y Pablo)'},fr:{name:'Basilique Saint-Pierre',type:'Basilique',city:'Cité du Vatican',province:'Vatican',description:'Le cœur de la Chrétienté. La plus grande église du monde, construite sur le tombeau de saint Pierre.',history:'Première basilique construite par Constantin en 320. L\'actuelle conçue par Michel-Ange, achevée en 1626.',prayer:'Seigneur, sur cette pierre tu as bâti ton Église. Fortifie notre foi et fais de nous des témoins de l\'Évangile. Amen.',feast:'29 juin (Saints Pierre et Paul)'},it:{name:'Basilica di San Pietro',type:'Basilica',city:'Città del Vaticano',province:'Vaticano',description:'Il cuore della Cristianità. La chiesa più grande del mondo, costruita sulla tomba di San Pietro.',history:'Prima basilica costruita da Costantino nel 320. L\'attuale progettata da Michelangelo, completata nel 1626.',prayer:'Signore, su questa pietra hai edificato la tua Chiesa. Rafforza la nostra fede e rendici testimoni del Vangelo. Amen.',feast:'29 giugno (Santi Pietro e Paolo)'},pt:{name:'Basílica de São Pedro',type:'Basílica',city:'Cidade do Vaticano',province:'Vaticano',description:'O coração da Cristandade. A maior igreja do mundo, construída sobre o túmulo de São Pedro.',history:'Primeira basílica construída por Constantino em 320. A atual projetada por Miguel Ângelo, concluída em 1626.',prayer:'Senhor, sobre esta pedra edificaste a tua Igreja. Fortalece a nossa fé e faz de nós testemunhas do Evangelho. Ámen.',feast:'29 de junho (Santos Pedro e Paulo)'}},
  {id:402,country:'it',lat:43.070,lng:12.614,icon:'🕊️',name:'Basilica of Saint Francis',type:'Basilica',city:'Assisi',province:'Umbria',description:'The spiritual home of Saint Francis of Assisi. This magnificent double basilica, decorated by Giotto and Cimabue, is one of Italy\'s greatest artistic and spiritual treasures.',history:'Built immediately after Francis\'s canonisation in 1228, the basilica houses his tomb. The famous frescoes by Giotto illustrate the life of the saint. It is a UNESCO World Heritage Site.',prayer:'Lord, make me an instrument of your peace. Where there is hatred let me sow love, where there is doubt, faith, where there is darkness, light. Amen. (Prayer of Saint Francis)',feast:'October 4 (Saint Francis)',es:{name:'Basílica de San Francisco de Asís',type:'Basílica',city:'Asís',province:'Umbría',description:'El hogar espiritual de San Francisco de Asís. Esta magnífica doble basílica, decorada por Giotto y Cimabue, es uno de los mayores tesoros artísticos y espirituales de Italia.',history:'Construida inmediatamente después de la canonización de Francisco en 1228, la basílica alberga su tumba. Los famosos frescos de Giotto ilustran la vida del santo. Es Patrimonio de la Humanidad.',prayer:'Señor, hazme instrumento de tu paz. Donde haya odio, que yo ponga amor; donde haya duda, fe; donde haya oscuridad, luz. Amén. (Oración de San Francisco)',feast:'4 de octubre (San Francisco)'},fr:{name:'Basilique Saint-François d\'Assise',type:'Basilique',city:'Assise',province:'Ombrie',description:'Foyer spirituel de saint François. Double basilique décorée par Giotto et Cimabue. Patrimoine mondial.',history:'Construite après la canonisation de François en 1228. Les fresques de Giotto illustrent sa vie.',prayer:'Seigneur, fais de moi un instrument de ta paix. Là où il y a la haine, que je mette l\'amour. Amen.',feast:'4 octobre (Saint François)'},it:{name:'Basilica di San Francesco d\'Assisi',type:'Basilica',city:'Assisi',province:'Umbria',description:'Dimora spirituale di San Francesco. Doppia basilica decorata da Giotto e Cimabue. Patrimonio dell\'Umanità.',history:'Costruita dopo la canonizzazione di Francesco nel 1228. Gli affreschi di Giotto illustrano la sua vita.',prayer:'Signore, fa\' di me uno strumento della tua pace. Dove c\'è odio, che io porti amore. Amen.',feast:'4 ottobre (San Francesco)'},pt:{name:'Basílica de São Francisco de Assis',type:'Basílica',city:'Assis',province:'Úmbria',description:'Morada espiritual de São Francisco. Dupla basílica decorada por Giotto e Cimabue. Património da Humanidade.',history:'Construída após a canonização de Francisco em 1228. Os frescos de Giotto ilustram a sua vida.',prayer:'Senhor, faz de mim um instrumento da tua paz. Onde há ódio, que eu leve o amor. Ámen.',feast:'4 de outubro (São Francisco)'}},
  {id:403,country:'it',lat:43.723,lng:10.396,icon:'🏛️',name:'Cathedral of Pisa',type:'Cathedral',city:'Pisa',province:'Tuscany',description:'A masterpiece of Romanesque architecture forming part of the famous Piazza dei Miracoli. Together with the Baptistery, Cemetery and Leaning Tower, it is a UNESCO World Heritage Site.',history:'Construction began in 1063 after a naval victory over Saracens. The cathedral\'s architect Buscheto introduced the Pisan Romanesque style that influenced churches across Tuscany and Sardinia.',prayer:'Lord, this cathedral built in thanksgiving for victory reminds us that all our achievements are gifts from you. May we always return glory to you alone. Amen.',feast:'August 15 (Assumption)',es:{name:'Catedral de Pisa',type:'Catedral',city:'Pisa',province:'Toscana',description:'Obra maestra del románico que forma parte de la famosa Piazza dei Miracoli. Junto al Baptisterio, el Camposanto y la Torre Inclinada, es Patrimonio de la Humanidad de la UNESCO.',history:'La construcción comenzó en 1063 tras una victoria naval sobre los sarracenos. El arquitecto Buschetto introdujo el estilo románico pisano que influyó en iglesias de toda la Toscana y Cerdeña.',prayer:'Señor, esta catedral construida en acción de gracias por una victoria nos recuerda que todos nuestros logros son dones tuyos. Que siempre te devolvamos la gloria. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Cathédrale de Pise',type:'Cathédrale',city:'Pise',province:'Toscane',description:'Chef-d\'œuvre roman de la Piazza dei Miracoli. Patrimoine mondial avec le Baptistère et la Tour penchée.',history:'Construction débutée en 1063. Le style roman pisan influença toute la Toscane.',prayer:'Seigneur, que nous te rendions toujours la gloire pour tes dons. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Pisa',type:'Cattedrale',city:'Pisa',province:'Toscana',description:'Capolavoro romanico della Piazza dei Miracoli. Patrimonio dell\'Umanità con il Battistero e la Torre Pendente.',history:'Costruzione iniziata nel 1063. Lo stile romanico pisano influenzò tutta la Toscana.',prayer:'Signore, che ti rendiamo sempre la gloria per i tuoi doni. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Catedral de Pisa',type:'Catedral',city:'Pisa',province:'Toscana',description:'Obra-prima românica da Piazza dei Miracoli. Património da Humanidade com o Batistério e a Torre Inclinada.',history:'Construção iniciada em 1063. O estilo românico pisano influenciou toda a Toscana.',prayer:'Senhor, que te devolvamos sempre a glória pelos teus dons. Ámen.',feast:'15 de agosto (Assunção)'}},
  {id:404,country:'it',lat:45.437,lng:12.336,icon:'🌊',name:'Basilica of Santa Maria della Salute',type:'Basilica',city:'Venice',province:'Veneto',description:'One of Venice\'s most iconic buildings, built as a votive offering for the city\'s deliverance from a devastating plague in 1630. Its imposing dome dominates the entrance to the Grand Canal.',history:'Built between 1631 and 1687 by architect Baldassare Longhena. Every November 21st, Venetians walk across a pontoon bridge to give thanks at the Feast of the Madonna della Salute.',prayer:'Our Lady of Health, you interceded for Venice in its hour of plague. Intercede for us in our hour of need, and bring healing to all who are sick. Amen.',feast:'November 21',es:{name:'Basílica de Santa María della Salute',type:'Basílica',city:'Venecia',province:'Véneto',description:'Uno de los edificios más icónicos de Venecia, construido como ofrenda votiva por la liberación de la ciudad de una devastadora peste en 1630. Su imponente cúpula domina la entrada al Gran Canal.',history:'Construida entre 1631 y 1687 por el arquitecto Baldassare Longhena. Cada 21 de noviembre los venecianos cruzan un puente flotante para dar gracias en la Fiesta de la Madonna della Salute.',prayer:'Nuestra Señora de la Salud, intercediste por Venecia en su hora de la peste. Intercede por nosotros en nuestra hora de necesidad y trae curación a todos los enfermos. Amén.',feast:'21 de noviembre'},fr:{name:'Basilique Santa Maria della Salute',type:'Basilique',city:'Venise',province:'Vénétie',description:'Édifice emblématique de Venise, construit en action de grâces pour la délivrance de la peste de 1630.',history:'Construite entre 1631 et 1687. Chaque 21 novembre, les Vénitiens traversent un pont flottant pour la fête.',prayer:'Notre-Dame de la Santé, intercède pour nous et apporte la guérison à tous les malades. Amen.',feast:'21 novembre'},it:{name:'Basilica di Santa Maria della Salute',type:'Basilica',city:'Venezia',province:'Veneto',description:'Edificio iconico di Venezia, costruito come offerta votiva per la liberazione dalla peste del 1630.',history:'Costruita tra il 1631 e il 1687. Ogni 21 novembre i veneziani attraversano un ponte galleggiante per la festa.',prayer:'Nostra Signora della Salute, intercedi per noi e porta guarigione a tutti i malati. Amen.',feast:'21 novembre'},pt:{name:'Basílica de Santa Maria della Salute',type:'Basílica',city:'Veneza',province:'Véneto',description:'Edifício icónico de Veneza, construído em ação de graças pela libertação da peste de 1630.',history:'Construída entre 1631 e 1687. A cada 21 de novembro os venezianos atravessam uma ponte flutuante para a festa.',prayer:'Nossa Senhora da Saúde, intercede por nós e traz cura a todos os doentes. Ámen.',feast:'21 de novembro'}},
  {id:405,country:'it',lat:41.4890,lng:13.8136,icon:'🌿',name:'Abbey of Monte Cassino',type:'Abbey',city:'Monte Cassino',province:'Lazio',description:'The mother monastery of Western monasticism, founded by Saint Benedict of Nursia around 529 AD. Largely destroyed in World War II, it has been faithfully rebuilt as a symbol of peace.',history:'Saint Benedict founded the monastery and wrote his Rule here, which became the foundation of monastic life in the West. The abbey was destroyed and rebuilt four times. The war cemetery below holds thousands of soldiers.',prayer:'Saint Benedict, father of Western monks, teach us to seek God above all things, to receive all guests as Christ, and to work and pray in holy balance. Amen.',feast:'July 11 (Saint Benedict)',es:{name:'Abadía de Monte Cassino',type:'Abadía',city:'Monte Cassino',province:'Lacio',description:'El monasterio madre del monacato occidental, fundado por San Benito de Nursia hacia el año 529 d.C. Destruido en la Segunda Guerra Mundial, ha sido fielmente reconstruido como símbolo de paz.',history:'San Benito fundó el monasterio y escribió aquí su Regla, que se convirtió en el fundamento de la vida monástica en Occidente. La abadía fue destruida y reconstruida cuatro veces. El cementerio de guerra alberga a miles de soldados.',prayer:'San Benito, padre de los monjes occidentales, enséñanos a buscar a Dios sobre todas las cosas, a recibir a todos los huéspedes como a Cristo y a trabajar y orar en santa armonía. Amén.',feast:'11 de julio (San Benito)'},fr:{name:'Abbaye du Mont-Cassin',type:'Abbaye',city:'Mont-Cassin',province:'Latium',description:'Monastère mère du monachisme occidental, fondé par saint Benoît vers 529. Reconstruit après la Seconde Guerre mondiale.',history:'Saint Benoît y écrivit sa Règle, fondement de la vie monastique occidentale. Détruit et reconstruit quatre fois.',prayer:'Saint Benoît, apprends-nous à chercher Dieu avant tout et à travailler et prier en saint équilibre. Amen.',feast:'11 juillet (Saint Benoît)'},it:{name:'Abbazia di Montecassino',type:'Abbazia',city:'Montecassino',province:'Lazio',description:'Monastero madre del monachesimo occidentale, fondato da San Benedetto verso il 529. Ricostruito dopo la Seconda Guerra Mondiale.',history:'San Benedetto vi scrisse la sua Regola, fondamento della vita monastica occidentale. Distrutto e ricostruito quattro volte.',prayer:'San Benedetto, insegnaci a cercare Dio sopra ogni cosa e a lavorare e pregare in santo equilibrio. Amen.',feast:'11 luglio (San Benedetto)'},pt:{name:'Abadia de Monte Cassino',type:'Abadia',city:'Monte Cassino',province:'Lácio',description:'Mosteiro-mãe do monaquismo ocidental, fundado por São Bento por volta de 529. Reconstruído após a Segunda Guerra Mundial.',history:'São Bento escreveu aqui a sua Regra, fundamento da vida monástica ocidental. Destruído e reconstruído quatro vezes.',prayer:'São Bento, ensina-nos a procurar Deus acima de tudo e a trabalhar e rezar em santo equilíbrio. Ámen.',feast:'11 de julho (São Bento)'}},
  {id:406,country:'it',lat:41.7072,lng:15.7251,icon:'💒',name:'Sanctuary of San Giovanni Rotondo',type:'Sanctuary',city:'San Giovanni Rotondo',province:'Puglia',description:'Home of Padre Pio of Pietrelcina, one of the most popular saints of the 20th century. Millions of pilgrims visit each year to pray at his tomb.',history:'Padre Pio lived here from 1916 until his death in 1968. He bore the stigmata for 50 years, was renowned for reading souls and miracles of healing. He was canonised by John Paul II in 2002.',prayer:'Padre Pio, faithful servant of God who bore in your body the wounds of Christ, pray for us. Obtain for us from God the grace we need and draw us closer to the Sacred Heart of Jesus. Amen.',feast:'September 23 (Padre Pio)',es:{name:'Santuario de San Giovanni Rotondo',type:'Santuario',city:'San Giovanni Rotondo',province:'Apulia',description:'Hogar del Padre Pío de Pietrelcina, uno de los santos más populares del siglo XX. Millones de peregrinos visitan cada año su tumba.',history:'El Padre Pío vivió aquí desde 1916 hasta su muerte en 1968. Llevó los estigmas durante 50 años, y fue famoso por leer las almas y los milagros de curación. Fue canonizado por Juan Pablo II en 2002.',prayer:'Padre Pío, fiel servidor de Dios que llevaste en tu cuerpo las llagas de Cristo, ruega por nosotros. Obten de Dios la gracia que necesitamos y llévanos más cerca del Sagrado Corazón de Jesús. Amén.',feast:'23 de septiembre (Padre Pío)'},fr:{name:'Sanctuaire de San Giovanni Rotondo',type:'Sanctuaire',city:'San Giovanni Rotondo',province:'Pouilles',description:'Demeure de Padre Pio, l\'un des saints les plus populaires du XXe siècle. Des millions visitent sa tombe chaque année.',history:'Padre Pio vécut ici de 1916 à 1968. Il porta les stigmates pendant 50 ans. Canonisé en 2002.',prayer:'Padre Pio, obtiens-nous la grâce dont nous avons besoin et rapproche-nous du Sacré-Cœur de Jésus. Amen.',feast:'23 septembre (Padre Pio)'},it:{name:'Santuario di San Giovanni Rotondo',type:'Santuario',city:'San Giovanni Rotondo',province:'Puglia',description:'Dimora di Padre Pio, uno dei santi più popolari del XX secolo. Milioni visitano la sua tomba ogni anno.',history:'Padre Pio visse qui dal 1916 al 1968. Portò le stimmate per 50 anni. Canonizzato nel 2002.',prayer:'Padre Pio, ottienici la grazia di cui abbiamo bisogno e avvicinaci al Sacro Cuore di Gesù. Amen.',feast:'23 settembre (Padre Pio)'},pt:{name:'Santuário de San Giovanni Rotondo',type:'Santuário',city:'San Giovanni Rotondo',province:'Apúlia',description:'Morada do Padre Pio, um dos santos mais populares do século XX. Milhões visitam o seu túmulo todos os anos.',history:'O Padre Pio viveu aqui de 1916 a 1968. Levou os estigmas durante 50 anos. Canonizado em 2002.',prayer:'Padre Pio, obtém-nos a graça de que necessitamos e aproxima-nos do Sagrado Coração de Jesus. Ámen.',feast:'23 de setembro (Padre Pio)'}},
  {id:407,country:'it',lat:40.850,lng:14.268,icon:'🩸',name:'Cathedral of Naples',type:'Cathedral',city:'Naples',province:'Campania',description:'Home to the liquefaction miracle of the blood of Saint Januarius, patron of Naples. Three times a year, the dried blood liquefies — an event witnessed by thousands for centuries.',history:'The cathedral was built in the 13th century. The Chapel of San Gennaro houses the relics of the martyr. The liquefaction miracle has been recorded since 1389 and is the subject of intense popular devotion.',prayer:'Saint Januarius, martyr and patron of Naples, intercede for this city and its people. May the miracle of your blood be a sign of God\'s faithfulness to his people. Amen.',feast:'September 19 (Saint Januarius)',es:{name:'Catedral de Nápoles',type:'Catedral',city:'Nápoles',province:'Campania',description:'Sede del milagro de la licuefacción de la sangre de San Jenaro, patrón de Nápoles. Tres veces al año la sangre seca se licúa, un acontecimiento presenciado por miles desde hace siglos.',history:'La catedral fue construida en el siglo XIII. La Capilla de San Jenaro alberga las reliquias del mártir. El milagro de la licuefacción está documentado desde 1389 y es objeto de intensa devoción popular.',prayer:'San Jenaro, mártir y patrón de Nápoles, intercede por esta ciudad y su pueblo. Que el milagro de tu sangre sea signo de la fidelidad de Dios hacia su pueblo. Amén.',feast:'19 de septiembre (San Jenaro)'},fr:{name:'Cathédrale de Naples',type:'Cathédrale',city:'Naples',province:'Campanie',description:'Siège du miracle de la liquéfaction du sang de saint Janvier. Trois fois par an le sang séché se liquéfie.',history:'Construite au XIIIe siècle. Le miracle est documenté depuis 1389.',prayer:'Saint Janvier, martyr et patron de Naples, que le miracle de ton sang soit signe de la fidélité de Dieu. Amen.',feast:'19 septembre (Saint Janvier)'},it:{name:'Cattedrale di Napoli',type:'Cattedrale',city:'Napoli',province:'Campania',description:'Sede del miracolo della liquefazione del sangue di San Gennaro. Tre volte all\'anno il sangue secco si liquefa.',history:'Costruita nel XIII secolo. Il miracolo è documentato dal 1389.',prayer:'San Gennaro, martire e patrono di Napoli, che il miracolo del tuo sangue sia segno della fedeltà di Dio. Amen.',feast:'19 settembre (San Gennaro)'},pt:{name:'Catedral de Nápoles',type:'Catedral',city:'Nápoles',province:'Campânia',description:'Sede do milagre da liquefação do sangue de São Januário. Três vezes por ano o sangue seco liquefaz-se.',history:'Construída no século XIII. O milagre está documentado desde 1389.',prayer:'São Januário, mártir e padroeiro de Nápoles, que o milagre do teu sangue seja sinal da fidelidade de Deus. Ámen.',feast:'19 de setembro (São Januário)'}},

  // ===== POLAND =====
  {id:501,country:'pl',lat:50.814,lng:19.097,icon:'👑',name:'Jasna Góra Monastery',type:'Monastery',city:'Częstochowa',province:'Silesia',description:'The spiritual capital of Poland, home to the Black Madonna of Częstochowa — one of the most venerated Marian images in the world. The monastery has never been conquered.',history:'Founded in 1382, the monastery survived the Swedish Deluge of 1655 — a miracle attributed to the Black Madonna. King John II Casimir consecrated Poland to the Virgin Mary here. Pope John Paul II visited multiple times.',prayer:'Our Lady of Częstochowa, Black Madonna, Queen of Poland, be our refuge and strength. Under your protection we place our nation, our families and ourselves. Amen.',feast:'August 26',es:{name:'Monasterio de Jasna Góra',type:'Monasterio',city:'Częstochowa',province:'Silesia',description:'La capital espiritual de Polonia, hogar de la Virgen Negra de Częstochowa, una de las imágenes marianas más veneradas del mundo. El monasterio nunca ha sido conquistado.',history:'Fundado en 1382, el monasterio sobrevivió al Diluvio Sueco de 1655, milagro atribuido a la Virgen Negra. El rey Juan II Casimiro consagró Polonia a la Virgen María aquí. El Papa Juan Pablo II lo visitó varias veces.',prayer:'Nuestra Señora de Częstochowa, Virgen Negra, Reina de Polonia, sé nuestro refugio y fortaleza. Bajo tu protección ponemos nuestra nación, nuestras familias y a nosotros mismos. Amén.',feast:'26 de agosto'},fr:{name:'Monastère de Jasna Góra',type:'Monastère',city:'Częstochowa',province:'Silésie',description:'Capitale spirituelle de la Pologne, abritant la Vierge Noire de Częstochowa.',history:'Fondé en 1382. Survécut au Déluge suédois de 1655. Jean-Paul II le visita plusieurs fois.',prayer:'Notre-Dame de Częstochowa, Vierge Noire, Reine de Pologne, sois notre refuge et notre force. Amen.',feast:'26 août'},it:{name:'Monastero di Jasna Góra',type:'Monastero',city:'Częstochowa',province:'Slesia',description:'Capitale spirituale della Polonia, sede della Madonna Nera di Częstochowa.',history:'Fondato nel 1382. Sopravvisse al Diluvio svedese del 1655. Giovanni Paolo II lo visitò più volte.',prayer:'Nostra Signora di Częstochowa, Madonna Nera, Regina di Polonia, sii il nostro rifugio e la nostra forza. Amen.',feast:'26 agosto'},pt:{name:'Mosteiro de Jasna Góra',type:'Mosteiro',city:'Częstochowa',province:'Silésia',description:'Capital espiritual da Polónia, sede da Virgem Negra de Częstochowa.',history:'Fundado em 1382. Sobreviveu ao Dilúvio Sueco de 1655. João Paulo II visitou várias vezes.',prayer:'Nossa Senhora de Częstochowa, Virgem Negra, Rainha da Polónia, sê o nosso refúgio e a nossa força. Ámen.',feast:'26 de agosto'}},
  {id:502,country:'pl',lat:50.0200,lng:19.9186,icon:'⛪',name:'Divine Mercy Sanctuary',type:'Sanctuary',city:'Kraków',province:'Lesser Poland',description:'The global centre of the Divine Mercy devotion, based on the visions of Saint Faustina Kowalska. Millions of pilgrims come to venerate the famous Divine Mercy image.',history:'Sister Faustina received her visions here in the 1930s. Pope John Paul II, a native of Kraków, was devoted to Divine Mercy and canonised Faustina in 2000. He proclaimed the second Sunday of Easter as Divine Mercy Sunday.',prayer:'Jesus, I trust in you. For the sake of your sorrowful Passion, have mercy on us and on the whole world. Amen.',feast:'Second Sunday of Easter (Divine Mercy Sunday)',es:{name:'Santuario de la Divina Misericordia',type:'Santuario',city:'Cracovia',province:'Pequeña Polonia',description:'El centro mundial de la devoción a la Divina Misericordia, basada en las visiones de Santa Faustina Kowalska. Millones de peregrinos vienen a venerar la famosa imagen de la Divina Misericordia.',history:'La hermana Faustina recibió sus visiones aquí en los años 1930. El Papa Juan Pablo II, natural de Cracovia, era devoto de la Divina Misericordia y canonizó a Faustina en 2000. Proclamó el segundo domingo de Pascua como Domingo de la Divina Misericordia.',prayer:'Jesús, en ti confío. Por tu dolorosa Pasión, ten misericordia de nosotros y del mundo entero. Amén.',feast:'Segundo domingo de Pascua (Domingo de la Divina Misericordia)'},fr:{name:'Sanctuaire de la Divine Miséricorde',type:'Sanctuaire',city:'Cracovie',province:'Petite-Pologne',description:'Centre mondial de la dévotion à la Divine Miséricorde, basé sur les visions de sainte Faustine.',history:'Sœur Faustine reçut ses visions dans les années 1930. Canonisée en 2000 par Jean-Paul II.',prayer:'Jésus, j\'ai confiance en toi. Par ta douloureuse Passion, aie pitié de nous et du monde entier. Amen.',feast:'Deuxième dimanche de Pâques'},it:{name:'Santuario della Divina Misericordia',type:'Santuario',city:'Cracovia',province:'Piccola Polonia',description:'Centro mondiale della devozione alla Divina Misericordia, basato sulle visioni di Santa Faustina.',history:'Suor Faustina ricevette le visioni negli anni 1930. Canonizzata nel 2000 da Giovanni Paolo II.',prayer:'Gesù, confido in te. Per la tua dolorosa Passione, abbi misericordia di noi e del mondo intero. Amen.',feast:'Seconda domenica di Pasqua'},pt:{name:'Santuário da Divina Misericórdia',type:'Santuário',city:'Cracóvia',province:'Pequena Polónia',description:'Centro mundial da devoção à Divina Misericórdia, baseado nas visões de Santa Faustina.',history:'Irmã Faustina recebeu as visões nos anos 1930. Canonizada em 2000 por João Paulo II.',prayer:'Jesus, eu confio em ti. Pela tua dolorosa Paixão, tem misericórdia de nós e do mundo inteiro. Ámen.',feast:'Segundo domingo da Páscoa'}},
  {id:503,country:'pl',lat:52.3078,lng:18.3556,icon:'🌊',name:'Basilica of Our Lady of Licheń',type:'Basilica',city:'Licheń Stary',province:'Greater Poland',description:'The largest church in Poland and one of the largest in the world. An extraordinary place of pilgrimage dedicated to Our Lady of Licheń, Sorrowful Queen of Poland.',history:'The devotion to Our Lady of Licheń began in the 19th century. The enormous new basilica was built between 1994 and 2004, financed entirely by donations from Polish faithful worldwide.',prayer:'Our Lady of Licheń, Sorrowful Queen of Poland, wipe away the tears of your children, give strength to the afflicted and hope to the despairing. Amen.',feast:'September 12',es:{name:'Basílica de Nuestra Señora de Licheń',type:'Basílica',city:'Licheń Stary',province:'Gran Polonia',description:'La iglesia más grande de Polonia y una de las más grandes del mundo. Un extraordinario lugar de peregrinación dedicado a Nuestra Señora de Licheń, Reina Dolorosa de Polonia.',history:'La devoción a Nuestra Señora de Licheń comenzó en el siglo XIX. La enorme basílica nueva fue construida entre 1994 y 2004, financiada íntegramente por donativos de fieles polacos de todo el mundo.',prayer:'Nuestra Señora de Licheń, Reina Dolorosa de Polonia, enjuga las lágrimas de tus hijos, da fuerza a los afligidos y esperanza a los desesperados. Amén.',feast:'12 de septiembre'},fr:{name:'Basilique de Notre-Dame de Licheń',type:'Basilique',city:'Licheń Stary',province:'Grande-Pologne',description:'La plus grande église de Pologne. Lieu de pèlerinage dédié à Notre-Dame de Licheń, Reine Douloureuse.',history:'Dévotion commencée au XIXe siècle. La basilique fut construite entre 1994 et 2004.',prayer:'Notre-Dame de Licheń, essuie les larmes de tes enfants et donne espérance aux désespérés. Amen.',feast:'12 septembre'},it:{name:'Basilica di Nostra Signora di Licheń',type:'Basilica',city:'Licheń Stary',province:'Grande Polonia',description:'La chiesa più grande della Polonia. Luogo di pellegrinaggio dedicato a Nostra Signora di Licheń, Regina Addolorata.',history:'Devozione iniziata nel XIX secolo. La basilica fu costruita tra il 1994 e il 2004.',prayer:'Nostra Signora di Licheń, asciuga le lacrime dei tuoi figli e dai speranza ai disperati. Amen.',feast:'12 settembre'},pt:{name:'Basílica de Nossa Senhora de Licheń',type:'Basílica',city:'Licheń Stary',province:'Grande Polónia',description:'A maior igreja da Polónia. Lugar de peregrinação dedicado a Nossa Senhora de Licheń, Rainha Dolorosa.',history:'Devoção iniciada no século XIX. A basílica foi construída entre 1994 e 2004.',prayer:'Nossa Senhora de Licheń, enxuga as lágrimas dos teus filhos e dá esperança aos desesperados. Ámen.',feast:'12 de setembro'}},
  {id:504,country:'pl',lat:50.054,lng:19.935,icon:'🏰',name:'Wawel Cathedral',type:'Cathedral',city:'Kraków',province:'Lesser Poland',description:'The royal cathedral of Poland, burial place of kings, saints and national heroes. The Sigismund Bell and the relics of Saint Stanislaus make it the spiritual heart of the Polish nation.',history:'The current Gothic cathedral was completed in 1364. It contains 18 chapels including the golden Sigismund Chapel. Among those buried here are Saint Jadwiga, King John III Sobieski and President Lech Kaczyński.',prayer:'Saint Stanislaus, patron of Poland and bishop and martyr, intercede for this nation. May Poland always remain faithful to Christ and to his Church. Amen.',feast:'May 8 (Saint Stanislaus)',es:{name:'Catedral del Wawel',type:'Catedral',city:'Cracovia',province:'Pequeña Polonia',description:'La catedral real de Polonia, lugar de sepultura de reyes, santos y héroes nacionales. La Campana Segismundo y las reliquias de San Estanislao la convierten en el corazón espiritual de la nación polaca.',history:'La actual catedral gótica se completó en 1364. Contiene 18 capillas, incluida la dorada Capilla Segismundo. Entre los aquí enterrados se encuentran Santa Jadwiga, el rey Juan III Sobieski y el presidente Lech Kaczyński.',prayer:'San Estanislao, patrón de Polonia y obispo mártir, intercede por esta nación. Que Polonia permanezca siempre fiel a Cristo y a su Iglesia. Amén.',feast:'8 de mayo (San Estanislao)'},fr:{name:'Cathédrale du Wawel',type:'Cathédrale',city:'Cracovie',province:'Petite-Pologne',description:'Cathédrale royale de Pologne, sépulture des rois, saints et héros nationaux.',history:'Cathédrale gothique achevée en 1364. Contient 18 chapelles dont la Chapelle Sigismond.',prayer:'Saint Stanislas, patron de la Pologne, que la Pologne reste fidèle au Christ et à son Église. Amen.',feast:'8 mai (Saint Stanislas)'},it:{name:'Cattedrale del Wawel',type:'Cattedrale',city:'Cracovia',province:'Piccola Polonia',description:'Cattedrale reale della Polonia, sepoltura di re, santi e eroi nazionali.',history:'Cattedrale gotica completata nel 1364. Contiene 18 cappelle tra cui la Cappella Sigismondo.',prayer:'San Stanislao, patrono della Polonia, che la Polonia resti fedele a Cristo e alla sua Chiesa. Amen.',feast:'8 maggio (San Stanislao)'},pt:{name:'Catedral do Wawel',type:'Catedral',city:'Cracóvia',province:'Pequena Polónia',description:'Catedral real da Polónia, sepultura de reis, santos e heróis nacionais.',history:'Catedral gótica concluída em 1364. Contém 18 capelas incluindo a Capela Sigismundo.',prayer:'São Estanislau, padroeiro da Polónia, que a Polónia permaneça fiel a Cristo e à sua Igreja. Ámen.',feast:'8 de maio (São Estanislau)'}},
  {id:505,country:'pl',lat:51.764,lng:19.456,icon:'🌿',name:'Sanctuary of Our Lady of Łódź',type:'Sanctuary',city:'Łódź',province:'Łódź',description:'One of the most important Marian sanctuaries in central Poland, housing an ancient image of Our Lady venerated for centuries of miracles and answered prayers.',history:'The sanctuary has been a place of pilgrimage since the 17th century. The image of Our Lady has been venerated through wars, partitions and communist persecution, standing as a symbol of hope.',prayer:'Our Lady of Łódź, gentle mother who has watched over this city through its joys and sorrows, continue to pray for us and lead us to your Son. Amen.',feast:'August 15 (Assumption)',es:{name:'Santuario de Nuestra Señora de Łódź',type:'Santuario',city:'Łódź',province:'Łódź',description:'Uno de los santuarios marianos más importantes del centro de Polonia, que alberga una antigua imagen de Nuestra Señora venerada durante siglos por sus milagros y plegarias atendidas.',history:'El santuario ha sido lugar de peregrinación desde el siglo XVII. La imagen de Nuestra Señora ha sido venerada a través de guerras, particiones y la persecución comunista, como símbolo de esperanza.',prayer:'Nuestra Señora de Łódź, madre gentil que has velado por esta ciudad en sus alegrías y tristezas, continúa rezando por nosotros y llévanos a tu Hijo. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Sanctuaire de Notre-Dame de Łódź',type:'Sanctuaire',city:'Łódź',province:'Łódź',description:'Important sanctuaire marial du centre de la Pologne avec une ancienne image vénérée pour ses miracles.',history:'Lieu de pèlerinage depuis le XVIIe siècle, symbole d\'espérance à travers guerres et persécutions.',prayer:'Notre-Dame de Łódź, continue de prier pour nous et conduis-nous à ton Fils. Amen.',feast:'15 août (Assomption)'},it:{name:'Santuario di Nostra Signora di Łódź',type:'Santuario',city:'Łódź',province:'Łódź',description:'Importante santuario mariano della Polonia centrale con un\'antica immagine venerata per i suoi miracoli.',history:'Luogo di pellegrinaggio dal XVII secolo, simbolo di speranza attraverso guerre e persecuzioni.',prayer:'Nostra Signora di Łódź, continua a pregare per noi e conducici a tuo Figlio. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Santuário de Nossa Senhora de Łódź',type:'Santuário',city:'Łódź',province:'Łódź',description:'Importante santuário mariano da Polónia central com uma antiga imagem venerada pelos seus milagres.',history:'Lugar de peregrinação desde o século XVII, símbolo de esperança através de guerras e perseguições.',prayer:'Nossa Senhora de Łódź, continua a rezar por nós e conduz-nos ao teu Filho. Ámen.',feast:'15 de agosto (Assunção)'}},

  // ===== IRELAND =====
  {id:601,country:'ie',lat:53.778,lng:-8.918,icon:'🕊️',name:'Knock Shrine',type:'Marian shrine',city:'Knock',province:'County Mayo',description:'Ireland\'s national Marian shrine. On August 21, 1879, an apparition of Our Lady, Saint Joseph and Saint John the Evangelist was witnessed by 15 people on the gable of the village church.',history:'The apparition lasted two hours in rain. The witnesses — ranging from children to elderly — were consistent in their accounts. Pope John Paul II visited in 1979 for the centenary. One million pilgrims visit annually.',prayer:'Our Lady of Knock, Queen of Ireland, you gave hope to our people in a time of famine and despair. Be with us still as we face the challenges of our time. Amen.',feast:'August 21 (Knock Apparition)',es:{name:'Santuario de Knock',type:'Santuario mariano',city:'Knock',province:'Condado de Mayo',description:'El santuario mariano nacional de Irlanda. El 21 de agosto de 1879, una aparición de Nuestra Señora, San José y San Juan Evangelista fue presenciada por 15 personas en el frontón de la iglesia del pueblo.',history:'La aparición duró dos horas bajo la lluvia. Los testigos, de niños a ancianos, fueron consistentes en sus relatos. El Papa Juan Pablo II visitó el lugar en 1979 para el centenario. Un millón de peregrinos visitan anualmente.',prayer:'Nuestra Señora de Knock, Reina de Irlanda, diste esperanza a tu pueblo en un tiempo de hambre y desesperación. Permanece con nosotros mientras afrontamos los retos de nuestro tiempo. Amén.',feast:'21 de agosto (Aparición de Knock)'},fr:{name:'Sanctuaire de Knock',type:'Sanctuaire marial',city:'Knock',province:'Comté de Mayo',description:'Sanctuaire marial national d\'Irlande. En 1879, apparition de Notre-Dame, saint Joseph et saint Jean devant 15 témoins.',history:'L\'apparition dura deux heures sous la pluie. Jean-Paul II visita le lieu en 1979. Un million de pèlerins par an.',prayer:'Notre-Dame de Knock, Reine d\'Irlande, reste avec nous face aux défis de notre temps. Amen.',feast:'21 août (Apparition de Knock)'},it:{name:'Santuario di Knock',type:'Santuario mariano',city:'Knock',province:'Contea di Mayo',description:'Santuario mariano nazionale d\'Irlanda. Nel 1879, apparizione di Nostra Signora, San Giuseppe e San Giovanni davanti a 15 testimoni.',history:'L\'apparizione durò due ore sotto la pioggia. Giovanni Paolo II visitò il luogo nel 1979. Un milione di pellegrini all\'anno.',prayer:'Nostra Signora di Knock, Regina d\'Irlanda, resta con noi nelle sfide del nostro tempo. Amen.',feast:'21 agosto (Apparizione di Knock)'},pt:{name:'Santuário de Knock',type:'Santuário mariano',city:'Knock',province:'Condado de Mayo',description:'Santuário mariano nacional da Irlanda. Em 1879, aparição de Nossa Senhora, São José e São João perante 15 testemunhas.',history:'A aparição durou duas horas sob chuva. João Paulo II visitou em 1979. Um milhão de peregrinos por ano.',prayer:'Nossa Senhora de Knock, Rainha da Irlanda, permanece connosco nos desafios do nosso tempo. Ámen.',feast:'21 de agosto (Aparição de Knock)'}},
  {id:602,country:'ie',lat:53.339,lng:-6.269,icon:'🏛️',name:'Saint Patrick\'s Cathedral',type:'Cathedral',city:'Dublin',province:'County Dublin',description:'Ireland\'s largest cathedral, built on the site where Saint Patrick is said to have baptised converts in the 5th century. An imposing Gothic landmark in the heart of Dublin.',history:'Founded in 1191 and elevated to cathedral status in 1213. Jonathan Swift, author of Gulliver\'s Travels, served as Dean here. The cathedral has been a place of worship for over 800 years.',prayer:'Saint Patrick, Apostle of Ireland, you drove out the darkness of paganism and brought the light of Christ to our shores. May Ireland remain ever faithful to your legacy. Amen.',feast:'March 17 (Saint Patrick)',es:{name:'Catedral de San Patricio',type:'Catedral',city:'Dublín',province:'Condado de Dublín',description:'La catedral más grande de Irlanda, construida en el lugar donde se dice que San Patricio bautizó a conversos en el siglo V. Un imponente monumento gótico en el corazón de Dublín.',history:'Fundada en 1191 y elevada al rango de catedral en 1213. Jonathan Swift, autor de Los viajes de Gulliver, fue deán aquí. La catedral ha sido lugar de culto durante más de 800 años.',prayer:'San Patricio, apóstol de Irlanda, alejaste las tinieblas del paganismo y trajiste la luz de Cristo a estas tierras. Que Irlanda permanezca siempre fiel a tu legado. Amén.',feast:'17 de marzo (San Patricio)'},fr:{name:'Cathédrale Saint-Patrick',type:'Cathédrale',city:'Dublin',province:'Comté de Dublin',description:'La plus grande cathédrale d\'Irlande, construite où saint Patrick aurait baptisé des convertis au Ve siècle.',history:'Fondée en 1191. Jonathan Swift en fut le doyen. Lieu de culte depuis plus de 800 ans.',prayer:'Saint Patrick, apôtre d\'Irlande, que l\'Irlande reste fidèle à ton héritage. Amen.',feast:'17 mars (Saint Patrick)'},it:{name:'Cattedrale di San Patrizio',type:'Cattedrale',city:'Dublino',province:'Contea di Dublino',description:'La cattedrale più grande d\'Irlanda, costruita dove San Patrizio avrebbe battezzato convertiti nel V secolo.',history:'Fondata nel 1191. Jonathan Swift ne fu il decano. Luogo di culto da oltre 800 anni.',prayer:'San Patrizio, apostolo d\'Irlanda, che l\'Irlanda resti fedele alla tua eredità. Amen.',feast:'17 marzo (San Patrizio)'},pt:{name:'Catedral de São Patrício',type:'Catedral',city:'Dublin',province:'Condado de Dublin',description:'A maior catedral da Irlanda, construída onde São Patrício teria batizado convertidos no século V.',history:'Fundada em 1191. Jonathan Swift foi decano. Lugar de culto há mais de 800 anos.',prayer:'São Patrício, apóstolo da Irlanda, que a Irlanda permaneça fiel à tua herança. Ámen.',feast:'17 de março (São Patrício)'}},
  {id:603,country:'ie',lat:53.760,lng:-9.659,icon:'⛰️',name:'Croagh Patrick',type:'Pilgrimage site',city:'Westport',province:'County Mayo',description:'Ireland\'s holy mountain, where Saint Patrick fasted for 40 days in 441 AD. Each year on Reek Sunday, tens of thousands climb the 764-metre summit, many barefoot.',history:'The mountain has been a place of pilgrimage since pre-Christian times. Patrick\'s fast on the summit is one of Ireland\'s foundational spiritual narratives. The small oratory at the top is a modern replacement of successive earlier chapels.',prayer:'Lord, as we climb this holy mountain in the footsteps of your servant Patrick, purify our hearts and strengthen our resolve to follow you. Amen.',feast:'Last Sunday of July (Reek Sunday)',es:{name:'Croagh Patrick',type:'Lugar de peregrinación',city:'Westport',province:'Condado de Mayo',description:'La montaña sagrada de Irlanda, donde San Patricio ayunó durante 40 días en el año 441 d.C. Cada año el Domingo del Reek, decenas de miles suben a la cima de 764 metros, muchos descalzos.',history:'La montaña ha sido lugar de peregrinación desde tiempos precristianos. El ayuno de Patricio en la cumbre es una de las narraciones espirituales fundacionales de Irlanda. El pequeño oratorio en la cima es un reemplazo moderno de sucesivas capillas anteriores.',prayer:'Señor, al subir esta montaña sagrada siguiendo los pasos de tu siervo Patricio, purifica nuestros corazones y fortalece nuestra determinación de seguirte. Amén.',feast:'Último domingo de julio (Domingo del Reek)'},fr:{name:'Croagh Patrick',type:'Lieu de pèlerinage',city:'Westport',province:'Comté de Mayo',description:'Montagne sacrée d\'Irlande. Saint Patrick y jeûna 40 jours en 441. Des dizaines de milliers y grimpent chaque année.',history:'Lieu de pèlerinage depuis les temps préchrétiens. Le jeûne de Patrick est fondateur de la spiritualité irlandaise.',prayer:'Seigneur, en gravissant cette montagne, purifie nos cœurs et fortifie notre résolution de te suivre. Amen.',feast:'Dernier dimanche de juillet'},it:{name:'Croagh Patrick',type:'Luogo di pellegrinaggio',city:'Westport',province:'Contea di Mayo',description:'Montagna sacra d\'Irlanda. San Patrizio vi digiunò 40 giorni nel 441. Decine di migliaia vi salgono ogni anno.',history:'Luogo di pellegrinaggio fin dai tempi precristiani. Il digiuno di Patrizio è fondante della spiritualità irlandese.',prayer:'Signore, salendo questa montagna, purifica i nostri cuori e rafforza la nostra determinazione a seguirti. Amen.',feast:'Ultima domenica di luglio'},pt:{name:'Croagh Patrick',type:'Lugar de peregrinação',city:'Westport',province:'Condado de Mayo',description:'Montanha sagrada da Irlanda. São Patrício jejuou aqui 40 dias em 441. Dezenas de milhares sobem todos os anos.',history:'Lugar de peregrinação desde tempos pré-cristãos. O jejum de Patrício é fundador da espiritualidade irlandesa.',prayer:'Senhor, ao subirmos esta montanha, purifica os nossos corações e fortalece a nossa determinação de te seguir. Ámen.',feast:'Último domingo de julho'}},
  {id:604,country:'ie',lat:51.896,lng:-8.468,icon:'💒',name:'Shandon Church',type:'Church',city:'Cork',province:'County Cork',description:'Saint Anne\'s Church, known as Shandon, is one of Cork\'s most beloved landmarks. Visitors can ring the famous Shandon Bells, an experience unique in Irish religious heritage.',history:'Built in 1722 on the site of a church destroyed by Williamite forces. The famous steeple has four clock faces that were historically known as the four-faced liar because they showed different times.',prayer:'Lord, as these bells have called generations of Cork people to prayer, may their sound call us too to lift our hearts to you in gratitude and praise. Amen.',feast:'July 26 (Saint Anne)',es:{name:'Iglesia de Shandon',type:'Iglesia',city:'Cork',province:'Condado de Cork',description:'La Iglesia de Santa Ana, conocida como Shandon, es uno de los monumentos más queridos de Cork. Los visitantes pueden tocar las famosas Campanas de Shandon, una experiencia única en el patrimonio religioso irlandés.',history:'Construida en 1722 sobre el emplazamiento de una iglesia destruida por las fuerzas williamitas. El famoso campanario tiene cuatro esferas de reloj que históricamente se conocían como el mentiroso de cuatro caras porque marcaban horas distintas.',prayer:'Señor, así como estas campanas han llamado a generaciones de habitantes de Cork a la oración, que su sonido nos llame también a nosotros a elevar nuestros corazones hacia ti con gratitud y alabanza. Amén.',feast:'26 de julio (Santa Ana)'},fr:{name:'Église de Shandon',type:'Église',city:'Cork',province:'Comté de Cork',description:'L\'Église Sainte-Anne, monument emblématique de Cork. Les visiteurs peuvent sonner les célèbres Cloches de Shandon.',history:'Construite en 1722. Le clocher a quatre cadrans qui montraient des heures différentes.',prayer:'Seigneur, que ces cloches nous appellent à élever nos cœurs vers toi en gratitude. Amen.',feast:'26 juillet (Sainte Anne)'},it:{name:'Chiesa di Shandon',type:'Chiesa',city:'Cork',province:'Contea di Cork',description:'La Chiesa di Sant\'Anna, monumento emblematico di Cork. I visitatori possono suonare le famose Campane di Shandon.',history:'Costruita nel 1722. Il campanile ha quattro quadranti che segnavano ore diverse.',prayer:'Signore, che queste campane ci chiamino a elevare i nostri cuori verso di te con gratitudine. Amen.',feast:'26 luglio (Sant\'Anna)'},pt:{name:'Igreja de Shandon',type:'Igreja',city:'Cork',province:'Condado de Cork',description:'A Igreja de Santa Ana, monumento emblemático de Cork. Os visitantes podem tocar os famosos Sinos de Shandon.',history:'Construída em 1722. O campanário tem quatro relógios que marcavam horas diferentes.',prayer:'Senhor, que estes sinos nos chamem a elevar os nossos corações até ti com gratidão. Ámen.',feast:'26 de julho (Santa Ana)'}},
  {id:605,country:'ie',lat:51.6438,lng:-8.7664,icon:'✝️',name:'Timoleague Abbey',type:'Abbey',city:'Timoleague',province:'County Cork',description:'Hauntingly beautiful ruins of a Franciscan friary founded in 1240, set beside a tidal estuary. One of the most atmospheric medieval religious sites in Ireland.',history:'Founded by the MacCarthy family, Timoleague was one of the largest Franciscan houses in medieval Ireland. It was suppressed during the Reformation in the 16th century. The ruins include the church, cloister and tower.',prayer:'Lord, though these walls are ruined, the faith that built them endures. May we too build on the rock of your love, withstanding every storm. Amen.',feast:'October 4 (Saint Francis)',es:{name:'Abadía de Timoleague',type:'Abadía',city:'Timoleague',province:'Condado de Cork',description:'Ruinas de una sobrecogedora belleza de un convento franciscano fundado en 1240, junto a un estuario de marea. Uno de los lugares religiosos medievales más atmosféricos de Irlanda.',history:'Fundada por la familia MacCarthy, Timoleague fue una de las casas franciscanas más grandes de la Irlanda medieval. Fue suprimida durante la Reforma en el siglo XVI. Las ruinas incluyen la iglesia, el claustro y la torre.',prayer:'Señor, aunque estas paredes estén en ruinas, la fe que las construyó permanece. Que nosotros también edifiquemos sobre la roca de tu amor, resistiendo todas las tempestades. Amén.',feast:'4 de octubre (San Francisco)'},fr:{name:'Abbaye de Timoleague',type:'Abbaye',city:'Timoleague',province:'Comté de Cork',description:'Ruines d\'un couvent franciscain fondé en 1240. L\'un des sites religieux médiévaux les plus atmosphériques d\'Irlande.',history:'Fondée par les MacCarthy. Supprimée lors de la Réforme au XVIe siècle.',prayer:'Seigneur, la foi qui a bâti ces murs perdure. Que nous aussi bâtissions sur le roc de ton amour. Amen.',feast:'4 octobre (Saint François)'},it:{name:'Abbazia di Timoleague',type:'Abbazia',city:'Timoleague',province:'Contea di Cork',description:'Rovine di un convento francescano fondato nel 1240. Uno dei siti religiosi medievali più evocativi d\'Irlanda.',history:'Fondata dai MacCarthy. Soppressa durante la Riforma nel XVI secolo.',prayer:'Signore, la fede che ha costruito queste mura perdura. Che anche noi edifichiamo sulla roccia del tuo amore. Amen.',feast:'4 ottobre (San Francesco)'},pt:{name:'Abadia de Timoleague',type:'Abadia',city:'Timoleague',province:'Condado de Cork',description:'Ruínas de um convento franciscano fundado em 1240. Um dos sítios religiosos medievais mais evocativos da Irlanda.',history:'Fundada pelos MacCarthy. Suprimida durante a Reforma no século XVI.',prayer:'Senhor, a fé que construiu estas paredes perdura. Que também nós edifiquemos sobre a rocha do teu amor. Ámen.',feast:'4 de outubro (São Francisco)'}},

  // ===== GERMANY =====
  {id:701,country:'de',lat:47.6810,lng:10.9004,icon:'🙏',name:'Wieskirche',type:'Church',city:'Steingaden',province:'Bavaria',description:'The Pilgrimage Church of Wies, a UNESCO World Heritage Site. This extraordinary Rococo church in the Bavarian foothills is considered one of the finest examples of Rococo art in the world.',history:'Built between 1745 and 1754 by Dominikus Zimmermann after a miraculous image of the Scourged Christ wept. Pilgrims immediately began flocking to the site and the church was built to accommodate them.',prayer:'Lord Jesus, Scourged Saviour, you shed tears for our sins. Touch our hearts with true contrition and renew in us the joy of your salvation. Amen.',feast:'Sunday after Pentecost',es:{name:'Wieskirche',type:'Iglesia',city:'Steingaden',province:'Baviera',description:'La Iglesia de Peregrinación de Wies, Patrimonio de la Humanidad de la UNESCO. Esta extraordinaria iglesia rococó en las estribaciones bávaras es considerada uno de los mejores ejemplos de arte rococó del mundo.',history:'Construida entre 1745 y 1754 por Dominikus Zimmermann, tras relatos de que una imagen del Cristo Flagelado derramó lágrimas. Los peregrinos comenzaron a acudir inmediatamente y la iglesia fue construida para acogerlos.',prayer:'Señor Jesús, Salvador Flagelado, derramaste lágrimas por nuestros pecados. Toca nuestros corazones con verdadero arrepentimiento y renueva en nosotros el gozo de tu salvación. Amén.',feast:'Domingo de Pentecostés'},fr:{name:'Wieskirche',type:'Église',city:'Steingaden',province:'Bavière',description:'Église de pèlerinage de Wies, Patrimoine mondial. Extraordinaire église rococo dans les Alpes bavaroises.',history:'Construite entre 1745 et 1754 après qu\'une image du Christ Flagellé aurait pleuré.',prayer:'Seigneur Jésus, touche nos cœurs d\'un vrai repentir et renouvelle en nous la joie de ton salut. Amen.',feast:'Dimanche de Pentecôte'},it:{name:'Wieskirche',type:'Chiesa',city:'Steingaden',province:'Baviera',description:'Chiesa di pellegrinaggio di Wies, Patrimonio dell\'Umanità. Straordinaria chiesa rococò nelle Alpi bavaresi.',history:'Costruita tra il 1745 e il 1754 dopo che un\'immagine del Cristo Flagellato avrebbe pianto.',prayer:'Signore Gesù, tocca i nostri cuori con vero pentimento e rinnova in noi la gioia della tua salvezza. Amen.',feast:'Domenica di Pentecoste'},pt:{name:'Wieskirche',type:'Igreja',city:'Steingaden',province:'Baviera',description:'Igreja de Peregrinação de Wies, Património da Humanidade. Extraordinária igreja rococó nos Alpes bávaros.',history:'Construída entre 1745 e 1754 após uma imagem do Cristo Flagelado ter alegadamente chorado.',prayer:'Senhor Jesus, toca os nossos corações com verdadeiro arrependimento e renova em nós a alegria da tua salvação. Ámen.',feast:'Domingo de Pentecostes'}},
  {id:702,country:'de',lat:48.137,lng:11.575,icon:'⛪',name:'Frauenkirche Munich',type:'Cathedral',city:'Munich',province:'Bavaria',description:'The Cathedral of Our Dear Lady, symbol of Munich. Its twin towers are iconic landmarks of the Bavarian capital. A place of Marian devotion at the heart of the city.',history:'Built in a mere 20 years (1468–1488), a remarkable feat for a cathedral of this size. According to legend, the Devil left a footprint in the doorway when he found no windows from inside — an optical illusion still visible today.',prayer:'Our Lady of Munich, gentle mother under whose patronage this city has lived for centuries, watch over us and lead us to your Son. Amen.',feast:'August 15 (Assumption)',es:{name:'Frauenkirche de Múnich',type:'Catedral',city:'Múnich',province:'Baviera',description:'La Catedral de Nuestra Querida Señora, símbolo de Múnich. Sus torres gemelas son monumentos icónicos de la capital bávara. Lugar de devoción mariana en el corazón de la ciudad.',history:'Construida en solo 20 años (1468-1488), un logro notable para una catedral de este tamaño. Según la leyenda, el diablo dejó una huella en el umbral cuando descubrió que no se veían ventanas desde dentro, una ilusión óptica aún visible hoy.',prayer:'Nuestra Señora de Múnich, madre gentil bajo cuyo patrocinio esta ciudad ha vivido durante siglos, vela por nosotros y llévanos a tu Hijo. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Frauenkirche de Munich',type:'Cathédrale',city:'Munich',province:'Bavière',description:'Cathédrale Notre-Dame, symbole de Munich. Ses tours jumelles sont emblématiques de la capitale bavaroise.',history:'Construite en 20 ans (1468-1488). Selon la légende, le diable y laissa son empreinte.',prayer:'Notre-Dame de Munich, veille sur nous et conduis-nous à ton Fils. Amen.',feast:'15 août (Assomption)'},it:{name:'Frauenkirche di Monaco',type:'Cattedrale',city:'Monaco di Baviera',province:'Baviera',description:'Cattedrale di Nostra Signora, simbolo di Monaco. Le torri gemelle sono iconiche della capitale bavarese.',history:'Costruita in 20 anni (1468-1488). Secondo la leggenda, il diavolo vi lasciò la sua impronta.',prayer:'Nostra Signora di Monaco, veglia su di noi e conducici a tuo Figlio. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Frauenkirche de Munique',type:'Catedral',city:'Munique',province:'Baviera',description:'Catedral de Nossa Senhora, símbolo de Munique. As torres gémeas são icónicas da capital bávara.',history:'Construída em 20 anos (1468-1488). Segundo a lenda, o diabo deixou a sua pegada na entrada.',prayer:'Nossa Senhora de Munique, vela por nós e conduz-nos ao teu Filho. Ámen.',feast:'15 de agosto (Assunção)'}},
  {id:703,country:'de',lat:47.5694,lng:11.0956,icon:'💒',name:'Ettal Abbey',type:'Abbey',city:'Ettal',province:'Bavaria',description:'A Benedictine monastery in the Bavarian Alps, founded in 1330, housing a miraculous marble image of Our Lady. Famous for its distillery and as a centre of learning and culture.',history:'Founded by Emperor Louis IV, the abbey was largely rebuilt in the 18th century after a fire. It runs one of Germany\'s top boarding schools. The Baroque church is one of the finest in Bavaria.',prayer:'Our Lady of Ettal, Queen enthroned in the mountains, may your alpine home remind us of the heights to which God calls each of us. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Abadía de Ettal',type:'Abadía',city:'Ettal',province:'Baviera',description:'Un monasterio benedictino en los Alpes bávaros, fundado en 1330, que alberga una milagrosa imagen de mármol de Nuestra Señora. Famoso por su destilería y como centro de aprendizaje y cultura.',history:'Fundada por el emperador Luis IV, la abadía fue reconstruida en gran parte en el siglo XVIII tras un incendio. Gestiona uno de los mejores internados de Alemania. La iglesia barroca es una de las más bellas de Baviera.',prayer:'Nuestra Señora de Ettal, Reina entronizada en las montañas, que tu hogar alpino nos recuerde las alturas a las que Dios llama a cada uno de nosotros. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'},fr:{name:'Abbaye d\'Ettal',type:'Abbaye',city:'Ettal',province:'Bavière',description:'Monastère bénédictin dans les Alpes bavaroises fondé en 1330 avec une image miraculeuse de Notre-Dame.',history:'Fondée par l\'empereur Louis IV. Reconstruite au XVIIIe siècle. L\'église baroque est l\'une des plus belles de Bavière.',prayer:'Notre-Dame d\'Ettal, que ton foyer alpin nous rappelle les hauteurs auxquelles Dieu nous appelle. Amen.',feast:'8 décembre (Immaculée Conception)'},it:{name:'Abbazia di Ettal',type:'Abbazia',city:'Ettal',province:'Baviera',description:'Monastero benedettino nelle Alpi bavaresi fondato nel 1330 con un\'immagine miracolosa di Nostra Signora.',history:'Fondato dall\'imperatore Ludovico IV. Ricostruito nel XVIII secolo. La chiesa barocca è una delle più belle della Baviera.',prayer:'Nostra Signora di Ettal, che la tua dimora alpina ci ricordi le altezze a cui Dio ci chiama. Amen.',feast:'8 dicembre (Immacolata Concezione)'},pt:{name:'Abadia de Ettal',type:'Abadia',city:'Ettal',province:'Baviera',description:'Mosteiro beneditino nos Alpes bávaros fundado em 1330 com uma imagem milagrosa de Nossa Senhora.',history:'Fundado pelo imperador Luís IV. Reconstruído no século XVIII. A igreja barroca é uma das mais belas da Baviera.',prayer:'Nossa Senhora de Ettal, que a tua morada alpina nos lembre das alturas a que Deus nos chama. Ámen.',feast:'8 de dezembro (Imaculada Conceição)'}},
  {id:704,country:'de',lat:48.223,lng:12.676,icon:'🌟',name:'Sanctuary of Altötting',type:'Sanctuary',city:'Altötting',province:'Bavaria',description:'Bavaria\'s most important Marian pilgrimage site, home to the Black Madonna of Altötting. The Chapel of Grace is the heart of this ancient shrine visited by millions.',history:'Miracles were reported here as early as 1489. Bavaria\'s royal House of Wittelsbach gave special patronage to the shrine. Joseph Ratzinger (later Pope Benedict XVI) was baptised nearby and maintained lifelong devotion to Our Lady of Altötting.',prayer:'Our Lady of Altötting, Black Madonna of Bavaria, you have heard the prayers of millions. Hear ours too, and bring them to your Son Jesus. Amen.',feast:'August 15 (Assumption)',es:{name:'Santuario de Altötting',type:'Santuario',city:'Altötting',province:'Baviera',description:'El lugar de peregrinación mariana más importante de Baviera, hogar de la Virgen Negra de Altötting. La Capilla de la Gracia es el corazón de este antiguo santuario visitado por millones.',history:'Los milagros aquí fueron reportados ya en 1489. La casa real bávara de los Wittelsbach dio especial patronazgo al santuario. Joseph Ratzinger (luego Papa Benedicto XVI) fue bautizado cerca y mantuvo devoción de por vida a Nuestra Señora de Altötting.',prayer:'Nuestra Señora de Altötting, Virgen Negra de Baviera, has escuchado las oraciones de millones. Escucha también las nuestras y llévalas a tu Hijo Jesús. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Sanctuaire d\'Altötting',type:'Sanctuaire',city:'Altötting',province:'Bavière',description:'Le plus important lieu de pèlerinage marial de Bavière avec la Vierge Noire d\'Altötting.',history:'Miracles rapportés dès 1489. Joseph Ratzinger (Benoît XVI) garda une dévotion de toute sa vie.',prayer:'Notre-Dame d\'Altötting, Vierge Noire de Bavière, entends nos prières et porte-les à ton Fils Jésus. Amen.',feast:'15 août (Assomption)'},it:{name:'Santuario di Altötting',type:'Santuario',city:'Altötting',province:'Baviera',description:'Il più importante luogo di pellegrinaggio mariano della Baviera con la Madonna Nera di Altötting.',history:'Miracoli segnalati dal 1489. Joseph Ratzinger (Benedetto XVI) mantenne una devozione per tutta la vita.',prayer:'Nostra Signora di Altötting, Madonna Nera della Baviera, ascolta le nostre preghiere e portale a tuo Figlio Gesù. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Santuário de Altötting',type:'Santuário',city:'Altötting',province:'Baviera',description:'O mais importante lugar de peregrinação mariano da Baviera com a Virgem Negra de Altötting.',history:'Milagres relatados desde 1489. Joseph Ratzinger (Bento XVI) manteve devoção ao longo de toda a vida.',prayer:'Nossa Senhora de Altötting, Virgem Negra da Baviera, ouve as nossas orações e leva-as ao teu Filho Jesus. Ámen.',feast:'15 de agosto (Assunção)'}},
