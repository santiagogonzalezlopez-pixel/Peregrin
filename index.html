  {id:1303,country:'pe',lat:-13.5170,lng:-71.9785,icon:'🏔️',name:'Cathedral of Cusco',type:'Cathedral',city:'Cusco',province:'Cusco',description:'Built on the foundations of the palace of the Inca Viracocha, this Renaissance cathedral took nearly a century to complete. It is a powerful symbol of the encounter between Inca civilisation and Christianity.',history:'Construction began in 1559 on the site of the Inca palace. It was completed in 1654, housing the largest collection of colonial paintings in the Americas — the Cusco School. It contains a famous image of the Last Supper with guinea pig on the table, painted by the indigenous artist Marcos Zapata.',prayer:'Lord of Cusco, God of the Inca and God of the conquerors, you are God of all people. Teach us to honour every human dignity and to find you in every culture and tradition. Amen.',feast:'December 8 (Immaculate Conception)',es:{name:'Catedral de Cusco',type:'Catedral',city:'Cusco',province:'Cusco',description:'Construida sobre los cimientos del palacio del inca Viracocha, esta catedral renacentista tardó casi un siglo en completarse. Es un poderoso símbolo del encuentro entre la civilización inca y el cristianismo.',history:'La construcción comenzó en 1559 sobre el emplazamiento del palacio inca. Se completó en 1654, albergando la mayor colección de pinturas coloniales de América — la Escuela Cusqueña. Contiene una famosa imagen de la Última Cena con cuy sobre la mesa, pintada por el artista indígena Marcos Zapata.',prayer:'Señor de Cusco, Dios de los incas y Dios de los conquistadores, eres el Dios de todos los pueblos. Enséñanos a honrar cada dignidad humana y a encontrarte en cada cultura y tradición. Amén.',feast:'8 de diciembre (Inmaculada Concepción)'},fr:{name:'Cathédrale de Cusco',type:'Cathédrale',city:'Cusco',province:'Cusco',description:'Construite sur les fondations du palais inca de Viracocha. Symbole de la rencontre entre civilisation inca et christianisme.',history:'Construction de 1559 à 1654. Contient une Dernière Cène avec un cochon d\'Inde, peinte par Marcos Zapata.',prayer:'Seigneur, Dieu de tous les peuples, apprends-nous à honorer chaque dignité humaine. Amen.',feast:'8 décembre (Immaculée Conception)'},it:{name:'Cattedrale di Cusco',type:'Cattedrale',city:'Cusco',province:'Cusco',description:'Costruita sulle fondamenta del palazzo inca di Viracocha. Simbolo dell\'incontro tra civiltà inca e cristianesimo.',history:'Costruzione dal 1559 al 1654. Contiene un\'Ultima Cena con il cuy, dipinta da Marcos Zapata.',prayer:'Signore, Dio di tutti i popoli, insegnaci a onorare ogni dignità umana. Amen.',feast:'8 dicembre (Immacolata Concezione)'},pt:{name:'Catedral de Cusco',type:'Catedral',city:'Cusco',province:'Cusco',description:'Construída sobre os alicerces do palácio inca de Viracocha. Símbolo do encontro entre civilização inca e cristianismo.',history:'Construção de 1559 a 1654. Contém uma Última Ceia com porquinho-da-índia, pintada por Marcos Zapata.',prayer:'Senhor, Deus de todos os povos, ensina-nos a honrar cada dignidade humana. Ámen.',feast:'8 de dezembro (Imaculada Conceição)'}},
  {id:1304,country:'pe',lat:-16.3989,lng:-71.5350,icon:'✨',name:'Sanctuary of Our Lady of Chapi',type:'Marian shrine',city:'Polobaya',province:'Arequipa',description:'The most important Marian shrine in southern Peru, located in a dramatic desert canyon. Each May 1st, hundreds of thousands of pilgrims walk through the night to reach the sanctuary at dawn.',history:'The image of Our Lady was placed in the chapel in the 17th century. The May pilgrimage, during which pilgrims walk 45 km through the night, is one of the most striking acts of popular piety in Peru. The canyon setting, surrounded by volcanic peaks, adds to the spiritual atmosphere.',prayer:'Our Lady of Chapi, sought by pilgrims who walk through the desert night, be our light in the darkness. May our own spiritual journeys lead us, as theirs do, to find you at the break of dawn. Amen.',feast:'May 1 (Our Lady of Chapi)',es:{name:'Santuario de Nuestra Señora de Chapi',type:'Santuario mariano',city:'Polobaya',province:'Arequipa',description:'El santuario mariano más importante del sur del Perú, ubicado en un dramático cañón desértico. Cada 1 de mayo, cientos de miles de peregrinos caminan de noche para llegar al santuario al amanecer.',history:'La imagen de Nuestra Señora fue colocada en la capilla en el siglo XVII. La peregrinación de mayo, durante la cual los peregrinos caminan 45 km de noche, es uno de los actos de piedad popular más llamativos del Perú. El entorno del cañón, rodeado de cumbres volcánicas, añade a la atmósfera espiritual.',prayer:'Nuestra Señora de Chapi, buscada por peregrinos que caminan de noche por el desierto, sé nuestra luz en la oscuridad. Que nuestros propios caminos espirituales nos lleven, como los suyos, a encontrarte al amanecer. Amén.',feast:'1 de mayo (Nuestra Señora de Chapi)'},fr:{name:'Sanctuaire de Notre-Dame de Chapi',type:'Sanctuaire marial',city:'Polobaya',province:'Arequipa',description:'Le plus important sanctuaire marial du sud du Pérou, dans un canyon désertique. Chaque 1er mai, des centaines de milliers marchent de nuit.',history:'Image placée au XVIIe siècle. La marche de 45 km de nuit est l\'un des actes de piété les plus frappants du Pérou.',prayer:'Notre-Dame de Chapi, sois notre lumière dans l\'obscurité. Que nos chemins spirituels nous mènent à toi à l\'aube. Amen.',feast:'1er mai (Notre-Dame de Chapi)'},it:{name:'Santuario di Nostra Signora di Chapi',type:'Santuario mariano',city:'Polobaya',province:'Arequipa',description:'Il santuario mariano più importante del Perù meridionale, in un canyon desertico. Ogni 1° maggio centinaia di migliaia camminano di notte.',history:'Immagine posta nel XVII secolo. La marcia di 45 km notturna è uno degli atti di pietà più impressionanti del Perù.',prayer:'Nostra Signora di Chapi, sii la nostra luce nell\'oscurità. Che i nostri cammini spirituali ci portino a te all\'alba. Amen.',feast:'1° maggio (Nostra Signora di Chapi)'},pt:{name:'Santuário de Nossa Senhora de Chapi',type:'Santuário mariano',city:'Polobaya',province:'Arequipa',description:'O santuário mariano mais importante do sul do Peru, num desfiladeiro desértico. A cada 1 de maio centenas de milhares caminham de noite.',history:'Imagem colocada no século XVII. A marcha de 45 km noturna é um dos atos de piedade mais impressionantes do Peru.',prayer:'Nossa Senhora de Chapi, sê a nossa luz na escuridão. Que os nossos caminhos espirituais nos levem a ti ao amanhecer. Ámen.',feast:'1 de maio (Nossa Senhora de Chapi)'}},

  // ===== COLOMBIA =====
  {id:1401,country:'co',lat:0.8219,lng:-77.5946,icon:'🌈',name:'Sanctuary of Our Lady of Las Lajas',type:'Marian shrine',city:'Ipiales',province:'Nariño',description:'One of the most spectacular sanctuaries in the world, built inside a gorge over the Guáitara River. The neo-Gothic basilica seems to grow out of the canyon walls, and a miraculous image of Our Lady appeared on the rock face in 1754.',history:'The image appeared on the rock to an indigenous woman and her deaf-mute daughter, who was miraculously cured. The current basilica was built between 1916 and 1949. The walls inside are covered with thousands of plaques left by pilgrims giving thanks for miracles.',prayer:'Our Lady of Las Lajas, you revealed yourself in the rock of the canyon, a sign that God is present even in the hardest places of our lives. When we feel trapped in our own gorges, help us see your face. Amen.',feast:'September 15 (Our Lady of Sorrows)',es:{name:'Santuario de Nuestra Señora de Las Lajas',type:'Santuario mariano',city:'Ipiales',province:'Nariño',description:'Uno de los santuarios más espectaculares del mundo, construido dentro de un desfiladero sobre el río Guáitara. La basílica neogótica parece brotar de las paredes del cañón, y una imagen milagrosa de Nuestra Señora apareció en la roca en 1754.',history:'La imagen apareció en la roca a una mujer indígena y a su hija sordomuda, que fue curada milagrosamente. La basílica actual fue construida entre 1916 y 1949. Las paredes interiores están cubiertas de miles de placas dejadas por peregrinos en agradecimiento por milagros.',prayer:'Nuestra Señora de Las Lajas, te revelaste en la roca del desfiladero, señal de que Dios está presente incluso en los lugares más duros de nuestra vida. Cuando nos sentimos atrapados en nuestros propios desfiladeros, ayúdanos a ver tu rostro. Amén.',feast:'15 de septiembre (Nuestra Señora de los Dolores)'},fr:{name:'Sanctuaire de Notre-Dame de Las Lajas',type:'Sanctuaire marial',city:'Ipiales',province:'Nariño',description:'L\'un des sanctuaires les plus spectaculaires au monde, dans un canyon au-dessus du fleuve Guáitara. Image miraculeuse sur la roche en 1754.',history:'Image apparue à une femme indigène et sa fille sourde-muette, miraculeusement guérie. Basilique construite 1916-1949.',prayer:'Notre-Dame de Las Lajas, aide-nous à voir ton visage même dans les lieux les plus durs de notre vie. Amen.',feast:'15 septembre (Notre-Dame des Douleurs)'},it:{name:'Santuario di Nostra Signora di Las Lajas',type:'Santuario mariano',city:'Ipiales',province:'Nariño',description:'Uno dei santuari più spettacolari al mondo, in un canyon sopra il fiume Guáitara. Immagine miracolosa sulla roccia nel 1754.',history:'Immagine apparsa a una donna indigena e alla figlia sordomuta, miracolosamente guarita. Basilica costruita 1916-1949.',prayer:'Nostra Signora di Las Lajas, aiutaci a vedere il tuo volto anche nei luoghi più duri della nostra vita. Amen.',feast:'15 settembre (Nostra Signora dei Dolori)'},pt:{name:'Santuário de Nossa Senhora de Las Lajas',type:'Santuário mariano',city:'Ipiales',province:'Nariño',description:'Um dos santuários mais espetaculares do mundo, num desfiladeiro sobre o rio Guáitara. Imagem milagrosa na rocha em 1754.',history:'Imagem aparecida a uma mulher indígena e à filha surda-muda, que foi miraculosamente curada. Basílica construída 1916-1949.',prayer:'Nossa Senhora de Las Lajas, ajuda-nos a ver o teu rosto mesmo nos lugares mais duros da nossa vida. Ámen.',feast:'15 de setembro (Nossa Senhora das Dores)'}},
  {id:1402,country:'co',lat:5.6207,lng:-73.8190,icon:'🙏',name:'Sanctuary of Our Lady of Chiquinquirá',type:'Marian shrine',city:'Chiquinquirá',province:'Boyacá',description:'The national shrine of Colombia, home to the image of Our Lady of Chiquinquirá which underwent a miraculous renovation in 1586. Declared Patroness of Colombia, she is known as La Chinita by the faithful.',history:'A deteriorated canvas of Our Lady was donated to a chapel in 1586. When a woman placed it in a window, the image miraculously renewed itself before witnesses. The image was crowned in 1919 and Pope John Paul II prayed before it in 1986.',prayer:'Our Lady of Chiquinquirá, La Chinita, Patroness of Colombia, you renewed a faded image as a sign that God renews all things. Renew what is faded in us — our faith, our hope, our love — and make us shine with your Son\'s glory. Amen.',feast:'July 9 (Our Lady of Chiquinquirá)',es:{name:'Santuario de Nuestra Señora de Chiquinquirá',type:'Santuario mariano',city:'Chiquinquirá',province:'Boyacá',description:'El santuario nacional de Colombia, sede de la imagen de Nuestra Señora de Chiquinquirá que sufrió una renovación milagrosa en 1586. Declarada Patrona de Colombia, es conocida por los fieles como La Chinita.',history:'Un deteriorado lienzo de Nuestra Señora fue donado a una capilla en 1586. Cuando una mujer lo colocó en una ventana, la imagen se renovó milagrosamente ante testigos. La imagen fue coronada en 1919 y el Papa Juan Pablo II rezó ante ella en 1986.',prayer:'Nuestra Señora de Chiquinquirá, La Chinita, Patrona de Colombia, renovaste una imagen desvanecida como señal de que Dios renueva todas las cosas. Renueva lo que en nosotros está desvanecido — nuestra fe, nuestra esperanza, nuestro amor — y haznos brillar con la gloria de tu Hijo. Amén.',feast:'9 de julio (Nuestra Señora de Chiquinquirá)'},fr:{name:'Sanctuaire de Notre-Dame de Chiquinquirá',type:'Sanctuaire marial',city:'Chiquinquirá',province:'Boyacá',description:'Sanctuaire national de Colombie. Image miraculeusement rénovée en 1586, Patronne de Colombie.',history:'Un tableau détérioré se rénova miraculeusement en 1586 devant témoins. Couronnée en 1919. Jean-Paul II pria ici en 1986.',prayer:'Notre-Dame de Chiquinquirá, renouvelle ce qui est fané en nous — notre foi, notre espérance, notre amour. Amen.',feast:'9 juillet (Notre-Dame de Chiquinquirá)'},it:{name:'Santuario di Nostra Signora di Chiquinquirá',type:'Santuario mariano',city:'Chiquinquirá',province:'Boyacá',description:'Santuario nazionale della Colombia. Immagine miracolosamente rinnovata nel 1586, Patrona della Colombia.',history:'Un quadro deteriorato si rinnovò miracolosamente nel 1586 davanti a testimoni. Incoronata nel 1919. Giovanni Paolo II pregò qui nel 1986.',prayer:'Nostra Signora di Chiquinquirá, rinnova ciò che è sbiadito in noi — la nostra fede, la nostra speranza, il nostro amore. Amen.',feast:'9 luglio (Nostra Signora di Chiquinquirá)'},pt:{name:'Santuário de Nossa Senhora de Chiquinquirá',type:'Santuário mariano',city:'Chiquinquirá',province:'Boyacá',description:'Santuário nacional da Colômbia. Imagem miraculosamente renovada em 1586, Padroeira da Colômbia.',history:'Um quadro deteriorado renovou-se miraculosamente em 1586 perante testemunhas. Coroada em 1919. João Paulo II rezou aqui em 1986.',prayer:'Nossa Senhora de Chiquinquirá, renova o que está desbotado em nós — a nossa fé, a nossa esperança, o nosso amor. Ámen.',feast:'9 de julho (Nossa Senhora de Chiquinquirá)'}},
  {id:1403,country:'co',lat:3.9019,lng:-76.2983,icon:'💒',name:'Sanctuary of the Lord of Miracles of Buga',type:'Sanctuary',city:'Buga',province:'Valle del Cauca',description:'The most important sanctuary in the Pacific region of Colombia, receiving over 1.5 million pilgrims a year. The miraculous image of a small Christ was found floating in the Guadalajara River by an indigenous woman in the 16th century.',history:'According to tradition, the small image appeared to an indigenous woman fetching water from the river in the 16th century. It kept returning to the river until a chapel was built. The current neo-Gothic basilica was completed in 1907 and receives pilgrims from across Latin America.',prayer:'Lord of Miracles of Buga, found floating in the river by a humble woman, you chose the lowly to reveal your presence. May we too have eyes to find you in the unexpected places and people of our lives. Amen.',feast:'Last Sunday of March',es:{name:'Santuario del Señor de los Milagros de Buga',type:'Santuario',city:'Buga',province:'Valle del Cauca',description:'El santuario más importante de la región pacífica de Colombia, con más de 1,5 millones de peregrinos al año. La milagrosa imagen de un pequeño Cristo fue encontrada flotando en el río Guadalajara por una mujer indígena en el siglo XVI.',history:'Según la tradición, la pequeña imagen se apareció a una mujer indígena que buscaba agua en el río en el siglo XVI. Seguía regresando al río hasta que se construyó una capilla. La actual basílica neogótica fue completada en 1907 y recibe peregrinos de toda América Latina.',prayer:'Señor de los Milagros de Buga, encontrado flotando en el río por una mujer humilde, elegiste a los humildes para revelar tu presencia. Que nosotros también tengamos ojos para encontrarte en los lugares y personas inesperados de nuestra vida. Amén.',feast:'Último domingo de marzo'},fr:{name:'Sanctuaire du Seigneur des Miracles de Buga',type:'Sanctuaire',city:'Buga',province:'Valle del Cauca',description:'Le plus important sanctuaire de la région pacifique de Colombie. Plus de 1,5 million de pèlerins par an.',history:'Image apparue à une femme indigène au XVIe siècle. Basilique néogothique achevée en 1907.',prayer:'Seigneur de Buga, que nous ayons des yeux pour te trouver dans les lieux inattendus de notre vie. Amen.',feast:'Dernier dimanche de mars'},it:{name:'Santuario del Signore dei Miracoli di Buga',type:'Santuario',city:'Buga',province:'Valle del Cauca',description:'Il santuario più importante della regione pacifica della Colombia. Oltre 1,5 milioni di pellegrini all\'anno.',history:'Immagine apparsa a una donna indigena nel XVI secolo. Basilica neogotica completata nel 1907.',prayer:'Signore di Buga, che abbiamo occhi per trovarti nei luoghi inaspettati della nostra vita. Amen.',feast:'Ultima domenica di marzo'},pt:{name:'Santuário do Senhor dos Milagres de Buga',type:'Santuário',city:'Buga',province:'Valle del Cauca',description:'O santuário mais importante da região pacífica da Colômbia. Mais de 1,5 milhão de peregrinos por ano.',history:'Imagem aparecida a uma mulher indígena no século XVI. Basílica neogótica concluída em 1907.',prayer:'Senhor de Buga, que tenhamos olhos para te encontrar nos lugares inesperados da nossa vida. Ámen.',feast:'Último domingo de março'}},
  {id:1404,country:'co',lat:4.5986,lng:-74.0760,icon:'🏛️',name:'Cathedral Basilica of Bogotá',type:'Cathedral',city:'Bogotá',province:'Cundinamarca',description:'The mother church of Colombia, standing on the site where the first Mass was celebrated in 1538 in what would become Bogotá. The neo-classical facade dominates the historic Plaza de Bolívar.',history:'The current neo-classical cathedral was built between 1807 and 1823, replacing earlier colonial structures. It houses the tomb of Gonzalo Jiménez de Quesada, founder of Bogotá. Pope Francis visited Colombia in 2017 and celebrated Mass in the Plaza de Bolívar.',prayer:'Lord, on this plaza where the history of a nation was forged, we remember all who built this country in faith. May Colombia always find in your Church a source of justice, reconciliation and hope. Amen.',feast:'August 6 (Transfiguration — Cathedral dedication)',es:{name:'Catedral Basílica de Bogotá',type:'Catedral',city:'Bogotá',province:'Cundinamarca',description:'La iglesia madre de Colombia, en el lugar donde se celebró la primera misa en 1538 en lo que sería Bogotá. La fachada neoclásica domina la histórica Plaza de Bolívar.',history:'La actual catedral neoclásica fue construida entre 1807 y 1823, reemplazando estructuras coloniales anteriores. Alberga la tumba de Gonzalo Jiménez de Quesada, fundador de Bogotá. El Papa Francisco visitó Colombia en 2017 y celebró misa en la Plaza de Bolívar.',prayer:'Señor, en esta plaza donde se forjó la historia de una nación, recordamos a todos los que construyeron este país en la fe. Que Colombia encuentre siempre en tu Iglesia una fuente de justicia, reconciliación y esperanza. Amén.',feast:'6 de agosto (Transfiguración — dedicación de la Catedral)'},fr:{name:'Cathédrale Basilique de Bogotá',type:'Cathédrale',city:'Bogotá',province:'Cundinamarca',description:'Église mère de Colombie, sur le lieu de la première messe en 1538. Façade néoclassique sur la Plaza de Bolívar.',history:'Construite entre 1807 et 1823. Le pape François visita la Colombie en 2017.',prayer:'Seigneur, que la Colombie trouve en ton Église une source de justice, réconciliation et espérance. Amen.',feast:'6 août (Transfiguration)'},it:{name:'Cattedrale Basilica di Bogotá',type:'Cattedrale',city:'Bogotá',province:'Cundinamarca',description:'Chiesa madre della Colombia, nel luogo della prima messa nel 1538. Facciata neoclassica sulla Plaza de Bolívar.',history:'Costruita tra il 1807 e il 1823. Papa Francesco visitò la Colombia nel 2017.',prayer:'Signore, che la Colombia trovi nella tua Chiesa una fonte di giustizia, riconciliazione e speranza. Amen.',feast:'6 agosto (Trasfigurazione)'},pt:{name:'Catedral Basílica de Bogotá',type:'Catedral',city:'Bogotá',province:'Cundinamarca',description:'Igreja-mãe da Colômbia, no local da primeira missa em 1538. Fachada neoclássica na Plaza de Bolívar.',history:'Construída entre 1807 e 1823. O Papa Francisco visitou a Colômbia em 2017.',prayer:'Senhor, que a Colômbia encontre na tua Igreja uma fonte de justiça, reconciliação e esperança. Ámen.',feast:'6 de agosto (Transfiguração)'}},

  // ===== PHILIPPINES =====
  {id:1501,country:'ph',lat:10.2936,lng:123.9016,icon:'👶',name:'Basilica del Santo Niño',type:'Basilica',city:'Cebu City',province:'Cebu',description:'The oldest church in the Philippines, housing the image of the Holy Child Jesus brought by Ferdinand Magellan in 1521. The Sinulog festival in January draws millions of devotees in a spectacular celebration of faith.',history:'The image of the Santo Niño was given by Magellan to Queen Juana of Cebu upon her baptism in 1521. When the Spanish returned in 1565, they found the image miraculously intact among the ruins. The current basilica dates from the 18th century.',prayer:'Holy Child Jesus, Santo Niño of Cebu, you came to these islands with the first light of faith. Keep alive in us the childlike trust and joy that you inspire in millions of Filipino hearts. Amen.',feast:'Third Sunday of January (Sinulog)',es:{name:'Basílica del Santo Niño',type:'Basílica',city:'Ciudad de Cebú',province:'Cebú',description:'La iglesia más antigua de Filipinas, que alberga la imagen del Niño Jesús traída por Fernando de Magallanes en 1521. El festival Sinulog en enero atrae a millones de devotos.',history:'La imagen del Santo Niño fue entregada por Magallanes a la reina Juana de Cebú en su bautismo en 1521. Cuando los españoles regresaron en 1565, encontraron la imagen milagrosamente intacta entre las ruinas.',prayer:'Santo Niño Jesús de Cebú, llegaste a estas islas con la primera luz de la fe. Mantén viva en nosotros la confianza y la alegría que inspiras en millones de corazones filipinos. Amén.',feast:'Tercer domingo de enero (Sinulog)'},fr:{name:'Basilique du Santo Niño',type:'Basilique',city:'Cebu',province:'Cebu',description:'La plus ancienne église des Philippines, abritant l\'image de l\'Enfant Jésus apportée par Magellan en 1521. Le festival Sinulog en janvier attire des millions de fidèles.',history:'L\'image du Santo Niño fut offerte par Magellan à la reine Juana de Cebu lors de son baptême en 1521. Retrouvée miraculeusement intacte en 1565.',prayer:'Saint Enfant Jésus de Cebu, garde vivante en nous la confiance et la joie que tu inspires à des millions de cœurs. Amen.',feast:'Troisième dimanche de janvier (Sinulog)'},it:{name:'Basilica del Santo Niño',type:'Basilica',city:'Cebu',province:'Cebu',description:'La chiesa più antica delle Filippine, che custodisce l\'immagine del Bambino Gesù portata da Magellano nel 1521. Il festival Sinulog a gennaio attira milioni di devoti.',history:'L\'immagine del Santo Niño fu donata da Magellano alla regina Juana di Cebu al suo battesimo nel 1521. Ritrovata miracolosamente intatta nel 1565.',prayer:'Santo Bambino Gesù di Cebu, mantieni viva in noi la fiducia e la gioia che ispiri a milioni di cuori. Amen.',feast:'Terza domenica di gennaio (Sinulog)'},pt:{name:'Basílica do Santo Niño',type:'Basílica',city:'Cebu',province:'Cebu',description:'A igreja mais antiga das Filipinas, que alberga a imagem do Menino Jesus trazida por Magalhães em 1521. O festival Sinulog em janeiro atrai milhões.',history:'A imagem foi oferecida por Magalhães à rainha Juana de Cebu no seu batismo em 1521. Encontrada miraculosamente intacta em 1565.',prayer:'Santo Menino Jesus de Cebu, mantém viva em nós a confiança e a alegria que inspiras a milhões de corações. Ámen.',feast:'Terceiro domingo de janeiro (Sinulog)'}},
  {id:1502,country:'ph',lat:14.5988,lng:120.9843,icon:'✝️',name:'Minor Basilica of the Black Nazarene',type:'Basilica',city:'Quiapo, Manila',province:'Metro Manila',description:'Home to the Black Nazarene, a dark-skinned life-size statue of Jesus carrying the cross. The annual Traslación procession on January 9 draws 5 to 10 million barefoot devotees — one of the largest Catholic gatherings on Earth.',history:'The image was brought from Mexico by Augustinian friars in 1606. It was darkened, according to tradition, by a fire during the galleon voyage. The devotion is among the most intense expressions of popular piety in the Catholic world.',prayer:'Black Nazarene, Lord of Quiapo, you carry the cross for us. Give us strength to carry our own crosses with faith, knowing that you walk beside us. Amen.',feast:'January 9 (Traslación)',es:{name:'Basílica Menor del Nazareno Negro',type:'Basílica',city:'Quiapo, Manila',province:'Metro Manila',description:'Sede del Nazareno Negro, una imagen de tamaño natural de Jesús con la cruz. La procesión de la Traslación el 9 de enero reúne de 5 a 10 millones de devotos descalzos.',history:'La imagen fue traída de México por frailes agustinos en 1606. Se oscureció, según la tradición, por un incendio durante el viaje en galeón.',prayer:'Nazareno Negro, Señor de Quiapo, cargas la cruz por nosotros. Danos fuerza para cargar nuestras propias cruces con fe, sabiendo que caminas a nuestro lado. Amén.',feast:'9 de enero (Traslación)'},fr:{name:'Basilique Mineure du Nazaréen Noir',type:'Basilique',city:'Quiapo, Manille',province:'Metro Manila',description:'Abrite le Nazaréen Noir, une statue du Christ portant la croix. La procession de la Traslación le 9 janvier réunit 5 à 10 millions de fidèles pieds nus.',history:'L\'image fut apportée du Mexique par des augustins en 1606. Elle fut noircie, selon la tradition, par un incendie durant le voyage en galion.',prayer:'Nazaréen Noir, Seigneur de Quiapo, tu portes la croix pour nous. Donne-nous la force de porter nos croix avec foi. Amen.',feast:'9 janvier (Traslación)'},it:{name:'Basilica Minore del Nazareno Nero',type:'Basilica',city:'Quiapo, Manila',province:'Metro Manila',description:'Sede del Nazareno Nero, una statua a grandezza naturale di Gesù con la croce. La processione della Traslación il 9 gennaio riunisce da 5 a 10 milioni di devoti scalzi.',history:'L\'immagine fu portata dal Messico da frati agostiniani nel 1606. Si scurì, secondo la tradizione, per un incendio durante il viaggio in galeone.',prayer:'Nazareno Nero, Signore di Quiapo, porti la croce per noi. Dacci la forza di portare le nostre croci con fede. Amen.',feast:'9 gennaio (Traslación)'},pt:{name:'Basílica Menor do Nazareno Negro',type:'Basílica',city:'Quiapo, Manila',province:'Metro Manila',description:'Sede do Nazareno Negro, uma estátua de Jesus com a cruz. A procissão da Traslación a 9 de janeiro reúne 5 a 10 milhões de devotos descalços.',history:'A imagem foi trazida do México por frades agostinhos em 1606. Escureceu, segundo a tradição, por um incêndio durante a viagem em galeão.',prayer:'Nazareno Negro, Senhor de Quiapo, carregas a cruz por nós. Dá-nos força para carregar as nossas cruzes com fé. Ámen.',feast:'9 de janeiro (Traslación)'}},
  {id:1503,country:'ph',lat:16.0322,lng:120.4858,icon:'🌹',name:'Basilica of Our Lady of Manaoag',type:'Basilica',city:'Manaoag',province:'Pangasinan',description:'One of the most visited Marian shrines in Asia, home to a 17th-century ivory image of the Virgin Mary. Thousands of miracles are attributed to Our Lady of Manaoag, drawing pilgrims from across Southeast Asia.',history:'The ivory image was brought by Augustinian missionaries in the early 17th century. Miraculous cures were reported almost immediately. The basilica was rebuilt after earthquakes and World War II damage.',prayer:'Our Lady of Manaoag, Mother of those who seek your help, hear the prayers of all who come to you with faith. Place us under your loving protection. Amen.',feast:'Third Wednesday of April',es:{name:'Basílica de Nuestra Señora de Manaoag',type:'Basílica',city:'Manaoag',province:'Pangasinan',description:'Uno de los santuarios marianos más visitados de Asia, con una imagen de marfil de la Virgen del siglo XVII. Miles de milagros son atribuidos a Nuestra Señora de Manaoag.',history:'La imagen de marfil fue traída por misioneros agustinos a principios del siglo XVII. Las curaciones milagrosas comenzaron casi de inmediato.',prayer:'Nuestra Señora de Manaoag, Madre de quienes buscan tu ayuda, escucha las oraciones de todos los que acuden a ti con fe. Ponlos bajo tu amorosa protección. Amén.',feast:'Tercer miércoles de abril'},fr:{name:'Basilique de Notre-Dame de Manaoag',type:'Basilique',city:'Manaoag',province:'Pangasinan',description:'L\'un des sanctuaires mariaux les plus visités d\'Asie, avec une image en ivoire de la Vierge du XVIIe siècle. Des milliers de miracles sont attribués à Notre-Dame de Manaoag.',history:'L\'image en ivoire fut apportée par des missionnaires augustins au début du XVIIe siècle. Les guérisons miraculeuses commencèrent presque immédiatement.',prayer:'Notre-Dame de Manaoag, Mère de ceux qui cherchent ton aide, écoute les prières de tous ceux qui viennent à toi avec foi. Amen.',feast:'Troisième mercredi d\'avril'},it:{name:'Basilica di Nostra Signora di Manaoag',type:'Basilica',city:'Manaoag',province:'Pangasinan',description:'Uno dei santuari mariani più visitati dell\'Asia, con un\'immagine in avorio della Vergine del XVII secolo. Migliaia di miracoli sono attribuiti a Nostra Signora di Manaoag.',history:'L\'immagine in avorio fu portata da missionari agostiniani all\'inizio del XVII secolo. Le guarigioni miracolose iniziarono quasi subito.',prayer:'Nostra Signora di Manaoag, Madre di coloro che cercano il tuo aiuto, ascolta le preghiere di tutti coloro che vengono a te con fede. Amen.',feast:'Terzo mercoledì di aprile'},pt:{name:'Basílica de Nossa Senhora de Manaoag',type:'Basílica',city:'Manaoag',province:'Pangasinan',description:'Um dos santuários marianos mais visitados da Ásia, com uma imagem de marfim da Virgem do século XVII.',history:'Imagem trazida por missionários agostinhos no início do século XVII. As curas milagrosas começaram quase de imediato.',prayer:'Nossa Senhora de Manaoag, Mãe de quem procura a tua ajuda, ouve as orações de todos os que vêm a ti com fé. Ámen.',feast:'Terceira quarta-feira de abril'}},
  {id:1504,country:'ph',lat:14.5891,lng:120.9750,icon:'🏛️',name:'San Agustin Church',type:'Church',city:'Intramuros, Manila',province:'Metro Manila',description:'The oldest stone church in the Philippines and a UNESCO World Heritage Site. A masterpiece of Filipino Baroque architecture that has survived seven earthquakes, fires and the Battle of Manila in 1945.',history:'Built between 1587 and 1607 by the Augustinian friars. It is the only building left standing in Intramuros after the devastation of World War II. The ornate trompe-l\'oeil ceiling and hand-carved doors are extraordinary.',prayer:'Lord, this church has stood through centuries of trial. Like its walls, may our faith withstand every storm and remain standing when all else falls. Amen.',feast:'September 28 (Saint Augustine)',es:{name:'Iglesia de San Agustín',type:'Iglesia',city:'Intramuros, Manila',province:'Metro Manila',description:'La iglesia de piedra más antigua de Filipinas y Patrimonio de la Humanidad. Una obra maestra del barroco filipino que ha sobrevivido a siete terremotos, incendios y la Batalla de Manila de 1945.',history:'Construida entre 1587 y 1607 por los frailes agustinos. Es el único edificio que quedó en pie en Intramuros tras la devastación de la Segunda Guerra Mundial.',prayer:'Señor, esta iglesia ha resistido siglos de pruebas. Como sus muros, que nuestra fe resista toda tempestad y permanezca en pie cuando todo lo demás caiga. Amén.',feast:'28 de septiembre (San Agustín)'},fr:{name:'Église San Agustin',type:'Église',city:'Intramuros, Manille',province:'Metro Manila',description:'La plus ancienne église en pierre des Philippines et Patrimoine mondial. Chef-d\'œuvre du baroque philippin ayant survécu à sept séismes et à la Bataille de Manille de 1945.',history:'Construite entre 1587 et 1607 par les augustins. Seul bâtiment resté debout à Intramuros après la Seconde Guerre mondiale.',prayer:'Seigneur, cette église a résisté à des siècles d\'épreuves. Que notre foi résiste de même à toute tempête. Amen.',feast:'28 septembre (Saint Augustin)'},it:{name:'Chiesa di San Agustin',type:'Chiesa',city:'Intramuros, Manila',province:'Metro Manila',description:'La più antica chiesa in pietra delle Filippine e Patrimonio dell\'Umanità. Capolavoro del barocco filippino che è sopravvissuto a sette terremoti e alla Battaglia di Manila del 1945.',history:'Costruita tra il 1587 e il 1607 dagli agostiniani. Unico edificio rimasto in piedi a Intramuros dopo la Seconda Guerra Mondiale.',prayer:'Signore, questa chiesa ha resistito a secoli di prove. Che la nostra fede resista allo stesso modo a ogni tempesta. Amen.',feast:'28 settembre (Sant\'Agostino)'},pt:{name:'Igreja de San Agustin',type:'Igreja',city:'Intramuros, Manila',province:'Metro Manila',description:'A mais antiga igreja de pedra das Filipinas e Património da Humanidade. Obra-prima do barroco filipino que sobreviveu a sete terramotos e à Batalha de Manila de 1945.',history:'Construída entre 1587 e 1607 pelos frades agostinhos. Único edifício que ficou de pé em Intramuros após a Segunda Guerra Mundial.',prayer:'Senhor, esta igreja resistiu a séculos de provações. Que a nossa fé resista da mesma forma a cada tempestade. Ámen.',feast:'28 de setembro (Santo Agostinho)'}},
  {id:1505,country:'ph',lat:13.6218,lng:123.1948,icon:'🕯️',name:'Basilica of Our Lady of Peñafrancia',type:'Basilica',city:'Naga City',province:'Camarines Sur',description:'The patroness of the Bicol region. The September fluvial procession on the Naga River, where the image is carried on a decorated boat, is one of the most beautiful Catholic traditions in Asia.',history:'The devotion was brought from Spain in 1710 by a seminarian from Bicol. The image was modelled after the Virgen de la Peñafrancia of Salamanca. The fluvial procession has been held for over 300 years.',prayer:'Our Lady of Peñafrancia, patroness of Bicol, carried over the waters like the Ark of the Covenant, protect your people from floods and storms and bring us safely to the shore of eternal life. Amen.',feast:'Third Saturday of September',es:{name:'Basílica de Nuestra Señora de Peñafrancia',type:'Basílica',city:'Naga',province:'Camarines Sur',description:'La patrona de la región de Bicol. La procesión fluvial de septiembre por el río Naga, donde la imagen es llevada en un barco decorado, es una de las tradiciones católicas más bellas de Asia.',history:'La devoción fue traída de España en 1710 por un seminarista de Bicol. La imagen fue modelada a partir de la Virgen de la Peñafrancia de Salamanca. La procesión fluvial se celebra desde hace más de 300 años.',prayer:'Nuestra Señora de Peñafrancia, patrona de Bicol, llevada sobre las aguas como el Arca de la Alianza, protege a tu pueblo de inundaciones y tormentas y llévanos a salvo a la orilla de la vida eterna. Amén.',feast:'Tercer sábado de septiembre'},fr:{name:'Basilique de Notre-Dame de Peñafrancia',type:'Basilique',city:'Naga',province:'Camarines Sur',description:'La patronne de la région de Bicol. La procession fluviale de septembre sur le fleuve Naga est l\'une des plus belles traditions catholiques d\'Asie.',history:'La dévotion fut apportée d\'Espagne en 1710. L\'image fut modelée d\'après la Virgen de la Peñafrancia de Salamanque. La procession fluviale a lieu depuis plus de 300 ans.',prayer:'Notre-Dame de Peñafrancia, patronne de Bicol, portée sur les eaux, protège ton peuple et conduis-nous au rivage de la vie éternelle. Amen.',feast:'Troisième samedi de septembre'},it:{name:'Basilica di Nostra Signora di Peñafrancia',type:'Basilica',city:'Naga',province:'Camarines Sur',description:'La patrona della regione di Bicol. La processione fluviale di settembre sul fiume Naga è una delle più belle tradizioni cattoliche dell\'Asia.',history:'La devozione fu portata dalla Spagna nel 1710. L\'immagine fu modellata sulla Virgen de la Peñafrancia di Salamanca. La processione fluviale si tiene da oltre 300 anni.',prayer:'Nostra Signora di Peñafrancia, patrona di Bicol, portata sulle acque, proteggi il tuo popolo e conducici alla riva della vita eterna. Amen.',feast:'Terzo sabato di settembre'},pt:{name:'Basílica de Nossa Senhora de Peñafrancia',type:'Basílica',city:'Naga',province:'Camarines Sur',description:'Padroeira da região de Bicol. A procissão fluvial de setembro pelo rio Naga é uma das mais belas tradições católicas da Ásia.',history:'A devoção foi trazida de Espanha em 1710. A procissão fluvial celebra-se há mais de 300 anos.',prayer:'Nossa Senhora de Peñafrancia, padroeira de Bicol, protege o teu povo e conduz-nos à margem da vida eterna. Ámen.',feast:'Terceiro sábado de setembro'}},

  // ===== INDIA =====
  {id:1601,country:'in',lat:13.0337,lng:80.2780,icon:'✝️',name:'San Thome Basilica',type:'Basilica',city:'Chennai',province:'Tamil Nadu',description:'Built over the tomb of Saint Thomas the Apostle, one of the twelve disciples of Jesus. One of only three churches in the world built over the tomb of an apostle, alongside Saint Peter\'s in Rome and Santiago de Compostela.',history:'According to tradition, Thomas arrived in India in 52 AD and was martyred near Chennai in 72 AD. The Portuguese built the first church here in 1523. The current neo-Gothic basilica was completed in 1896.',prayer:'Saint Thomas, Apostle who brought the faith to India, you once doubted but then proclaimed "My Lord and my God!" Strengthen our faith and help us to believe without seeing. Amen.',feast:'July 3 (Saint Thomas the Apostle)',es:{name:'Basílica de Santo Tomé',type:'Basílica',city:'Chennai',province:'Tamil Nadu',description:'Construida sobre la tumba del apóstol Santo Tomás, uno de los doce discípulos de Jesús. Una de las tres únicas iglesias del mundo construidas sobre la tumba de un apóstol.',history:'Según la tradición, Tomás llegó a la India en el año 52 d.C. y fue martirizado cerca de Chennai en el 72 d.C. Los portugueses construyeron la primera iglesia aquí en 1523.',prayer:'Santo Tomás apóstol, que trajiste la fe a la India, dudaste pero proclamaste «¡Señor mío y Dios mío!». Fortalece nuestra fe y ayúdanos a creer sin ver. Amén.',feast:'3 de julio (Santo Tomás Apóstol)'},fr:{name:'Basilique San Thome',type:'Basilique',city:'Chennai',province:'Tamil Nadu',description:'Construite sur le tombeau de l\'apôtre saint Thomas, l\'un des douze disciples de Jésus. L\'une des trois seules églises au monde bâties sur la tombe d\'un apôtre.',history:'Selon la tradition, Thomas arriva en Inde en 52 et fut martyrisé près de Chennai en 72. Les Portugais construisirent la première église en 1523.',prayer:'Saint Thomas, apôtre qui portas la foi en Inde, tu doutas mais proclamas « Mon Seigneur et mon Dieu ! ». Fortifie notre foi et aide-nous à croire sans voir. Amen.',feast:'3 juillet (Saint Thomas Apôtre)'},it:{name:'Basilica di San Tommaso',type:'Basilica',city:'Chennai',province:'Tamil Nadu',description:'Costruita sulla tomba dell\'apostolo San Tommaso, uno dei dodici discepoli di Gesù. Una delle sole tre chiese al mondo edificate sulla tomba di un apostolo.',history:'Secondo la tradizione, Tommaso arrivò in India nel 52 d.C. e fu martirizzato vicino a Chennai nel 72 d.C. I portoghesi costruirono la prima chiesa nel 1523.',prayer:'San Tommaso apostolo, che portasti la fede in India, dubitasti ma poi proclamasti «Mio Signore e mio Dio!». Rafforza la nostra fede e aiutaci a credere senza vedere. Amen.',feast:'3 luglio (San Tommaso Apostolo)'},pt:{name:'Basílica de São Tomé',type:'Basílica',city:'Chennai',province:'Tamil Nadu',description:'Construída sobre o túmulo do apóstolo São Tomé, um dos doze discípulos de Jesus. Uma das três únicas igrejas do mundo sobre o túmulo de um apóstolo.',history:'Segundo a tradição, Tomé chegou à Índia em 52 d.C. e foi martirizado perto de Chennai em 72 d.C. Os portugueses construíram a primeira igreja em 1523.',prayer:'São Tomé apóstolo, que trouxeste a fé à Índia, duvidaste mas proclamaste «Meu Senhor e meu Deus!». Fortalece a nossa fé. Ámen.',feast:'3 de julho (São Tomé Apóstolo)'}},
  {id:1602,country:'in',lat:15.5009,lng:73.9116,icon:'🌟',name:'Basilica of Bom Jesus',type:'Basilica',city:'Old Goa',province:'Goa',description:'A UNESCO World Heritage Site housing the mortal remains of Saint Francis Xavier, co-founder of the Jesuits and the greatest missionary since Saint Paul. The body, remarkably preserved, is exposed to the public every ten years.',history:'Built between 1594 and 1605 in the Baroque style. Saint Francis Xavier died in 1552 on Sancian Island. His body was brought to Goa in 1554 and has remained here ever since. The Exposition of the relics is a major event.',prayer:'Saint Francis Xavier, Apostle of the Indies, you left everything to bring Christ to Asia. Inspire in us the same missionary zeal and help us to share the Gospel with joy and courage. Amen.',feast:'December 3 (Saint Francis Xavier)',es:{name:'Basílica del Buen Jesús',type:'Basílica',city:'Vieja Goa',province:'Goa',description:'Patrimonio de la Humanidad que alberga los restos mortales de San Francisco Javier, cofundador de los jesuitas y el mayor misionero desde San Pablo. El cuerpo, notablemente conservado, se expone al público cada diez años.',history:'Construida entre 1594 y 1605 en estilo barroco. San Francisco Javier murió en 1552 en la isla de Sancián. Su cuerpo fue trasladado a Goa en 1554 y permanece aquí desde entonces.',prayer:'San Francisco Javier, apóstol de las Indias, lo dejaste todo para llevar a Cristo a Asia. Inspíranos el mismo celo misionero y ayúdanos a compartir el Evangelio con alegría y valentía. Amén.',feast:'3 de diciembre (San Francisco Javier)'},fr:{name:'Basilique du Bon Jésus',type:'Basilique',city:'Vieux Goa',province:'Goa',description:'Patrimoine mondial abritant les restes de saint François Xavier, cofondateur des Jésuites et le plus grand missionnaire depuis saint Paul. Le corps, remarquablement conservé, est exposé tous les dix ans.',history:'Construite entre 1594 et 1605 en style baroque. Saint François Xavier mourut en 1552. Son corps fut amené à Goa en 1554.',prayer:'Saint François Xavier, apôtre des Indes, tu as tout quitté pour porter le Christ en Asie. Inspire-nous le même zèle missionnaire. Amen.',feast:'3 décembre (Saint François Xavier)'},it:{name:'Basilica del Buon Gesù',type:'Basilica',city:'Vecchia Goa',province:'Goa',description:'Patrimonio dell\'Umanità che custodisce i resti di San Francesco Saverio, cofondatore dei Gesuiti e il più grande missionario dopo San Paolo. Il corpo, straordinariamente conservato, è esposto ogni dieci anni.',history:'Costruita tra il 1594 e il 1605 in stile barocco. San Francesco Saverio morì nel 1552. Il corpo fu portato a Goa nel 1554.',prayer:'San Francesco Saverio, apostolo delle Indie, hai lasciato tutto per portare Cristo in Asia. Ispiraci lo stesso zelo missionario. Amen.',feast:'3 dicembre (San Francesco Saverio)'},pt:{name:'Basílica do Bom Jesus',type:'Basílica',city:'Velha Goa',province:'Goa',description:'Património da Humanidade que alberga os restos de São Francisco Xavier, cofundador dos Jesuítas e o maior missionário desde São Paulo.',history:'Construída entre 1594 e 1605. São Francisco Xavier morreu em 1552. O corpo foi trazido para Goa em 1554.',prayer:'São Francisco Xavier, apóstolo das Índias, inspira-nos o mesmo zelo missionário. Ámen.',feast:'3 de dezembro (São Francisco Xavier)'}},
  {id:1603,country:'in',lat:10.6820,lng:79.8466,icon:'💧',name:'Basilica of Our Lady of Good Health',type:'Basilica',city:'Velankanni',province:'Tamil Nadu',description:'Known as the Lourdes of the East, this Marian shrine receives up to 20 million pilgrims a year, making it one of the most visited Catholic sites in the world. People of all faiths come seeking healing.',history:'Three apparitions of the Virgin are reported: to a sleeping shepherd boy, to a boy carrying milk, and to Portuguese sailors rescued from a storm in the 17th century. The shrine has grown from a small chapel to a major basilica.',prayer:'Our Lady of Good Health, Mother who heals the sick and comforts the sorrowful, we come to you from every land and every faith. Hear our prayers and bring us the healing we seek. Amen.',feast:'September 8 (Nativity of Our Lady)',es:{name:'Basílica de Nuestra Señora de la Buena Salud',type:'Basílica',city:'Velankanni',province:'Tamil Nadu',description:'Conocida como la Lourdes del Este, este santuario mariano recibe hasta 20 millones de peregrinos al año. Personas de todas las religiones acuden buscando curación.',history:'Se reportan tres apariciones de la Virgen: a un pastorcillo dormido, a un niño que llevaba leche, y a marineros portugueses rescatados de una tormenta en el siglo XVII.',prayer:'Nuestra Señora de la Buena Salud, Madre que sana a los enfermos y consuela a los afligidos, venimos a ti desde todas las tierras y todas las creencias. Escucha nuestras oraciones. Amén.',feast:'8 de septiembre (Natividad de Nuestra Señora)'},fr:{name:'Basilique de Notre-Dame de Bonne Santé',type:'Basilique',city:'Velankanni',province:'Tamil Nadu',description:'Connue comme la Lourdes de l\'Est, ce sanctuaire reçoit jusqu\'à 20 millions de pèlerins par an. Des personnes de toutes confessions viennent chercher la guérison.',history:'Trois apparitions de la Vierge sont rapportées : à un berger endormi, à un garçon portant du lait, et à des marins portugais rescapés d\'une tempête au XVIIe siècle.',prayer:'Notre-Dame de Bonne Santé, Mère qui guéris les malades et consoles les affligés, écoute nos prières et apporte-nous la guérison. Amen.',feast:'8 septembre (Nativité de Notre-Dame)'},it:{name:'Basilica di Nostra Signora della Buona Salute',type:'Basilica',city:'Velankanni',province:'Tamil Nadu',description:'Conosciuta come la Lourdes dell\'Est, questo santuario riceve fino a 20 milioni di pellegrini all\'anno. Persone di ogni fede vengono in cerca di guarigione.',history:'Sono riportate tre apparizioni della Vergine: a un pastorello addormentato, a un ragazzo che portava latte, e a marinai portoghesi salvati da una tempesta nel XVII secolo.',prayer:'Nostra Signora della Buona Salute, Madre che guarisci i malati e consoli gli afflitti, ascolta le nostre preghiere e portaci la guarigione. Amen.',feast:'8 settembre (Natività di Nostra Signora)'},pt:{name:'Basílica de Nossa Senhora da Boa Saúde',type:'Basílica',city:'Velankanni',province:'Tamil Nadu',description:'Conhecida como a Lourdes do Oriente, este santuário recebe até 20 milhões de peregrinos por ano. Pessoas de todas as religiões vêm em busca de cura.',history:'Três aparições da Virgem são relatadas: a um pastorinho adormecido, a um rapaz que levava leite, e a marinheiros portugueses no século XVII.',prayer:'Nossa Senhora da Boa Saúde, Mãe que cura os doentes e consola os aflitos, ouve as nossas orações. Ámen.',feast:'8 de setembro (Natividade de Nossa Senhora)'}},
  {id:1604,country:'in',lat:15.4989,lng:73.9130,icon:'🏛️',name:'Sé Cathedral',type:'Cathedral',city:'Old Goa',province:'Goa',description:'The largest church in Asia at the time of its construction and the seat of the Archbishop of Goa. Dedicated to Saint Catherine of Alexandria, it is a monument to the Portuguese Golden Age in the East.',history:'Construction began in 1562 and was completed in 1619. The cathedral originally had two towers but one collapsed in 1776. It houses the Chapel of the Blessed Sacrament and the miraculous Cross of Miracles.',prayer:'Lord, this cathedral built at the edge of the known world reminds us that your Church knows no borders. May your Gospel reach every corner of the earth. Amen.',feast:'November 25 (Saint Catherine of Alexandria)',es:{name:'Catedral de Sé',type:'Catedral',city:'Vieja Goa',province:'Goa',description:'La iglesia más grande de Asia en el momento de su construcción y sede del Arzobispo de Goa. Dedicada a Santa Catalina de Alejandría, es un monumento de la era dorada portuguesa en Oriente.',history:'La construcción comenzó en 1562 y se completó en 1619. Originalmente tenía dos torres, pero una se derrumbó en 1776. Alberga la Capilla del Santísimo Sacramento y la Cruz de los Milagros.',prayer:'Señor, esta catedral construida en el confín del mundo conocido nos recuerda que tu Iglesia no conoce fronteras. Que tu Evangelio llegue a cada rincón de la tierra. Amén.',feast:'25 de noviembre (Santa Catalina de Alejandría)'},fr:{name:'Cathédrale Sé',type:'Cathédrale',city:'Vieux Goa',province:'Goa',description:'La plus grande église d\'Asie à l\'époque de sa construction. Dédiée à sainte Catherine d\'Alexandrie, monument de l\'âge d\'or portugais en Orient.',history:'Construction de 1562 à 1619. Avait deux tours à l\'origine, l\'une s\'effondra en 1776. Abrite la Croix des Miracles.',prayer:'Seigneur, cette cathédrale au bout du monde connu nous rappelle que ton Église ne connaît pas de frontières. Amen.',feast:'25 novembre (Sainte Catherine d\'Alexandrie)'},it:{name:'Cattedrale di Sé',type:'Cattedrale',city:'Vecchia Goa',province:'Goa',description:'La chiesa più grande dell\'Asia al momento della sua costruzione. Dedicata a Santa Caterina d\'Alessandria, monumento dell\'età d\'oro portoghese in Oriente.',history:'Costruzione dal 1562 al 1619. Aveva due torri in origine, una crollò nel 1776. Custodisce la Croce dei Miracoli.',prayer:'Signore, questa cattedrale ai confini del mondo conosciuto ci ricorda che la tua Chiesa non conosce confini. Amen.',feast:'25 novembre (Santa Caterina d\'Alessandria)'},pt:{name:'Catedral de Sé',type:'Catedral',city:'Velha Goa',province:'Goa',description:'A maior igreja da Ásia na época da sua construção. Dedicada a Santa Catarina de Alexandria, monumento da era dourada portuguesa no Oriente.',history:'Construção de 1562 a 1619. Tinha duas torres, uma desabou em 1776. Alberga a Cruz dos Milagres.',prayer:'Senhor, esta catedral nos confins do mundo conhecido lembra-nos que a tua Igreja não conhece fronteiras. Ámen.',feast:'25 de novembro (Santa Catarina de Alexandria)'}},

  // ===== SOUTH KOREA =====
  {id:1701,country:'kr',lat:37.5496,lng:126.9507,icon:'🩸',name:'Jeoldusan Martyrs\' Shrine',type:'Shrine',city:'Seoul',province:'Seoul',description:'Built on the cliff where thousands of Catholics were beheaded during the 1866 Byeongin Persecution. The name means "beheading hill". It is the most important martyrdom site in Korean Catholic history.',history:'During the Joseon dynasty, over 10,000 Catholics were martyred. At this site, believers were pushed off the cliff or beheaded. The shrine and museum were built in 1967. Pope Francis visited in 2014.',prayer:'Holy Martyrs of Korea, you gave your lives rather than deny Christ. Your blood became the seed of the Church in this land. Pray for us that we may have the same courage in our faith. Amen.',feast:'September 20 (Korean Martyrs)',es:{name:'Santuario de los Mártires de Jeoldusan',type:'Santuario',city:'Seúl',province:'Seúl',description:'Construido en el acantilado donde miles de católicos fueron decapitados durante la persecución de 1866. El nombre significa «colina de las decapitaciones». Es el lugar de martirio más importante de la historia católica coreana.',history:'Durante la dinastía Joseon, más de 10.000 católicos fueron martirizados. En este lugar, los creyentes eran arrojados del acantilado o decapitados. El santuario y museo fueron construidos en 1967. El Papa Francisco lo visitó en 2014.',prayer:'Santos Mártires de Corea, disteis vuestra vida antes que negar a Cristo. Vuestra sangre fue semilla de la Iglesia en esta tierra. Rogad por nosotros para que tengamos el mismo valor en nuestra fe. Amén.',feast:'20 de septiembre (Mártires Coreanos)'},fr:{name:'Sanctuaire des Martyrs de Jeoldusan',type:'Sanctuaire',city:'Séoul',province:'Séoul',description:'Construit sur la falaise où des milliers de catholiques furent décapités lors de la persécution de 1866. Le lieu de martyre le plus important de l\'histoire catholique coréenne.',history:'Sous la dynastie Joseon, plus de 10 000 catholiques furent martyrisés. Le sanctuaire et le musée furent construits en 1967. Le pape François le visita en 2014.',prayer:'Saints Martyrs de Corée, vous avez donné votre vie plutôt que de renier le Christ. Priez pour que nous ayons le même courage dans notre foi. Amen.',feast:'20 septembre (Martyrs Coréens)'},it:{name:'Santuario dei Martiri di Jeoldusan',type:'Santuario',city:'Seul',province:'Seul',description:'Costruito sulla scogliera dove migliaia di cattolici furono decapitati durante la persecuzione del 1866. Il luogo di martirio più importante della storia cattolica coreana.',history:'Durante la dinastia Joseon, oltre 10.000 cattolici furono martirizzati. Il santuario e il museo furono costruiti nel 1967. Papa Francesco lo visitò nel 2014.',prayer:'Santi Martiri di Corea, avete dato la vita piuttosto che rinnegare Cristo. Pregate perché abbiamo lo stesso coraggio nella nostra fede. Amen.',feast:'20 settembre (Martiri Coreani)'},pt:{name:'Santuário dos Mártires de Jeoldusan',type:'Santuário',city:'Seul',province:'Seul',description:'Construído no penhasco onde milhares de católicos foram decapitados durante a perseguição de 1866. O lugar de martírio mais importante da história católica coreana.',history:'Durante a dinastia Joseon, mais de 10.000 católicos foram martirizados. O santuário e museu foram construídos em 1967. O Papa Francisco visitou em 2014.',prayer:'Santos Mártires da Coreia, destes a vossa vida em vez de negar Cristo. Rogai por nós para que tenhamos a mesma coragem na fé. Ámen.',feast:'20 de setembro (Mártires Coreanos)'}},
  {id:1702,country:'kr',lat:36.7758,lng:126.6644,icon:'🌿',name:'Solmoe Shrine',type:'Shrine',city:'Dangjin',province:'South Chungcheong',description:'The birthplace of Saint Andrew Kim Taegon, the first Korean-born Catholic priest and the most celebrated of the 103 Korean Martyrs canonised by Pope John Paul II in 1984.',history:'Andrew Kim was born here in 1821 into a family of converts. He was ordained in Shanghai and returned to Korea to minister in secret. He was arrested and beheaded at the age of 25 in 1846. His last words urged the faithful to remain strong.',prayer:'Saint Andrew Kim Taegon, first priest of Korea, you returned to your homeland knowing it meant death, because you loved your people more than your life. Pray for us that we may serve God with the same selfless love. Amen.',feast:'September 20 (Korean Martyrs)',es:{name:'Santuario de Solmoe',type:'Santuario',city:'Dangjin',province:'Chungcheong del Sur',description:'Lugar de nacimiento de San Andrés Kim Taegón, el primer sacerdote católico coreano y el más célebre de los 103 Mártires Coreanos canonizados por Juan Pablo II en 1984.',history:'Andrés Kim nació aquí en 1821 en una familia de conversos. Fue ordenado en Shanghái y regresó a Corea para ejercer en secreto. Fue arrestado y decapitado a los 25 años en 1846.',prayer:'San Andrés Kim Taegón, primer sacerdote de Corea, regresaste a tu patria sabiendo que significaba la muerte, porque amabas a tu pueblo más que a tu vida. Ruega por nosotros. Amén.',feast:'20 de septiembre (Mártires Coreanos)'},fr:{name:'Sanctuaire de Solmoe',type:'Sanctuaire',city:'Dangjin',province:'Chungcheong du Sud',description:'Lieu de naissance de saint André Kim Taegon, premier prêtre catholique coréen et le plus célèbre des 103 Martyrs Coréens canonisés par Jean-Paul II en 1984.',history:'André Kim naquit ici en 1821. Ordonné à Shanghai, il retourna en Corée pour exercer en secret. Arrêté et décapité à 25 ans en 1846.',prayer:'Saint André Kim Taegon, premier prêtre de Corée, tu es retourné dans ta patrie sachant que cela signifiait la mort. Prie pour que nous servions Dieu avec le même amour. Amen.',feast:'20 septembre (Martyrs Coréens)'},it:{name:'Santuario di Solmoe',type:'Santuario',city:'Dangjin',province:'Chungcheong Meridionale',description:'Luogo di nascita di Sant\'Andrea Kim Taegon, primo sacerdote cattolico coreano e il più celebre dei 103 Martiri Coreani canonizzati da Giovanni Paolo II nel 1984.',history:'Andrea Kim nacque qui nel 1821. Ordinato a Shanghai, tornò in Corea per esercitare in segreto. Arrestato e decapitato a 25 anni nel 1846.',prayer:'Sant\'Andrea Kim Taegon, primo sacerdote di Corea, sei tornato in patria sapendo che significava la morte. Prega perché serviamo Dio con lo stesso amore. Amen.',feast:'20 settembre (Martiri Coreani)'},pt:{name:'Santuário de Solmoe',type:'Santuário',city:'Dangjin',province:'Chungcheong do Sul',description:'Local de nascimento de Santo André Kim Taegon, primeiro sacerdote católico coreano e o mais célebre dos 103 Mártires Coreanos canonizados por João Paulo II em 1984.',history:'André Kim nasceu aqui em 1821. Ordenado em Xangai, regressou à Coreia para exercer em segredo. Preso e decapitado aos 25 anos em 1846.',prayer:'Santo André Kim Taegon, primeiro sacerdote da Coreia, regressaste à pátria sabendo que significava a morte. Reza para que sirvamos Deus com o mesmo amor. Ámen.',feast:'20 de setembro (Mártires Coreanos)'}},
  {id:1703,country:'kr',lat:37.5633,lng:126.9872,icon:'⛪',name:'Myeongdong Cathedral',type:'Cathedral',city:'Seoul',province:'Seoul',description:'The mother church of Korean Catholicism and a symbol of democracy and human rights. This neo-Gothic cathedral in the heart of Seoul has been a gathering point for pro-democracy movements since the 1980s.',history:'Completed in 1898, it was the first parish church in Korea. During the military dicttatorship, it served as a sanctuary for pro-democracy activists. Pope Francis celebrated Mass here in 2014.',prayer:'Lord, this cathedral has been a refuge for those who seek justice and truth. May your Church always stand on the side of the poor, the oppressed and those who cry out for freedom. Amen.',feast:'May 8 (Dedication of the Cathedral)',es:{name:'Catedral de Myeongdong',type:'Catedral',city:'Seúl',province:'Seúl',description:'La iglesia madre del catolicismo coreano y símbolo de democracia y derechos humanos. Esta catedral neogótica ha sido punto de encuentro de los movimientos prodemocracia desde los años 80.',history:'Completada en 1898, fue la primera iglesia parroquial de Corea. Durante la dictadura militar sirvió como refugio para activistas prodemocracia. El Papa Francisco celebró misa aquí en 2014.',prayer:'Señor, esta catedral ha sido refugio para quienes buscan justicia y verdad. Que tu Iglesia siempre esté del lado de los pobres, los oprimidos y los que claman libertad. Amén.',feast:'8 de mayo (Dedicación de la Catedral)'},fr:{name:'Cathédrale de Myeongdong',type:'Cathédrale',city:'Séoul',province:'Séoul',description:'L\'église mère du catholicisme coréen et symbole de démocratie et de droits de l\'homme. Point de rassemblement des mouvements prodémocratie depuis les années 1980.',history:'Achevée en 1898, première église paroissiale de Corée. Elle servit de refuge aux militants prodémocratie. Le pape François y célébra la messe en 2014.',prayer:'Seigneur, cette cathédrale a été un refuge pour ceux qui cherchent la justice. Que ton Église se tienne toujours du côté des opprimés. Amen.',feast:'8 mai (Dédicace de la Cathédrale)'},it:{name:'Cattedrale di Myeongdong',type:'Cattedrale',city:'Seul',province:'Seul',description:'La chiesa madre del cattolicesimo coreano e simbolo di democrazia e diritti umani. Punto di incontro dei movimenti pro-democrazia dagli anni \'80.',history:'Completata nel 1898, prima chiesa parrocchiale della Corea. Servì da rifugio per gli attivisti pro-democrazia. Papa Francesco vi celebrò messa nel 2014.',prayer:'Signore, questa cattedrale è stata rifugio per chi cerca giustizia. Che la tua Chiesa stia sempre dalla parte degli oppressi. Amen.',feast:'8 maggio (Dedicazione della Cattedrale)'},pt:{name:'Catedral de Myeongdong',type:'Catedral',city:'Seul',province:'Seul',description:'A igreja-mãe do catolicismo coreano e símbolo de democracia e direitos humanos. Ponto de encontro dos movimentos pró-democracia desde os anos 80.',history:'Concluída em 1898, primeira igreja paroquial da Coreia. Serviu de refúgio para ativistas. O Papa Francisco celebrou missa aqui em 2014.',prayer:'Senhor, que a tua Igreja esteja sempre do lado dos oprimidos. Ámen.',feast:'8 de maio (Dedicação da Catedral)'}},
  {id:1704,country:'kr',lat:36.7041,lng:126.6009,icon:'🏔️',name:'Haemi Martyrs\' Shrine',type:'Shrine',city:'Seosan',province:'South Chungcheong',description:'The site of one of the largest mass executions of Catholics in Korean history. During the 1866 persecution, over 1,000 believers were buried alive in a pit. Pope Francis visited in 2014 and beatified 124 martyrs.',history:'The fortress of Haemi served as a prison and execution ground during the Joseon persecutions. Catholics were tortured and thrown into a pit. The site was designated a shrine in 1935. It remains deeply moving.',prayer:'Martyrs of Haemi, buried alive for your faith, your sacrifice sanctified this ground. Help us to hold fast to the faith, even when the world presses in on all sides. Amen.',feast:'September 20 (Korean Martyrs)',es:{name:'Santuario de los Mártires de Haemi',type:'Santuario',city:'Seosan',province:'Chungcheong del Sur',description:'Lugar de una de las mayores ejecuciones masivas de católicos en la historia de Corea. Durante la persecución de 1866, más de 1.000 creyentes fueron enterrados vivos. El Papa Francisco lo visitó en 2014.',history:'La fortaleza de Haemi sirvió como prisión y lugar de ejecución durante las persecuciones Joseon. Los católicos eran torturados y arrojados a una fosa. El lugar fue designado santuario en 1935.',prayer:'Mártires de Haemi, enterrados vivos por vuestra fe, vuestro sacrificio santificó esta tierra. Ayudadnos a mantener la fe incluso cuando el mundo nos presiona. Amén.',feast:'20 de septiembre (Mártires Coreanos)'},fr:{name:'Sanctuaire des Martyrs de Haemi',type:'Sanctuaire',city:'Seosan',province:'Chungcheong du Sud',description:'Lieu de l\'une des plus grandes exécutions massives de catholiques en Corée. Plus de 1 000 croyants furent enterrés vivants en 1866. Le pape François le visita en 2014.',history:'La forteresse de Haemi servit de prison et de lieu d\'exécution. Les catholiques étaient torturés et jetés dans une fosse. Désigné sanctuaire en 1935.',prayer:'Martyrs de Haemi, enterrés vivants pour votre foi, aidez-nous à tenir ferme dans la foi même quand le monde nous oppresse. Amen.',feast:'20 septembre (Martyrs Coréens)'},it:{name:'Santuario dei Martiri di Haemi',type:'Santuario',city:'Seosan',province:'Chungcheong Meridionale',description:'Luogo di una delle più grandi esecuzioni di massa di cattolici nella storia coreana. Oltre 1.000 credenti furono sepolti vivi nel 1866. Papa Francesco lo visitò nel 2014.',history:'La fortezza di Haemi servì da prigione e luogo di esecuzione. I cattolici venivano torturati e gettati in una fossa. Designato santuario nel 1935.',prayer:'Martiri di Haemi, sepolti vivi per la vostra fede, aiutateci a restare saldi nella fede anche quando il mondo ci opprime. Amen.',feast:'20 settembre (Martiri Coreani)'},pt:{name:'Santuário dos Mártires de Haemi',type:'Santuário',city:'Seosan',province:'Chungcheong do Sul',description:'Local de uma das maiores execuções em massa de católicos na história coreana. Mais de 1.000 crentes foram enterrados vivos em 1866. O Papa Francisco visitou em 2014.',history:'A fortaleza de Haemi serviu de prisão e local de execução. Os católicos eram torturados e atirados para uma fossa. Designado santuário em 1935.',prayer:'Mártires de Haemi, enterrados vivos pela vossa fé, ajudai-nos a permanecer firmes na fé mesmo quando o mundo nos oprime. Ámen.',feast:'20 de setembro (Mártires Coreanos)'}},

  // ===== JAPAN =====
  {id:1801,country:'jp',lat:32.7343,lng:129.8752,icon:'🕊️',name:'Oura Church',type:'Church',city:'Nagasaki',province:'Nagasaki',description:'The Church of the Hidden Christians, a UNESCO World Heritage Site. When French missionaries arrived in 1865, they were astonished to discover that thousands of Japanese had secretly kept the Catholic faith alive for 250 years without priests.',history:'Built in 1864 by Father Bernard Petitjean. On March 17, 1865, a group of Japanese approached and whispered: "Our hearts are the same as yours." This moment, the Discovery of the Hidden Christians, is one of the most remarkable events in Church history.',prayer:'Lord, you preserved the faith in Japan through 250 years of darkness. The Hidden Christians kept your flame alive through baptism, prayer and secret devotion. May their example inspire us to hold fast to the faith in every circumstance. Amen.',feast:'March 17 (Discovery of the Hidden Christians)',es:{name:'Iglesia de Oura',type:'Iglesia',city:'Nagasaki',province:'Nagasaki',description:'La Iglesia de los Cristianos Ocultos, Patrimonio de la Humanidad. Cuando los misioneros franceses llegaron en 1865, descubrieron asombrados que miles de japoneses habían mantenido en secreto la fe católica durante 250 años sin sacerdotes.',history:'Construida en 1864 por el padre Bernard Petitjean. El 17 de marzo de 1865, un grupo de japoneses se acercó y susurró: «Nuestros corazones son iguales a los vuestros». Este momento es uno de los más extraordinarios de la historia de la Iglesia.',prayer:'Señor, preservaste la fe en Japón durante 250 años de oscuridad. Los Cristianos Ocultos mantuvieron tu llama viva mediante el bautismo, la oración y la devoción secreta. Que su ejemplo nos inspire. Amén.',feast:'17 de marzo (Descubrimiento de los Cristianos Ocultos)'},fr:{name:'Église d\'Oura',type:'Église',city:'Nagasaki',province:'Nagasaki',description:'L\'Église des Chrétiens Cachés, Patrimoine mondial. En 1865, des missionnaires français découvrirent que des milliers de Japonais avaient secrètement gardé la foi catholique pendant 250 ans sans prêtres.',history:'Construite en 1864 par le père Petitjean. Le 17 mars 1865, un groupe de Japonais s\'approcha et murmura : « Nos cœurs sont les mêmes que les vôtres ». Un moment extraordinaire de l\'histoire de l\'Église.',prayer:'Seigneur, tu as préservé la foi au Japon pendant 250 ans d\'obscurité. Que l\'exemple des Chrétiens Cachés nous inspire à tenir ferme dans la foi. Amen.',feast:'17 mars (Découverte des Chrétiens Cachés)'},it:{name:'Chiesa di Oura',type:'Chiesa',city:'Nagasaki',province:'Nagasaki',description:'La Chiesa dei Cristiani Nascosti, Patrimonio dell\'Umanità. Nel 1865 missionari francesi scoprirono con stupore che migliaia di giapponesi avevano segretamente mantenuto la fede cattolica per 250 anni senza sacerdoti.',history:'Costruita nel 1864 da padre Petitjean. Il 17 marzo 1865, un gruppo di giapponesi si avvicinò e sussurrò: «I nostri cuori sono uguali ai vostri». Uno dei momenti più straordinari della storia della Chiesa.',prayer:'Signore, hai preservato la fede in Giappone per 250 anni di oscurità. Che l\'esempio dei Cristiani Nascosti ci ispiri a restare saldi nella fede. Amen.',feast:'17 marzo (Scoperta dei Cristiani Nascosti)'},pt:{name:'Igreja de Oura',type:'Igreja',city:'Nagasaki',province:'Nagasaki',description:'A Igreja dos Cristãos Ocultos, Património da Humanidade. Em 1865 missionários franceses descobriram com espanto que milhares de japoneses tinham mantido secretamente a fé católica durante 250 anos sem sacerdotes.',history:'Construída em 1864 pelo padre Petitjean. A 17 de março de 1865, um grupo de japoneses aproximou-se e sussurrou: «Os nossos corações são iguais aos vossos». Um dos momentos mais extraordinários da história da Igreja.',prayer:'Senhor, preservaste a fé no Japão durante 250 anos de escuridão. Que o exemplo dos Cristãos Ocultos nos inspire a permanecer firmes na fé. Ámen.',feast:'17 de março (Descoberta dos Cristãos Ocultos)'}},
  {id:1802,country:'jp',lat:32.7746,lng:129.8649,icon:'🩸',name:'Twenty-Six Martyrs Monument',type:'Shrine',city:'Nagasaki',province:'Nagasaki',description:'A monument and museum on Nishizaka Hill where 26 Catholics — six Franciscan missionaries, three Japanese Jesuits and seventeen Japanese laypeople including three boys — were crucified on February 5, 1597, on the orders of Toyotomi Hideyoshi.',history:'The 26 were marched 800 km from Kyoto to Nagasaki in winter as a warning. They sang hymns as they were crucified. They were canonised by Pope Pius IX in 1862. The site remains a powerful place of pilgrimage.',prayer:'Holy Martyrs of Nagasaki, you walked to your deaths singing the Te Deum. Your courage turned a hill of execution into holy ground. Pray for us that we may face our trials with the same faith and joy. Amen.',feast:'February 6 (Twenty-Six Martyrs of Japan)',es:{name:'Monumento a los Veintiséis Mártires',type:'Santuario',city:'Nagasaki',province:'Nagasaki',description:'Monumento y museo en la colina de Nishizaka donde 26 católicos — seis franciscanos, tres jesuitas japoneses y diecisiete laicos japoneses, incluidos tres niños — fueron crucificados el 5 de febrero de 1597.',history:'Los 26 fueron obligados a marchar 800 km desde Kioto hasta Nagasaki en invierno. Cantaban himnos mientras eran crucificados. Fueron canonizados por el Papa Pío IX en 1862.',prayer:'Santos Mártires de Nagasaki, caminasteis a la muerte cantando el Te Deum. Vuestro valor convirtió una colina de ejecución en tierra santa. Rogad por nosotros. Amén.',feast:'6 de febrero (Veintiséis Mártires de Japón)'},fr:{name:'Monument des Vingt-Six Martyrs',type:'Sanctuaire',city:'Nagasaki',province:'Nagasaki',description:'Monument et musée sur la colline de Nishizaka où 26 catholiques furent crucifiés le 5 février 1597 sur ordre de Toyotomi Hideyoshi.',history:'Les 26 furent forcés de marcher 800 km de Kyoto à Nagasaki en hiver. Ils chantaient des hymnes en étant crucifiés. Canonisés par Pie IX en 1862.',prayer:'Saints Martyrs de Nagasaki, vous avez marché à la mort en chantant le Te Deum. Votre courage a transformé une colline d\'exécution en terre sainte. Priez pour nous. Amen.',feast:'6 février (Vingt-Six Martyrs du Japon)'},it:{name:'Monumento dei Ventisei Martiri',type:'Santuario',city:'Nagasaki',province:'Nagasaki',description:'Monumento e museo sulla collina di Nishizaka dove 26 cattolici furono crocifissi il 5 febbraio 1597 per ordine di Toyotomi Hideyoshi.',history:'I 26 furono costretti a marciare 800 km da Kyoto a Nagasaki in inverno. Cantavano inni mentre venivano crocifissi. Canonizzati da Pio IX nel 1862.',prayer:'Santi Martiri di Nagasaki, avete camminato verso la morte cantando il Te Deum. Il vostro coraggio ha trasformato una collina di esecuzione in terra santa. Pregate per noi. Amen.',feast:'6 febbraio (Ventisei Martiri del Giappone)'},pt:{name:'Monumento dos Vinte e Seis Mártires',type:'Santuário',city:'Nagasaki',province:'Nagasaki',description:'Monumento e museu na colina de Nishizaka onde 26 católicos foram crucificados a 5 de fevereiro de 1597 por ordem de Toyotomi Hideyoshi.',history:'Os 26 foram obrigados a marchar 800 km de Quioto a Nagasaki no inverno. Cantavam hinos enquanto eram crucificados. Canonizados por Pio IX em 1862.',prayer:'Santos Mártires de Nagasaki, caminhastes para a morte cantando o Te Deum. A vossa coragem transformou uma colina de execução em terra santa. Rogai por nós. Ámen.',feast:'6 de fevereiro (Vinte e Seis Mártires do Japão)'}},
  {id:1803,country:'jp',lat:32.7744,lng:129.8689,icon:'⛪',name:'Urakami Cathedral',type:'Cathedral',city:'Nagasaki',province:'Nagasaki',description:'Built over 30 years by the Hidden Christians who came out of hiding after 1865. It was the largest cathedral in East Asia — until August 9, 1945, when the atomic bomb destroyed it completely. Rebuilt as a symbol of peace and resilience.',history:'Construction began in 1895 and was completed in 1925. On August 9, 1945, the atomic bomb exploded 500 metres away, killing 8,500 of the 12,000 Urakami Catholics. The cathedral was rebuilt in 1959. Remnants of the original are displayed as a memorial.',prayer:'Lord, from the ashes of Urakami your people rose again. This cathedral, twice built by the hands of the faithful, stands as a testament to the power of faith over destruction. Grant peace to the world. Amen.',feast:'August 9 (Memorial of the Atomic Bombing)',es:{name:'Catedral de Urakami',type:'Catedral',city:'Nagasaki',province:'Nagasaki',description:'Construida durante 30 años por los Cristianos Ocultos. Era la catedral más grande de Asia Oriental hasta que la bomba atómica del 9 de agosto de 1945 la destruyó por completo. Reconstruida como símbolo de paz.',history:'Construcción de 1895 a 1925. El 9 de agosto de 1945, la bomba atómica explotó a 500 metros, matando a 8.500 de los 12.000 católicos de Urakami. Reconstruida en 1959.',prayer:'Señor, de las cenizas de Urakami tu pueblo resurgió. Esta catedral, construida dos veces por manos de fieles, es testimonio del poder de la fe sobre la destrucción. Concede la paz al mundo. Amén.',feast:'9 de agosto (Memorial del Bombardeo Atómico)'},fr:{name:'Cathédrale d\'Urakami',type:'Cathédrale',city:'Nagasaki',province:'Nagasaki',description:'Construite en 30 ans par les Chrétiens Cachés. C\'était la plus grande cathédrale d\'Asie de l\'Est jusqu\'au 9 août 1945, quand la bombe atomique la détruisit entièrement. Reconstruite comme symbole de paix.',history:'Construction de 1895 à 1925. Le 9 août 1945, la bombe explosa à 500 mètres, tuant 8 500 des 12 000 catholiques d\'Urakami. Reconstruite en 1959.',prayer:'Seigneur, des cendres d\'Urakami ton peuple s\'est relevé. Cette cathédrale, deux fois bâtie par les mains des fidèles, témoigne du pouvoir de la foi sur la destruction. Accorde la paix au monde. Amen.',feast:'9 août (Mémorial du bombardement atomique)'},it:{name:'Cattedrale di Urakami',type:'Cattedrale',city:'Nagasaki',province:'Nagasaki',description:'Costruita in 30 anni dai Cristiani Nascosti. Era la cattedrale più grande dell\'Asia Orientale fino al 9 agosto 1945, quando la bomba atomica la distrusse completamente. Ricostruita come simbolo di pace.',history:'Costruzione dal 1895 al 1925. Il 9 agosto 1945, la bomba esplose a 500 metri, uccidendo 8.500 dei 12.000 cattolici di Urakami. Ricostruita nel 1959.',prayer:'Signore, dalle ceneri di Urakami il tuo popolo è risorto. Questa cattedrale, costruita due volte dalle mani dei fedeli, testimonia il potere della fede sulla distruzione. Concedi la pace al mondo. Amen.',feast:'9 agosto (Memoriale del bombardamento atomico)'},pt:{name:'Catedral de Urakami',type:'Catedral',city:'Nagasaki',province:'Nagasaki',description:'Construída em 30 anos pelos Cristãos Ocultos. Era a maior catedral da Ásia Oriental até ao 9 de agosto de 1945, quando a bomba atómica a destruiu completamente. Reconstruída como símbolo de paz.',history:'Construção de 1895 a 1925. A 9 de agosto de 1945, a bomba explodiu a 500 metros, matando 8.500 dos 12.000 católicos de Urakami. Reconstruída em 1959.',prayer:'Senhor, das cinzas de Urakami o teu povo ressurgiu. Esta catedral, construída duas vezes pelas mãos dos fiéis, testemunha o poder da fé sobre a destruição. Concede a paz ao mundo. Ámen.',feast:'9 de agosto (Memorial do bombardeamento atómico)'}},
  {id:1804,country:'jp',lat:35.7178,lng:139.7283,icon:'🏛️',name:'Saint Mary\'s Cathedral',type:'Cathedral',city:'Tokyo',province:'Tokyo',description:'The seat of the Archbishop of Tokyo, designed by renowned architect Kenzo Tange in 1964. Its striking modernist form, shaped like a cross when seen from above, represents the renewal of the Japanese Catholic Church after the war.',history:'The original Gothic cathedral was destroyed in the 1945 Tokyo firebombing. Kenzo Tange designed the new cathedral using stainless steel and concrete. It was consecrated in 1964. Its interior creates an extraordinary vertical space of prayer.',prayer:'Lord, in this cathedral where ancient faith meets modern architecture, may we too find new ways to express our eternal devotion to you. Bless the Church in Japan and all who seek you in this great city. Amen.',feast:'August 15 (Assumption)',es:{name:'Catedral de Santa María',type:'Catedral',city:'Tokio',province:'Tokio',description:'Sede del Arzobispo de Tokio, diseñada por el célebre arquitecto Kenzo Tange en 1964. Su impactante forma modernista, en forma de cruz vista desde arriba, representa la renovación de la Iglesia católica japonesa tras la guerra.',history:'La catedral gótica original fue destruida en el bombardeo incendiario de Tokio de 1945. Kenzo Tange diseñó la nueva catedral en acero inoxidable y hormigón. Fue consagrada en 1964.',prayer:'Señor, en esta catedral donde la fe antigua encuentra la arquitectura moderna, que también nosotros encontremos nuevas formas de expresar nuestra eterna devoción. Bendice a la Iglesia en Japón. Amén.',feast:'15 de agosto (Asunción)'},fr:{name:'Cathédrale Sainte-Marie',type:'Cathédrale',city:'Tokyo',province:'Tokyo',description:'Siège de l\'archevêque de Tokyo, conçue par l\'architecte Kenzo Tange en 1964. Sa forme moderniste en croix vue du ciel symbolise le renouveau de l\'Église catholique japonaise après la guerre.',history:'La cathédrale gothique originale fut détruite lors des bombardements incendiaires de Tokyo en 1945. Kenzo Tange conçut la nouvelle en acier et béton. Consacrée en 1964.',prayer:'Seigneur, dans cette cathédrale où la foi ancienne rencontre l\'architecture moderne, bénis l\'Église au Japon et tous ceux qui te cherchent. Amen.',feast:'15 août (Assomption)'},it:{name:'Cattedrale di Santa Maria',type:'Cattedrale',city:'Tokyo',province:'Tokyo',description:'Sede dell\'Arcivescovo di Tokyo, progettata dal celebre architetto Kenzo Tange nel 1964. La sua forma modernista a croce vista dall\'alto rappresenta il rinnovamento della Chiesa cattolica giapponese dopo la guerra.',history:'La cattedrale gotica originale fu distrutta nei bombardamenti incendiari di Tokyo del 1945. Kenzo Tange progettò la nuova in acciaio e cemento. Consacrata nel 1964.',prayer:'Signore, in questa cattedrale dove la fede antica incontra l\'architettura moderna, benedici la Chiesa in Giappone e tutti coloro che ti cercano. Amen.',feast:'15 agosto (Assunzione)'},pt:{name:'Catedral de Santa Maria',type:'Catedral',city:'Tóquio',province:'Tóquio',description:'Sede do Arcebispo de Tóquio, projetada pelo célebre arquiteto Kenzo Tange em 1964. A sua forma modernista em cruz vista do alto representa a renovação da Igreja católica japonesa após a guerra.',history:'A catedral gótica original foi destruída nos bombardeamentos incendiários de Tóquio de 1945. Kenzo Tange projetou a nova em aço e betão. Consagrada em 1964.',prayer:'Senhor, nesta catedral onde a fé antiga encontra a arquitetura moderna, abençoa a Igreja no Japão e todos os que te procuram. Ámen.',feast:'15 de agosto (Assunção)'}},

  // ===== UNITED STATES =====
